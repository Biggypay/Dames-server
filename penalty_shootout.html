<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Penalty Shootout - Mindspille</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ══ TOP BAR — même structure que Dames ══ */
#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}
.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);font-size:22px;transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* États profil — identiques Dames */
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.10)}
.profile.active.me-active .profile-avatar{box-shadow:0 0 18px rgba(255,255,255,0.5)}
.profile.active.op-active .profile-avatar{box-shadow:0 0 18px rgba(251,191,36,0.5)}
.profile.choosing .profile-avatar{border-color:rgba(251,191,36,0.8);box-shadow:0 0 18px rgba(251,191,36,0.5)}
.profile.done .profile-avatar{border-color:rgba(74,222,128,0.8);box-shadow:0 0 18px rgba(74,222,128,0.5)}
.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;transition:color 0.3s;text-align:center;max-width:72px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.profile.active .profile-name{color:rgba(255,255,255,0.9)}
.profile-role{font-size:10px;color:rgba(255,255,255,0.5);min-height:14px;text-align:center;font-family:'Cinzel',serif;letter-spacing:0.5px}
.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#fff;display:inline-block}
.snum.bump{animation:scoreBump .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes scoreBump{0%,100%{transform:scale(1)}50%{transform:scale(1.6) rotate(-5deg)}}
.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px;font-family:'Cinzel',serif}
/* Timer urgent — identique Dames */
.timer-urgent .timer-arc{animation:urgentPulse 0.5s infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:0.35}}

/* ══ MAIN WRAP ══ */
#wrap{flex:1 1 auto;position:relative;overflow:hidden}

/* ══ LOADING — identique Dames ══ */
#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif;text-align:center;padding:0 16px}

/* ══ TOAST — identique Dames ══ */
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px;white-space:pre-line}

/* ══ BARRES SYSTÈME — identiques Dames ══ */
#reconn-bar{position:absolute;top:0;left:0;right:0;z-index:150;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none}
#reconn-bar.show{display:block}
#forfeit-bar{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.95);border:1px solid rgba(251,191,36,0.5);border-radius:99px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#fbbf24;display:none;z-index:25;backdrop-filter:blur(8px);white-space:nowrap}
#forfeit-bar.show{display:block}

/* ══ CANVASES ══ */
#goal-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#particles-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:8}
#confetti-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:55}
#screen-flash{position:absolute;inset:0;z-index:25;pointer-events:none;opacity:0}
.flash-goal{background:radial-gradient(ellipse at 50% 50%,rgba(251,191,36,.55) 0%,transparent 70%)}
.flash-save{background:radial-gradient(ellipse at 50% 50%,rgba(248,113,113,.45) 0%,transparent 70%)}
@keyframes flashAni{0%{opacity:1}100%{opacity:0}}

/* ══ ZONES CLIQUABLES — z-index élevé ══ */
#spots-layer{position:absolute;inset:0;pointer-events:none;z-index:15}
.zone-btn{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;border:none;background:none;outline:none;
  animation:zoneAppear .45s cubic-bezier(.34,1.56,.64,1) both;
  touch-action:manipulation;
}
@keyframes zoneAppear{from{transform:translate(-50%,-50%) scale(0) rotate(-180deg);opacity:0}to{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}}
.zone-btn:nth-child(1){animation-delay:.05s}
.zone-btn:nth-child(2){animation-delay:.13s}
.zone-btn:nth-child(3){animation-delay:.21s}
.zone-ring{
  width:72px;height:72px;border-radius:50%;
  border:2.5px solid rgba(251,191,36,0.45);
  background:rgba(251,191,36,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;position:relative;transition:all .18s;
}
.zone-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:3px solid transparent;border-top-color:rgba(251,191,36,0.35);border-right-color:rgba(251,191,36,0.15);animation:rotArc 3s linear infinite}
.zone-ring::after{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(251,191,36,0.1);animation:rotArc 5s linear infinite reverse}
@keyframes rotArc{to{transform:rotate(360deg)}}
.zone-btn:hover .zone-ring{border-color:rgba(251,191,36,0.85);background:rgba(251,191,36,0.18);transform:scale(1.1)}
.zone-btn.selected .zone-ring{border-color:#fbbf24;background:rgba(251,191,36,0.25);box-shadow:0 0 0 8px rgba(251,191,36,0.15),0 0 32px rgba(251,191,36,0.6);animation:ringPulse 1s ease-in-out infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.45),0 0 22px rgba(251,191,36,.35)}50%{box-shadow:0 0 0 16px rgba(251,191,36,0),0 0 40px rgba(251,191,36,.7)}}
.zone-btn.selected .zone-ring::before{border-top-color:#fbbf24;border-right-color:rgba(251,191,36,.45);animation:rotArc .6s linear infinite}
.zone-btn.dimmed .zone-ring{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.02);opacity:.38;transform:scale(0.9)}

/* ══ RESULT OVERLAY ══ */
.result-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.68);opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.result-overlay.show{opacity:1}
.result-txt{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;animation:rPop .5s cubic-bezier(.34,1.56,.64,1);margin-bottom:10px;text-align:center}
.result-txt.goal{color:#fbbf24;text-shadow:0 0 60px rgba(251,191,36,.9),0 0 120px rgba(251,191,36,.5)}
.result-txt.saved{color:#f87171;text-shadow:0 0 60px rgba(248,113,113,.9),0 0 120px rgba(248,113,113,.5)}
.result-sub{color:rgba(255,255,255,.85);font-size:.9rem;font-weight:600;font-family:'Cinzel',serif;letter-spacing:1px;animation:fadeUp .5s .1s both}
.result-timer{width:180px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin-top:18px;overflow:hidden;animation:fadeUp .5s .2s both}
.result-timer-fill{height:100%;border-radius:2px;background:#fbbf24}
@keyframes timerDrain{from{width:100%}to{width:0%}}
@keyframes rPop{from{transform:scale(.05) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══ BOT BAR — identique Dames ══ */
#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
#choice-hint{font-family:'Cinzel',serif;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;flex:1;text-align:left;min-height:16px}
.btn-confirm{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1e1b4b;border:none;border-radius:99px;padding:10px 22px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:1px;white-space:nowrap;box-shadow:0 4px 16px rgba(251,191,36,.4)}
.btn-confirm:disabled{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.25);cursor:default;box-shadow:none}
.btn-confirm:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(251,191,36,.6)}
.btn-confirm:not(:disabled):active{transform:scale(0.96)}
</style>
</head>
<body>

<!-- TOP BAR — identique Dames -->
<div id="top">
  <div class="profile" id="profile-me">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-me" cx="29" cy="29" r="26" stroke="#fbbf24"/>
      </svg>
      <div class="profile-avatar" id="avatar-me">⚽</div>
    </div>
    <div class="profile-name" id="name-me">Moi</div>
    <div class="profile-role" id="role-me"></div>
  </div>

  <div class="top-center">
    <div class="score-row">
      <span class="snum" id="score-me">0</span>
      <span class="ssep">vs</span>
      <span class="snum" id="score-op">0</span>
    </div>
    <span class="manche-lbl" id="round-lbl">Penalty Shootout</span>
  </div>

  <div class="profile" id="profile-op">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-op" cx="29" cy="29" r="26" stroke="#f87171"/>
      </svg>
      <div class="profile-avatar" id="avatar-op">🥅</div>
    </div>
    <div class="profile-name" id="name-op">Adversaire</div>
    <div class="profile-role" id="role-op"></div>
  </div>
</div>

<!-- MAIN -->
<div id="wrap">
  <div id="loading"><div class="spin"></div><p>CONNEXION EN COURS…</p></div>
  <canvas id="goal-canvas"></canvas>
  <canvas id="particles-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div id="screen-flash"></div>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
  <div id="spots-layer"></div>
  <div class="result-overlay" id="result-overlay">
    <div class="result-txt" id="result-txt">BUT !</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-timer"><div class="result-timer-fill" id="result-timer-fill"></div></div>
  </div>
  <div id="toast">
    <div id="toast-emoji"></div>
    <div id="toast-title"></div>
    <div id="toast-sub"></div>
  </div>
</div>

<!-- BOT BAR -->
<div id="bot">
  <div id="choice-hint">Sélectionnez une zone</div>
  <button class="btn-confirm" id="btn-confirm" disabled onclick="window._penaltyConfirm()">✅ VALIDER</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ══════════════════════════════════════════════════════════
   PENALTY SHOOTOUT — Architecture identique au jeu de Dames
   · Timers synchronisés serveur (pendingTimerData)
   · Reconnexion / restauration d'état complète
   · Forfait avec countdown
   · postMessage résultat
   · game:over / game:result identiques
══════════════════════════════════════════════════════════ */

window.onerror = function(msg,url,line,col,err){
  var ld = document.getElementById('loading');
  if(ld) ld.querySelector('p').textContent = 'ERREUR JS: '+msg+' (L'+line+')';
  return false;
};

(function(){
'use strict';

/* ══════════════════════════════════════
   PARAMS URL — identiques Dames
══════════════════════════════════════ */
var P = new URLSearchParams(window.location.search);
var ROOM_ID    = P.get('room')    || '';
var MY_SLOT    = parseInt(P.get('player') || '1', 10);
var P1_ID      = P.get('p1Id')    || '';
var P2_ID      = P.get('p2Id')    || '';
var P1_NAME    = P.get('p1Name')  || 'Joueur 1';
var P2_NAME    = P.get('p2Name')  || 'Joueur 2';
var BET_AMOUNT = parseFloat(P.get('bet') || '0');
var CURRENCY   = P.get('currency') || 'HTG';

if(!ROOM_ID && P1_ID && P2_ID){
  var _ids = [P1_ID, P2_ID].sort();
  ROOM_ID = 'penalty-' + _ids[0].slice(-8) + '-' + _ids[1].slice(-8);
}
if(!ROOM_ID) ROOM_ID = P.get('gameId') || P.get('matchId') || '';

/* 0-indexed cohérents — MY_SLOT 1 = player 0, MY_SLOT 2 = player 1 */
var MY_PLAYER      = MY_SLOT === 1 ? 0 : 1;
var MY_SUPABASE_ID = MY_SLOT === 1 ? P1_ID  : P2_ID;
var OP_SUPABASE_ID = MY_SLOT === 1 ? P2_ID  : P1_ID;
var MY_NAME        = MY_SLOT === 1 ? P1_NAME : P2_NAME;
var OP_NAME        = MY_SLOT === 1 ? P2_NAME : P1_NAME;

/* ══════════════════════════════════════
   CONSTANTES
══════════════════════════════════════ */
var TOTAL_ROUNDS   = 10;
var TIMER_DURATION = 15000;           /* 15s pour choisir */
var CIRC           = 2 * Math.PI * 26; /* arc SVG r=26 */

/* Slot 1 tire les manches impaires, Slot 2 les paires */
function isMyRoleShooter(round){
  return MY_SLOT === 1 ? (round % 2 === 1) : (round % 2 === 0);
}

/* ══════════════════════════════════════
   STATE — identique Dames
══════════════════════════════════════ */
var gameOver      = false;
var gameReady     = false;
var resultSent    = false;
var isProcessing  = false;        /* bloque les interactions pendant l'anim */
var currentRound  = 1;
var scores        = {me:0, op:0};
var myChoice      = null;
var opChoiceReceived = false;
var phase         = 'idle';       /* idle | choosing | resolving | showing */

/* BUG FIX identique Dames : timer en attente tant que gameReady=false */
var pendingTimerData = null;

/* ══════════════════════════════════════
   SOCKET
══════════════════════════════════════ */
var socket       = null;
var forfeitTimer  = null;
var forfeitCountdown = 0;
var timerStart   = null;
var timerRAF     = null;
var timerActive  = false;
var graceRAF     = null;
var graceActive  = false;

function hideLoading(){
  var ld = document.getElementById('loading');
  if(ld){ ld.style.opacity='0'; setTimeout(function(){ ld.style.display='none'; }, 500); }
}

function emitJoin(){
  socket.emit('penalty_join',{
    room:ROOM_ID, player:MY_SLOT,
    supabaseId:MY_SUPABASE_ID, name:MY_NAME,
    bet:BET_AMOUNT, currency:CURRENCY
  });
}

function initSocket(){
  var lt = document.querySelector('#loading p');
  if(lt) lt.textContent = 'ROOM: '+(ROOM_ID||'MANQUANT')+' | SLOT: '+MY_SLOT;

  socket = io({
    transports:['websocket','polling'],
    reconnection:true,
    reconnectionAttempts:Infinity,
    reconnectionDelay:1000,
    reconnectionDelayMax:5000,
    timeout:20000
  });

  /* ── connect ── */
  socket.on('connect', function(){
    document.getElementById('reconn-bar').classList.remove('show');
    emitJoin();
  });

  /* ── disconnect ── */
  socket.on('disconnect', function(){
    if(!gameOver) document.getElementById('reconn-bar').classList.add('show');
  });

  /* ── connect_error ── */
  socket.on('connect_error', function(){
    var lt = document.querySelector('#loading p');
    if(lt && !gameReady) lt.textContent = 'CONNEXION IMPOSSIBLE — Vérifiez votre réseau';
  });

  /* ════════════════════════════════════════════════════════
     penalty_start — démarrage ou restauration d'état
     IDENTIQUE à dames_start
  ════════════════════════════════════════════════════════ */
  socket.on('penalty_start', function(data){
    hideLoading();

    if(data.reconnected && gameReady){
      /* Reconnexion simple — partie déjà en mémoire */
      gameOver = false; isProcessing = false;
      stopForfeitCountdown();
      showToast('📶','Connexion rétablie','La partie reprend !', 2000, function(){ updUI(); });

    } else if(data.reconnected && !gameReady && !data.gameState){
      /* Reconnexion sans état serveur */
      startPenaltyGame();

    } else if(data.reconnected && data.gameState){
      /* Restauration complète — identique Dames FIX3 */
      gameOver = false; isProcessing = false; resultSent = false;
      stopForfeitCountdown();
      try {
        var gs = data.gameState;
        currentRound = gs.round || 1;
        phase        = gs.phase || 'choosing';
        scores.me    = gs.scores ? (MY_SLOT===1 ? gs.scores.p1 : gs.scores.p2) : 0;
        scores.op    = gs.scores ? (MY_SLOT===1 ? gs.scores.p2 : gs.scores.p1) : 0;
        myChoice     = null;
        opChoiceReceived = false;
        updateScores();
        stopTimer(); stopGraceTimer();
        showToast('📶','Partie restaurée','Reprise là où vous étiez !', 2400, function(){
          gameReady = true;
          updUI();
          applyPendingTimer(); /* BUG FIX identique Dames */
          if(phase === 'choosing') startRound();
        });
      } catch(e){ startPenaltyGame(); }

    } else {
      startPenaltyGame();
    }
  });

  /* ════════════════════════════════════════════════════════
     penalty_turn_start — timer synchronisé serveur
     IDENTIQUE à dames_turn_start avec pendingTimerData
  ════════════════════════════════════════════════════════ */
  socket.on('penalty_turn_start', function(data){
    if(gameOver) return;
    /* Stocker TOUJOURS — appliqué dès gameReady si besoin */
    pendingTimerData = {
      type:'turn_start',
      player:data.player,         /* MY_SLOT qui doit jouer */
      startTime:data.startTime,
      duration:data.duration || TIMER_DURATION
    };
    if(!gameReady) return;
    stopGraceTimer();
    startTimer(data.player === MY_SLOT, data.startTime, data.duration || TIMER_DURATION);
  });

  /* ── penalty_turn_warning — période de grâce ── */
  socket.on('penalty_turn_warning', function(data){
    if(gameOver) return;
    startGraceTimer(data.player === MY_SLOT, data.startTime, data.duration || 30000);
  });

  /* ── penalty_turn_sync — resynchronisation ── */
  socket.on('penalty_turn_sync', function(data){
    if(gameOver) return;
    pendingTimerData = {
      type:'sync',
      serverTime:data.serverTime,
      turnPlayer:data.turnPlayer,
      graceStartTime:data.graceStartTime || null,
      turnStartTime:data.turnStartTime   || null,
      duration:data.duration || TIMER_DURATION
    };
    if(!gameReady) return;
    var offset = Date.now() - data.serverTime;
    if(data.graceStartTime){
      startGraceTimer(data.turnPlayer === MY_SLOT, data.graceStartTime + offset, data.duration || 30000);
    } else if(data.turnStartTime){
      startTimer(data.turnPlayer === MY_SLOT, data.turnStartTime + offset, data.duration || TIMER_DURATION);
    }
  });

  /* ════════════════════════════════════════════════════════
     penalty_choice_received — l'adversaire a soumis son choix
  ════════════════════════════════════════════════════════ */
  socket.on('penalty_choice_received', function(data){
    if(data.player !== MY_SLOT){
      opChoiceReceived = true;
      updateChoiceHint();
      var profOp = document.getElementById('profile-op');
      profOp.classList.remove('choosing');
      profOp.classList.add('done');
    }
  });

  /* ════════════════════════════════════════════════════════
     penalty_round_result — résultat du round
  ════════════════════════════════════════════════════════ */
  socket.on('penalty_round_result', function(data){
    if(gameOver) return;
    stopTimer(); stopGraceTimer();

    var myZone     = MY_SLOT === 1 ? data.p1Zone : data.p2Zone;
    var opZone     = MY_SLOT === 1 ? data.p2Zone : data.p1Zone;
    var iamShooter = isMyRoleShooter(currentRound);
    var shooterZone= iamShooter ? myZone : opZone;
    var keeperZone = iamShooter ? opZone : myZone;
    var isGoal     = data.isGoal;

    if(isGoal){
      if(iamShooter){ scores.me++; bumpScore('me'); }
      else           { scores.op++; bumpScore('op'); }
    }
    updateScores();

    resolveAnimation(shooterZone, keeperZone, isGoal, iamShooter, function(){
      var nextRound = data.nextRound || (currentRound + 1);
      if(nextRound > TOTAL_ROUNDS || data.gameOver){
        var outcome = scores.me > scores.op ? 'win'
                    : scores.me < scores.op ? 'loss' : 'draw';
        handleGameEnd(outcome, 'normal');
      } else {
        currentRound = nextRound;
        setTimeout(function(){ hideResult(); startRound(); }, 2500);
      }
    });
  });

  /* ── Déconnexion adversaire ── */
  socket.on('penalty_opponent_disconnected', function(data){
    if(gameOver) return;
    startForfeitCountdown(60);
  });

  /* ── Statut joueur ── */
  socket.on('penalty_player_status', function(data){
    if(data.slot === MY_SLOT) return;
    document.getElementById('profile-op').style.opacity = data.connected ? '1' : '0.45';
  });

  /* ── Partie reprise ── */
  socket.on('penalty_game_resumed', function(data){
    stopForfeitCountdown();
    document.getElementById('profile-op').style.opacity = '1';
    showToast('▶️','Partie reprise', data.message||'Les deux joueurs sont de retour !', 2000, function(){
      if(gameReady && !gameOver) updUI();
    });
  });

  /* ── player:reconnected — identique Dames ── */
  socket.on('player:reconnected', function(data){
    stopForfeitCountdown();
    showToast('✅','Adversaire reconnecté', data.message||'La partie reprend !', 2500, function(){
      if(gameReady && !gameOver) updUI();
    });
  });

  /* ── game:over — identique Dames (hideLoading avant toast) ── */
  socket.on('game:over', function(d){
    if(gameOver) return;
    hideLoading();
    stopForfeitCountdown();
    if(d.result === 'cancel'){
      gameOver = true; stopTimer(); stopGraceTimer();
      var penalty = d.penalty || 0;
      showToast('⚠️','Partie annulée',
        'Les deux joueurs se sont déconnectés.\nPénalité de '+penalty+' HTG appliquée.',
        4000, function(){ sendResult('cancel','both_disconnected'); });
      return;
    }
    var iWon = d.winnerSupabaseId === MY_SUPABASE_ID ||
               (d.winnerSlot && d.winnerSlot === MY_SLOT) ||
               (d.winner==='player1' && MY_SLOT===1) ||
               (d.winner==='player2' && MY_SLOT===2);
    handleGameEnd(iWon ? 'win' : 'loss', 'forfeit');
  });

  /* ── game:result — identique Dames ── */
  socket.on('game:result', function(d){
    if(d.postMessage && !gameOver){
      hideLoading();
      handleGameEnd(d.postMessage.result==='win' ? 'win' : 'loss', 'forfeit');
    }
  });
}

function startForfeitCountdown(seconds){
  stopForfeitCountdown();
  forfeitCountdown = seconds;
  var bar = document.getElementById('forfeit-bar');
  bar.classList.add('show');
  function tick(){
    bar.textContent = '⏳ Adversaire absent — victoire dans '+forfeitCountdown+'s';
    if(forfeitCountdown <= 0){ stopForfeitCountdown(); return; }
    forfeitCountdown--;
    forfeitTimer = setTimeout(tick, 1000);
  }
  tick();
}
function stopForfeitCountdown(){
  if(forfeitTimer){ clearTimeout(forfeitTimer); forfeitTimer = null; }
  var bar = document.getElementById('forfeit-bar');
  if(bar) bar.classList.remove('show');
  forfeitCountdown = 0;
}

/* ══════════════════════════════════════
   POSTMESSAGE RÉSULTAT — identique Dames
══════════════════════════════════════ */
function sendResult(outcome, reason){
  if(resultSent) return;
  resultSent = true;
  var winnerId = outcome==='win' ? MY_SUPABASE_ID : OP_SUPABASE_ID;
  var loserId  = outcome==='win' ? OP_SUPABASE_ID : MY_SUPABASE_ID;
  var msg = {
    type:'game_result', game:'penalty', room:ROOM_ID,
    winner:winnerId, loser:loserId,
    bet:BET_AMOUNT, currency:CURRENCY,
    reason:reason||'normal', p1Id:P1_ID, p2Id:P2_ID
  };
  try{ window.parent.postMessage(msg,'*'); } catch(e){}
  if(socket && socket.connected) socket.emit('penalty_result', msg);
}

/* BUG FIX identique Dames : appliquer le timer stocké après gameReady */
function applyPendingTimer(){
  if(!pendingTimerData) return;
  var d = pendingTimerData;
  pendingTimerData = null;
  if(d.type === 'turn_start'){
    stopGraceTimer();
    startTimer(d.player === MY_SLOT, d.startTime, d.duration || TIMER_DURATION);
  } else if(d.type === 'sync'){
    var offset = Date.now() - d.serverTime;
    if(d.graceStartTime){
      startGraceTimer(d.turnPlayer===MY_SLOT, d.graceStartTime+offset, d.duration||30000);
    } else if(d.turnStartTime){
      startTimer(d.turnPlayer===MY_SLOT, d.turnStartTime+offset, d.duration||TIMER_DURATION);
    }
  }
}

/* startTimer — synchronisé serveur, anime les DEUX arcs simultanément */
function startTimer(isMyTurn, serverStartTime, duration){
  stopGraceTimer(); stopTimer();
  if(gameOver) return;
  timerActive = true;
  timerStart  = serverStartTime || Date.now();
  var dur     = duration || TIMER_DURATION;

  var arcMe  = document.getElementById('timer-arc-me');
  var arcOp  = document.getElementById('timer-arc-op');
  var profMe = document.getElementById('profile-me');
  var profOp = document.getElementById('profile-op');

  profMe.classList.add('active', isMyTurn ? 'me-active' : '');
  profOp.classList.add('active', !isMyTurn ? 'op-active' : '');
  /* Les deux joueurs choisissent en même temps → on anime les deux arcs */
  profMe.classList.add('choosing');
  profOp.classList.add('choosing');

  function tick(){
    if(!timerActive) return;
    var progress = Math.min((Date.now() - timerStart) / dur, 1);
    var off = CIRC * progress;
    arcMe.style.strokeDashoffset = off;
    arcOp.style.strokeDashoffset = off;
    if(progress >= 0.67){
      profMe.classList.add('timer-urgent');
      profOp.classList.add('timer-urgent');
    }
    if(progress < 1) timerRAF = requestAnimationFrame(tick);
    else timerActive = false;
  }
  timerRAF = requestAnimationFrame(tick);
}

/* stopTimer — identique Dames */
function stopTimer(){
  timerActive = false;
  if(timerRAF){ cancelAnimationFrame(timerRAF); timerRAF = null; }
  var arcMe = document.getElementById('timer-arc-me');
  var arcOp = document.getElementById('timer-arc-op');
  if(arcMe) arcMe.style.strokeDashoffset = CIRC;
  if(arcOp) arcOp.style.strokeDashoffset = CIRC;
  document.getElementById('profile-me').className = 'profile';
  document.getElementById('profile-op').className = 'profile';
}

/* startGraceTimer — identique Dames */
function startGraceTimer(isMyTurn, serverStartTime, duration){
  stopTimer(); stopGraceTimer();
  if(gameOver) return;
  graceActive  = true;
  var graceStart   = serverStartTime || Date.now();
  var graceDuration= duration || 30000;
  var bar  = document.getElementById('forfeit-bar');
  var arcMe= document.getElementById('timer-arc-me');
  var arcOp= document.getElementById('timer-arc-op');
  var profMe=document.getElementById('profile-me');
  var profOp=document.getElementById('profile-op');
  profMe.classList.add('active','timer-urgent');
  profOp.classList.add('active','timer-urgent');

  function tick(){
    if(!graceActive) return;
    var elapsed   = Date.now() - graceStart;
    var remaining = Math.max(0, graceDuration - elapsed);
    var progress  = (graceDuration - remaining) / graceDuration;
    arcMe.style.strokeDashoffset = CIRC * progress;
    arcOp.style.strokeDashoffset = CIRC * progress;
    var secs = Math.ceil(remaining / 1000);
    bar.classList.add('show');
    if(isMyTurn)
      bar.textContent = '⚠️ Jouez maintenant — '+secs+'s avant défaite !';
    else
      bar.textContent = '⏳ En attente de l\'adversaire — '+secs+'s';
    if(remaining > 0) graceRAF = requestAnimationFrame(tick);
    else{ graceActive=false; bar.classList.remove('show'); }
  }
  graceRAF = requestAnimationFrame(tick);
}

function stopGraceTimer(){
  graceActive = false;
  if(graceRAF){ cancelAnimationFrame(graceRAF); graceRAF=null; }
  var bar = document.getElementById('forfeit-bar');
  if(bar) bar.classList.remove('show');
}

/* ══════════════════════════════════════
   CANVAS GOAL
══════════════════════════════════════ */
var canvas  = document.getElementById('goal-canvas');
var ctx     = canvas.getContext('2d');
var pCanvas = document.getElementById('particles-canvas');
var pCtx    = pCanvas.getContext('2d');
var cfCanvas= document.getElementById('confetti-canvas');
var cfCtx   = cfCanvas.getContext('2d');

var W, H, GL, GR, GT, GB;
var SPOTS = [];
var SPOT_GK_ANGLE = [0, -0.75, 0.75];

/* GK */
var gkX,gkY,gkTX,gkTY,gkSX,gkSY,gkAngle=0,gkTAngle=0,gkSAngle=0;
var gkIdleT=0, gkIdleActive=false, idleAniId=null;

/* Ball */
var ballX,ballY,ballTX,ballTY,ballSX,ballSY;
var ballSz,ballTSz,ballSSz,ballVis=false,ballAngle=0,ballTrailPoints=[];
var ballEndAngle=0;

/* Deflect */
var deflectVis=false,deflectX,deflectY,deflectVX,deflectVY;
var deflectSz,deflectAlpha,deflectAngle,deflectRotV,deflectAniId=null;

/* Highlights */
var shooterHighlight=null, keeperHighlight=null;

/* Shake */
var shakeX=0, shakeY=0, shakeDuration=0, shakeAni=null;

/* Anim */
var aniId=null, aniStart=null, aniDur=900, aniDone=null;

/* Particles */
var parts=[], particleRaf=null;

/* Confetti */
var cfParts=[], cfActive=false;

/* pitchT pour les lignes animées */
var pitchT=0;

function initCanvas(){
  var wrap = document.getElementById('wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = W; canvas.height  = H;
  pCanvas.width = W; pCanvas.height = H;
  cfCanvas.width= W; cfCanvas.height= H;

  GL = W*.055; GR = W*.945;
  GT = H*.09;  GB = H*.63;
  var iL=GL+28, iR=GR-28, iT=GT+38, iB=GB-38;
  SPOTS = [
    {x:(iL+iR)/2, y:iT},
    {x:iL,        y:iB},
    {x:iR,        y:iB}
  ];

  resetGK();
  ballVis=false; deflectVis=false;
  shooterHighlight=null; keeperHighlight=null;
  render();
}

function resetGK(){
  gkX=gkTX=gkSX=(GL+GR)/2;
  gkY=gkTY=gkSY=GB-4;
  gkAngle=gkTAngle=gkSAngle=0;
  gkIdleActive=true;
  startGKIdle();
}

function startGKIdle(){
  if(idleAniId) cancelAnimationFrame(idleAniId);
  gkIdleT=0;
  function step(){
    if(!gkIdleActive) return;
    gkIdleT+=0.04;
    if(!ballVis && !aniId){
      gkX=gkSX+Math.sin(gkIdleT)*9;
      gkY=gkSY-Math.abs(Math.sin(gkIdleT*2))*3.5;
      gkAngle=Math.sin(gkIdleT*.7)*.07;
      render();
    }
    idleAniId=requestAnimationFrame(step);
  }
  step();
}

/* ── RENDER ── */
function render(){
  var sx=shakeDuration>0?shakeX:0, sy=shakeDuration>0?shakeY:0;
  ctx.save(); ctx.translate(sx,sy);
  ctx.clearRect(-20,-20,W+40,H+40);
  pitchT+=0.012;

  /* Fond gazon */
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d2a10'); bg.addColorStop(1,'#1a5c1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  /* Bandes terrain */
  for(var s=0;s<8;s++){
    ctx.fillStyle=s%2===0?'rgba(0,0,0,.07)':'rgba(255,255,255,.025)';
    ctx.fillRect(s*(W/8),0,W/8,H);
  }

  /* Intérieur du but */
  ctx.save();
  ctx.beginPath(); ctx.rect(GL+3,GT+3,(GR-GL)-6,(GB-GT)-3); ctx.clip();
  var ng=ctx.createLinearGradient(0,GT,0,GB);
  ng.addColorStop(0,'rgba(4,28,8,.95)');
  ng.addColorStop(1,'rgba(10,50,10,.82)');
  ctx.fillStyle=ng; ctx.fillRect(GL,GT,GR-GL,GB-GT);
  var ga=.08+Math.sin(pitchT)*.03;
  ctx.strokeStyle='rgba(255,255,255,'+ga+')'; ctx.lineWidth=1;
  for(var gx=GL;gx<=GR;gx+=20){ ctx.beginPath(); ctx.moveTo(gx,GT); ctx.lineTo(gx,GB); ctx.stroke(); }
  for(var gy=GT;gy<=GB;gy+=20){ ctx.beginPath(); ctx.moveTo(GL,gy); ctx.lineTo(GR,gy); ctx.stroke(); }
  ctx.restore();

  /* Poteaux dorés — couleur Mindspille */
  ctx.save();
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=7; ctx.lineJoin='round';
  ctx.shadowColor='rgba(251,191,36,.5)'; ctx.shadowBlur=16;
  ctx.beginPath();
  ctx.moveTo(GL,GB); ctx.lineTo(GL,GT); ctx.lineTo(GR,GT); ctx.lineTo(GR,GB);
  ctx.stroke();
  ctx.restore();

  /* Barre transversale glow */
  ctx.save();
  ctx.strokeStyle='rgba(251,191,36,.3)'; ctx.lineWidth=2;
  ctx.shadowColor='rgba(251,191,36,.4)'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.moveTo(GL,GT); ctx.lineTo(GR,GT); ctx.stroke();
  ctx.restore();

  /* Traînée balle */
  if(ballVis && ballTrailPoints.length>1){
    for(var ti=1;ti<ballTrailPoints.length;ti++){
      var tt=ti/ballTrailPoints.length;
      ctx.beginPath();
      ctx.arc(ballTrailPoints[ti].x,ballTrailPoints[ti].y,ballSz*tt*.35,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(tt*.15)+')'; ctx.fill();
    }
    if(ballTrailPoints.length>3){
      var lt=ballTrailPoints[ballTrailPoints.length-1], lf=ballTrailPoints[0];
      ctx.save(); ctx.globalAlpha=.14; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      for(var ll=-1;ll<=1;ll++){
        ctx.beginPath(); ctx.moveTo(lf.x+ll*4,lf.y); ctx.lineTo(lt.x+ll*4,lt.y); ctx.stroke();
      }
      ctx.restore();
    }
  }

  /* Ombre balle au sol */
  if(ballVis){
    ctx.save();
    var sc=0.3+0.7*(ballY/GB);
    ctx.globalAlpha=.2;
    ctx.beginPath();
    ctx.ellipse(ballTX,GB-3,ballSz*sc*.65,ballSz*sc*.2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(ballX,ballY); ctx.rotate(ballAngle);
    ctx.font=Math.round(ballSz)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,255,255,.5)'; ctx.shadowBlur=14;
    ctx.fillText('⚽',0,0);
    ctx.restore();
  }

  /* Balle déviation */
  if(deflectVis){
    ctx.save(); ctx.globalAlpha=deflectAlpha;
    ctx.translate(deflectX,deflectY); ctx.rotate(deflectAngle);
    ctx.font=Math.round(deflectSz)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(248,113,113,.7)'; ctx.shadowBlur=12;
    ctx.fillText('⚽',0,0);
    ctx.restore();
  }

  /* Highlights */
  if(shooterHighlight!==null) drawHighlight(SPOTS[shooterHighlight],'#fbbf24','⚽');
  if(keeperHighlight!==null)  drawHighlight(SPOTS[keeperHighlight],'#f87171','🧤');

  drawGoalkeeper();
  ctx.restore();
}

function drawGoalkeeper(){
  var sz=Math.round(W*.13), gap=W*.055;
  ctx.save();
  ctx.shadowColor='rgba(251,191,36,.22)'; ctx.shadowBlur=20;
  ctx.font=sz+'px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.save(); ctx.translate(gkX-gap,gkY); ctx.rotate(gkAngle-0.15); ctx.fillText('🧤',0,0); ctx.restore();
  ctx.save(); ctx.translate(gkX+gap,gkY); ctx.scale(-1,1); ctx.rotate(-(gkAngle+0.15)); ctx.fillText('🧤',0,0); ctx.restore();
  ctx.restore();
}

function drawHighlight(sp, color, emoji){
  var p=Date.now()/500;
  var r=30+Math.sin(p)*5;
  ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
  ctx.fillStyle=color+'2a'; ctx.strokeStyle=color; ctx.lineWidth=2.5;
  ctx.fill(); ctx.stroke();
  ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(emoji,sp.x,sp.y);
}

/* ── SHAKE ── */
function doShake(intensity, duration){
  shakeIntensity=intensity; shakeDuration=duration;
  if(shakeAni) clearInterval(shakeAni);
  shakeAni=setInterval(function(){
    if(shakeDuration<=0){ clearInterval(shakeAni); shakeX=0; shakeY=0; return; }
    shakeX=(Math.random()-.5)*shakeIntensity;
    shakeY=(Math.random()-.5)*shakeIntensity;
    shakeDuration--;
  },16);
}

/* ── PARTICLES ── */
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2, sp=4+Math.random()*10;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-5,life:1,decay:.016+Math.random()*.022,size:5+Math.random()*11,color:color,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.35});
  }
  if(!particleRaf) tickParticles();
}
function tickParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  parts=parts.filter(function(p){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.32; p.vx*=.97; p.life-=p.decay; p.rot+=p.rotV;
    if(p.life<=0) return false;
    pCtx.save(); pCtx.globalAlpha=p.life; pCtx.translate(p.x,p.y); pCtx.rotate(p.rot);
    pCtx.fillStyle=p.color;
    pCtx.beginPath();
    for(var j=0;j<5;j++){
      var ang=j*Math.PI*2/5-Math.PI/2, a2=ang+Math.PI/5;
      if(j===0) pCtx.moveTo(Math.cos(ang)*p.size,Math.sin(ang)*p.size);
      else pCtx.lineTo(Math.cos(ang)*p.size,Math.sin(ang)*p.size);
      pCtx.lineTo(Math.cos(a2)*p.size*.42,Math.sin(a2)*p.size*.42);
    }
    pCtx.closePath(); pCtx.fill(); pCtx.restore();
    return true;
  });
  if(parts.length>0) particleRaf=requestAnimationFrame(tickParticles);
  else particleRaf=null;
}

function recordTrail(){
  ballTrailPoints.push({x:ballX,y:ballY});
  if(ballTrailPoints.length>10) ballTrailPoints.shift();
}

function startDeflect(sx,sy,onDone){
  deflectVis=true; deflectX=sx; deflectY=sy;
  deflectSz=Math.round(W*.08); deflectAlpha=1; deflectAngle=0;
  var angles=[-2.2,-1.8,-1.4,-0.8,-0.4,0.4,0.8,1.4,1.8,2.2];
  var ca=angles[Math.floor(Math.random()*angles.length)];
  var sp=11+Math.random()*8;
  deflectVX=Math.cos(ca)*sp; deflectVY=Math.sin(ca)*sp;
  deflectRotV=(Math.random()-.5)*.5;
  if(deflectAniId) cancelAnimationFrame(deflectAniId);
  function step(){
    deflectX+=deflectVX; deflectY+=deflectVY;
    deflectVY+=0.58; deflectVX*=0.96;
    deflectAlpha-=0.022; deflectAngle+=deflectRotV;
    render();
    if(deflectAlpha>0) deflectAniId=requestAnimationFrame(step);
    else{ deflectVis=false; if(onDone) onDone(); }
  }
  step();
}

/* ── ANIMATION ENGINE ── */
function animTo(dur, done){
  gkIdleActive=false;
  gkSX=gkX; gkSY=gkY; gkSAngle=gkAngle;
  ballSX=ballX; ballSY=ballY; ballSSz=ballSz;
  ballTrailPoints=[];
  ballEndAngle=(Math.random()>.5?1:-1)*(Math.PI*2)*(2+Math.random()*4);
  aniDur=dur; aniDone=done; aniStart=null;
  if(aniId) cancelAnimationFrame(aniId);
  aniId=requestAnimationFrame(aniStep);
}
function aniStep(ts){
  if(!aniStart) aniStart=ts;
  var t=Math.min(1,(ts-aniStart)/aniDur);
  var eBall=1-Math.pow(1-t,3);
  var tGk=Math.max(0,(t-.06)/.94), eGk=tGk<.5?2*tGk*tGk:-1+(4-2*tGk)*tGk;
  if(ballVis){
    var arcY=-45*Math.sin(t*Math.PI);
    ballX=ballSX+(ballTX-ballSX)*eBall;
    ballY=ballSY+(ballTY-ballSY)*eBall+arcY*(1-eBall);
    ballSz=ballSSz+(ballTSz-ballSSz)*eBall;
    ballAngle=ballEndAngle*eBall;
    recordTrail();
  }
  gkX=gkSX+(gkTX-gkSX)*eGk;
  gkY=gkSY+(gkTY-gkSY)*eGk;
  gkAngle=gkSAngle+(gkTAngle-gkSAngle)*eGk;
  render();
  if(t<1) aniId=requestAnimationFrame(aniStep);
  else{ aniId=null; gkIdleActive=false; if(aniDone) aniDone(); }
}

/* ── CONFETTI — identique Dames ── */
function createConfetti(){
  var colors=['#fbbf24','#f59e0b','#ffffff','#e74c3c','#818cf8','#c084fc','#34d399','#60a5fa'];
  var shapes=['circle','square','triangle'];
  cfParts=[];
  for(var i=0;i<200;i++){
    cfParts.push({
      x:cfCanvas.width/2, y:cfCanvas.height/2,
      vx:(Math.random()-.5)*24, vy:(Math.random()-.5)*24-8,
      color:colors[Math.floor(Math.random()*colors.length)],
      shape:shapes[Math.floor(Math.random()*shapes.length)],
      size:Math.random()*10+4, rotation:Math.random()*360,
      rotSpeed:(Math.random()-.5)*14, gravity:.35, drag:.984, life:1.0
    });
  }
  cfActive=true;
}
function updateConfetti(){
  if(!cfActive) return;
  cfCtx.clearRect(0,0,cfCanvas.width,cfCanvas.height);
  var any=false;
  for(var i=cfParts.length-1;i>=0;i--){
    var p=cfParts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=p.drag; p.vy*=p.drag;
    p.rotation+=p.rotSpeed; p.life-=0.004;
    if(p.life>0 && p.y<cfCanvas.height+60){
      any=true;
      cfCtx.save();
      cfCtx.translate(p.x,p.y); cfCtx.rotate(p.rotation*Math.PI/180);
      cfCtx.globalAlpha=p.life; cfCtx.fillStyle=p.color;
      if(p.shape==='circle'){ cfCtx.beginPath(); cfCtx.arc(0,0,p.size/2,0,Math.PI*2); cfCtx.fill(); }
      else if(p.shape==='square'){ cfCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size); }
      else{ cfCtx.beginPath(); cfCtx.moveTo(0,-p.size/2); cfCtx.lineTo(p.size/2,p.size/2); cfCtx.lineTo(-p.size/2,p.size/2); cfCtx.closePath(); cfCtx.fill(); }
      cfCtx.restore();
    }
  }
  if(!any){ cfActive=false; cfParts=[]; cfCtx.clearRect(0,0,cfCanvas.width,cfCanvas.height); }
}

/* ══════════════════════════════════════
   ZONES — CORRIGÉES
   z-index:15, gestion touch + click
══════════════════════════════════════ */
function showZones(){
  var layer = document.getElementById('spots-layer');
  layer.innerHTML = '';
  layer.style.pointerEvents = 'all';
  myChoice = null;
  opChoiceReceived = false;
  document.getElementById('btn-confirm').disabled = true;

  var iamShooter = isMyRoleShooter(currentRound);

  SPOTS.forEach(function(sp, i){
    var btn = document.createElement('button');
    btn.className = 'zone-btn';
    btn.type = 'button';

    var ring = document.createElement('div');
    ring.className = 'zone-ring';
    ring.textContent = iamShooter ? '🎯' : '🧤';
    btn.appendChild(ring);

    btn.style.left = sp.x + 'px';
    btn.style.top  = sp.y + 'px';
    btn.style.animationDelay = (i * 0.08) + 's';

    (function(idx){
      btn.addEventListener('click', function(){ selectZone(idx); });
      btn.addEventListener('touchend', function(e){ e.preventDefault(); selectZone(idx); });
    })(i);

    layer.appendChild(btn);
  });

  if(iamShooter){
    ballX=(GL+GR)/2; ballY=GB+(H-GB)*.38;
    ballSz=Math.round(W*.10); ballVis=true; ballAngle=0;
  } else {
    ballVis=false;
  }

  document.getElementById('choice-hint').textContent = iamShooter ? 'Où tirez-vous ?' : 'Où plongez-vous ?';
  document.getElementById('choice-hint').style.color = 'rgba(255,255,255,.4)';
  render();
}

function hideZones(){
  var layer = document.getElementById('spots-layer');
  layer.innerHTML = '';
  layer.style.pointerEvents = 'none';
}

function selectZone(idx){
  if(phase !== 'choosing' || isProcessing) return;
  myChoice = idx;
  if(navigator.vibrate) navigator.vibrate(30);

  document.querySelectorAll('.zone-btn').forEach(function(btn, i){
    var ring = btn.querySelector('.zone-ring');
    btn.classList.remove('selected','dimmed');
    if(i === idx){
      btn.classList.add('selected');
      ring.textContent = isMyRoleShooter(currentRound) ? '⚽' : '🧤';
    } else {
      btn.classList.add('dimmed');
    }
  });

  document.getElementById('btn-confirm').disabled = false;
  var profMe = document.getElementById('profile-me');
  profMe.classList.remove('choosing'); profMe.classList.add('done');
  updateChoiceHint();
}

function updateChoiceHint(){
  var hint = document.getElementById('choice-hint');
  if(myChoice !== null && opChoiceReceived){
    hint.textContent = '✅ Les deux joueurs ont choisi !';
    hint.style.color = '#4ade80';
  } else if(myChoice !== null){
    hint.textContent = '✅ En attente de l\'adversaire…';
    hint.style.color = '#fbbf24';
  } else if(opChoiceReceived){
    hint.textContent = '⏳ L\'adversaire a choisi — à vous !';
    hint.style.color = '#f87171';
  } else {
    var iamShooter = isMyRoleShooter(currentRound);
    hint.textContent = iamShooter ? 'Où tirez-vous ?' : 'Où plongez-vous ?';
    hint.style.color = 'rgba(255,255,255,.4)';
  }
}

/* ── Valider le choix ── */
window._penaltyConfirm = function(){
  if(myChoice === null || phase !== 'choosing' || isProcessing) return;
  phase = 'resolving';
  isProcessing = true;
  document.getElementById('btn-confirm').disabled = true;
  if(navigator.vibrate) navigator.vibrate([20,10,20]);

  /* BUG FIX identique Dames : arrêter le timer local dès la validation */
  stopTimer();

  if(socket && socket.connected){
    socket.emit('penalty_choice',{
      room:ROOM_ID, player:MY_SLOT,
      round:currentRound, zone:myChoice
    });
  }
  document.getElementById('choice-hint').textContent = '⌛ En attente du résultat…';
  document.getElementById('choice-hint').style.color = 'rgba(255,255,255,.45)';
};

/* ══════════════════════════════════════
   ANIMATION DE RÉSOLUTION
══════════════════════════════════════ */
function resolveAnimation(shooterZone, keeperZone, isGoal, iamShooter, onDone){
  hideZones();
  phase = 'showing';

  var bsX=(GL+GR)/2, bsY=GB+(H-GB)*.38;
  ballX=ballSX=bsX; ballY=ballSY=bsY;
  ballTX=SPOTS[shooterZone].x; ballTY=SPOTS[shooterZone].y;
  ballSz=ballSSz=Math.round(W*.10);
  ballTSz=Math.round(W*.055);
  ballVis=true; ballAngle=0;
  gkTX=SPOTS[keeperZone].x; gkTY=SPOTS[keeperZone].y;
  gkTAngle=SPOT_GK_ANGLE[keeperZone];

  animTo(900, function(){
    ballVis=false;
    isProcessing=false;

    if(!isGoal){
      /* ── ARRÊT ── */
      var svX=gkX, svY=gkY-Math.round(W*.075);
      ctx.save();
      ctx.beginPath(); ctx.arc(svX,svY,44,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fill();
      ctx.restore();

      startDeflect(svX, svY, function(){
        shooterHighlight=shooterZone; keeperHighlight=keeperZone;
        render();
        if(onDone) onDone();
      });

      flashScreen('flash-save');
      doShake(6,16);
      if(navigator.vibrate) navigator.vibrate([50,30,50,30,50]);
      for(var i=0;i<4;i++){
        (function(ii){ setTimeout(function(){ spawnParticles(svX,svY,'#f87171',8); }, ii*65); })(i);
      }
      showResult(
        iamShooter ? 'BLOQUÉ ! 🧤' : 'ARRÊTÉ ! 🧤',
        !iamShooter,
        iamShooter ? 'Le gardien vous a stoppé !' : 'Vous avez arrêté le tir !',
        '#f87171'
      );

    } else {
      /* ── BUT ── */
      shooterHighlight=shooterZone; keeperHighlight=keeperZone;
      render();
      var gx=SPOTS[shooterZone].x, gy=SPOTS[shooterZone].y;
      flashScreen('flash-goal');
      doShake(10,24);
      if(navigator.vibrate) navigator.vibrate([100,50,100]);
      var colors=['#fbbf24','#f59e0b','#ffffff','#818cf8','#c084fc','#34d399','#60a5fa'];
      for(var i=0;i<6;i++){
        (function(ii){ setTimeout(function(){ spawnParticles(gx,gy,colors[Math.floor(Math.random()*colors.length)],14); },ii*75); })(i);
      }
      showResult(
        iamShooter ? 'BUT ! 🎉' : 'BUT ! 😤',
        iamShooter,
        iamShooter ? 'Vous avez trompé le gardien !' : 'L\'adversaire a marqué !',
        '#fbbf24'
      );
      if(onDone) onDone();
    }
  });
}

function showResult(txt, isPositive, sub, color){
  var rt=document.getElementById('result-txt');
  var rs=document.getElementById('result-sub');
  var rf=document.getElementById('result-timer-fill');
  rt.textContent=txt;
  rt.className='result-txt '+(isPositive?'goal':'saved');
  rs.textContent=sub||'';
  rf.style.background=color||'#fbbf24';
  rf.style.animation='none'; void rf.offsetWidth;
  rf.style.animation='timerDrain 2.4s linear forwards';
  document.getElementById('result-overlay').classList.add('show');
}
function hideResult(){
  document.getElementById('result-overlay').classList.remove('show');
}

/* ══════════════════════════════════════
   GAME FLOW
══════════════════════════════════════ */
function startPenaltyGame(){
  gameOver=false; resultSent=false; isProcessing=false;
  currentRound=1; scores={me:0,op:0};
  myChoice=null; opChoiceReceived=false; phase='idle';
  pendingTimerData=null;
  stopTimer(); stopGraceTimer(); stopForfeitCountdown();
  initCanvas(); updateScores();

  var iAmFirst = isMyRoleShooter(1);
  var sub = iAmFirst
    ? 'Vous tirez en premier !\nManche 1 / '+TOTAL_ROUNDS
    : OP_NAME+' tire en premier !\nManche 1 / '+TOTAL_ROUNDS;

  showToast('⚽','Match commencé !', sub, 2400, function(){
    gameReady=true;
    updUI();
    /* BUG FIX identique Dames — timer reçu pendant le toast */
    applyPendingTimer();
  });
}

function startRound(){
  myChoice=null; opChoiceReceived=false; isProcessing=false;
  shooterHighlight=null; keeperHighlight=null;
  deflectVis=false; parts=[];
  phase='choosing';
  resetGK(); ballAngle=0; ballTrailPoints=[];
  updUI();
  /* Délai court pour stabiliser le layout avant de placer les zones */
  setTimeout(function(){ showZones(); }, 60);
}

function updateScores(){
  document.getElementById('score-me').textContent  = scores.me;
  document.getElementById('score-op').textContent  = scores.op;
  document.getElementById('round-lbl').textContent = 'Manche '+currentRound+' / '+TOTAL_ROUNDS;
}

function bumpScore(who){
  var el=document.getElementById('score-'+who);
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

function updUI(){
  var iamShooter = isMyRoleShooter(currentRound);
  document.getElementById('avatar-me').textContent = iamShooter ? '⚽' : '🥅';
  document.getElementById('avatar-op').textContent = iamShooter ? '🥅' : '⚽';
  document.getElementById('name-me').textContent   = MY_NAME;
  document.getElementById('name-op').textContent   = OP_NAME;
  document.getElementById('role-me').textContent   = iamShooter ? 'Tireur' : 'Gardien';
  document.getElementById('role-op').textContent   = iamShooter ? 'Gardien' : 'Tireur';
  document.getElementById('round-lbl').textContent = 'Manche '+currentRound+' / '+TOTAL_ROUNDS;
  document.getElementById('profile-me').classList.add('active');
  document.getElementById('profile-op').classList.add('active');
}

function handleGameEnd(outcome, reason){
  if(gameOver) return;
  stopTimer(); stopGraceTimer(); stopForfeitCountdown();
  gameOver=true; isProcessing=false;
  hideZones();

  var humanWon = outcome==='win', isDraw = outcome==='draw';
  var title, sub;

  if(reason==='forfeit'){
    title = humanWon ? 'Victoire par forfait !' : 'Défaite par forfait.';
    sub   = humanWon ? 'L\'adversaire a abandonné.' : 'Vous avez abandonné la partie.';
  } else {
    title = humanWon ? 'Victoire ! 🏆' : isDraw ? 'Match nul 🤝' : 'Défaite 😤';
    sub   = scores.me+' buts — '+scores.op+' buts\n'
          +(humanWon ? 'Bravo !' : isDraw ? 'Égalité parfaite !' : OP_NAME+' remporte le match.');
  }

  if(humanWon) createConfetti();

  showToast(
    humanWon ? '🏆' : isDraw ? '🤝' : '⚽',
    title, sub, 4500,
    function(){ sendResult(humanWon ? 'win' : 'loss', reason||'normal'); }
  );
}

/* ══════════════════════════════════════
   TOAST — identique Dames
══════════════════════════════════════ */
function showToast(emoji, title, sub, delay, cb){
  var el = document.getElementById('toast');
  document.getElementById('toast-emoji').textContent = emoji;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent   = sub;
  el.style.cssText='display:block;opacity:0;transform:translate(-50%,-50%) scale(0.75);transition:none;';
  setTimeout(function(){
    el.style.transition='all 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';
    el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1)';
  }, 20);
  setTimeout(function(){
    el.style.opacity='0'; el.style.transform='translate(-50%,-50%) scale(0.85)';
    setTimeout(function(){ el.style.display='none'; if(cb) cb(); }, 320);
  }, delay);
}

/* ══════════════════════════════════════
   BOUCLE RENDU
══════════════════════════════════════ */
function renderLoop(){
  requestAnimationFrame(renderLoop);
  updateConfetti();
}
renderLoop();

   RESIZE
══════════════════════════════════════ */
window.addEventListener('resize', function(){
  if(gameReady){
    initCanvas();
    if(phase === 'choosing') showZones();
  }
});

/* ══ INIT ══ */
initCanvas();
initSocket();

})();
