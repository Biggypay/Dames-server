<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dames 3D Pro - International</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}
.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);transition:border-color 0.3s,box-shadow 0.3s,background 0.3s}
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.10)}
.profile.active.human-active .profile-avatar{box-shadow:0 0 18px rgba(255,255,255,0.5)}
.profile.active.ai-active .profile-avatar{box-shadow:0 0 18px rgba(231,76,60,0.5)}
.av-white{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f5f5f5 0%,#ffffff 50%,#e0e0e0 100%);border:3px solid #c0c0c0;box-shadow:0 2px 8px rgba(255,255,255,0.4),inset 0 2px 4px rgba(255,255,255,0.8);position:relative}
.av-white::after{content:'';position:absolute;top:20%;left:20%;width:35%;height:20%;border-radius:50%;background:rgba(255,255,255,0.9);transform:rotate(-45deg)}
.av-red{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c0392b 0%,#e74c3c 50%,#a93226 100%);border:3px solid #922b21;box-shadow:0 2px 8px rgba(231,76,60,0.4),inset 0 2px 4px rgba(255,150,150,0.3);position:relative}
.av-red::after{content:'';position:absolute;top:20%;left:20%;width:35%;height:20%;border-radius:50%;background:rgba(255,200,200,0.4);transform:rotate(-45deg)}
.av-king::before{content:'♔';position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:14px;color:#fbbf24;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;transition:color 0.3s}
.profile.active .profile-name{color:rgba(255,255,255,0.9)}
.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.timer-urgent .timer-arc{animation:urgentPulse 0.5s infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:0.4}}
.btns{display:flex;gap:7px}
.btn{background:rgba(255,255,255,0.10);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:99px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(255,255,255,0.25);transform:scale(0.95)}
.btn.ia{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.5);color:#fbbf24}
.btn.active-cam{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.7);color:#fbbf24}
.btn-topview,.btn-2p{display:flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border-radius:50%;flex-shrink:0;color:rgba(255,255,255,0.7);transition:all .2s}
.btn-topview.active-top{background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.7);color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.3)}
.btn-2p.active-2p{background:rgba(129,252,140,0.18);border-color:rgba(100,220,120,0.8);color:#86efac;box-shadow:0 0 12px rgba(100,220,120,0.35)}
#wrap{flex:1 1 auto;position:relative;overflow:hidden;touch-action:none}
#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif}
#modal{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:60;backdrop-filter:blur(8px)}
#modal.on{display:flex}
.mbox{background:linear-gradient(135deg,rgba(30,27,75,0.95),rgba(49,46,129,0.95));border:2px solid #fbbf24;border-radius:24px;padding:32px 28px;text-align:center;animation:pop .4s cubic-bezier(0.175,0.885,0.32,1.275);min-width:280px;box-shadow:0 25px 80px rgba(0,0,0,.6),0 0 40px rgba(251,191,36,0.2)}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.mbox .emoji{font-size:56px;margin-bottom:8px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.mbox h2{font-family:'Cinzel',serif;color:#fbbf24;font-size:28px;margin-bottom:8px}
.mbox p{color:rgba(255,255,255,.85);margin-bottom:24px;font-size:14px;line-height:1.5;white-space:pre-line}
.mbox-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-g{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1e1b4b;font-weight:700;font-family:'Cinzel',serif;border:none;border-radius:99px;padding:12px 28px;font-size:13px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(251,191,36,0.3)}
.btn-g:active{transform:scale(0.95)}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.sym-white-wrap{position:relative;width:72px;height:72px}
.sym-white{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#f5f5f5 0%,#ffffff 50%,#e0e0e0 100%);border:4px solid #c0c0c0;box-shadow:0 4px 20px rgba(255,255,255,0.5),inset 0 4px 8px rgba(255,255,255,0.9);position:absolute;top:3px;left:3px}
.sym-white::after{content:'';position:absolute;top:18%;left:18%;width:35%;height:18%;border-radius:50%;background:rgba(255,255,255,0.95);transform:rotate(-45deg)}
.sym-red-wrap{position:relative;width:72px;height:72px}
.sym-red{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#c0392b 0%,#e74c3c 50%,#a93226 100%);border:4px solid #922b21;box-shadow:0 4px 20px rgba(231,76,60,0.5),inset 0 4px 8px rgba(255,150,150,0.4);position:absolute;top:3px;left:3px}
.sym-red::after{content:'';position:absolute;top:18%;left:18%;width:35%;height:18%;border-radius:50%;background:rgba(255,200,200,0.5);transform:rotate(-45deg)}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px}
#confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55}
#force-jump-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(220,40,20,0.22);border:1.5px solid rgba(255,90,60,0.8);border-radius:99px;padding:8px 20px;font-size:12px;color:#ff6060;font-weight:700;display:none;z-index:25;backdrop-filter:blur(8px);box-shadow:0 0 18px rgba(255,60,30,0.3)}
#force-jump-hint.show{display:block;animation:pulse-hint 1s infinite}
@keyframes pulse-hint{0%,100%{opacity:0.85;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
#hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;pointer-events:none;z-index:5}
#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
.sw{color:#ffffff}.sr{color:#f87171}.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px}
/* Captured pieces display */
.captured-row{display:flex;flex-wrap:wrap;align-items:center;gap:2px;justify-content:center;min-height:14px;max-width:80px}
.cap-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cap-dot-white{background:radial-gradient(circle at 35% 35%,#f0ecdc,#b8b0a0);border:1px solid rgba(255,255,255,0.4)}
.cap-dot-red{background:radial-gradient(circle at 35% 35%,#e04030,#881818);border:1px solid rgba(255,100,80,0.4)}
.cap-count{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:rgba(255,255,255,0.7);margin-left:2px}
</style>
</head>
<body>
<div id="top">
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#ffffff"/></svg>
      <div class="profile-avatar" id="avatar-human"><div class="av-white"></div></div>
    </div>
    <div class="profile-name">Blanc</div>
    <div class="captured-row" id="cap-human"></div>
  </div>
  <div class="top-center">
    <div class="score-row"><span class="snum sw" id="score-w">20</span><span class="ssep">vs</span><span class="snum sr" id="score-r">20</span></div>
    <span class="manche-lbl">Dames International</span>
  </div>
  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/></svg>
      <div class="profile-avatar" id="avatar-ai"><div class="av-red"></div></div>
    </div>
    <div class="profile-name">Rouge</div>
    <div class="captured-row" id="cap-ai"></div>
  </div>
</div>

<div id="wrap">
  <div id="loading"><div class="spin"></div><p>CHARGEMENT...</p></div>
  <canvas id="confetti-canvas"></canvas>
  <div id="force-jump-hint">⚡ Prise obligatoire !</div>
  <div id="hint">👌 Pince = zoom · Glisse = tourner · Tap = jouer</div>
  <div id="toast"><div id="toast-emoji"></div><div id="toast-title"></div><div id="toast-sub"></div></div>
</div>

<div id="bot">
  <div style="display:flex;gap:7px;flex-shrink:0">
    <button class="btn btn-topview" id="btn-topview" title="Changer vue">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="btns">
    <button class="btn" id="btn-cam">⟳ Auto</button>
  </div>
</div>

<div id="modal">
  <div class="mbox">
    <div class="emoji" id="m-emoji">🏆</div>
    <h2 id="m-title">Victoire !</h2>
    <p id="m-msg">Félicitations !</p>
    <div class="mbox-btns"><button class="btn-g" id="btn-restart">Nouvelle partie</button></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.onerror=function(msg,url,line,col,err){
  var ld=document.getElementById('loading');if(ld){ld.classList.add('error');ld.querySelector('p').textContent='ERREUR - Rafraîchissez';}return false;
};
(function(){
'use strict';

/* ══════════════════════════════════════════
   URL PARAMS — Mindspille matchmaking
   ?room=ROOM_ID&player=1or2&p1Id=SUP_ID&p2Id=SUP_ID
   &p1Name=NAME&p2Name=NAME&bet=AMOUNT&currency=HTG
══════════════════════════════════════════ */
var urlParams=new URLSearchParams(window.location.search);
var ROOM_ID   =urlParams.get('room')    ||'demo-room';
var MY_SLOT   =parseInt(urlParams.get('player')||'1',10); /* 1 ou 2 */
var P1_ID     =urlParams.get('p1Id')    ||'';
var P2_ID     =urlParams.get('p2Id')    ||'';
var P1_NAME   =urlParams.get('p1Name')  ||'Joueur 1';
var P2_NAME   =urlParams.get('p2Name')  ||'Joueur 2';
var BET_AMOUNT=parseFloat(urlParams.get('bet')||'0');
var CURRENCY  =urlParams.get('currency')||'HTG';
/* Joueur 1 = Blancs (player 0), Joueur 2 = Rouges (player 1) */
var MY_PLAYER = MY_SLOT===1?0:1; /* 0=blanc,1=rouge */
var MY_SUPABASE_ID = MY_SLOT===1?P1_ID:P2_ID;
var OP_SUPABASE_ID = MY_SLOT===1?P2_ID:P1_ID;
var MY_NAME   = MY_SLOT===1?P1_NAME:P2_NAME;
var OP_NAME   = MY_SLOT===1?P2_NAME:P1_NAME;

/* ══════════════════════════════════════════
   SOCKET.IO
══════════════════════════════════════════ */
var socket=null;
var opponentConnected=false;
var resultSent=false;

function initSocket(){
  socket=io({transports:['websocket'],reconnectionAttempts:5});

  socket.on('connect',function(){
    /* Rejoindre la salle dames */
    socket.emit('dames_join',{
      room:ROOM_ID,
      player:MY_SLOT,
      supabaseId:MY_SUPABASE_ID,
      name:MY_NAME,
      bet:BET_AMOUNT,
      currency:CURRENCY
    });
  });

  /* Les deux joueurs sont connectés — lancer la partie */
  socket.on('dames_start',function(data){
    opponentConnected=true;
    var ldEl=document.getElementById('loading');
    if(ldEl){ldEl.style.opacity='0';setTimeout(function(){ldEl.style.display='none';},600);}
    startMultiGame();
  });

  /* Recevoir un coup de l'adversaire */
  socket.on('dames_move',function(data){
    if(data.player===MY_SLOT)return; /* ignorer nos propres coups renvoyés */
    applyRemoteMove(data.from,data.to);
  });

  /* L'adversaire a abandonné / s'est déconnecté */
  socket.on('dames_forfeit',function(data){
    if(gameOver)return;
    gameOver=true;stopTimer();
    showToast('🏆','Victoire par forfait','L\'adversaire a quitté la partie.',3000,function(){
      sendResult('win','forfeit');
    });
  });

  socket.on('dames_opponent_disconnected',function(){
    if(gameOver)return;
    gameOver=true;stopTimer();
    showToast('📡','Connexion perdue','L\'adversaire s\'est déconnecté.',3000,function(){
      sendResult('win','disconnect');
    });
  });

  socket.on('connect_error',function(){
    var lt=document.getElementById('loading-text')||document.querySelector('#loading p');
    if(lt)lt.textContent='CONNEXION IMPOSSIBLE';
  });

  socket.on('disconnect',function(){
    if(!gameOver){
      showToast('📡','Déconnexion','Tentative de reconnexion…',2000,null);
    }
  });
}

/* Envoyer le résultat financier au parent Lovable */
function sendResult(outcome,reason){
  if(resultSent)return;
  resultSent=true;
  var winnerId=outcome==='win'?MY_SUPABASE_ID:OP_SUPABASE_ID;
  var loserId =outcome==='win'?OP_SUPABASE_ID:MY_SUPABASE_ID;
  var msg={
    type:'game_result',
    game:'dames',
    room:ROOM_ID,
    winner:winnerId,
    loser:loserId,
    bet:BET_AMOUNT,
    currency:CURRENCY,
    reason:reason||'normal',
    p1Id:P1_ID,
    p2Id:P2_ID
  };
  window.parent.postMessage(msg,'*');
  socket.emit('dames_result',msg);
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
var AI_LEVEL='expert';
var twoPlayerMode=false;
var gameOver=false;
var isProcessing=false;
var gameReady=false;
var TIMER_DURATION=30000;
var CIRC=2*Math.PI*26;
var timerStart=null,timerRAF=null,timerActive=false;
var currentPlayer=0;
var humanPlayer=MY_PLAYER; /* fixé par URL param, jamais aléatoire */
var board=[];
var selectedPiece=null;
var validMoves=[];
/* Captures par joueur */
var capturedBy=[0,0];

/* ══════════════════════════════════════════
   THREE.JS SETUP
══════════════════════════════════════════ */
var wrap=document.getElementById('wrap');
var scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x1e1b4b,22,70);
/* Camera: départ avec les blancs EN BAS (Math.PI) */
var camD=22,camPhi=0.72,camTheta=Math.PI;
var autoRotate=false;
var camera=new THREE.PerspectiveCamera(42,1,0.1,1000);
function setCam(){
  camera.position.set(
    camD*Math.sin(camPhi)*Math.sin(camTheta),
    camD*Math.cos(camPhi),
    camD*Math.sin(camPhi)*Math.cos(camTheta)
  );
  camera.lookAt(0,0,0);
}
setCam();
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
wrap.appendChild(renderer.domElement);
function resize(){
  var w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  var cc=document.getElementById('confetti-canvas');
  if(cc){cc.width=w;cc.height=h;}
}
resize();
window.addEventListener('resize',resize);

/* ══════════════════════════════════════════
   LIGHTING — équilibré, couleurs nettes
   Ambient modéré + key + fill multi-angle
══════════════════════════════════════════ */
/* Ambient modéré — base propre sans blanchir */
scene.add(new THREE.AmbientLight(0xffffff,0.45));
/* Key light principale — légèrement chaude, angle naturel */
var keyL=new THREE.DirectionalLight(0xfff8f0,0.90);
keyL.position.set(6,18,12);keyL.castShadow=true;
keyL.shadow.mapSize.width=1024;keyL.shadow.mapSize.height=1024;
keyL.shadow.camera.near=0.5;keyL.shadow.camera.far=45;
keyL.shadow.camera.left=-13;keyL.shadow.camera.right=13;
keyL.shadow.camera.top=13;keyL.shadow.camera.bottom=-13;
scene.add(keyL);
/* Fill droit chaud — donne du volume aux pions */
var fillR=new THREE.DirectionalLight(0xffd8b0,0.42);
fillR.position.set(13,8,2);scene.add(fillR);
/* Fill gauche froid — contrebalance, crée le modelé */
var fillL=new THREE.DirectionalLight(0xb8ccff,0.35);
fillL.position.set(-11,8,-7);scene.add(fillL);
/* Fill arrière doux — empêche les ombres totales */
var backL=new THREE.DirectionalLight(0xffe0c8,0.22);
backL.position.set(0,5,-14);scene.add(backL);
/* Hémisphère sky/ground — shading volumétrique naturel */
scene.add(new THREE.HemisphereLight(0x8888bb,0x442200,0.28));
/* Spot doré — reflet chaud sur le dessus des pions */
var spot=new THREE.SpotLight(0xfbbf24,0.38);
spot.position.set(-5,14,-4);spot.angle=Math.PI/5.5;spot.penumbra=0.65;
scene.add(spot);

/* ══════════════════════════════════════════
   SCENE GROUPS
══════════════════════════════════════════ */
var boardGroup=new THREE.Group();
var piecesGroup=new THREE.Group();
var hlGroup=new THREE.Group();      /* sélection */
var moveHlGroup=new THREE.Group();  /* coups valides */
var lastMoveGroup=new THREE.Group();/* dernier coup (case origine) */
var particlesGroup=new THREE.Group();
scene.add(boardGroup);scene.add(piecesGroup);
scene.add(hlGroup);scene.add(moveHlGroup);
scene.add(lastMoveGroup);scene.add(particlesGroup);

var CELL=1.4;
var BS=10;
var BO=(BS-1)*CELL/2; /* boardOffset */

/* ══════════════════════════════════════════
   BOARD SHAKE ANIMATION
══════════════════════════════════════════ */
var shake={active:false,t0:0,dur:2000,
  aX:0.20,aZ:0.15,fX:12,fZ:9,aP:0.12,fP:16};
function triggerShake(){shake.active=true;shake.t0=Date.now();}
function applyShake(){
  var groups=[boardGroup,piecesGroup,hlGroup,moveHlGroup,lastMoveGroup];
  if(!shake.active){
    for(var i=0;i<groups.length;i++){groups[i].rotation.x=0;groups[i].rotation.z=0;groups[i].position.x=0;}
    return;
  }
  var el=(Date.now()-shake.t0)/1000;
  var t=el/(shake.dur/1000);
  if(t>=1){shake.active=false;return;}
  var d=Math.pow(1-t,2.2);
  var rx=Math.sin(el*shake.fX)*shake.aX*d;
  var rz=Math.sin(el*shake.fZ+1.1)*shake.aZ*d;
  var px=Math.sin(el*shake.fP+0.5)*shake.aP*d;
  for(var i=0;i<groups.length;i++){
    groups[i].rotation.x=rx;groups[i].rotation.z=rz;groups[i].position.x=px;
  }
}

var particles=[];
function createExplosion(x,y,z,color,count){
  count=count||25;
  var geo=new THREE.SphereGeometry(0.08,6,6);
  var mat=new THREE.MeshBasicMaterial({color:color});
  for(var i=0;i<count;i++){
    var m=new THREE.Mesh(geo,mat);
    m.position.set(x,y,z);
    m.userData={vel:new THREE.Vector3((Math.random()-.5)*.34,Math.random()*.42+.08,(Math.random()-.5)*.34),life:1.0,decay:0.016+Math.random()*.013};
    particlesGroup.add(m);particles.push(m);
  }
}
function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.userData.life-=p.userData.decay;
    p.position.add(p.userData.vel);
    p.userData.vel.y-=0.016;
    var s=Math.max(0,p.userData.life);
    p.scale.set(s,s,s);
    if(p.userData.life<=0){particlesGroup.remove(p);particles.splice(i,1);}
  }
}

function makePiece(player,row,col,isKing){
  var g=new THREE.Group();
  /* Blanc: gris perle doux / Rouge: rouge profond */
  /* Blanc nacré / Rouge profond — reflet naturel, pas plastique */
  var mainC=player===0?0xe8e0cc:0xc02818;
  var edgeC=player===0?0x909080:0x781410;
  var emivC=player===0?0x181410:0x380800;
  var emiI =player===0?0.03:0.12;
  var mat=new THREE.MeshStandardMaterial({
    color:mainC,roughness:0.38,metalness:0.18,
    emissive:emivC,emissiveIntensity:emiI
  });
  var disk=new THREE.Mesh(new THREE.CylinderGeometry(0.52,0.57,0.24,32),mat);
  disk.castShadow=true;disk.receiveShadow=true;g.add(disk);
  /* Bord métallique */
  var edgeMat=new THREE.MeshStandardMaterial({color:edgeC,roughness:0.20,metalness:0.75});
  var edge=new THREE.Mesh(new THREE.TorusGeometry(0.52,0.048,16,32),edgeMat);
  edge.rotation.x=Math.PI/2;edge.castShadow=true;g.add(edge);
  /* Disque dessus — highlight naturel */
  var capC=player===0?0xf8f0dc:0xe04030;
  var capMat=new THREE.MeshStandardMaterial({color:capC,roughness:0.18,metalness:0.35,emissive:capC,emissiveIntensity:0.05});
  var cap=new THREE.Mesh(new THREE.CircleGeometry(0.36,32),capMat);
  cap.rotation.x=-Math.PI/2;cap.position.y=0.13;g.add(cap);
  if(isKing)addCrown(g);
  g.position.set(col*CELL-BO,0.36,row*CELL-BO);
  g.scale.set(0,0,0);
  g.userData={type:'piece',player:player,king:isKing,row:row,col:col,targetY:0.36,animating:false};
  piecesGroup.add(g);

}
function addCrown(g){
  var cm=new THREE.MeshStandardMaterial({color:0xfbbf24,roughness:0.12,metalness:0.96,emissive:0xfbbf24,emissiveIntensity:0.48});
  var ring=new THREE.Mesh(new THREE.TorusGeometry(0.30,0.058,16,32),cm);
  ring.position.y=0.22;ring.rotation.x=Math.PI/2;g.add(ring);
  for(var i=0;i<5;i++){
    var a=(i/5)*Math.PI*2;
    var spike=new THREE.Mesh(new THREE.ConeGeometry(0.046,0.14,8),cm);
    spike.position.set(Math.cos(a)*0.3,0.31,Math.sin(a)*0.3);g.add(spike);
  }
}
function animPop(mesh){
  var t0=Date.now(),DUR=620;
  function eoe(t){if(t===0||t===1)return t;var p=0.38,s=p/(2*Math.PI)*Math.asin(1);return Math.pow(2,-10*t)*Math.sin((t-s)*(2*Math.PI)/p)+1;}
  function loop(){var p=Math.min((Date.now()-t0)/DUR,1);var sv=Math.max(0,eoe(p));mesh.scale.set(sv,sv,sv);if(p<1)requestAnimationFrame(loop);else mesh.scale.set(1,1,1);}
  loop();
}
function animCapture(mesh,onComplete){
  var t0=Date.now();
  createExplosion(mesh.position.x,mesh.position.y,mesh.position.z,mesh.userData.player===0?0xf8f6f0:0xd63020,22);
  function animate(){
    var p=(Date.now()-t0)/300;
    if(p<1){var sc=1-p;mesh.scale.set(sc,sc,sc);mesh.position.y+=0.04;mesh.rotation.y+=0.25;requestAnimationFrame(animate);}
    else{piecesGroup.remove(mesh);if(onComplete)onComplete();}
  }
  animate();
}

  mesh.userData.animating=true;mesh.userData.row=row;mesh.userData.col=col;
  var sx=mesh.position.x,sz=mesh.position.z;

    mesh.position.x=sx+(tx-sx)*e;mesh.position.z=sz+(tz-sz)*e;

    else{mesh.position.y=mesh.userData.targetY;mesh.userData.animating=false;}

  animate();

/* ══════════════════════════════════════════
   MOVE LOGIC — Règles internationales strictes
   
   CORRECTIONS CRITIQUES :
   1. Les pions PEUVENT capturer en arrière (règle internationale)
   2. La prise est OBLIGATOIRE et bloque tout déplacement simple
   3. La dame vole sur toute la diagonale
══════════════════════════════════════════ */
var ALL_DIRS=[[-1,-1],[-1,1],[1,-1],[1,1]];

function getValidMoves(row,col,onlyJumps){
  var piece=board[row][col];if(!piece)return[];
  var player=piece.player,isKing=piece.king;
  var moves=[],jumps=[];

  if(isKing){
    /* Dame volante: se déplace ET capture sur toute la diagonale */
    for(var d=0;d<ALL_DIRS.length;d++){
      var dr=ALL_DIRS[d][0],dc=ALL_DIRS[d][1];
      var foundEnemy=false,eR=-1,eC=-1;
      for(var dist=1;dist<BS;dist++){
        var nr=row+dr*dist,nc=col+dc*dist;
        if(nr<0||nr>=BS||nc<0||nc>=BS)break;
        if(!board[nr][nc]){
          if(!foundEnemy){if(!onlyJumps)moves.push({row:nr,col:nc,captures:[]});}
          else jumps.push({row:nr,col:nc,captures:[{row:eR,col:eC}]});
        } else if(board[nr][nc].player!==player&&!foundEnemy){
          foundEnemy=true;eR=nr;eC=nc;
        } else break;
      }
    }
  } else {
    /* Pion: avance seulement dans sa direction MAIS peut capturer dans TOUTES directions */
    var fwdDirs=player===0?[[1,-1],[1,1]]:[[-1,-1],[-1,1]];
    /* Mouvements simples: uniquement vers l'avant */
    if(!onlyJumps){
      for(var d=0;d<fwdDirs.length;d++){
        var dr=fwdDirs[d][0],dc=fwdDirs[d][1];
        var nr=row+dr,nc=col+dc;
        if(nr>=0&&nr<BS&&nc>=0&&nc<BS&&!board[nr][nc])moves.push({row:nr,col:nc,captures:[]});
      }
    }
    /* Captures: TOUTES les 4 directions (règle internationale) */
    for(var d=0;d<ALL_DIRS.length;d++){
      var dr=ALL_DIRS[d][0],dc=ALL_DIRS[d][1];
      var mr=row+dr,mc=col+dc;
      var jr=row+2*dr,jc=col+2*dc;
      if(jr>=0&&jr<BS&&jc>=0&&jc<BS&&
         board[mr]&&board[mr][mc]&&board[mr][mc].player!==player&&
         !board[jr][jc]){
        jumps.push({row:jr,col:jc,captures:[{row:mr,col:mc}]});
      }
    }
  }
  if(onlyJumps)return jumps;
  /* PRISE OBLIGATOIRE: si des sauts existent, retourner seulement les sauts */
  return jumps.length>0?jumps:moves;
}

function getAllValidMoves(player){
  var allMoves=[],hasJump=false;
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++)
    if(board[r][c]&&board[r][c].player===player){
      var jumps=getValidMoves(r,c,true);
      if(jumps.length>0){hasJump=true;for(var j=0;j<jumps.length;j++)allMoves.push({from:{row:r,col:c},to:jumps[j]});}
    }
  if(hasJump)return{moves:allMoves,forced:true};
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++)
    if(board[r][c]&&board[r][c].player===player){
      var ms=getValidMoves(r,c,false);for(var m=0;m<ms.length;m++)allMoves.push({from:{row:r,col:c},to:ms[m]});
    }
  return{moves:allMoves,forced:false};
}

function getMultiJumps(row,col,captured){
  var piece=board[row][col];if(!piece)return[];
  var jumps=[];
  if(piece.king){
    for(var d=0;d<ALL_DIRS.length;d++){
      var dr=ALL_DIRS[d][0],dc=ALL_DIRS[d][1],foundEnemy=false,eR=-1,eC=-1;
      for(var dist=1;dist<BS;dist++){
        var nr=row+dr*dist,nc=col+dc*dist;
        if(nr<0||nr>=BS||nc<0||nc>=BS)break;
        if(!board[nr][nc]){
          if(foundEnemy){
            var already=false;
            for(var i=0;i<captured.length;i++)if(captured[i].row===eR&&captured[i].col===eC){already=true;break;}
            if(!already){var nc2=captured.slice();nc2.push({row:eR,col:eC});jumps.push({row:nr,col:nc,captures:nc2});}
          }
        } else if(board[nr][nc].player!==piece.player&&!foundEnemy){foundEnemy=true;eR=nr;eC=nc;}
        else break;
      }
    }
  } else {
    /* Pion: multi-saut dans toutes les directions */
    for(var d=0;d<ALL_DIRS.length;d++){
      var dr=ALL_DIRS[d][0],dc=ALL_DIRS[d][1];
      var mr=row+dr,mc=col+dc,jr=row+2*dr,jc=col+2*dc;
      if(jr>=0&&jr<BS&&jc>=0&&jc<BS&&board[mr]&&board[mr][mc]&&board[mr][mc].player!==piece.player&&!board[jr][jc]){
        var already=false;
        for(var i=0;i<captured.length;i++)if(captured[i].row===mr&&captured[i].col===mc){already=true;break;}
        if(!already){var nc2=captured.slice();nc2.push({row:mr,col:mc});jumps.push({row:jr,col:jc,captures:nc2});}
      }
    }
  }
  return jumps;
}

function executeMove(from,to){
  var piece=board[from.row][from.col];
  board[to.row][to.col]=piece;board[from.row][from.col]=null;
  var captured=[];
  if(to.captures)for(var i=0;i<to.captures.length;i++){
    var cap=to.captures[i];
    if(board[cap.row][cap.col]){
      captured.push({row:cap.row,col:cap.col,player:board[cap.row][cap.col].player});
      board[cap.row][cap.col]=null;
    }
  }
  /* Créditer les captures au joueur qui joue */
  if(captured.length>0){
    capturedBy[piece.player]+=captured.length;
    updateCapturedDisplay();
  }
  var promoted=false;
  if(!piece.king){
    if((piece.player===0&&to.row===BS-1)||(piece.player===1&&to.row===0)){piece.king=true;promoted=true;}
  }
  return{captured:captured,promoted:promoted};
}

function checkGameOver(){
  var wc=0,rc=0;
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++)if(board[r][c]){if(board[r][c].player===0)wc++;else rc++;}
  document.getElementById('score-w').textContent=wc;
  document.getElementById('score-r').textContent=rc;
  if(wc===0)return 1;if(rc===0)return 0;
  if(getAllValidMoves(0).moves.length===0)return 1;
  if(getAllValidMoves(1).moves.length===0)return 0;
  return -1;
}

/* ── CAPTURED DISPLAY ──────────────────────────────────────────────
   humanCaptures = pions pris PAR le joueur humain (affiché sous son profil)
   aiCaptures    = pions pris PAR l'IA (affiché sous son profil)
   Les dots montrent la couleur des pions CAPTURÉS (couleur adverse)
──────────────────────────────────────────────────────────────────── */
function updateCapturedDisplay(){
  var elH=document.getElementById('cap-human');
  var elA=document.getElementById('cap-ai');
  /* Couleur des pions capturés = couleur de l'adversaire du capteur */
  var humanCapturedColor=humanPlayer===0?'red':'white'; /* humain capture les pions de l'IA */
  var aiCapturedColor=humanPlayer===0?'white':'red';   /* IA capture les pions du joueur */
  var hCount=capturedBy[humanPlayer];
  var aCount=capturedBy[1-humanPlayer];
  function buildDots(el,count,colorClass){
    el.innerHTML='';
    if(count===0)return;
    var show=Math.min(count,10); /* max 10 dots visibles */
    for(var i=0;i<show;i++){
      var d=document.createElement('div');
      d.className='cap-dot cap-dot-'+colorClass;
      el.appendChild(d);
    }
    if(count>0){
      var span=document.createElement('span');
      span.className='cap-count';
      span.textContent='×'+count;
      el.appendChild(span);
    }
  }
  buildDots(elH,hCount,humanCapturedColor);
  buildDots(elA,aCount,aiCapturedColor);
}

/* ══════════════════════════════════════════
   PLAYER MOVE — prise obligatoire stricte
══════════════════════════════════════════ */
function onCellClick(row,col){
  if(!gameReady||gameOver||isProcessing)return;
  /* En multijoueur: bloquer si c'est le tour de l'adversaire */
  if(currentPlayer!==MY_PLAYER)return;
  var result=getAllValidMoves(currentPlayer);

  if(selectedPiece){
    /* Tenter de jouer le coup sur cette case */
    for(var i=0;i<validMoves.length;i++){
      if(validMoves[i].row===row&&validMoves[i].col===col){
        executePlayerMove(selectedPiece,validMoves[i]);return;
      }
    }
    /* Changer de pion sélectionné */
    if(board[row][col]&&board[row][col].player===currentPlayer){
      var moves=result.forced?getValidMoves(row,col,true):getValidMoves(row,col,false);
      /* En cas de prise obligatoire, ignorer les pions sans capture possible */
      if(result.forced&&moves.length===0)return;
      if(moves.length===0){clearHighlights();selectedPiece=null;validMoves=[];return;}
      selectedPiece={row:row,col:col};validMoves=moves;showSelection(row,col);showValidMoves(moves);return;
    }
    clearHighlights();selectedPiece=null;validMoves=[];return;
  }
  /* Sélectionner un pion */
  if(board[row][col]&&board[row][col].player===currentPlayer){
    var moves=result.forced?getValidMoves(row,col,true):getValidMoves(row,col,false);
    if(result.forced&&moves.length===0)return; /* Ce pion ne peut pas capturer */
    if(moves.length===0)return;
    selectedPiece={row:row,col:col};validMoves=moves;showSelection(row,col);showValidMoves(moves);
  }
}

function executePlayerMove(from,to){
  isProcessing=true;
  var originRow=from.row,originCol=from.col;
  selectedPiece=null;validMoves=[];clearHighlights();stopTimer();
  /* Émettre le coup au serveur avant d'appliquer localement */
  if(socket&&socket.connected){
    socket.emit('dames_move',{room:ROOM_ID,player:MY_SLOT,from:from,to:to});
  }
  var result=executeMove(from,to);
  var mesh=getPieceMesh(from.row,from.col);
  updatePiecePosition(mesh,to.row,to.col);
  showLastMoveOrigin(originRow,originCol);
  var cc=0;
  function nextCap(){
    if(cc<result.captured.length){
      var cap=result.captured[cc],cm=getPieceMesh(cap.row,cap.col);
      if(cm)animCapture(cm,function(){cc++;nextCap();}); else{cc++;nextCap();}
    } else finishMove(to,result.promoted,mesh);
  }
  setTimeout(nextCap,260);
}

/* Appliquer un coup reçu de l'adversaire */
function applyRemoteMove(from,to){
  if(gameOver||isProcessing)return;
  isProcessing=true;
  var originRow=from.row,originCol=from.col;
  clearHighlights();stopTimer();
  var result=executeMove(from,to);
  var mesh=getPieceMesh(from.row,from.col);
  updatePiecePosition(mesh,to.row,to.col);
  showLastMoveOrigin(originRow,originCol);
  var cc=0;
  function nextCap(){
    if(cc<result.captured.length){
      var cap=result.captured[cc],cm=getPieceMesh(cap.row,cap.col);
      if(cm)animCapture(cm,function(){cc++;nextCap();}); else{cc++;nextCap();}
    } else finishRemoteMove(to,result.promoted,mesh);
  }
  setTimeout(nextCap,260);
}

function finishRemoteMove(to,promoted,mesh){
  if(promoted)promotePiece(mesh);
  var multiJ=getMultiJumps(to.row,to.col,to.captures||[]);
  /* En multi: l'adversaire joue toujours ses multi-sauts lui-même */
  if(multiJ.length>0&&to.captures&&to.captures.length>0){
    isProcessing=false;updateForcedHint();return;
  }
  var winner=checkGameOver();if(winner>=0){handleGameEnd(winner);return;}
  currentPlayer=1-currentPlayer;isProcessing=false;updUI();
}

function finishMove(to,promoted,mesh){
  if(promoted)promotePiece(mesh);
  var multiJ=getMultiJumps(to.row,to.col,to.captures||[]);
  if(multiJ.length>0&&to.captures&&to.captures.length>0){
    validMoves=multiJ;selectedPiece={row:to.row,col:to.col};
    showSelection(to.row,to.col);showValidMoves(multiJ);
    isProcessing=false;updateForcedHint();return;
  }
  var winner=checkGameOver();if(winner>=0){handleGameEnd(winner);return;}
  currentPlayer=1-currentPlayer;isProcessing=false;updUI();
  /* Pas d'IA en multijoueur — l'adversaire joue via socket */
}

function handleGameEnd(winner){
  stopTimer();gameOver=true;
  var wc=0,rc=0;
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++)if(board[r][c]){if(board[r][c].player===0)wc++;else rc++;}

  var winnerEmoji=humanWon?(MY_PLAYER===0?'⚪':'🔴'):(MY_PLAYER===0?'🔴':'⚪');

    :(OP_NAME+' a remporté la partie.\n'+wc+' pions restants contre '+rc+'.');

    sendResult(outcome,'normal');
  });
}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
function stopTimer(){
  timerActive=false;if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}
  document.getElementById('timer-arc-human').style.strokeDashoffset=CIRC;
  document.getElementById('timer-arc-ai').style.strokeDashoffset=CIRC;
  document.getElementById('profile-human').className='profile';
  document.getElementById('profile-ai').className='profile';
}
function startTimer(isHuman){
  stopTimer();if(gameOver)return;
  timerActive=true;timerStart=Date.now();
  var arcId=isHuman?'timer-arc-human':'timer-arc-ai';
  var profId=isHuman?'profile-human':'profile-ai';
  var arc=document.getElementById(arcId),prof=document.getElementById(profId);
  prof.classList.add('active',isHuman?'human-active':'ai-active');
  function tick(){
    if(!timerActive)return;
    var progress=Math.min((Date.now()-timerStart)/TIMER_DURATION,1);
    arc.style.strokeDashoffset=CIRC*progress;
    if(progress>=0.67)prof.classList.add('timer-urgent');
    if(progress<1){timerRAF=requestAnimationFrame(tick);}
    else{
      timerActive=false;
      /* Temps écoulé: jouer un coup aléatoire si c'est notre tour */
      if(isHuman&&gameReady&&!gameOver&&!isProcessing&&currentPlayer===MY_PLAYER){
        var result=getAllValidMoves(currentPlayer);
        if(result.moves.length>0){var rm=result.moves[Math.floor(Math.random()*result.moves.length)];executePlayerMove(rm.from,rm.to);}
      }
    }
  }
  timerRAF=requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════ */
var confettiCanvas=document.getElementById('confetti-canvas');
var confettiCtx=confettiCanvas.getContext('2d');
var confettiParts=[],confettiActive=false;
function createConfetti(){
  var colors=['#fbbf24','#f59e0b','#ffffff','#e74c3c','#818cf8','#c084fc','#34d399'];
  var shapes=['circle','square','triangle'];
  for(var i=0;i<180;i++){
    confettiParts.push({x:confettiCanvas.width/2,y:confettiCanvas.height/2,
      vx:(Math.random()-.5)*22,vy:(Math.random()-.5)*22-6,
      color:colors[Math.floor(Math.random()*colors.length)],
      shape:shapes[Math.floor(Math.random()*shapes.length)],
      size:Math.random()*10+5,rotation:Math.random()*360,
      rotSpeed:(Math.random()-.5)*12,gravity:0.32,drag:0.985,life:1.0});
  }
  confettiActive=true;
}
function updateConfetti(){
  if(!confettiActive)return;
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  var any=false;
  for(var i=confettiParts.length-1;i>=0;i--){
    var p=confettiParts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=p.drag;p.vy*=p.drag;
    p.rotation+=p.rotSpeed;p.life-=0.004;
    if(p.life>0&&p.y<confettiCanvas.height+60){
      any=true;
      confettiCtx.save();confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rotation*Math.PI/180);
      confettiCtx.globalAlpha=p.life;confettiCtx.fillStyle=p.color;
      if(p.shape==='circle'){confettiCtx.beginPath();confettiCtx.arc(0,0,p.size/2,0,Math.PI*2);confettiCtx.fill();}
      else if(p.shape==='square'){confettiCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);}
      else{confettiCtx.beginPath();confettiCtx.moveTo(0,-p.size/2);confettiCtx.lineTo(p.size/2,p.size/2);confettiCtx.lineTo(-p.size/2,p.size/2);confettiCtx.closePath();confettiCtx.fill();}
      confettiCtx.restore();
    }
  }
  if(!any){confettiActive=false;confettiParts=[];confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}
}

/* ══════════════════════════════════════════
   INPUT — touch/mouse
   Rotation naturelle: drag haut = caméra monte
══════════════════════════════════════════ */
var raycaster=new THREE.Raycaster();
var mouse=new THREE.Vector2();
var isDragging=false,dragMoved=false,lastTouchDist=0;
var lastMX=0,lastMY=0;

function getPointerCell(cx,cy){
  var rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;
  mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
  var pt=new THREE.Vector3();
  raycaster.ray.intersectPlane(plane,pt);
  if(!pt)return null;
  var col=Math.round((pt.x+BO)/CELL);
  var row=Math.round((pt.z+BO)/CELL);
  if(row>=0&&row<BS&&col>=0&&col<BS)return{row:row,col:col};
  return null;
}

renderer.domElement.addEventListener('mousedown',function(e){isDragging=true;dragMoved=false;lastMX=e.clientX;lastMY=e.clientY;});
renderer.domElement.addEventListener('mousemove',function(e){
  if(!isDragging)return;
  var dx=e.clientX-lastMX,dy=e.clientY-lastMY;
  if(Math.abs(dx)+Math.abs(dy)>4)dragMoved=true;
  if(!topViewAnimating){
    camTheta-=dx*0.009;
    /* drag vers le haut (dy<0) = caméra monte (phi diminue) */
    camPhi=Math.max(0.28,Math.min(1.45,camPhi-dy*0.007));
    setCam();
  }
  lastMX=e.clientX;lastMY=e.clientY;
});
renderer.domElement.addEventListener('mouseup',function(e){
  if(!dragMoved){var cell=getPointerCell(e.clientX,e.clientY);if(cell)onCellClick(cell.row,cell.col);}
  isDragging=false;
});

renderer.domElement.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===1){isDragging=true;dragMoved=false;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}
  else if(e.touches.length===2){isDragging=false;var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy);}
},{passive:false});
renderer.domElement.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    var dx=e.touches[0].clientX-lastMX,dy=e.touches[0].clientY-lastMY;
    if(Math.abs(dx)+Math.abs(dy)>5)dragMoved=true;
    if(!topViewAnimating){
      camTheta-=dx*0.010;
      camPhi=Math.max(0.28,Math.min(1.45,camPhi-dy*0.008));
      setCam();
    }
    lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0){var delta=(lastTouchDist-dist)*0.045;camD=Math.max(12,Math.min(38,camD+delta));setCam();}
    lastTouchDist=dist;
  }
},{passive:false});
renderer.domElement.addEventListener('touchend',function(e){
  e.preventDefault();
  if(!dragMoved&&e.changedTouches.length>0){var t=e.changedTouches[0];var cell=getPointerCell(t.clientX,t.clientY);if(cell)onCellClick(cell.row,cell.col);}
  isDragging=false;lastTouchDist=0;
},{passive:false});

/* ══════════════════════════════════════════
   CAMERA VIEWS — avec shake du plateau
══════════════════════════════════════════ */
var topViewAnimating=false,camViewIdx=0;
var camViews=[
  {phi:0.72, toff:0,              d:22, label:'Votre camp'},
  {phi:0.58, toff:Math.PI*0.30,   d:22, label:'Diagonale droite'},
  {phi:0.55, toff:Math.PI*0.50,   d:22, label:'Côté droit'},
  {phi:0.72, toff:Math.PI,        d:22, label:'Camp adversaire'},
  {phi:0.55, toff:-Math.PI*0.50,  d:22, label:'Côté gauche'},
  {phi:0.58, toff:-Math.PI*0.30,  d:22, label:'Diagonale gauche'},
  {phi:0.06, toff:0,              d:24, label:'Dessus'}
];
function baseTheta(){return humanPlayer===0?Math.PI:0;}
function animCamTo(tD,tPhi,tTheta,dur,onDone){
  var sD=camD,sPhi=camPhi,sTheta=camTheta,t0=Date.now();
  var dTheta=tTheta-sTheta;
  while(dTheta>Math.PI)dTheta-=Math.PI*2;while(dTheta<-Math.PI)dTheta+=Math.PI*2;
  topViewAnimating=true;
  function step(){
    var p=Math.min((Date.now()-t0)/dur,1);
    var e=p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
    camD=sD+(tD-sD)*e;camPhi=sPhi+(tPhi-sPhi)*e;camTheta=sTheta+dTheta*e;setCam();
    if(p<1)requestAnimationFrame(step);
    else{camD=tD;camPhi=tPhi;camTheta=tTheta;setCam();topViewAnimating=false;if(onDone)onDone();}
  }
  requestAnimationFrame(step);
}
document.getElementById('btn-topview').addEventListener('click',function(){
  if(topViewAnimating)return;
  camViewIdx=(camViewIdx+1)%camViews.length;
  var v=camViews[camViewIdx];
  animCamTo(camD,v.phi,baseTheta()+v.toff,720,null);
  triggerShake();
  autoRotate=false;document.getElementById('btn-cam').classList.remove('active-cam');
  document.getElementById('btn-topview').classList.toggle('active-top',camViewIdx!==0);
});
document.getElementById('btn-cam').addEventListener('click',function(){
  autoRotate=!autoRotate;
  document.getElementById('btn-cam').classList[autoRotate?'add':'remove']('active-cam');
});
/* Pas de bouton restart en mode multijoueur — la partie se termine définitivement */

/* ══════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════ */
var hlPulseT=0,lastMoveAlpha=0,lastMoveDir=1;
function renderLoop(){
  requestAnimationFrame(renderLoop);
  if(autoRotate&&!topViewAnimating){camTheta+=0.004;setCam();}
  hlPulseT+=0.04;
  /* Pulsation sélection */
  for(var i=0;i<hlGroup.children.length;i++)hlGroup.children[i].material.opacity=0.30+Math.sin(hlPulseT*2)*0.22;
  /* Pulsation coups valides */
  for(var i=0;i<moveHlGroup.children.length;i++)moveHlGroup.children[i].material.opacity=0.60+Math.sin(hlPulseT*2.8+i)*0.22;
  /* Pulsation last move */
  lastMoveAlpha+=0.025*lastMoveDir;
  if(lastMoveAlpha>1){lastMoveAlpha=1;lastMoveDir=-1;}
  if(lastMoveAlpha<0){lastMoveAlpha=0;lastMoveDir=1;}
  for(var i=0;i<lastMoveGroup.children.length;i++)lastMoveGroup.children[i].material.opacity=0.15+lastMoveAlpha*0.28;
  /* Rotation douce des pions */
  for(var i=0;i<piecesGroup.children.length;i++){var p=piecesGroup.children[i];if(!p.userData.animating)p.rotation.y+=0.006;}
  applyShake();
  updateParticles();updateConfetti();
  renderer.render(scene,camera);
}
renderLoop();
