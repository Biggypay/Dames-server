<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MINDSPILLE - Dames 3D Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}
.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);transition:border-color 0.3s,box-shadow 0.3s,background 0.3s}
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.10)}
.profile.active.human-active .profile-avatar{box-shadow:0 0 18px rgba(255,255,255,0.5)}
.profile.active.ai-active .profile-avatar{box-shadow:0 0 18px rgba(231,76,60,0.5)}
.av-white{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f5f5f5 0%,#ffffff 50%,#e0e0e0 100%);border:3px solid #c0c0c0;box-shadow:0 2px 8px rgba(255,255,255,0.4),inset 0 2px 4px rgba(255,255,255,0.8);position:relative}
.av-white::after{content:'';position:absolute;top:20%;left:20%;width:35%;height:20%;border-radius:50%;background:rgba(255,255,255,0.9);transform:rotate(-45deg)}
.av-red{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c0392b 0%,#e74c3c 50%,#a93226 100%);border:3px solid #922b21;box-shadow:0 2px 8px rgba(231,76,60,0.4),inset 0 2px 4px rgba(255,150,150,0.3);position:relative}
.av-red::after{content:'';position:absolute;top:20%;left:20%;width:35%;height:20%;border-radius:50%;background:rgba(255,200,200,0.4);transform:rotate(-45deg)}
.av-king::before{content:'♔';position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:14px;color:#fbbf24;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;transition:color 0.3s}
.profile.active .profile-name{color:rgba(255,255,255,0.9)}
.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.timer-urgent .timer-arc{animation:urgentPulse 0.5s infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:0.4}}
.btns{display:flex;gap:7px}
.btn{background:rgba(255,255,255,0.10);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:99px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(255,255,255,0.25);transform:scale(0.95)}
.btn.active-cam{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.7);color:#fbbf24}
.btn-topview{display:flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border-radius:50%;flex-shrink:0;color:rgba(255,255,255,0.7);transition:all .2s}
.btn-topview.active-top{background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.7);color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.3)}
#wrap{flex:1 1 auto;position:relative;overflow:hidden;touch-action:none}
#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif;text-align:center;padding:0 16px}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.sym-white-wrap{position:relative;width:72px;height:72px}
.sym-white{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#f5f5f5 0%,#ffffff 50%,#e0e0e0 100%);border:4px solid #c0c0c0;box-shadow:0 4px 20px rgba(255,255,255,0.5),inset 0 4px 8px rgba(255,255,255,0.9);position:absolute;top:3px;left:3px}
.sym-white::after{content:'';position:absolute;top:18%;left:18%;width:35%;height:18%;border-radius:50%;background:rgba(255,255,255,0.95);transform:rotate(-45deg)}
.sym-red-wrap{position:relative;width:72px;height:72px}
.sym-red{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#c0392b 0%,#e74c3c 50%,#a93226 100%);border:4px solid #922b21;box-shadow:0 4px 20px rgba(231,76,60,0.5),inset 0 4px 8px rgba(255,150,150,0.4);position:absolute;top:3px;left:3px}
.sym-red::after{content:'';position:absolute;top:18%;left:18%;width:35%;height:18%;border-radius:50%;background:rgba(255,200,200,0.5);transform:rotate(-45deg)}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px;white-space:pre-line}
#confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55}
#force-jump-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(220,40,20,0.22);border:1.5px solid rgba(255,90,60,0.8);border-radius:99px;padding:8px 20px;font-size:12px;color:#ff6060;font-weight:700;display:none;z-index:25;backdrop-filter:blur(8px);box-shadow:0 0 18px rgba(255,60,30,0.3)}
#force-jump-hint.show{display:block;animation:pulse-hint 1s infinite}
@keyframes pulse-hint{0%,100%{opacity:0.85;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
#reconn-bar{position:absolute;top:0;left:0;right:0;z-index:150;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none}
#reconn-bar.show{display:block}
#forfeit-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.95);border:1px solid rgba(251,191,36,0.5);border-radius:99px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#fbbf24;display:none;z-index:25;backdrop-filter:blur(8px)}
#forfeit-bar.show{display:block}
#hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;pointer-events:none;z-index:5}
#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
.sw{color:#ffffff}.sr{color:#f87171}.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px}
.captured-row{display:flex;flex-wrap:wrap;align-items:center;gap:2px;justify-content:center;min-height:14px;max-width:80px}
.cap-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cap-dot-white{background:radial-gradient(circle at 35% 35%,#f0ecdc,#b8b0a0);border:1px solid rgba(255,255,255,0.4)}
.cap-dot-red{background:radial-gradient(circle at 35% 35%,#e04030,#881818);border:1px solid rgba(255,100,80,0.4)}
.cap-count{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:rgba(255,255,255,0.7);margin-left:2px}
</style>
</head>
<body>
<div id="top">
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#ffffff"/></svg>
      <div class="profile-avatar" id="avatar-human"><div class="av-white"></div></div>
    </div>
    <div class="profile-name">Blanc</div>
    <div class="captured-row" id="cap-human"></div>
  </div>
  <div class="top-center">
    <div class="score-row"><span class="snum sw" id="score-w">20</span><span class="ssep">vs</span><span class="snum sr" id="score-r">20</span></div>
    <span class="manche-lbl">Dames International</span>
  </div>
  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/></svg>
      <div class="profile-avatar" id="avatar-ai"><div class="av-red"></div></div>
    </div>
    <div class="profile-name">Rouge</div>
    <div class="captured-row" id="cap-ai"></div>
  </div>
</div>

<div id="wrap">
  <div id="loading"><div class="spin"></div><p>CONNEXION AU SERVEUR MINDSPILLE...</p></div>
  <canvas id="confetti-canvas"></canvas>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
  <div id="force-jump-hint">⚡ Prise obligatoire !</div>
  <div id="hint">👌 Pince = zoom · Glisse = tourner · Tap = jouer</div>
  <div id="toast"><div id="toast-emoji"></div><div id="toast-title"></div><div id="toast-sub"></div></div>
</div>

<div id="bot">
  <div style="display:flex;gap:7px;flex-shrink:0">
    <button class="btn btn-topview" id="btn-topview" title="Changer vue">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="btns">
    <button class="btn" id="btn-cam">⟳ Auto</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.onerror=function(msg,url,line,col,err){
  var ld=document.getElementById('loading');
  if(ld){ld.querySelector('p').textContent='ERREUR: '+msg;}
  return false;
};

(function(){
'use strict';

/* ══════════════════════════════════════════
   CONFIGURATION & URL PARAMS
══════════════════════════════════════════ */
var P = new URLSearchParams(window.location.search);
var ROOM_ID    = P.get('room') || P.get('gameId') || 'default-room';
var MY_SLOT    = parseInt(P.get('player') || '1', 10); 
var P1_ID      = P.get('p1Id') || '';
var P2_ID      = P.get('p2Id') || '';
var P1_NAME    = P.get('p1Name') || 'Joueur 1';
var P2_NAME    = P.get('p2Name') || 'Joueur 2';
var BET_AMOUNT = parseFloat(P.get('bet') || '0');
var CURRENCY   = P.get('currency') || 'HTG';

var MY_PLAYER      = (MY_SLOT === 1) ? 0 : 1; 
var MY_SUPABASE_ID = (MY_SLOT === 1) ? P1_ID : P2_ID;
var OP_SUPABASE_ID = (MY_SLOT === 1) ? P2_ID : P1_ID;
var MY_NAME        = (MY_SLOT === 1) ? P1_NAME : P2_NAME;
var OP_NAME        = (MY_SLOT === 1) ? P2_NAME : P1_NAME;

/* ══════════════════════════════════════════
   SOCKET.IO LOGIC
══════════════════════════════════════════ */
var socket = null;
var resultSent = false;
var forfeitTimer = null;
var forfeitCountdown = 0;
var _moveSteps = []; 

function initSocket(){
  socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true
  });

  socket.on('connect', function(){
    document.getElementById('reconn-bar').classList.remove('show');
    socket.emit('dames_join', {
      room: ROOM_ID,
      player: MY_SLOT,
      supabaseId: MY_SUPABASE_ID,
      name: MY_NAME,
      bet: BET_AMOUNT,
      currency: CURRENCY
    });
  });

  socket.on('disconnect', function(){
    if(!gameOver) document.getElementById('reconn-bar').classList.add('show');
  });

  socket.on('dames_start', function(data){
    var ldEl = document.getElementById('loading');
    if(ldEl) { ldEl.style.opacity = '0'; setTimeout(function(){ ldEl.style.display = 'none'; }, 400); }
    
    if(data.reconnected && data.boardState) {
        board = JSON.parse(data.boardState);
        currentPlayer = data.currentPlayer !== undefined ? data.currentPlayer : 0;
        syncPieces();
        gameReady = true;
        updUI();
    } else {
        startMultiGame();
    }
  });

  socket.on('dames_turn_start', function(data){
    currentPlayer = (data.player === 1) ? 0 : 1;
    syncServerTimer(data.startTime, data.duration, (data.player === MY_SLOT));
  });

  socket.on('dames_move', function(data){
    if(data.player === MY_SLOT) return;
    applyRemoteSteps(data.steps);
  });

  socket.on('game:over', function(data){
    if(gameOver) return;
    stopForfeitCountdown();
    var iWon = (data.winnerSupabaseId === MY_SUPABASE_ID || data.winnerSlot === MY_SLOT);
    handleGameEnd(iWon ? MY_PLAYER : 1 - MY_PLAYER, data.reason || 'normal');
  });

  socket.on('dames_opponent_disconnected', function(){
    if(!gameOver) startForfeitCountdown(60);
  });

  socket.on('dames_game_resumed', function(){
    stopForfeitCountdown();
    showToast('▶️', 'Partie reprise', 'L\'adversaire est revenu !', 2000);
  });
}

function syncServerTimer(serverStartTime, duration, isHuman){
  stopTimer(); if(gameOver) return;
  var elapsed = Date.now() - serverStartTime;
  var remaining = Math.max(0, duration - elapsed);
  if(remaining <= 0) return;
  
  timerActive = true;
  timerStart = Date.now() - elapsed;
  var arcId = isHuman ? 'timer-arc-human' : 'timer-arc-ai';
  var profId = isHuman ? 'profile-human' : 'profile-ai';
  var arc = document.getElementById(arcId), prof = document.getElementById(profId);
  prof.className = 'profile active ' + (isHuman ? 'human-active' : 'ai-active');

  function tick(){
    if(!timerActive) return;
    var progress = Math.min((Date.now() - timerStart) / duration, 1);
    arc.style.strokeDashoffset = CIRC * progress;
    if(progress >= 0.7) prof.classList.add('timer-urgent');
    if(progress < 1) timerRAF = requestAnimationFrame(tick);
  }
  timerRAF = requestAnimationFrame(tick);
}

function sendResult(outcome, reason){
  if(resultSent) return;
  resultSent = true;
  var msg = {
    type: 'game_result', game: 'dames', room: ROOM_ID,
    winner: (outcome === 'win') ? MY_SUPABASE_ID : OP_SUPABASE_ID,
    loser: (outcome === 'win') ? OP_SUPABASE_ID : MY_SUPABASE_ID,
    bet: BET_AMOUNT, currency: CURRENCY, reason: reason,
    p1Id: P1_ID, p2Id: P2_ID
  };
  if(socket && socket.connected) socket.emit('dames_result', msg);
  try { window.parent.postMessage(msg, '*'); } catch(e){}
}

/* ══════════════════════════════════════════
   THREE.JS & GAME ENGINE
══════════════════════════════════════════ */
var gameOver=false, isProcessing=false, gameReady=false;
var TIMER_DURATION=30000, CIRC=2*Math.PI*26;
var timerStart=null, timerRAF=null, timerActive=false;
var currentPlayer=0, humanPlayer=MY_PLAYER;
var board=[], selectedPiece=null, validMoves=[];
var capturedBy=[0,0];

var wrap=document.getElementById('wrap');
var scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x1e1b4b, 22, 70);
var camD=22, camPhi=0.72, camTheta=MY_PLAYER===0 ? Math.PI : 0;
var autoRotate=false;
var camera=new THREE.PerspectiveCamera(42, 1, 0.1, 1000);

function setCam(){
  camera.position.set(camD*Math.sin(camPhi)*Math.sin(camTheta), camD*Math.cos(camPhi), camD*Math.sin(camPhi)*Math.cos(camTheta));
  camera.lookAt(0,0,0);
}
setCam();

var renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.shadowMap.enabled=true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
wrap.appendChild(renderer.domElement);

function resize(){
  var w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
var keyL=new THREE.DirectionalLight(0xfff8f0, 0.90);
keyL.position.set(6,18,12); keyL.castShadow=true;
scene.add(keyL);

var boardGroup=new THREE.Group(), piecesGroup=new THREE.Group(), hlGroup=new THREE.Group();
var moveHlGroup=new THREE.Group(), lastMoveGroup=new THREE.Group(), particlesGroup=new THREE.Group();
scene.add(boardGroup); scene.add(piecesGroup); scene.add(hlGroup);
scene.add(moveHlGroup); scene.add(lastMoveGroup); scene.add(particlesGroup);

var CELL=1.4, BS=10, BO=(BS-1)*CELL/2;

function createBoard(){
  var baseMat=new THREE.MeshStandardMaterial({color:0x2a1a10});
  var base=new THREE.Mesh(new THREE.BoxGeometry(BS*CELL+0.7, 0.22, BS*CELL+0.7), baseMat);
  base.position.y=-0.11; base.receiveShadow=true; boardGroup.add(base);
  
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++){
    var isDark=(r+c)%2===1;
    var cell=new THREE.Mesh(new THREE.BoxGeometry(CELL,0.12,CELL), new THREE.MeshStandardMaterial({color:isDark?0x100a28:0xb8936a}));
    cell.position.set(c*CELL-BO, 0.04, r*CELL-BO); cell.receiveShadow=true;
    boardGroup.add(cell);
  }
}
createBoard();

function makePiece(player, row, col, isKing){
  var g=new THREE.Group();
  var mat=new THREE.MeshStandardMaterial({color:player===0?0xe8e0cc:0xc02818, metalness:0.2});
  var disk=new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.57, 0.24, 32), mat);
  disk.castShadow=true; g.add(disk);
  if(isKing) addCrown(g);
  g.position.set(col*CELL-BO, 0.36, row*CELL-BO);
  g.userData={player:player, king:isKing, row:row, col:col, animating:false};
  piecesGroup.add(g); return g;
}

function addCrown(g){
  var cm=new THREE.MeshStandardMaterial({color:0xfbbf24, metalness:0.9});
  var ring=new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.05, 16, 32), cm);
  ring.position.y=0.22; ring.rotation.x=Math.PI/2; g.add(ring);
}

function initBoard(){
  board=[];
  for(var r=0;r<BS;r++){ board[r]=[]; for(var c=0;c<BS;c++) board[r][c]=null; }
  for(var r=0;r<4;r++)for(var c=0;c<BS;c++) if((r+c)%2===1) board[r][c]={player:0, king:false};
  for(var r=6;r<10;r++)for(var c=0;c<BS;c++) if((r+c)%2===1) board[r][c]={player:1, king:false};
}

function syncPieces(){
  while(piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
  for(var r=0;r<BS;r++)for(var c=0;c<BS;c++) if(board[r][c]) makePiece(board[r][c].player, r, c, board[r][c].king);
}

function getPieceMesh(row, col){
  for(var i=0; i<piecesGroup.children.length; i++){
    var p=piecesGroup.children[i]; if(p.userData.row===row && p.userData.col===col) return p;
  }
  return null;
}

function updatePiecePosition(mesh, row, col){
  mesh.userData.animating=true; mesh.userData.row=row; mesh.userData.col=col;
  var tx=col*CELL-BO, tz=row*CELL-BO;
  mesh.position.set(tx, 0.36, tz);
  mesh.userData.animating=false;
}

/* ══════════════════════════════════════════
   GAME LOGIC & MOVES
══════════════════════════════════════════ */
var ALL_DIRS=[[-1,-1],[-1,1],[1,-1],[1,1]];

function getValidMoves(row, col, onlyJumps){
  var piece=board[row][col]; if(!piece) return [];
  var player=piece.player, isKing=piece.king, moves=[], jumps=[];
  
  if(isKing){
    for(var d=0; d<ALL_DIRS.length; d++){
      var dr=ALL_DIRS[d][0], dc=ALL_DIRS[d][1], foundEnemy=false, eR, eC;
      for(var dist=1; dist<BS; dist++){
        var nr=row+dr*dist, nc=col+dc*dist;
        if(nr<0||nr>=BS||nc<0||nc>=BS) break;
        if(!board[nr][nc]){
          if(!foundEnemy){ if(!onlyJumps) moves.push({row:nr, col:nc, captures:[]}); }
          else jumps.push({row:nr, col:nc, captures:[{row:eR, col:eC}]});
        } else if(board[nr][nc].player!==player && !foundEnemy){ foundEnemy=true; eR=nr; eC=nc; }
        else break;
      }
    }
  } else {
    var fwdDirs=player===0?[[1,-1],[1,1]]:[[-1,-1],[-1,1]];
    if(!onlyJumps){
      for(var d=0; d<fwdDirs.length; d++){
        var nr=row+fwdDirs[d][0], nc=col+fwdDirs[d][1];
        if(nr>=0&&nr<BS&&nc>=0&&nc<BS&&!board[nr][nc]) moves.push({row:nr, col:nc, captures:[]});
      }
    }
    for(var d=0; d<ALL_DIRS.length; d++){
      var dr=ALL_DIRS[d][0], dc=ALL_DIRS[d][1], mr=row+dr, mc=col+dc, jr=row+2*dr, jc=col+2*dc;
      if(jr>=0&&jr<BS&&jc>=0&&jc<BS && board[mr] && board[mr][mc] && board[mr][mc].player!==player && !board[jr][jc])
        jumps.push({row:jr, col:jc, captures:[{row:mr, col:mc}]});
    }
  }
  return jumps.length>0 ? jumps : moves;
}

function getAllValidMoves(player){
  var allMoves=[], hasJump=false;
  for(var r=0; r<BS; r++)for(var c=0; c<BS; c++) if(board[r][c] && board[r][c].player===player){
    var js=getValidMoves(r,c,true); if(js.length>0){ hasJump=true; js.forEach(j=>allMoves.push({from:{row:r,col:c}, to:j})); }
  }
  if(hasJump) return {moves:allMoves, forced:true};
  for(var r=0; r<BS; r++)for(var c=0; c<BS; c++) if(board[r][c] && board[r][c].player===player){
    var ms=getValidMoves(r,c,false); ms.forEach(m=>allMoves.push({from:{row:r,col:c}, to:m}));
  }
  return {moves:allMoves, forced:false};
}

function getMultiJumps(row, col, captured){
  var piece=board[row][col]; if(!piece) return [];
  var jumps = [];
  var allPossible = getValidMoves(row, col, true);
  allPossible.forEach(j => {
    var already = captured.some(c => c.row === j.captures[0].row && c.col === j.captures[0].col);
    if(!already) {
      var nextCaps = captured.concat(j.captures);
      jumps.push({...j, captures: nextCaps});
    }
  });
  return jumps;
}

function executeMove(from, to){
  var piece=board[from.row][from.col]; board[to.row][to.col]=piece; board[from.row][from.col]=null;
  var captured=[];
  if(to.captures) to.captures.forEach(cap => {
    if(board[cap.row][cap.col]){ captured.push({...cap}); board[cap.row][cap.col]=null; }
  });
  if(captured.length>0) capturedBy[piece.player]+=captured.length;
  var promoted=false;
  if(!piece.king && ((piece.player===0 && to.row===BS-1)||(piece.player===1 && to.row===0))){ piece.king=true; promoted=true; }
  return {captured:captured, promoted:promoted};
}

function executePlayerMove(from, to){
  isProcessing=true; clearHighlights(); stopTimer();
  _moveSteps.push({from:{row:from.row, col:from.col}, to:{row:to.row, col:to.col}});
  
  var res=executeMove(from, to);
  var mesh=getPieceMesh(from.row, from.col);
  updatePiecePosition(mesh, to.row, to.col);
  
  res.captured.forEach(c => { var cm=getPieceMesh(c.row, c.col); if(cm) piecesGroup.remove(cm); });
  if(res.promoted) addCrown(mesh);

  var multi = getMultiJumps(to.row, to.col, to.captures || []);
  if(multi.length > 0 && to.captures && to.captures.length > 0){
    validMoves=multi; selectedPiece={row:to.row, col:to.col};
    showSelection(to.row, to.col); showValidMoves(multi);
    isProcessing=false; return;
  }

  if(socket) socket.emit('dames_move', { room:ROOM_ID, player:MY_SLOT, steps:_moveSteps, boardState:JSON.stringify(board) });
  _moveSteps=[];
}

function applyRemoteSteps(steps){
  isProcessing=true;
  steps.forEach(s => {
    var res=executeMove(s.from, s.to);
    var mesh=getPieceMesh(s.from.row, s.from.col);
    if(mesh) updatePiecePosition(mesh, s.to.row, s.to.col);
    res.captured.forEach(c => { var cm=getPieceMesh(c.row, c.col); if(cm) piecesGroup.remove(cm); });
    if(res.promoted && mesh) addCrown(mesh);
  });
  isProcessing=false; updUI();
}

/* ══════════════════════════════════════════
   UI & INTERACTION
══════════════════════════════════════════ */
function onCellClick(row, col){
  if(!gameReady || gameOver || isProcessing || currentPlayer !== MY_PLAYER) return;
  var res = getAllValidMoves(currentPlayer);
  
  if(selectedPiece){
    var m = validMoves.find(v => v.row===row && v.col===col);
    if(m){ executePlayerMove(selectedPiece, m); return; }
  }
  
  if(board[row][col] && board[row][col].player === currentPlayer){
    var ms = res.forced ? getValidMoves(row, col, true) : getValidMoves(row, col, false);
    if(ms.length > 0){ selectedPiece={row:row, col:col}; validMoves=ms; showSelection(row, col); showValidMoves(ms); }
  }
}

function clearHighlights(){ while(hlGroup.children.length) hlGroup.remove(hlGroup.children[0]); while(moveHlGroup.children.length) moveHlGroup.remove(moveHlGroup.children[0]); }
function showSelection(r,c){ 
  clearHighlights();
  var m=new THREE.Mesh(new THREE.CircleGeometry(0.6,32), new THREE.MeshBasicMaterial({color:0xfbbf24, transparent:true, opacity:0.4}));
  m.rotation.x=-Math.PI/2; m.position.set(c*CELL-BO, 0.15, r*CELL-BO); hlGroup.add(m);
}
function showValidMoves(moves){
  moves.forEach(mv => {
    var m=new THREE.Mesh(new THREE.CircleGeometry(0.4,32), new THREE.MeshBasicMaterial({color:0x00dd66, transparent:true, opacity:0.6}));
    m.rotation.x=-Math.PI/2; m.position.set(mv.col*CELL-BO, 0.2, mv.row*CELL-BO); moveHlGroup.add(m);
  });
}

function updUI(){
  document.getElementById('score-w').textContent = piecesGroup.children.filter(p=>p.userData.player===0).length;
  document.getElementById('score-r').textContent = piecesGroup.children.filter(p=>p.userData.player===1).length;
  document.getElementById('profile-human').querySelector('.profile-name').textContent = MY_NAME;
  document.getElementById('profile-ai').querySelector('.profile-name').textContent = OP_NAME;
  updateForcedHint();
}

function updateForcedHint(){
  var res = getAllValidMoves(currentPlayer);
  var hint = document.getElementById('force-jump-hint');
  if(res.forced){ hint.classList.add('show'); hint.textContent = (currentPlayer===MY_PLAYER)?"⚡ Prise obligatoire !":"⚡ L'adversaire doit prendre !"; }
  else hint.classList.remove('show');
}

function handleGameEnd(winner, reason){
  if(gameOver) return; gameOver=true; stopTimer();
  var win = (winner === MY_PLAYER);
  showToast(win?'🏆':'💀', win?'VICTOIRE !':'DÉFAITE', win?'Vous avez remporté la mise.':'L\'adversaire a gagné.', 5000, () => {
    sendResult(win?'win':'loss', reason);
  });
}

function stopTimer(){ timerActive=false; if(timerRAF) cancelAnimationFrame(timerRAF); }
function showToast(emoji, title, sub, delay, cb){
  var el=document.getElementById('toast');
  document.getElementById('toast-emoji').textContent=emoji;
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-sub').textContent=sub;
  el.style.display='block';
  setTimeout(() => { el.style.display='none'; if(cb) cb(); }, delay);
}

function startForfeitCountdown(s){
  forfeitCountdown=s; var bar=document.getElementById('forfeit-bar'); bar.classList.add('show');
  function tick(){
    bar.textContent='⏳ Adversaire déconnecté... Victoire dans '+forfeitCountdown+'s';
    if(forfeitCountdown-- > 0) forfeitTimer=setTimeout(tick, 1000);
  }
  tick();
}
function stopForfeitCountdown(){ clearTimeout(forfeitTimer); document.getElementById('forfeit-bar').classList.remove('show'); }

function startMultiGame(){ initBoard(); syncPieces(); gameReady=true; updUI(); }

/* ══════════════════════════════════════════
   CONTROLS & RENDER
══════════════════════════════════════════ */
var raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click', (e) => {
  var rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1; mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  var pt=new THREE.Vector3(); raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0),0), pt);
  var c=Math.round((pt.x+BO)/CELL), r=Math.round((pt.z+BO)/CELL);
  if(r>=0&&r<BS&&c>=0&&c<BS) onCellClick(r,c);
});

function renderLoop(){
  requestAnimationFrame(renderLoop);
  if(autoRotate) { camTheta+=0.005; setCam(); }
  renderer.render(scene, camera);
}

initSocket();
renderLoop();

})();
</script>
