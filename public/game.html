<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dames — Mindspille</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C; --gold-light:#E8C96A; --gold-dim:#7A5C10;
  --dark:#080609; --dark2:#100E16; --dark3:#181520;
  --surface:rgba(16,14,22,0.95); --border:rgba(201,168,76,0.18);
  --cream:#EFE4CC; --cream-dim:#B8A888;
  --sq-light:#C8A870; --sq-dark:#2A1E14;
  --wp-hi:#FFFFFF; --wp-lo:#8A7F6A;
  --rp-hi:#D44030; --rp-lo:#3A0808;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);font-family:'Raleway',sans-serif;color:var(--cream);min-height:100svh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 35% at 15% 8%,rgba(201,168,76,0.07) 0%,transparent 65%),radial-gradient(ellipse 45% 55% at 85% 92%,rgba(120,20,20,0.09) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;background:var(--dark);}
.screen.hidden{display:none;}
.brand{font-family:'Cinzel Decorative',serif;font-size:22px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,0.35);}
.screen-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2.5px;color:var(--cream-dim);text-transform:uppercase;}
.spinner{width:44px;height:44px;border:2px solid rgba(201,168,76,0.12);border-top-color:var(--gold);border-right-color:rgba(201,168,76,0.45);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.dots{display:flex;gap:7px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

/* ── RECONNECT BANNER ── */
.reconn-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none;}
.reconn-bar.show{display:block;}

/* ── GAME UI ── */
#gameUI{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;height:100svh;padding:10px 8px 12px;gap:8px;}
#gameUI.hidden{display:none;}

/* ── SCOREBOARD ── */
.scoreboard{width:100%;max-width:480px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.player-slot{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;position:relative;}
.player-slot.active::before{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px;}
.player-slot.active .p-name{color:var(--gold-light);}
.p-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--cream-dim);text-transform:uppercase;transition:color 0.3s;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-color{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(200,184,154,0.5);font-weight:300;letter-spacing:0.5px;}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cdot.w{background:radial-gradient(circle at 35% 35%,#fff,#b0a090);box-shadow:0 0 4px rgba(255,255,255,0.3);}
.cdot.r{background:radial-gradient(circle at 35% 35%,#D44030,#3A0808);box-shadow:0 0 4px rgba(180,40,20,0.4);}
.p-caps{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);min-height:20px;}
.mid-col{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 16px;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.vs-label{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);text-shadow:0 0 16px rgba(201,168,76,0.4);}
.pieces-count{font-size:9px;color:var(--cream-dim);letter-spacing:1px;font-weight:300;}

/* ── TURN STRIP ── */
.turn-strip{width:100%;max-width:480px;text-align:center;padding:7px 0;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:2px;border-radius:10px;border:1px solid transparent;transition:all 0.35s ease;}
.turn-strip.mine{background:rgba(201,168,76,0.09);border-color:rgba(201,168,76,0.3);color:var(--gold-light);animation:glow-pulse 2.2s ease-in-out infinite;}
.turn-strip.theirs{background:rgba(16,14,22,0.5);border-color:rgba(255,255,255,0.04);color:rgba(184,168,136,0.35);}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 rgba(201,168,76,0);}50%{box-shadow:0 0 18px rgba(201,168,76,0.15);}}

/* ── BOARD ── */
.board-frame{position:relative;width:min(94vw,460px);aspect-ratio:1;flex-shrink:0;}
.board-rim{position:absolute;inset:-7px;border-radius:5px;z-index:0;background:conic-gradient(var(--gold) 0deg,#6B4A10 90deg,var(--gold) 180deg,#6B4A10 270deg,var(--gold) 360deg);}
.board-rim::after{content:'';position:absolute;inset:3px;background:var(--dark2);border-radius:3px;}
.board-surface{position:relative;z-index:1;width:100%;height:100%;border-radius:2px;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,0.85),inset 0 0 20px rgba(0,0,0,0.25);}
.grid{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);width:100%;height:100%;}

/* ── CELLS ── */
.sq{position:relative;overflow:visible;transition:background 0.15s;}
.sq.lt{background:var(--sq-light);background-image:linear-gradient(145deg,rgba(255,255,255,0.12) 0%,transparent 55%);}
.sq.dk{background:var(--sq-dark);background-image:linear-gradient(145deg,rgba(255,255,255,0.03) 0%,transparent 55%);}
.sq.sel{background:rgba(201,168,76,0.32)!important;box-shadow:inset 0 0 0 2px rgba(201,168,76,0.7);}
.sq.lfrom{background:rgba(201,168,76,0.10)!important;}
.sq.lto{background:rgba(201,168,76,0.22)!important;}
.mdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32%;height:32%;border-radius:50%;background:rgba(201,168,76,0.4);border:1.5px solid rgba(201,168,76,0.65);pointer-events:none;animation:mdot-pulse 1.3s ease-in-out infinite;z-index:3;}
.sq.cap-mv .mdot{background:rgba(200,50,30,0.45);border-color:rgba(200,50,30,0.8);}
@keyframes mdot-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6;}50%{transform:translate(-50%,-50%) scale(1.18);opacity:1;}}

/* ── PIÈCE DISPARAÎT ── */
@keyframes piece-vanish{0%{opacity:1;transform:scale(1);}60%{opacity:0;transform:scale(1.3);}100%{opacity:0;transform:scale(0);}}
.piece.vanish{animation:piece-vanish 0.35s ease forwards;pointer-events:none;}

/* ── PIÈCE FANTÔME (highlight case) ── */
@keyframes cap-flash{0%{background:rgba(200,50,30,0.5)!important;}100%{background:transparent;}}
.sq.cap-fl{animation:cap-flash 0.4s ease forwards;}

/* ── PIECES ── */
.piece{position:absolute;inset:5%;border-radius:50%;z-index:2;transition:transform 0.14s ease,filter 0.14s;cursor:pointer;}
.piece.wp{background:radial-gradient(circle at 33% 28%,var(--wp-hi),#D8D0C0 45%,#A09080 75%,var(--wp-lo));box-shadow:0 3px 7px rgba(0,0,0,0.55),inset 0 -2px 4px rgba(0,0,0,0.18),inset 0 2px 5px rgba(255,255,255,0.65);border:1px solid rgba(160,145,120,0.45);}
.piece.rp{background:radial-gradient(circle at 33% 28%,var(--rp-hi),#A03020 45%,#600A0A 75%,var(--rp-lo));box-shadow:0 3px 7px rgba(0,0,0,0.65),inset 0 -2px 4px rgba(0,0,0,0.38),inset 0 2px 5px rgba(220,80,60,0.25);border:1px solid rgba(90,15,10,0.5);}
.piece.king::after{content:'♛';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));}
.piece.wp.king::after{color:rgba(110,88,50,0.88);}
.piece.rp.king::after{color:rgba(230,190,80,0.88);}
.piece.mine:hover{transform:translateY(-9%) scale(1.06);filter:brightness(1.18);}
.piece.picked{transform:translateY(-11%) scale(1.1);filter:brightness(1.22);z-index:10;}
.piece.wp.picked{box-shadow:0 8px 24px rgba(201,168,76,0.45),0 3px 7px rgba(0,0,0,0.55),inset 0 -2px 4px rgba(0,0,0,0.18),inset 0 2px 5px rgba(255,255,255,0.65);}

/* ── PIÈCE VOLANTE ── */
.flyer{position:fixed;border-radius:50%;pointer-events:none;z-index:999;transition:left .25s cubic-bezier(.4,0,.2,1),top .25s cubic-bezier(.4,0,.2,1);}
.flyer.wp{background:radial-gradient(circle at 33% 28%,var(--wp-hi),#D8D0C0 45%,#A09080 75%,var(--wp-lo));box-shadow:0 3px 7px rgba(0,0,0,0.55),inset 0 -2px 4px rgba(0,0,0,0.18),inset 0 2px 5px rgba(255,255,255,0.65);border:1px solid rgba(160,145,120,0.45);}
.flyer.rp{background:radial-gradient(circle at 33% 28%,var(--rp-hi),#A03020 45%,#600A0A 75%,var(--rp-lo));box-shadow:0 3px 7px rgba(0,0,0,0.65),inset 0 -2px 4px rgba(0,0,0,0.38),inset 0 2px 5px rgba(220,80,60,0.25);border:1px solid rgba(90,15,10,0.5);}
.flyer.king::after{content:'♛';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));}
.flyer.wp.king::after{color:rgba(110,88,50,0.88);}
.flyer.rp.king::after{color:rgba(230,190,80,0.88);}

/* ── GAME OVER ── */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(8,6,9,0.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.ov-card{background:linear-gradient(145deg,var(--dark2),var(--dark3));border:1px solid var(--border);border-radius:22px;padding:44px 36px;text-align:center;max-width:310px;width:90%;box-shadow:0 24px 70px rgba(0,0,0,0.85);}
.ov-icon{font-size:60px;margin-bottom:14px;}
.ov-title{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--gold);margin-bottom:6px;text-shadow:0 0 28px rgba(201,168,76,0.35);}
.ov-sub{font-size:13px;color:var(--cream-dim);line-height:1.65;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(120,20,20,0.92);border:1px solid rgba(192,57,43,0.55);color:#fff;padding:9px 22px;border-radius:9px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:1px;transition:transform 0.3s ease;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="reconn-bar" id="reconnBar">RECONNEXION EN COURS...</div>

<!-- CONNECTING -->
<div class="screen" id="scConnect">
  <div class="brand">♟ MINDSPILLE</div>
  <div class="spinner"></div>
  <div class="screen-sub">Connexion au serveur</div>
</div>

<!-- WAITING -->
<div class="screen hidden" id="scWait">
  <div class="brand">♟ MINDSPILLE</div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="screen-sub">En attente de l'adversaire</div>
</div>

<!-- GAME -->
<div id="gameUI" class="hidden">
  <div class="scoreboard">
    <div class="player-slot" id="slotMe">
      <div class="p-name" id="nameMe">MOI</div>
      <div class="p-color"><div class="cdot" id="dotMe"></div><span id="colorMe">—</span></div>
      <div class="p-caps" id="capsMe">0</div>
    </div>
    <div class="mid-col">
      <div class="vs-label">VS</div>
      <div class="pieces-count" id="pCount">40 pièces</div>
    </div>
    <div class="player-slot" id="slotOpp">
      <div class="p-name" id="nameOpp">ADVERSAIRE</div>
      <div class="p-color"><div class="cdot" id="dotOpp"></div><span id="colorOpp">—</span></div>
      <div class="p-caps" id="capsOpp">0</div>
    </div>
  </div>

  <div class="turn-strip" id="turnStrip">—</div>

  <div class="board-frame">
    <div class="board-rim"></div>
    <div class="board-surface">
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="overlay" id="ovEnd">
  <div class="ov-card">
    <div class="ov-icon"  id="ovIcon">🏆</div>
    <div class="ov-title" id="ovTitle">VICTOIRE</div>
    <div class="ov-sub"   id="ovSub"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────
var P       = new URLSearchParams(location.search);
var GAME_ID = P.get('gameId') || '';
var PLAYER  = P.get('player') || '';
var TOKEN   = P.get('token')  || '';
var UNAME   = P.get('username') || 'Joueur';
var SERVER  = location.origin;

// ── CONSTANTS ─────────────────────────────────────────────────────────
var E=0,W=1,B=2,WK=3,BK=4;
function isW(p){return p===W||p===WK;}
function isB(p){return p===B||p===BK;}
function isK(p){return p===WK||p===BK;}
function inB(r,c){return r>=0&&r<10&&c>=0&&c<10;}
function cloneBoard(b){return b.map(function(r){return r.slice();});}

// ── STATE ─────────────────────────────────────────────────────────────
var board, myColor, curPlayer, gameStatus='connecting';
var sel=null, vmoves=[], lastMv=null;
var capMe=0, capOpp=0, busy=false;
var jwt=TOKEN, socket, pingTimer, reconnTimer;

// ── BOOT ──────────────────────────────────────────────────────────────
window.onload = function(){ show('scConnect'); connectSocket(); };

function show(id) {
  var screens=['scConnect','scWait','gameUI'];
  for(var i=0;i<screens.length;i++){
    var el=document.getElementById(screens[i]);
    if(!el) continue;
    el.classList.toggle('hidden', screens[i]!==id);
  }
}

// ── SOCKET avec reconnexion auto ──────────────────────────────────────
function connectSocket() {
  socket = io(SERVER, {
    transports: ['websocket','polling'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });

  socket.on('connect', function(){
    document.getElementById('reconnBar').classList.remove('show');
    if(jwt) socket.emit('auth',{token:jwt});
    else socket.emit('auth:supabase',{supabaseId:PLAYER,username:UNAME});
    // Keep-alive ping toutes les 8 minutes
    clearInterval(pingTimer);
    pingTimer = setInterval(function(){
      socket.emit('ping_keep_alive');
      // aussi un fetch HTTP pour réveiller le serveur si besoin
      fetch(SERVER+'/health').catch(function(){});
    }, 8*60*1000);
  });

  socket.on('disconnect', function(){
    if(gameStatus==='playing'){
      document.getElementById('reconnBar').classList.add('show');
      showToast('Reconnexion...');
    }
  });

  socket.on('reconnect', function(){
    document.getElementById('reconnBar').classList.remove('show');
    // Ré-authentifier et recharger l'état de la partie
    if(jwt) socket.emit('auth',{token:jwt});
    else socket.emit('auth:supabase',{supabaseId:PLAYER,username:UNAME});
  });

  socket.on('auth:ok', function(data){
    if(data.token) jwt=data.token;
    socket.emit('game:join_room',{gameId:GAME_ID});
    loadGame();
  });

  socket.on('match:found', function(d){
    myColor=d.youAre;
    var opp=myColor==='white'?d.black:d.white;
    if(opp) setName('nameOpp', opp.username||'Adversaire');
    if(d.betAmount) setBetLabel(d.betAmount);
    loadGame();
  });

  socket.on('game:state', function(d){ applyState(d); });

  // ── RÉCEPTION D'UN COUP : animation puis mise à jour ──
  socket.on('game:move', function(d){
    var prevBoard = board ? cloneBoard(board) : null;
    var newBoard  = d.board;
    var mv        = d.lastMove;

    if(prevBoard && mv && mv.captured && mv.captured.length > 0){
      // Animer les captures progressivement
      busy = true;
      animateCaptures(prevBoard, newBoard, mv, function(){
        board      = newBoard;
        curPlayer  = d.currentPlayer;
        lastMv     = mv;
        updateCaptureCount(mv, newBoard);
        sel=null; vmoves=[]; busy=false;
        render(); updateTurn();
      });
    } else {
      board      = newBoard;
      curPlayer  = d.currentPlayer;
      if(mv) lastMv = mv;
      updateCaptureCount(mv, newBoard);
      sel=null; vmoves=[];
      render(); updateTurn();
    }
  });

  socket.on('game:over',   function(d){ showEnd(d); });
  socket.on('game:result', function(d){ if(d.postMessage) showEnd(d.postMessage); });
}

function updateCaptureCount(mv, newBoard) {
  if(!mv || !mv.captured) return;
  var n = mv.captured.length;
  if(n === 0) return;
  var landed = newBoard[mv.toRow][mv.toCol];
  var wasOpp = (myColor==='white' && isB(landed)) || (myColor==='black' && isW(landed));
  if(wasOpp) capOpp+=n; else capMe+=n;
}

// ── ANIMATION CAPTURES PROGRESSIVES ───────────────────────────────────
// Reconstruit les étapes intermédiaires et anime pièce par pièce
function animateCaptures(prevBoard, finalBoard, mv, onDone) {
  var captured = mv.captured || [];
  if(!captured.length){ onDone(); return; }

  // Construire les étapes : [from, cap, to]
  // On recalcule les positions intermédiaires à partir des captures
  var steps = buildAnimSteps(mv);
  var workBoard = cloneBoard(prevBoard);
  var stepIdx = 0;
  var pieceType = prevBoard[mv.fromRow][mv.fromCol];

  function doStep(){
    if(stepIdx >= steps.length){ onDone(); return; }
    var step = steps[stepIdx]; stepIdx++;

    // Animer le déplacement
    animFly(step.fromR, step.fromC, step.toR, step.toC, pieceType, workBoard, function(){
      // Mettre à jour workBoard : déplacer la pièce
      workBoard[step.toR][step.toC] = workBoard[step.fromR][step.fromC];
      workBoard[step.fromR][step.fromC] = E;

      // Faire disparaître la pièce capturée
      if(step.capR !== null){
        var capEl = document.getElementById('sq-'+step.capR+'-'+step.capC);
        if(capEl){
          var capPiece = capEl.querySelector('.piece');
          if(capPiece){
            capPiece.classList.add('vanish');
            capEl.classList.add('cap-fl');
          }
        }
        setTimeout(function(){
          workBoard[step.capR][step.capC] = E;
          renderIntermediate(workBoard, step.toR, step.toC);
          setTimeout(doStep, 120);
        }, 300);
      } else {
        renderIntermediate(workBoard, step.toR, step.toC);
        setTimeout(doStep, 80);
      }
    });
  }

  renderIntermediate(workBoard, mv.fromRow, mv.fromC);
  doStep();
}

function buildAnimSteps(mv){
  var caps = mv.captured || [];
  if(!caps.length) return [{fromR:mv.fromRow,fromC:mv.fromCol,toR:mv.toRow,toC:mv.toCol,capR:null,capC:null}];

  // Reconstituer le chemin : pour chaque cap, calculer la case de saut
  var steps = [];
  var curR = mv.fromRow, curC = mv.fromCol;

  for(var i=0;i<caps.length;i++){
    var cap = caps[i];
    var dr = cap.r > curR ? 1 : -1;
    var dc = cap.c > curC ? 1 : -1;
    var landR, landC;

    if(i === caps.length-1){
      landR = mv.toRow; landC = mv.toCol;
    } else {
      // Case juste après le cap dans la même direction
      landR = cap.r + dr;
      landC = cap.c + dc;
      // Vérifier que c'est bien aligné avec le prochain cap
      var nextCap = caps[i+1];
      // Si pas aligné, chercher dans la direction
      if(!isAligned(landR,landC,nextCap.r,nextCap.c)){
        var lr=cap.r+dr, lc=cap.c+dc;
        while(inB(lr,lc)){
          if(isAligned(lr,lc,nextCap.r,nextCap.c)){landR=lr;landC=lc;break;}
          lr+=dr; lc+=dc;
        }
      }
    }

    steps.push({fromR:curR,fromC:curC,toR:landR,toC:landC,capR:cap.r,capC:cap.c});
    curR=landR; curC=landC;
  }
  return steps;
}

function isAligned(r,c,tr,tc){
  var dr=tr-r, dc=tc-c;
  return dr!==0 && Math.abs(dr)===Math.abs(dc);
}

// Animer une pièce volante de A vers B
function animFly(fr,fc,tr,tc,pieceType,wb,cb){
  var fromEl=document.getElementById('sq-'+fr+'-'+fc);
  var toEl  =document.getElementById('sq-'+tr+'-'+tc);
  if(!fromEl||!toEl){cb();return;}

  var fromR=fromEl.getBoundingClientRect();
  var toR  =toEl.getBoundingClientRect();
  var size = fromR.width * 0.9;

  // Cacher la pièce d'origine
  var origPiece = fromEl.querySelector('.piece');
  if(origPiece) origPiece.style.opacity='0';

  // Créer pièce volante
  var fly = document.createElement('div');
  fly.className = 'flyer '+(isW(pieceType)?'wp':'rp');
  if(isK(pieceType)) fly.classList.add('king');
  fly.style.width  = size+'px';
  fly.style.height = size+'px';
  fly.style.left   = (fromR.left + fromR.width*0.05)+'px';
  fly.style.top    = (fromR.top  + fromR.height*0.05)+'px';
  document.body.appendChild(fly);

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      fly.style.left = (toR.left + toR.width*0.05)+'px';
      fly.style.top  = (toR.top  + toR.height*0.05)+'px';
    });
  });

  setTimeout(function(){ fly.remove(); cb(); }, 280);
}

// Rendu intermédiaire pendant l'animation (sans effacer les écouteurs)
function renderIntermediate(wb, highR, highC){
  var grid = document.getElementById('grid');
  grid.innerHTML='';
  for(var r=0;r<10;r++) for(var c=0;c<10;c++){
    var sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'lt':'dk');
    sq.id='sq-'+r+'-'+c;
    if(r===highR&&c===highC) sq.classList.add('lto');
    var p=wb[r][c];
    if(p!==E){
      var el=document.createElement('div');
      el.className='piece '+(isW(p)?'wp':'rp');
      if(isK(p)) el.classList.add('king');
      sq.appendChild(el);
    }
    grid.appendChild(sq);
  }
}

// ── LOAD GAME ─────────────────────────────────────────────────────────
function loadGame(){
  fetch(SERVER+'/games/'+GAME_ID, {headers:{'Authorization':'Bearer '+jwt}})
    .then(function(r){
      if(!r.ok){show('scWait');return null;}
      return r.json();
    })
    .then(function(d){ if(d) applyState(d); })
    .catch(function(){ show('scWait'); });
}

function applyState(d){
  board=d.board; curPlayer=d.currentPlayer;
  if(!myColor) myColor=d.youAre;
  if(d.status==='waiting'){show('scWait');return;}
  setName('nameMe', UNAME);
  setName('nameOpp', d.opponentName||'Adversaire');
  var iW=myColor==='white';
  setDot('dotMe', iW?'w':'r');  setDot('dotOpp', iW?'r':'w');
  document.getElementById('colorMe').textContent  = iW?'Blancs':'Noirs';
  document.getElementById('colorOpp').textContent = iW?'Noirs':'Blancs';
  if(d.betAmount) setBetLabel(d.betAmount);
  gameStatus='playing';
  show('gameUI');
  render(); updateTurn();
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  var g=document.getElementById('grid'); g.innerHTML='';
  var vs={}, cs={};
  for(var i=0;i<vmoves.length;i++){
    var key=vmoves[i].to[0]+','+vmoves[i].to[1];
    vs[key]=true;
    if(vmoves[i].capturedPieces.length) cs[key]=true;
  }

  for(var r=0;r<10;r++) for(var c=0;c<10;c++){
    var sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'lt':'dk');
    sq.id='sq-'+r+'-'+c;
    if(lastMv){
      if(r===lastMv.fromRow&&c===lastMv.fromCol) sq.classList.add('lfrom');
      if(r===lastMv.toRow  &&c===lastMv.toCol  ) sq.classList.add('lto');
    }
    var k=r+','+c;
    if(vs[k]&&!busy){
      sq.classList.add(cs[k]?'cap-mv':'valid-mv');
      sq.style.cursor='pointer';
      var dot=document.createElement('div'); dot.className='mdot'; sq.appendChild(dot);
      (function(rr,cc){ sq.addEventListener('click',function(){handleCell(rr,cc);}); })(r,c);
    }
    if(sel&&sel[0]===r&&sel[1]===c) sq.classList.add('sel');
    var p=board[r][c];
    if(p!==E){
      var el=document.createElement('div');
      el.className='piece '+(isW(p)?'wp':'rp');
      if(isK(p)) el.classList.add('king');
      var mine=myColor==='white'?isW(p):isB(p);
      if(mine){
        el.classList.add('mine');
        if(sel&&sel[0]===r&&sel[1]===c) el.classList.add('picked');
      }
      (function(rr,cc){ el.addEventListener('click',function(){handlePiece(rr,cc);}); })(r,c);
      sq.appendChild(el);
    }
    g.appendChild(sq);
  }
  // counts
  var w=0,b=0;
  for(var r=0;r<10;r++) for(var c=0;c<10;c++){if(isW(board[r][c]))w++;if(isB(board[r][c]))b++;}
  document.getElementById('pCount').textContent=(w+b)+' pièces';
  document.getElementById('capsMe').textContent=capMe;
  document.getElementById('capsOpp').textContent=capOpp;
  var myTurn=curPlayer===myColor;
  document.getElementById('slotMe').classList.toggle('active',myTurn);
  document.getElementById('slotOpp').classList.toggle('active',!myTurn);
}

function updateTurn(){
  var strip=document.getElementById('turnStrip');
  var mine=curPlayer===myColor;
  strip.className='turn-strip '+(mine?'mine':'theirs');
  strip.textContent=mine?'✦ VOTRE TOUR ✦':'Tour de l\'adversaire';
}

// ── INTERACTION ───────────────────────────────────────────────────────
function handlePiece(r,c){
  if(busy||curPlayer!==myColor) return;
  var p=board[r][c];
  var mine=myColor==='white'?isW(p):isB(p);
  if(!mine) return;
  sel=[r,c]; vmoves=movesFor(r,c,myColor); render();
}

function handleCell(r,c){
  if(busy||!sel) return;
  var mv=null;
  for(var i=0;i<vmoves.length;i++){
    if(vmoves[i].to[0]===r&&vmoves[i].to[1]===c){mv=vmoves[i];break;}
  }
  if(!mv) return;
  sel=null; vmoves=[];
  sendMove(mv.from[0],mv.from[1],r,c);
}

function sendMove(fr,fc,tr,tc){
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SERVER+'/games/'+GAME_ID+'/move',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+jwt);
  xhr.onload=function(){
    if(xhr.status!==200){
      try{var d=JSON.parse(xhr.responseText);showToast(d.error||'Coup invalide');}
      catch(e){showToast('Erreur');}
    }
  };
  xhr.onerror=function(){showToast('Erreur réseau');};
  xhr.send(JSON.stringify({fromRow:fr,fromCol:fc,toRow:tr,toCol:tc}));
}

// ── MOVES ─────────────────────────────────────────────────────────────
function movesFor(r,c,player){
  var isOwn=player==='white'?isW:isB;
  var allC=[];
  for(var rr=0;rr<10;rr++) for(var cc=0;cc<10;cc++)
    if(isOwn(board[rr][cc])){ var cs2=getCaps(rr,cc,board,player,[]); for(var i=0;i<cs2.length;i++) allC.push({from:[rr,cc],to:cs2[i].to,capturedPieces:cs2[i].capturedPieces}); }
  if(allC.length){
    var mx=0; for(var i=0;i<allC.length;i++) if(allC[i].capturedPieces.length>mx) mx=allC[i].capturedPieces.length;
    var res=[];
    for(var i=0;i<allC.length;i++) if(allC[i].capturedPieces.length===mx&&allC[i].from[0]===r&&allC[i].from[1]===c) res.push(allC[i]);
    return res;
  }
  var sm=getSimple(r,c);
  var res=[];
  for(var i=0;i<sm.length;i++) res.push({from:[r,c],to:sm[i],capturedPieces:[]});
  return res;
}

function getSimple(r,c){
  var p=board[r][c],mv=[];
  if(!isK(p)){
    var dirs=isW(p)?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
    for(var i=0;i<dirs.length;i++){var nr=r+dirs[i][0],nc=c+dirs[i][1];if(inB(nr,nc)&&board[nr][nc]===E)mv.push([nr,nc]);}
  } else {
    var dirs=[[-1,-1],[-1,1],[1,-1],[1,1]];
    for(var i=0;i<dirs.length;i++){var nr=r+dirs[i][0],nc=c+dirs[i][1];while(inB(nr,nc)&&board[nr][nc]===E){mv.push([nr,nc]);nr+=dirs[i][0];nc+=dirs[i][1];}}
  }
  return mv;
}

function getCaps(r,c,b,player,done){
  var p=b[r][c],res=[];
  var isEnemy=player==='white'?isB:isW;
  var dirs=[[-1,-1],[-1,1],[1,-1],[1,1]];
  if(!isK(p)){
    for(var i=0;i<dirs.length;i++){
      var dr=dirs[i][0],dc=dirs[i][1];
      var mr=r+dr,mc=c+dc,lr=r+2*dr,lc=c+2*dc;
      if(!inB(lr,lc)||!isEnemy(b[mr][mc])||b[lr][lc]!==E)continue;
      var k=mr+','+mc; if(done.indexOf(k)>=0)continue;
      var nb=cloneBoard(b),cp=b[mr][mc]; nb[lr][lc]=p;nb[r][c]=E;nb[mr][mc]=E;
      var f=getCaps(lr,lc,nb,player,done.concat([k]));
      if(f.length){ for(var j=0;j<f.length;j++) res.push({to:f[j].to,capturedPieces:[{r:mr,c:mc,piece:cp}].concat(f[j].capturedPieces)}); }
      else res.push({to:[lr,lc],capturedPieces:[{r:mr,c:mc,piece:cp}]});
    }
  } else {
    for(var i=0;i<dirs.length;i++){
      var dr=dirs[i][0],dc=dirs[i][1];
      var nr=r+dr,nc=c+dc;
      while(inB(nr,nc)&&b[nr][nc]===E){nr+=dr;nc+=dc;}
      if(!inB(nr,nc)||!isEnemy(b[nr][nc]))continue;
      var k=nr+','+nc; if(done.indexOf(k)>=0)continue;
      var ep=b[nr][nc],lr=nr+dr,lc=nc+dc;
      while(inB(lr,lc)&&b[lr][lc]===E){
        var nb=cloneBoard(b);nb[lr][lc]=p;nb[r][c]=E;nb[nr][nc]=E;
        var f=getCaps(lr,lc,nb,player,done.concat([k]));
        if(f.length){ for(var j=0;j<f.length;j++) res.push({to:f[j].to,capturedPieces:[{r:nr,c:nc,piece:ep}].concat(f[j].capturedPieces)}); }
        else res.push({to:[lr,lc],capturedPieces:[{r:nr,c:nc,piece:ep}]});
        lr+=dr;lc+=dc;
      }
    }
  }
  return res;
}

// ── GAME OVER ─────────────────────────────────────────────────────────
function showEnd(d){
  var won=d.winnerSupabaseId===PLAYER||d.winnerColor===myColor||(d.winner==='player1'&&myColor==='white')||(d.winner==='player2'&&myColor==='black');
  document.getElementById('ovIcon').textContent  = won?'🏆':'💀';
  document.getElementById('ovTitle').textContent = won?'VICTOIRE':'DÉFAITE';
  document.getElementById('ovSub').textContent   = won?'Félicitations — vous avez dominé cette partie !':'L\'adversaire a pris le dessus cette fois.';
  document.getElementById('ovEnd').classList.add('show');
  gameStatus='finished';
  try{window.parent.postMessage(d,'*');}catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────────────
function setName(id,n){ document.getElementById(id).textContent=(n||'?').toUpperCase().slice(0,14); }
function setDot(id,cls){ document.getElementById(id).className='cdot '+cls; }
function setBetLabel(v){ document.getElementById('pCount').textContent=v+' HTG en jeu'; }

var toastT;
function showToast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){el.classList.remove('show');},3000);
}
