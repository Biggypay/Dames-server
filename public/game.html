<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dames — Mindspille</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:        #C9A84C;
  --gold-light:  #E8C96A;
  --gold-dim:    #7A5C10;
  --dark:        #080609;
  --dark2:       #100E16;
  --dark3:       #181520;
  --surface:     rgba(16,14,22,0.95);
  --border:      rgba(201,168,76,0.18);
  --cream:       #EFE4CC;
  --cream-dim:   #B8A888;
  --sq-light:    #C8A870;
  --sq-dark:     #2A1E14;
  --w-piece-hi:  #FFFFFF;
  --w-piece-lo:  #8A7F6A;
  --r-piece-hi:  #D44030;
  --r-piece-lo:  #3A0808;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--dark);
  font-family: 'Raleway', sans-serif;
  color: var(--cream);
  min-height: 100svh;
  overflow: hidden;
}

/* subtle grain overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.5;
}

/* ambient glows */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 8%,  rgba(201,168,76,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 45% 55% at 85% 92%, rgba(120,20,20,0.09) 0%, transparent 65%);
  pointer-events:none; z-index:0;
}

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:18px; padding:24px;
  background: var(--dark);
}
.screen.hidden { display:none; }

.brand {
  font-family:'Cinzel Decorative',serif;
  font-size:22px; letter-spacing:3px;
  color:var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.35);
}

.screen-sub {
  font-family:'Cinzel',serif;
  font-size:11px; letter-spacing:2.5px;
  color:var(--cream-dim); text-transform:uppercase;
}

.spinner {
  width:44px; height:44px;
  border:2px solid rgba(201,168,76,0.12);
  border-top-color:var(--gold);
  border-right-color:rgba(201,168,76,0.45);
  border-radius:50%;
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.dots { display:flex; gap:7px; }
.dots span {
  width:7px; height:7px; border-radius:50%;
  background:var(--gold);
  animation:blink 1.4s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

/* ── MAIN GAME UI ── */
#gameUI {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center;
  height:100svh;
  padding:10px 8px 12px;
  gap:8px;
}
#gameUI.hidden { display:none; }

/* ── SCOREBOARD ── */
.scoreboard {
  width:100%; max-width:480px;
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; gap:0;
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}

.player-slot {
  display:flex; flex-direction:column;
  align-items:center; gap:4px;
  padding:10px 12px;
  position:relative;
}

.player-slot.active::before {
  content:'';
  position:absolute; bottom:0; left:10%; right:10%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  border-radius:2px;
}

.player-slot.active .p-name { color:var(--gold-light); }

.p-name {
  font-family:'Cinzel',serif;
  font-size:10px; font-weight:700;
  letter-spacing:1.5px;
  color:var(--cream-dim);
  text-transform:uppercase;
  transition:color 0.3s;
  max-width:110px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.p-color {
  display:flex; align-items:center; gap:5px;
  font-size:9px; color:rgba(200,184,154,0.5);
  font-weight:300; letter-spacing:0.5px;
}

.cdot {
  width:9px; height:9px; border-radius:50%;
  flex-shrink:0;
}
.cdot.w { background:radial-gradient(circle at 35% 35%,#fff,#b0a090); box-shadow:0 0 4px rgba(255,255,255,0.3); }
.cdot.r { background:radial-gradient(circle at 35% 35%,#D44030,#3A0808); box-shadow:0 0 4px rgba(180,40,20,0.4); }

.p-caps {
  font-family:'Cinzel',serif;
  font-size:16px; font-weight:700;
  color:var(--gold); min-height:20px;
}

.mid-col {
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
  padding:10px 16px;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

.vs-label {
  font-family:'Cinzel Decorative',serif;
  font-size:13px; color:var(--gold);
  text-shadow:0 0 16px rgba(201,168,76,0.4);
}

.pieces-count {
  font-size:9px; color:var(--cream-dim);
  letter-spacing:1px; font-weight:300;
}

/* ── TURN STRIP ── */
.turn-strip {
  width:100%; max-width:480px;
  text-align:center; padding:7px 0;
  font-family:'Cinzel',serif;
  font-size:11px; font-weight:600; letter-spacing:2px;
  border-radius:10px; border:1px solid transparent;
  transition:all 0.35s ease;
}
.turn-strip.mine {
  background:rgba(201,168,76,0.09);
  border-color:rgba(201,168,76,0.3);
  color:var(--gold-light);
  animation:glow-pulse 2.2s ease-in-out infinite;
}
.turn-strip.theirs {
  background:rgba(16,14,22,0.5);
  border-color:rgba(255,255,255,0.04);
  color:rgba(184,168,136,0.35);
}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 rgba(201,168,76,0);}50%{box-shadow:0 0 18px rgba(201,168,76,0.15);}}

/* ── BOARD ── */
.board-frame {
  position:relative;
  width:min(94vw,460px);
  aspect-ratio:1;
  flex-shrink:0;
}

.board-rim {
  position:absolute; inset:-7px; border-radius:5px; z-index:0;
  background:conic-gradient(
    var(--gold) 0deg,
    #6B4A10 90deg,
    var(--gold) 180deg,
    #6B4A10 270deg,
    var(--gold) 360deg
  );
}
.board-rim::after {
  content:''; position:absolute; inset:3px;
  background:var(--dark2); border-radius:3px;
}

.board-surface {
  position:relative; z-index:1;
  width:100%; height:100%;
  border-radius:2px; overflow:hidden;
  box-shadow:0 0 50px rgba(0,0,0,0.85), inset 0 0 20px rgba(0,0,0,0.25);
}

.grid {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  width:100%; height:100%;
}

/* ── CELLS ── */
.sq {
  position:relative; overflow:visible;
  transition:background 0.15s;
}
.sq.lt {
  background:var(--sq-light);
  background-image:linear-gradient(145deg,rgba(255,255,255,0.12) 0%,transparent 55%);
}
.sq.dk {
  background:var(--sq-dark);
  background-image:linear-gradient(145deg,rgba(255,255,255,0.03) 0%,transparent 55%);
}
.sq.sel   { background:rgba(201,168,76,0.32)!important; box-shadow:inset 0 0 0 2px rgba(201,168,76,0.7); }
.sq.lfrom { background:rgba(201,168,76,0.10)!important; }
.sq.lto   { background:rgba(201,168,76,0.22)!important; }

/* move dots */
.mdot {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:32%; height:32%; border-radius:50%;
  background:rgba(201,168,76,0.4);
  border:1.5px solid rgba(201,168,76,0.65);
  pointer-events:none;
  animation:mdot-pulse 1.3s ease-in-out infinite;
  z-index:3;
}
.sq.cap-mv .mdot {
  background:rgba(200,50,30,0.45);
  border-color:rgba(200,50,30,0.8);
}
@keyframes mdot-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6;}50%{transform:translate(-50%,-50%) scale(1.18);opacity:1;}}

/* capture flash */
@keyframes cap-flash{0%{background:rgba(200,50,30,0.5)!important;}100%{background:transparent;}}
.sq.cap-fl { animation:cap-flash 0.38s ease forwards; }

/* ── PIECES ── */
.piece {
  position:absolute; inset:5%;
  border-radius:50%; z-index:2;
  transition:transform 0.14s ease, filter 0.14s;
  cursor:pointer;
}
.piece.wp {
  background:radial-gradient(circle at 33% 28%, var(--w-piece-hi), #D8D0C0 45%, #A09080 75%, var(--w-piece-lo));
  box-shadow:0 3px 7px rgba(0,0,0,0.55), inset 0 -2px 4px rgba(0,0,0,0.18), inset 0 2px 5px rgba(255,255,255,0.65);
  border:1px solid rgba(160,145,120,0.45);
}
.piece.rp {
  background:radial-gradient(circle at 33% 28%, var(--r-piece-hi), #A03020 45%, #600A0A 75%, var(--r-piece-lo));
  box-shadow:0 3px 7px rgba(0,0,0,0.65), inset 0 -2px 4px rgba(0,0,0,0.38), inset 0 2px 5px rgba(220,80,60,0.25);
  border:1px solid rgba(90,15,10,0.5);
}
.piece.king::after {
  content:'♛';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:50%; line-height:1;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));
}
.piece.wp.king::after { color:rgba(110,88,50,0.88); }
.piece.rp.king::after { color:rgba(230,190,80,0.88); }
.piece.mine:hover      { transform:translateY(-9%) scale(1.06); filter:brightness(1.18); }
.piece.picked          { transform:translateY(-11%) scale(1.1); filter:brightness(1.22); z-index:10; }
.piece.wp.picked       { box-shadow:0 8px 24px rgba(201,168,76,0.45), 0 3px 7px rgba(0,0,0,0.55), inset 0 -2px 4px rgba(0,0,0,0.18), inset 0 2px 5px rgba(255,255,255,0.65); }

/* flying piece for animation */
.flyer {
  position:fixed; border-radius:50%; pointer-events:none; z-index:999;
  transition:left .26s cubic-bezier(.4,0,.2,1), top .26s cubic-bezier(.4,0,.2,1);
}
.flyer.wp {
  background:radial-gradient(circle at 33% 28%, var(--w-piece-hi), #D8D0C0 45%, #A09080 75%, var(--w-piece-lo));
  box-shadow:0 3px 7px rgba(0,0,0,0.55), inset 0 -2px 4px rgba(0,0,0,0.18), inset 0 2px 5px rgba(255,255,255,0.65);
  border:1px solid rgba(160,145,120,0.45);
}
.flyer.rp {
  background:radial-gradient(circle at 33% 28%, var(--r-piece-hi), #A03020 45%, #600A0A 75%, var(--r-piece-lo));
  box-shadow:0 3px 7px rgba(0,0,0,0.65), inset 0 -2px 4px rgba(0,0,0,0.38), inset 0 2px 5px rgba(220,80,60,0.25);
  border:1px solid rgba(90,15,10,0.5);
}
.flyer.king::after {
  content:'♛'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); font-size:50%; line-height:1;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));
}
.flyer.wp.king::after { color:rgba(110,88,50,0.88); }
.flyer.rp.king::after { color:rgba(230,190,80,0.88); }

/* ── GAME OVER OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(8,6,9,0.88); backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
}
.overlay.show { display:flex; }
.ov-card {
  background:linear-gradient(145deg,var(--dark2),var(--dark3));
  border:1px solid var(--border); border-radius:22px;
  padding:44px 36px; text-align:center; max-width:310px; width:90%;
  box-shadow:0 24px 70px rgba(0,0,0,0.85);
}
.ov-icon  { font-size:60px; margin-bottom:14px; }
.ov-title { font-family:'Cinzel Decorative',serif; font-size:22px; color:var(--gold); margin-bottom:6px; text-shadow:0 0 28px rgba(201,168,76,0.35); }
.ov-sub   { font-size:13px; color:var(--cream-dim); line-height:1.65; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(120,20,20,0.92); border:1px solid rgba(192,57,43,0.55);
  color:#fff; padding:9px 22px; border-radius:9px;
  font-size:12px; font-family:'Cinzel',serif; letter-spacing:1px;
  transition:transform 0.3s ease; z-index:200; pointer-events:none; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- CONNECTING SCREEN -->
<div class="screen" id="scConnect">
  <div class="brand">♟ MINDSPILLE</div>
  <div class="spinner"></div>
  <div class="screen-sub">Connexion au serveur</div>
</div>

<!-- WAITING SCREEN -->
<div class="screen hidden" id="scWait">
  <div class="brand">♟ MINDSPILLE</div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="screen-sub">En attente de l'adversaire</div>
</div>

<!-- GAME UI -->
<div id="gameUI" class="hidden">

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="player-slot" id="slotMe">
      <div class="p-name" id="nameMe">MOI</div>
      <div class="p-color">
        <div class="cdot" id="dotMe"></div>
        <span id="colorMe">—</span>
      </div>
      <div class="p-caps" id="capsMe">0</div>
    </div>
    <div class="mid-col">
      <div class="vs-label">VS</div>
      <div class="pieces-count" id="pCount">40 pièces</div>
    </div>
    <div class="player-slot" id="slotOpp">
      <div class="p-name" id="nameOpp">ADVERSAIRE</div>
      <div class="p-color">
        <div class="cdot" id="dotOpp"></div>
        <span id="colorOpp">—</span>
      </div>
      <div class="p-caps" id="capsOpp">0</div>
    </div>
  </div>

  <!-- Turn strip -->
  <div class="turn-strip" id="turnStrip">—</div>

  <!-- Board -->
  <div class="board-frame">
    <div class="board-rim"></div>
    <div class="board-surface">
      <div class="grid" id="grid"></div>
    </div>
  </div>

</div>

<!-- Game Over -->
<div class="overlay" id="ovEnd">
  <div class="ov-card">
    <div class="ov-icon"  id="ovIcon">🏆</div>
    <div class="ov-title" id="ovTitle">VICTOIRE</div>
    <div class="ov-sub"   id="ovSub"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const P       = new URLSearchParams(location.search);
const GAME_ID = P.get('gameId') || '';
const PLAYER  = P.get('player') || '';
const TOKEN   = P.get('token')  || '';
const UNAME   = P.get('username') || 'Joueur';
const SERVER  = location.origin;

// ── CONSTANTS ───────────────────────────────────────────────────────
const E=0,W=1,B=2,WK=3,BK=4;
const isW  = p=>p===W||p===WK;
const isB  = p=>p===B||p===BK;
const isK  = p=>p===WK||p===BK;
const ok   = (r,c)=>r>=0&&r<10&&c>=0&&c<10;
const clone= b=>b.map(r=>[...r]);

// ── STATE ───────────────────────────────────────────────────────────
let board, myColor, curPlayer, status='connecting';
let sel=null, vmoves=[], lastMv=null;
let capMe=0, capOpp=0, busy=false;
let jwt=TOKEN, socket;

// ── BOOT ────────────────────────────────────────────────────────────
window.onload = () => { show('scConnect'); connect(); };

function show(id) {
  ['scConnect','scWait','gameUI'].forEach(s=>{
    const el=document.getElementById(s);
    if(!el) return;
    el.classList.toggle('hidden', s!==id);
  });
}

// ── SOCKET ──────────────────────────────────────────────────────────
function connect() {
  socket = io(SERVER, { transports:['websocket','polling'] });

  socket.on('connect', ()=>{
    if(jwt) socket.emit('auth',{token:jwt});
    else socket.emit('auth:supabase',{supabaseId:PLAYER,username:UNAME});
  });

  socket.on('auth:ok', ({token})=>{
    if(token) jwt=token;
    socket.emit('game:join_room',{gameId:GAME_ID});
    loadGame();
  });

  socket.on('match:found', d=>{
    myColor=d.youAre;
    const opp=myColor==='white'?d.black:d.white;
    if(opp) setName('nameOpp', opp.username||'Adversaire');
    if(d.betAmount) setBetLabel(d.betAmount);
    loadGame();
  });

  socket.on('game:state', d=>applyState(d));

  socket.on('game:move', d=>{
    board=d.board; curPlayer=d.currentPlayer;
    if(d.lastMove){
      lastMv=d.lastMove;
      const mv=d.lastMove;
      const landed=board[mv.toRow][mv.toCol];
      const wasOppMove = (myColor==='white' && isB(landed)) || (myColor==='black' && isW(landed));
      const n=mv.captured? mv.captured.length : 0;
      if(wasOppMove) capOpp+=n; else capMe+=n;
    }
    sel=null; vmoves=[];
    render(); updateTurn();
  });

  socket.on('game:over', d=>showEnd(d));
  socket.on('game:result', d=>{ if(d.postMessage) showEnd(d.postMessage); });

  socket.on('disconnect',()=>{
    if(status==='playing') toast('Connexion perdue...');
  });
}

// ── LOAD GAME ───────────────────────────────────────────────────────
async function loadGame() {
  try {
    const r=await fetch(SERVER+'/games/'+GAME_ID,{headers:{'Authorization':'Bearer '+jwt}});
    if(!r.ok){ show('scWait'); return; }
    applyState(await r.json());
  } catch(e){ show('scWait'); }
}

function applyState(d) {
  board=d.board; curPlayer=d.currentPlayer;
  if(!myColor) myColor=d.youAre;
  if(d.status==='waiting'){ show('scWait'); return; }

  // Names & colors
  setName('nameMe', UNAME);
  setName('nameOpp', d.opponentName||'Adversaire');
  const iW=myColor==='white';
  setDot('dotMe',  iW?'w':'r');
  setDot('dotOpp', iW?'r':'w');
  document.getElementById('colorMe').textContent  = iW?'Blancs':'Noirs';
  document.getElementById('colorOpp').textContent = iW?'Noirs':'Blancs';
  if(d.betAmount) setBetLabel(d.betAmount);

  status='playing';
  show('gameUI');
  render(); updateTurn();
}

// ── RENDER ──────────────────────────────────────────────────────────
function render() {
  const g=document.getElementById('grid'); g.innerHTML='';
  const vs =new Set(vmoves.map(m=>m.to[0]+','+m.to[1]));
  const cs =new Set(vmoves.filter(m=>m.capturedPieces.length).map(m=>m.to[0]+','+m.to[1]));

  for(let r=0;r<10;r++) for(let c=0;c<10;c++){
    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'lt':'dk');
    sq.id='sq-'+r+'-'+c;

    if(lastMv){
      if(r===lastMv.fromRow&&c===lastMv.fromCol) sq.classList.add('lfrom');
      if(r===lastMv.toRow  &&c===lastMv.toCol  ) sq.classList.add('lto');
    }

    const key=r+','+c;
    if(vs.has(key)&&!busy){
      sq.classList.add(cs.has(key)?'cap-mv':'valid-mv','clickable');
      const d=document.createElement('div'); d.className='mdot'; sq.appendChild(d);
      sq.style.cursor='pointer';
      sq.addEventListener('click',()=>handleCell(r,c));
    }
    if(sel&&sel[0]===r&&sel[1]===c) sq.classList.add('sel');

    const p=board[r][c];
    if(p!==E){
      const el=document.createElement('div');
      el.className='piece '+(isW(p)?'wp':'rp');
      if(isK(p)) el.classList.add('king');
      const mine=myColor==='white'?isW(p):isB(p);
      if(mine){
        el.classList.add('mine');
        if(sel&&sel[0]===r&&sel[1]===c) el.classList.add('picked');
      }
      el.addEventListener('click',()=>handlePiece(r,c));
      sq.appendChild(el);
    }
    g.appendChild(sq);
  }

  // counts
  let w=0,b=0;
  for(let r=0;r<10;r++) for(let c=0;c<10;c++){if(isW(board[r][c]))w++;if(isB(board[r][c]))b++;}
  document.getElementById('pCount').textContent=(w+b)+' pièces';
  document.getElementById('capsMe').textContent=capMe;
  document.getElementById('capsOpp').textContent=capOpp;

  // active slot
  const myTurn=curPlayer===myColor;
  document.getElementById('slotMe').classList.toggle('active',myTurn);
  document.getElementById('slotOpp').classList.toggle('active',!myTurn);
}

function updateTurn() {
  const strip=document.getElementById('turnStrip');
  const mine=curPlayer===myColor;
  strip.className='turn-strip '+(mine?'mine':'theirs');
  strip.textContent=mine?'✦ VOTRE TOUR ✦':'Tour de l\'adversaire';
}

// ── INTERACTION ─────────────────────────────────────────────────────
function handlePiece(r,c) {
  if(busy||curPlayer!==myColor) return;
  const p=board[r][c];
  const mine=myColor==='white'?isW(p):isB(p);
  if(!mine) return;
  sel=[r,c];
  vmoves=movesFor(r,c,myColor);
  render();
}

function handleCell(r,c) {
  if(busy||!sel) return;
  const mv=vmoves.find(m=>m.to[0]===r&&m.to[1]===c);
  if(!mv) return;
  sel=null; vmoves=[];
  sendMove(mv.from[0],mv.from[1],r,c);
}

async function sendMove(fr,fc,tr,tc) {
  try {
    const res=await fetch(SERVER+'/games/'+GAME_ID+'/move',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({fromRow:fr,fromCol:fc,toRow:tr,toCol:tc})
    });
    const d=await res.json();
    if(!res.ok) showToast(d.error||'Coup invalide');
  } catch(e){ showToast('Erreur réseau'); }
}

// ── MOVES ───────────────────────────────────────────────────────────
function movesFor(r,c,player) {
  const isOwn=p=>player==='white'?isW(p):isB(p);
  const allC=[];
  for(let rr=0;rr<10;rr++) for(let cc=0;cc<10;cc++)
    if(isOwn(board[rr][cc])) for(const m of caps(rr,cc,board,player)) allC.push({from:[rr,cc],...m});
  if(allC.length){
    const mx=Math.max(...allC.map(m=>m.capturedPieces.length));
    return allC.filter(m=>m.capturedPieces.length===mx&&m.from[0]===r&&m.from[1]===c);
  }
  return simpleMoves(r,c).map(to=>({from:[r,c],to,capturedPieces:[]}));
}

function simpleMoves(r,c) {
  const p=board[r][c], mv=[];
  if(!isK(p)){
    const dirs=isW(p)?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
    for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc;if(ok(nr,nc)&&board[nr][nc]===E)mv.push([nr,nc]);}
  } else {
    for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){
      let nr=r+dr,nc=c+dc;
      while(ok(nr,nc)&&board[nr][nc]===E){mv.push([nr,nc]);nr+=dr;nc+=dc;}
    }
  }
  return mv;
}

function caps(r,c,b,player,done=[]) {
  const p=b[r][c], res=[];
  const isEnemy=x=>player==='white'?isB(x):isW(x);
  if(!isK(p)){
    for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){
      const mr=r+dr,mc=c+dc,lr=r+2*dr,lc=c+2*dc;
      if(!ok(lr,lc)||!isEnemy(b[mr][mc])||b[lr][lc]!==E)continue;
      const k=mr+','+mc; if(done.includes(k))continue;
      const nb=clone(b),cp=b[mr][mc]; nb[lr][lc]=p;nb[r][c]=E;nb[mr][mc]=E;
      const f=caps(lr,lc,nb,player,[...done,k]);
      if(f.length) for(const x of f) res.push({to:x.to,capturedPieces:[{r:mr,c:mc,piece:cp},...x.capturedPieces]});
      else res.push({to:[lr,lc],capturedPieces:[{r:mr,c:mc,piece:cp}]});
    }
  } else {
    for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){
      let nr=r+dr,nc=c+dc;
      while(ok(nr,nc)&&b[nr][nc]===E){nr+=dr;nc+=dc;}
      if(!ok(nr,nc)||!isEnemy(b[nr][nc]))continue;
      const k=nr+','+nc; if(done.includes(k))continue;
      const ep=b[nr][nc]; let lr=nr+dr,lc=nc+dc;
      while(ok(lr,lc)&&b[lr][lc]===E){
        const nb=clone(b);nb[lr][lc]=p;nb[r][c]=E;nb[nr][nc]=E;
        const f=caps(lr,lc,nb,player,[...done,k]);
        if(f.length) for(const x of f) res.push({to:x.to,capturedPieces:[{r:nr,c:nc,piece:ep},...x.capturedPieces]});
        else res.push({to:[lr,lc],capturedPieces:[{r:nr,c:nc,piece:ep}]});
        lr+=dr;lc+=dc;
      }
    }
  }
  return res;
}

// ── GAME OVER ───────────────────────────────────────────────────────
function showEnd(d) {
  const won = d.winnerSupabaseId===PLAYER || d.winnerColor===myColor ||
              (d.winner==='player1'&&myColor==='white') ||
              (d.winner==='player2'&&myColor==='black');
  document.getElementById('ovIcon').textContent  = won?'🏆':'💀';
  document.getElementById('ovTitle').textContent = won?'VICTOIRE':'DÉFAITE';
  document.getElementById('ovSub').textContent   = won
    ? 'Félicitations — vous avez dominé cette partie !'
    : 'L\'adversaire a pris le dessus cette fois.';
  document.getElementById('ovEnd').classList.add('show');
  status='finished';
  try{ window.parent.postMessage(d,'*'); }catch(e){}
}

// ── HELPERS ─────────────────────────────────────────────────────────
function setName(id,n){ document.getElementById(id).textContent=(n||'?').toUpperCase().slice(0,14); }
function setDot(id,cls){ const el=document.getElementById(id); el.className='cdot '+cls; }
function setBetLabel(v){ document.getElementById('pCount').textContent=v+' HTG en jeu'; }

let toastT;
function showToast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),3000);
}
function toast(m){showToast(m);}
