<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Penalty Shootout - Mindspille</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}
.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);font-size:22px;transition:all 0.3s}
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5)}
.profile.choosing .profile-avatar{border-color:rgba(251,191,36,0.8);box-shadow:0 0 18px rgba(251,191,36,0.5)}
.profile.locked .profile-avatar{border-color:rgba(74,222,128,0.8);box-shadow:0 0 18px rgba(74,222,128,0.5)}
.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.6);text-transform:uppercase;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-role{font-size:10px;color:rgba(255,255,255,0.4);min-height:14px;text-align:center}
.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#fff;display:inline-block}
.snum.bump{animation:scoreBump .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes scoreBump{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px;font-family:'Cinzel',serif}

/* ── MAIN WRAP ── */
#wrap{flex:1 1 auto;position:relative;overflow:hidden}
#gc{position:absolute;inset:0;width:100%;height:100%;display:block}
#spots-layer{position:absolute;inset:0;pointer-events:none;z-index:10}

/* ── ZONES ── */
.zone-btn{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;border:none;background:none;outline:none;animation:zoneAppear .4s cubic-bezier(.34,1.56,.64,1) both;-webkit-tap-highlight-color:transparent}
@keyframes zoneAppear{from{transform:translate(-50%,-50%) scale(0);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.zone-ring{width:72px;height:72px;border-radius:50%;border:2.5px solid rgba(251,191,36,0.5);background:rgba(251,191,36,0.07);display:flex;align-items:center;justify-content:center;position:relative;transition:all .18s}
.zone-ring::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;border-top-color:rgba(251,191,36,0.4);animation:rotArc 3s linear infinite}
@keyframes rotArc{to{transform:rotate(360deg)}}
.zone-btn.selected .zone-ring{border-color:#fbbf24;background:rgba(251,191,36,0.18);box-shadow:0 0 0 8px rgba(251,191,36,0.12),0 0 28px rgba(251,191,36,0.5)}
.zone-btn.selected .zone-ring::before{border-top-color:#fbbf24;animation:rotArc .7s linear infinite}
.zone-btn.selected{animation:ringPulse 1s ease-in-out infinite}
@keyframes ringPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(251,191,36,.5))}50%{filter:drop-shadow(0 0 16px rgba(251,191,36,.9))}}
.zone-btn.dimmed .zone-ring{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.02);opacity:.35}
.zone-btn.dimmed .zone-ring::before{opacity:0}
.zone-btn.locked-in{pointer-events:none}
.zone-icon{font-size:32px;line-height:1;display:block;transition:transform .2s}
.zone-btn.selected .zone-icon{transform:scale(1.15)}
.zone-btn.dimmed .zone-icon{opacity:.3}

/* ── BALL CENTER ── */
#ball-center{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:8;transition:opacity .25s;font-size:52px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));animation:ballBounce 1.8s ease-in-out infinite}
@keyframes ballBounce{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}
#ball-center.hidden{opacity:0;pointer-events:none}

/* ── RESULT OVERLAY ── */
.result-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.65);opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.result-overlay.show{opacity:1}
.result-txt{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;animation:rPop .45s cubic-bezier(.34,1.56,.64,1);margin-bottom:8px;text-align:center}
.result-txt.goal{color:#fbbf24;text-shadow:0 0 60px rgba(251,191,36,.9)}
.result-txt.saved{color:#f87171;text-shadow:0 0 60px rgba(248,113,113,.9)}
.result-txt.forfeit{color:#a78bfa;text-shadow:0 0 60px rgba(167,139,250,.9)}
.result-txt.draw-r{color:#94a3b8;text-shadow:0 0 40px rgba(148,163,184,.6)}
.result-sub{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600;font-family:'Cinzel',serif;letter-spacing:1px}
@keyframes rPop{from{transform:scale(.1) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* ── BOTTOM BAR ── */
#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
#choice-hint{font-family:'Cinzel',serif;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;flex:1;text-align:left}
.btn-confirm{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1e1b4b;border:none;border-radius:99px;padding:10px 22px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:1px;white-space:nowrap}
.btn-confirm:disabled{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.25);cursor:default}
.btn-confirm:not(:disabled):active{transform:scale(0.95)}

/* ── TOAST ── */
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px;white-space:pre-line}

/* ── STATUS BAR ── */
#status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.88);border:1px solid rgba(251,191,36,0.35);border-radius:99px;padding:6px 18px;font-family:'Cinzel',serif;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:1px;z-index:10;backdrop-filter:blur(8px);white-space:nowrap;display:none}
#status-bar.show{display:block}

/* ── TIMER BAR ── */
#timer-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1);z-index:15}
#timer-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);width:100%;transition:width 0.08s linear}

/* ── SCREEN FLASH ── */
#screen-flash{position:absolute;inset:0;z-index:25;pointer-events:none;opacity:0}
.flash-goal{background:radial-gradient(ellipse at 50% 50%,rgba(251,191,36,.55) 0%,transparent 70%)}
.flash-save{background:radial-gradient(ellipse at 50% 50%,rgba(248,113,113,.45) 0%,transparent 70%)}
@keyframes flashAni{0%{opacity:1}100%{opacity:0}}

/* ── WAITING BADGE ── */
#waiting-badge{position:absolute;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.92);border:1.5px solid rgba(74,222,128,0.6);border-radius:99px;padding:8px 22px;font-size:12px;color:#4ade80;z-index:15;font-family:'Cinzel',serif;letter-spacing:1px;display:none;white-space:nowrap;box-shadow:0 0 18px rgba(74,222,128,0.25);animation:badgePulse 1.4s ease-in-out infinite;pointer-events:none}
#waiting-badge.show{display:block}
#waiting-badge.waiting{border-color:rgba(251,191,36,0.6);color:#fbbf24;box-shadow:0 0 18px rgba(251,191,36,0.2)}
@keyframes badgePulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.75;transform:translateX(-50%) scale(1.03)}}

/* ── RECONNECT BAR ── */
#reconn-bar{position:absolute;top:0;left:0;right:0;z-index:150;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none}
#reconn-bar.show{display:block}

/* ── FORFEIT BAR ── */
#forfeit-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.95);border:1px solid rgba(251,191,36,0.5);border-radius:99px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#fbbf24;display:none;z-index:25;backdrop-filter:blur(8px);white-space:nowrap}
#forfeit-bar.show{display:block}

/* ── LOADING ── */
#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif;text-align:center;padding:0 16px}
</style>
</head>
<body>

<div id="top">
  <div class="profile" id="profile-me">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-me" cx="29" cy="29" r="26" stroke="#fbbf24"/></svg>
      <div class="profile-avatar" id="avatar-me">⚽</div>
    </div>
    <div class="profile-name" id="name-me">Vous</div>
    <div class="profile-role" id="role-me"></div>
  </div>
  <div class="top-center">
    <div class="score-row">
      <span class="snum" id="score-me">0</span>
      <span class="ssep">vs</span>
      <span class="snum" id="score-op">0</span>
    </div>
    <span class="manche-lbl" id="round-lbl">Penalty Shootout</span>
  </div>
  <div class="profile" id="profile-op">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-op" cx="29" cy="29" r="26" stroke="#f87171"/></svg>
      <div class="profile-avatar" id="avatar-op">🥅</div>
    </div>
    <div class="profile-name" id="name-op">Adversaire</div>
    <div class="profile-role" id="role-op"></div>
  </div>
</div>

<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="screen-flash"></div>
  <div id="status-bar"></div>
  <div id="waiting-badge">⏳ Adversaire réfléchit…</div>
  <div id="ball-center" class="hidden">⚽</div>
  <div id="spots-layer"></div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div class="result-overlay" id="result-overlay">
    <div class="result-txt" id="result-txt">BUT !</div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div id="toast"><div id="toast-emoji"></div><div id="toast-title"></div><div id="toast-sub"></div></div>
  <div id="loading"><div class="spin"></div><p id="loading-txt">CONNEXION EN COURS…</p></div>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
</div>

<div id="bot">
  <div id="choice-hint">En attente…</div>
  <button class="btn-confirm" id="btn-confirm" disabled onclick="confirmChoice()">✅ VALIDER</button>
</div>

<!-- Socket.io chargé depuis le serveur -->
<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';

/* ══════════════════════════════════════
   PARAMÈTRES URL
══════════════════════════════════════ */
var P           = new URLSearchParams(window.location.search);
var ROOM_ID     = P.get('room')     || '';
var MY_SLOT     = parseInt(P.get('player') || '1', 10);  /* 1 ou 2 */
var P1_ID       = P.get('p1Id')     || '';
var P2_ID       = P.get('p2Id')     || '';
var P1_NAME     = P.get('p1Name')   || 'Joueur 1';
var P2_NAME     = P.get('p2Name')   || 'Joueur 2';
var BET_AMOUNT  = parseFloat(P.get('bet') || '0');
var CURRENCY    = P.get('currency') || 'HTG';

/* Génération automatique du room si absent */
if (!ROOM_ID && P1_ID && P2_ID) {
  var ids = [P1_ID, P2_ID].sort();
  ROOM_ID = 'penalty-' + ids[0].slice(-8) + '-' + ids[1].slice(-8);
}
if (!ROOM_ID) ROOM_ID = P.get('gameId') || P.get('matchId') || ('penalty-' + Date.now());

var MY_SUPABASE_ID = MY_SLOT === 1 ? P1_ID : P2_ID;
var OP_SUPABASE_ID = MY_SLOT === 1 ? P2_ID : P1_ID;
var MY_NAME        = MY_SLOT === 1 ? P1_NAME : P2_NAME;
var OP_NAME        = MY_SLOT === 1 ? P2_NAME : P1_NAME;

/* ══════════════════════════════════════
   CONSTANTES
══════════════════════════════════════ */
var TOTAL_ROUNDS    = 10;
var TIMER_DURATION  = 15000;   /* 15s par manche (sync avec serveur) */
var CIRC            = 2 * Math.PI * 26;
var SPOT_GK_ANGLE   = [0, -0.75, 0.75];

/* ══════════════════════════════════════
   ÉTAT DU JEU
══════════════════════════════════════ */
var socket        = null;
var gameReady     = false;
var gameOver      = false;
var resultSent    = false;
var phase         = 'idle';      /* idle | waiting_opponent | choosing | syncing | showing */
var currentRound  = 1;
var scores        = { me: 0, op: 0 };
var myChoice      = null;
var myLocked      = false;
var opLocked      = false;
var forfeitTimer  = null;
var forfeitCountdown = 0;

/* ══════════════════════════════════════
   CANVAS & RENDU
══════════════════════════════════════ */
var canvas  = document.getElementById('gc');
var ctx     = canvas.getContext('2d');
var W, H, GL, GR, GT, GB, SPOTS = [];
var gkX, gkY, gkTX, gkTY, gkAngle = 0, gkTAngle = 0, gkSX, gkSY, gkSAngle = 0;
var gkIdleT = 0, gkIdleActive = false, idleAniId = null;
var ballX, ballY, ballTX, ballTY, ballSX, ballSY, ballSz, ballTSz, ballSSz;
var ballVis = false, ballAngle = 0, ballTrailPts = [];
var deflectVis = false, deflectX, deflectY, deflectVX, deflectVY, deflectSz, deflectAlpha, deflectAngle, deflectRotV, deflectAniId = null;
var shooterHL = null, keeperHL = null;
var shakeX = 0, shakeY = 0, shakeDur = 0, shakeAni = null, shakeIntensity = 0;
var aniId = null, aniStart = null, aniDur = 900, aniDone = null, ballEndAngle = 0;
var ballCenterEl = document.getElementById('ball-center');

/* ══════════════════════════════════════
   HELPERS ROUND
══════════════════════════════════════ */
/* Slot 1 = tireur aux manches impaires, gardien aux paires
   Slot 2 = gardien aux manches impaires, tireur aux paires */
function isMyShooter(r) {
  if (MY_SLOT === 1) return r % 2 === 1;
  return r % 2 === 0;
}

/* ══════════════════════════════════════
   SOCKET.IO
══════════════════════════════════════ */
function hideLoading() {
  var el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(function(){ el.style.display = 'none'; }, 400); }
}

function initSocket() {
  document.getElementById('loading-txt').textContent = 'ROOM: ' + ROOM_ID + ' | SLOT: ' + MY_SLOT;

  socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });

  socket.on('connect', function() {
    document.getElementById('reconn-bar').classList.remove('show');
    emitJoin();
  });

  socket.on('disconnect', function() {
    if (!gameOver) document.getElementById('reconn-bar').classList.add('show');
  });

  socket.on('connect_error', function() {
    var lt = document.getElementById('loading-txt');
    if (lt && !gameReady) lt.textContent = 'CONNEXION IMPOSSIBLE — Vérifiez votre réseau';
  });

  /* ── Partie démarrée ── */
  socket.on('penalty_start', function(data) {
    hideLoading();
    stopForfeitCountdown();

    OP_NAME = data.opponentName || OP_NAME;
    BET_AMOUNT = data.bet || BET_AMOUNT;
    CURRENCY = data.currency || CURRENCY;

    if (data.reconnected && data.gameState) {
      /* Reconnexion en cours de partie */
      gameOver = false;
      currentRound = data.gameState.round || 1;
      scores.me  = MY_SLOT === 1 ? (data.gameState.scores.p1 || 0) : (data.gameState.scores.p2 || 0);
      scores.op  = MY_SLOT === 1 ? (data.gameState.scores.p2 || 0) : (data.gameState.scores.p1 || 0);
      updateScores();
      showToast('📶', 'Reconnecté !', 'Reprise de la manche ' + currentRound + ' / ' + TOTAL_ROUNDS, 2200, function(){
        gameReady = true;
        startRound();
      });
    } else {
      /* Nouvelle partie */
      currentRound = 1;
      scores = { me: 0, op: 0 };
      updateScores();
      var iamShooter = isMyShooter(1);
      showToast('⚽', 'Penalty Shootout !',
        MY_NAME + ' vs ' + OP_NAME + '\n' + TOTAL_ROUNDS + ' manches\n' +
        (iamShooter ? 'Vous tirez en premier !' : OP_NAME + ' tire en premier !'),
        2500, function(){
          gameReady = true;
          startRound();
        }
      );
    }
  });

  /* ── Adversaire a confirmé son choix ── */
  socket.on('penalty_choice_received', function(data) {
    if (data.player === MY_SLOT) return; /* c'est nous, ignorer */
    opLocked = true;
    document.getElementById('profile-op').classList.remove('choosing');
    document.getElementById('profile-op').classList.add('locked');
    var b = document.getElementById('waiting-badge');
    b.className = 'show';
    b.textContent = '✅ Adversaire prêt';
    checkBothReady();
  });

  /* ── Résultat de la manche ── */
  socket.on('penalty_round_result', function(data) {
    if (phase !== 'syncing' && phase !== 'choosing') return;
    phase = 'showing';
    stopLocalTimer();

    /* Mettre à jour les scores depuis le serveur (source de vérité) */
    scores.me = MY_SLOT === 1 ? data.scores.p1 : data.scores.p2;
    scores.op = MY_SLOT === 1 ? data.scores.p2 : data.scores.p1;

    var myZone  = MY_SLOT === 1 ? data.p1Zone : data.p2Zone;
    var opZone  = MY_SLOT === 1 ? data.p2Zone : data.p1Zone;
    var iamShooter = (data.shooterSlot === MY_SLOT);
    var shooterZone = iamShooter ? myZone : opZone;
    var keeperZone  = iamShooter ? opZone : myZone;

    resolveAnimation(shooterZone, keeperZone, data.isGoal, iamShooter, function(){
      updateScores();
      if (data.gameOver) {
        setTimeout(function(){
          handleGameEnd();
        }, 2400);
      } else {
        currentRound = data.nextRound;
        setTimeout(function(){ hideResult(); startRound(); }, 2600);
      }
    });
  });

  /* ── Sync timer du serveur ── */
  socket.on('penalty_turn_start', function(data) {
    if (gameOver || phase !== 'choosing') return;
    syncTimerFromServer(data.startTime, data.duration);
  });

  socket.on('penalty_turn_warning', function(data) {
    if (gameOver) return;
    startForfeitCountdown(Math.ceil((data.duration || 30000) / 1000));
  });

  socket.on('penalty_turn_sync', function(data) {
    if (gameOver || phase !== 'choosing') return;
    var offset = Date.now() - data.serverTime;
    syncTimerFromServer(data.startTime + offset, data.duration || TIMER_DURATION);
  });

  /* ── Adversaire déconnecté ── */
  socket.on('penalty_opponent_disconnected', function(data) {
    if (gameOver) return;
    startForfeitCountdown(60);
  });

  socket.on('penalty_player_status', function(data) {
    if (data.slot === MY_SLOT) return;
    document.getElementById('profile-op').style.opacity = data.connected ? '1' : '0.45';
  });

  socket.on('penalty_game_resumed', function(data) {
    stopForfeitCountdown();
    document.getElementById('profile-op').style.opacity = '1';
    showToast('▶️', 'Partie reprise', data.message || 'Les deux joueurs sont de retour !', 2000, function(){
      if (gameReady && !gameOver) updUI();
    });
  });

  socket.on('player:reconnected', function(data) {
    stopForfeitCountdown();
    showToast('✅', 'Adversaire reconnecté', data.message || 'La partie reprend !', 2500, null);
  });

  /* ── Fin de partie (serveur) ── */
  socket.on('game:over', function(d) {
    if (gameOver) return;
    hideLoading();
    stopForfeitCountdown();

    if (d.result === 'cancel') {
      gameOver = true; phase = 'idle';
      stopLocalTimer();
      var penalty = d.penalty || 0;
      showToast('⚠️', 'Partie annulée',
        'Les deux joueurs se sont déconnectés.\nPénalité de ' + penalty + ' ' + CURRENCY + ' appliquée.',
        5000, function(){ sendResult('cancel', 'both_disconnected'); });
      return;
    }

    var iWon = d.winnerSupabaseId === MY_SUPABASE_ID ||
               (d.winnerSlot && d.winnerSlot === MY_SLOT) ||
               (d.winner === 'player1' && MY_SLOT === 1) ||
               (d.winner === 'player2' && MY_SLOT === 2);
    handleGameEnd(iWon ? 'win' : 'loss', d.reason || 'normal');
  });

  socket.on('game:result', function(d) {
    if (d.postMessage && !gameOver) {
      hideLoading();
      var iWon = d.postMessage.result === 'win';
      handleGameEnd(iWon ? 'win' : 'loss', 'forfeit');
    }
  });

  socket.on('penalty_error', function(d) {
    document.getElementById('loading-txt').textContent = 'ERREUR: ' + (d.detail || d.message);
  });
}

function emitJoin() {
  socket.emit('penalty_join', {
    room: ROOM_ID,
    player: MY_SLOT,
    supabaseId: MY_SUPABASE_ID,
    name: MY_NAME,
    bet: BET_AMOUNT,
    currency: CURRENCY
  });
}

function sendResult(outcome, reason) {
  if (resultSent) return;
  resultSent = true;
  var winnerId = outcome === 'win' ? MY_SUPABASE_ID : OP_SUPABASE_ID;
  var loserId  = outcome === 'win' ? OP_SUPABASE_ID : MY_SUPABASE_ID;
  var msg = {
    type: 'game_result', game: 'penalty', room: ROOM_ID,
    winner: winnerId, loser: loserId,
    bet: BET_AMOUNT, currency: CURRENCY,
    reason: reason || 'normal',
    p1Id: P1_ID, p2Id: P2_ID,
    scores: { p1: MY_SLOT===1?scores.me:scores.op, p2: MY_SLOT===1?scores.op:scores.me }
  };
  try { window.parent.postMessage(msg, '*'); } catch(e) {}
  if (socket && socket.connected) socket.emit('penalty_result', msg);
}

   TIMER LOCAL (affichage seulement)
   La source de vérité = serveur

var localTimerInt = null;
var localTimerStart = null;
var localTimerDuration = TIMER_DURATION;

function syncTimerFromServer(serverStartTime, duration) {
  stopLocalTimer();
  localTimerStart = serverStartTime;
  localTimerDuration = duration || TIMER_DURATION;
  localTimerInt = setInterval(function(){
    var elapsed = Date.now() - localTimerStart;
    var progress = Math.min(elapsed / localTimerDuration, 1);
    document.getElementById('timer-arc-me').style.strokeDashoffset  = CIRC * progress;
    document.getElementById('timer-arc-op').style.strokeDashoffset  = CIRC * progress;
    document.getElementById('timer-fill').style.width = (100 * (1 - progress)) + '%';
    if (progress >= 1) stopLocalTimer();
  }, 50);
}

function startLocalTimer() {
  stopLocalTimer();
  localTimerStart = Date.now();
  localTimerDuration = TIMER_DURATION;
  document.getElementById('profile-me').classList.add('active', 'choosing');
  document.getElementById('profile-op').classList.add('active', 'choosing');
  localTimerInt = setInterval(function(){
    var elapsed = Date.now() - localTimerStart;
    var progress = Math.min(elapsed / localTimerDuration, 1);
    document.getElementById('timer-arc-me').style.strokeDashoffset  = CIRC * progress;
    document.getElementById('timer-arc-op').style.strokeDashoffset  = CIRC * progress;
    document.getElementById('timer-fill').style.width = (100 * (1 - progress)) + '%';
    if (progress >= 1) stopLocalTimer();
  }, 50);
}

function stopLocalTimer() {
  if (localTimerInt) { clearInterval(localTimerInt); localTimerInt = null; }
  document.getElementById('timer-arc-me').style.strokeDashoffset = CIRC;
  document.getElementById('timer-arc-op').style.strokeDashoffset = CIRC;
  document.getElementById('timer-fill').style.width = '100%';
  document.getElementById('profile-me').className = 'profile active';
  document.getElementById('profile-op').className = 'profile active';
}

function startForfeitCountdown(seconds) {
  stopForfeitCountdown();
  forfeitCountdown = seconds;
  var bar = document.getElementById('forfeit-bar');
  bar.classList.add('show');
  function tick() {
    bar.textContent = '⏳ Adversaire absent — victoire dans ' + forfeitCountdown + 's';
    if (forfeitCountdown <= 0) { stopForfeitCountdown(); return; }
    forfeitCountdown--;
    forfeitTimer = setTimeout(tick, 1000);
  }
  tick();
}
function stopForfeitCountdown() {
  if (forfeitTimer) { clearTimeout(forfeitTimer); forfeitTimer = null; }
  var bar = document.getElementById('forfeit-bar');
  if (bar) bar.classList.remove('show');
  forfeitCountdown = 0;
}

/* ══════════════════════════════════════
   CANVAS INIT & RENDU
══════════════════════════════════════ */
function initCanvas() {
  var wrap = document.getElementById('wrap');
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  GL = W * .055; GR = W * .945; GT = H * .09; GB = H * .63;
  var iL = GL + 28, iR = GR - 28, iT = GT + 38, iB = GB - 38;
  SPOTS = [
    { x: (iL + iR) / 2, y: iT },
    { x: iL,            y: iB },
    { x: iR,            y: iB }
  ];
  var wb = document.getElementById('waiting-badge');
  wb.style.top = (GB + 14) + 'px';
  resetGK(); ballVis = false; deflectVis = false;
  shooterHL = null; keeperHL = null;
  render();
}

function resetGK() {
  gkX = gkTX = gkSX = (GL + GR) / 2;
  gkY = gkTY = gkSY = GB - 4;
  gkAngle = gkTAngle = gkSAngle = 0;
  gkIdleActive = true; startGKIdle();
}

function startGKIdle() {
  if (idleAniId) cancelAnimationFrame(idleAniId);
  gkIdleT = 0;
  function step() {
    if (!gkIdleActive) return;
    gkIdleT += 0.04;
    var ox = Math.sin(gkIdleT) * 8, oy = Math.abs(Math.sin(gkIdleT * 2)) * 3;
    if (!ballVis && !aniId) { gkX = gkSX + ox; gkY = gkSY - oy; render(); }
    idleAniId = requestAnimationFrame(step);
  }
  step();
}

function showBallCenter() {
  var bx = (GL + GR) / 2, by = GB + (H - GB) * .42;
  ballCenterEl.style.left = bx + 'px';
  ballCenterEl.style.top  = by + 'px';
  ballCenterEl.style.fontSize = Math.round(W * .13) + 'px';
  ballCenterEl.classList.remove('hidden');
}
function hideBallCenter() {
  ballCenterEl.classList.add('hidden');
}

function render() {
  var sx = shakeDur > 0 ? shakeX : 0, sy = shakeDur > 0 ? shakeY : 0;
  ctx.save(); ctx.translate(sx, sy);
  ctx.clearRect(-20, -20, W + 40, H + 40);

  /* Pelouse */
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d2a10'); bg.addColorStop(1, '#1a5c1a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  /* Filet */
  ctx.save();
  ctx.beginPath(); ctx.rect(GL + 3, GT + 3, (GR - GL) - 6, (GB - GT) - 3); ctx.clip();
  var ng = ctx.createLinearGradient(0, GT, 0, GB);
  ng.addColorStop(0, 'rgba(4,28,8,.95)'); ng.addColorStop(1, 'rgba(10,50,10,.8)');
  ctx.fillStyle = ng; ctx.fillRect(GL, GT, GR - GL, GB - GT);
  ctx.strokeStyle = 'rgba(255,255,255,.09)'; ctx.lineWidth = 1;
  for (var x = GL; x <= GR; x += 20) { ctx.beginPath(); ctx.moveTo(x, GT); ctx.lineTo(x, GB); ctx.stroke(); }
  for (var y = GT; y <= GB; y += 20) { ctx.beginPath(); ctx.moveTo(GL, y); ctx.lineTo(GR, y); ctx.stroke(); }
  ctx.restore();

  /* Poteaux */
  ctx.save();
  ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 7; ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(251,191,36,.45)'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.moveTo(GL, GB); ctx.lineTo(GL, GT); ctx.lineTo(GR, GT); ctx.lineTo(GR, GB); ctx.stroke();
  ctx.restore();

  /* Trail balle */
  if (ballVis && ballTrailPts.length > 1) {
    for (var i = 1; i < ballTrailPts.length; i++) {
      var t = i / ballTrailPts.length;
      ctx.beginPath(); ctx.arc(ballTrailPts[i].x, ballTrailPts[i].y, ballSz * t * .3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (t * .12) + ')'; ctx.fill();
    }
  }

  /* Balle animée */
  if (ballVis) {
    ctx.save(); ctx.translate(ballX, ballY); ctx.rotate(ballAngle);
    ctx.font = Math.round(ballSz) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,255,255,.4)'; ctx.shadowBlur = 8;
    ctx.fillText('⚽', 0, 0); ctx.restore();
  }

  /* Balle déviée */
  if (deflectVis) {
    ctx.save(); ctx.globalAlpha = deflectAlpha; ctx.translate(deflectX, deflectY); ctx.rotate(deflectAngle);
    ctx.font = Math.round(deflectSz) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(248,113,113,.6)'; ctx.shadowBlur = 10;
    ctx.fillText('⚽', 0, 0); ctx.restore();
  }

  /* Highlights */
  if (shooterHL !== null) drawHL(SPOTS[shooterHL], '#fbbf24', '⚽');
  if (keeperHL  !== null) drawHL(SPOTS[keeperHL],  '#f87171', '🧤');

  drawGK();
  ctx.restore();
}

function drawGK() {
  var sz = Math.round(W * .13), gap = W * .055;
  ctx.save();
  ctx.shadowColor = 'rgba(251,191,36,.2)'; ctx.shadowBlur = 18;
  ctx.font = sz + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.save(); ctx.translate(gkX - gap, gkY); ctx.rotate(gkAngle - 0.15); ctx.fillText('🧤', 0, 0); ctx.restore();
  ctx.save(); ctx.translate(gkX + gap, gkY); ctx.scale(-1, 1); ctx.rotate(-(gkAngle + 0.15)); ctx.fillText('🧤', 0, 0); ctx.restore();
  ctx.restore();
}

function drawHL(sp, color, emoji) {
  ctx.beginPath(); ctx.arc(sp.x, sp.y, 34, 0, Math.PI * 2);
  ctx.fillStyle = color + '33'; ctx.strokeStyle = color; ctx.lineWidth = 3;
  ctx.fill(); ctx.stroke();
  ctx.font = '26px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, sp.x, sp.y);
}

function doShake(intensity, dur) {
  shakeIntensity = intensity; shakeDur = dur;
  if (shakeAni) clearInterval(shakeAni);
  shakeAni = setInterval(function(){
    if (shakeDur <= 0) { clearInterval(shakeAni); shakeX = 0; shakeY = 0; return; }
    shakeX = (Math.random() - .5) * shakeIntensity;
    shakeY = (Math.random() - .5) * shakeIntensity;
    shakeDur--;
  }, 16);
}

function recordTrail() {
  ballTrailPts.push({ x: ballX, y: ballY });
  if (ballTrailPts.length > 8) ballTrailPts.shift();
}

function startDeflect(sx, sy, onDone) {
  deflectVis = true; deflectX = sx; deflectY = sy;
  deflectSz = Math.round(W * .1); deflectAlpha = 1; deflectAngle = 0;
  var angles = [-2.2, -1.8, -1.4, -0.8, -0.4, 0.4, 0.8, 1.4, 1.8, 2.2];
  var ca = angles[Math.floor(Math.random() * angles.length)];
  var sp = 10 + Math.random() * 7;
  deflectVX = Math.cos(ca) * sp; deflectVY = Math.sin(ca) * sp;
  deflectRotV = (Math.random() - .5) * .45;
  if (deflectAniId) cancelAnimationFrame(deflectAniId);
  function step() {
    deflectX += deflectVX; deflectY += deflectVY;
    deflectVY += 0.55; deflectVX *= .96;
    deflectAlpha -= 0.025; deflectAngle += deflectRotV;
    render();
    if (deflectAlpha > 0) deflectAniId = requestAnimationFrame(step);
    else { deflectVis = false; if (onDone) onDone(); }
  }
  step();
}

function animTo(dur, done) {
  gkIdleActive = false;
  gkSX = gkX; gkSY = gkY; gkSAngle = gkAngle;
  ballSX = ballX; ballSY = ballY; ballSSz = ballSz;
  ballTrailPts = [];
  ballEndAngle = (Math.random() > .5 ? 1 : -1) * (Math.PI * 2) * (1.5 + Math.random() * 3);
  aniDur = dur; aniDone = done; aniStart = null;
  if (aniId) cancelAnimationFrame(aniId);
  aniId = requestAnimationFrame(aniStep);
}

function aniStep(ts) {
  if (!aniStart) aniStart = ts;
  var t = Math.min(1, (ts - aniStart) / aniDur);
  var eBall = 1 - Math.pow(1 - t, 3);
  var tGk = Math.max(0, (t - .08) / .92), eGk = tGk < .5 ? 2 * tGk * tGk : -1 + (4 - 2 * tGk) * tGk;
  if (ballVis) {
    ballX = ballSX + (ballTX - ballSX) * eBall;
    ballY = ballSY + (ballTY - ballSY) * eBall;
    ballSz = ballSSz + (ballTSz - ballSSz) * eBall;
    ballAngle = ballEndAngle * eBall; recordTrail();
  }
  gkX = gkSX + (gkTX - gkSX) * eGk;
  gkY = gkSY + (gkTY - gkSY) * eGk;
  gkAngle = gkSAngle + (gkTAngle - gkSAngle) * eGk;
  render();
  if (t < 1) aniId = requestAnimationFrame(aniStep);
  else { aniId = null; gkIdleActive = false; if (aniDone) aniDone(); }
}

function flashScreen(cls) {
  var f = document.getElementById('screen-flash');
  f.className = ''; f.offsetHeight; f.className = cls;
  f.style.animation = 'none'; f.offsetHeight;
  f.style.animation = 'flashAni .6s ease-out forwards';
}

function showZones() {
  var layer = document.getElementById('spots-layer');
  layer.innerHTML = ''; layer.style.pointerEvents = 'all';
  myChoice = null; myLocked = false; opLocked = false;
  document.getElementById('btn-confirm').disabled = true;

  var badge = document.getElementById('waiting-badge');
  badge.className = '';
  badge.textContent = '⏳ Adversaire réfléchit…';
  badge.className = 'show waiting';

  var iamShooter = isMyShooter(currentRound);
  var icon = iamShooter ? '⚽' : '🧤';

  SPOTS.forEach(function(sp, i) {
    var btn = document.createElement('button');
    btn.className = 'zone-btn';
    var ring = document.createElement('div');
    ring.className = 'zone-ring';
    var ico = document.createElement('span');
    ico.className = 'zone-icon'; ico.textContent = icon;
    ring.appendChild(ico); btn.appendChild(ring);
    btn.style.left = sp.x + 'px';
    btn.style.top  = sp.y + 'px';
    btn.style.animationDelay = (i * 0.07) + 's';
    btn.addEventListener('click', function(){ selectZone(i); });
    layer.appendChild(btn);
  });

  if (iamShooter) showBallCenter();
  else { hideBallCenter(); ballVis = false; }

  var sb = document.getElementById('status-bar');
  sb.className = 'show';
  sb.textContent = iamShooter ? '⚽ Choisissez votre zone de tir' : '🧤 Choisissez votre zone de parade';
  document.getElementById('choice-hint').textContent  = iamShooter ? 'Où tirez-vous ?' : 'Où plongez-vous ?';
  document.getElementById('choice-hint').style.color  = 'rgba(255,255,255,.4)';
  render();
  startLocalTimer();
}

function hideZones() {
  var layer = document.getElementById('spots-layer');
  layer.innerHTML = ''; layer.style.pointerEvents = 'none';
}

function selectZone(idx) {
  if (phase !== 'choosing' || myLocked) return;
  myChoice = idx;
  document.querySelectorAll('.zone-btn').forEach(function(btn, i){
    btn.classList.remove('selected', 'dimmed');
    if (i === idx) btn.classList.add('selected'); else btn.classList.add('dimmed');
  });
  var iamShooter = isMyShooter(currentRound);
  if (iamShooter) hideBallCenter();
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('choice-hint').textContent = '✅ Confirmez votre choix !';
  document.getElementById('choice-hint').style.color = '#fbbf24';
}

window.confirmChoice = function() {
  if (myChoice === null || phase !== 'choosing' || myLocked) return;
  myLocked = true;
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('profile-me').classList.remove('choosing');
  document.getElementById('profile-me').classList.add('locked');
  document.querySelectorAll('.zone-btn').forEach(function(btn){ btn.classList.add('locked-in'); });
  hideBallCenter();

  /* Envoyer le choix au serveur */
  if (socket && socket.connected) {
    socket.emit('penalty_choice', {
      room: ROOM_ID,
      player: MY_SLOT,
      round: currentRound,
      zone: myChoice
    });
  }

  if (!opLocked) {
    document.getElementById('choice-hint').textContent = '⏳ En attente de l\'adversaire…';
    document.getElementById('choice-hint').style.color = 'rgba(255,255,255,.4)';
  }
  checkBothReady();
};

function checkBothReady() {
  /* La résolution est faite côté SERVEUR — on attend penalty_round_result.
     Ici on met juste à jour l'UI si les deux ont confirmé. */
  if (myLocked && opLocked && phase === 'choosing') {
    phase = 'syncing';
    stopLocalTimer();
  }
}

/* ══════════════════════════════════════
   ANIMATION DU TIR
══════════════════════════════════════ */
function resolveAnimation(shooterZone, keeperZone, isGoal, iamShooter, onDone) {
  var bsX = (GL + GR) / 2, bsY = GB + (H - GB) * .42;
  ballX = ballSX = bsX; ballY = ballSY = bsY;

  /* Si shooterZone est null (joueur n'a pas joué), balle reste au centre */
  if (shooterZone === null || shooterZone === undefined) {
    ballTX = (GL + GR) / 2; ballTY = (GT + GB) / 2;
  } else {
    ballTX = SPOTS[shooterZone].x; ballTY = SPOTS[shooterZone].y;
  }

  ballSz = ballSSz = Math.round(W * .13); ballTSz = Math.round(W * .055);
  ballVis = true; ballAngle = 0;

  if (keeperZone !== null && keeperZone !== undefined) {
    gkTX = SPOTS[keeperZone].x; gkTY = SPOTS[keeperZone].y;
    gkTAngle = SPOT_GK_ANGLE[keeperZone];
  } else {
    gkTX = gkSX = (GL + GR) / 2; gkTY = gkSY = GB - 4; gkTAngle = 0;
  }

  animTo(900, function(){
    ballVis = false;
    if (!isGoal) {
      var svX = gkX, svY = gkY - Math.round(W * .07);
      startDeflect(svX, svY, function(){
        shooterHL = shooterZone; keeperHL = keeperZone; render();
        if (onDone) onDone();
      });
      flashScreen('flash-save'); doShake(5, 14);
      showResult(
        iamShooter ? 'BLOQUÉ ! 🧤' : 'ARRÊTÉ ! 🧤',
        'saved',
        iamShooter ? 'Le gardien vous a stoppé !' : 'Vous avez arrêté le tir !'
      );
    } else {
      if (shooterZone !== null && shooterZone !== undefined) shooterHL = shooterZone;
      if (keeperZone  !== null && keeperZone  !== undefined) keeperHL  = keeperZone;
      render();
      flashScreen('flash-goal'); doShake(8, 20);
      showResult(
        iamShooter ? 'BUT ! 🎉' : 'BUT ! 😤',
        'goal',
        iamShooter ? 'Vous avez trompé le gardien !' : 'L\'adversaire a marqué !'
      );
      if (onDone) onDone();
    }
    updateScores();
  });
}

/* ══════════════════════════════════════
   FIN DE PARTIE
══════════════════════════════════════ */
function handleGameEnd(outcome, reason) {
  if (gameOver) return;
  gameOver = true; phase = 'idle';
  stopLocalTimer(); stopForfeitCountdown();

  var humanWon = (outcome === 'win');
  var isDraw   = (outcome === 'draw' || (scores.me === scores.op));

  var title, sub, emoji;
  if (isDraw && !humanWon) {
    emoji = '🤝'; title = 'Match nul !';
    sub = scores.me + ' buts — ' + scores.op + ' buts\nÉgalité parfaite !';
  } else if (humanWon) {
    emoji = '🏆'; title = 'Victoire ! 🏆';
    sub = scores.me + ' buts — ' + scores.op + ' buts\n' +
          (reason === 'forfeit' ? 'L\'adversaire a abandonné.' : 'Bravo, vous avez gagné !');
  } else {
    emoji = '😤'; title = 'Défaite';
    sub = scores.me + ' buts — ' + scores.op + ' buts\n' +
          (reason === 'forfeit' ? 'Vous avez abandonné.' : OP_NAME + ' remporte le match !');
  }

  showToast(emoji, title, sub, 5000, function(){
    var realOutcome = isDraw && scores.me === scores.op ? 'draw' : outcome;
    sendResult(realOutcome, reason || 'normal');
  });
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
function showToast(emoji, title, sub, delay, cb) {
  var el = document.getElementById('toast');
  document.getElementById('toast-emoji').textContent  = emoji;
  document.getElementById('toast-title').textContent  = title;
  document.getElementById('toast-sub').textContent    = sub;
  el.style.cssText = 'display:block;opacity:0;transform:translate(-50%,-50%) scale(0.8);transition:none;';
  setTimeout(function(){
    el.style.transition = 'all 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';
    el.style.opacity = '1'; el.style.transform = 'translate(-50%,-50%) scale(1)';
  }, 20);
  if (delay > 0) {
    setTimeout(function(){
      el.style.opacity = '0'; el.style.transform = 'translate(-50%,-50%) scale(0.85)';
      setTimeout(function(){ el.style.display = 'none'; if (cb) cb(); }, 300);
    }, delay);
  }
}
