<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe - Mindspille</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}
.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);transition:border-color 0.3s,box-shadow 0.3s,background 0.3s}
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.10)}
.profile.active.human-active .profile-avatar{box-shadow:0 0 18px rgba(220,235,255,0.5)}
.profile.active.ai-active .profile-avatar{box-shadow:0 0 18px rgba(231,76,60,0.5)}
.av-x{position:relative;width:28px;height:28px}
.av-x-arm{position:absolute;top:50%;left:50%;width:28px;height:6px;border-radius:3px;background:linear-gradient(90deg,#c8d8f0,#e2e8f0,#c8d8f0);box-shadow:0 2px 6px rgba(200,220,255,0.5);transform-origin:center}
.av-x-arm:nth-child(1){transform:translate(-50%,-50%) rotate(45deg)}
.av-x-arm:nth-child(2){transform:translate(-50%,-50%) rotate(-45deg)}
.av-o{width:24px;height:24px;border-radius:50%;border:5px solid #c0392b;box-shadow:0 0 10px rgba(192,57,43,0.6),inset 0 2px 4px rgba(255,120,100,0.3)}
.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;transition:color 0.3s}
.profile.active .profile-name{color:rgba(255,255,255,0.9)}
.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.timer-urgent .timer-arc{animation:urgentPulse 0.5s infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:0.4}}
.btn{background:rgba(255,255,255,0.10);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:99px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(255,255,255,0.25);transform:scale(0.95)}
.btn.active-cam{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.7);color:#fbbf24}
.btn-topview{display:flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border-radius:50%;flex-shrink:0;color:rgba(255,255,255,0.7);transition:all .2s}
.btn-topview.active-top{background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.7);color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.3)}
#wrap{flex:1 1 auto;position:relative;overflow:hidden;touch-action:none}
#manche-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:7px;align-items:center;z-index:15;pointer-events:none}
.mdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.07);transition:all .35s ease}
.mdot.win-w{background:#e2e8f0;border-color:#e2e8f0;box-shadow:0 0 12px rgba(200,220,255,.9)}
.mdot.win-r{background:#e74c3c;border-color:#e74c3c;box-shadow:0 0 12px rgba(231,76,60,.9)}
.mdot.draw-d{background:#fbbf24;border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.7)}
.mdot.current{border-color:rgba(255,255,255,.8);animation:pulse-dot 1s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}50%{box-shadow:0 0 0 5px rgba(255,255,255,0)}}
.mdot.tie{border-color:#fbbf24;border-style:dashed}
.manche-sep{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.3)}
#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif;text-align:center;padding:0 16px}
#reconn-bar{position:absolute;top:0;left:0;right:0;z-index:150;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none}
#reconn-bar.show{display:block}
#forfeit-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.95);border:1px solid rgba(251,191,36,0.5);border-radius:99px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#fbbf24;display:none;z-index:25;backdrop-filter:blur(8px)}
#forfeit-bar.show{display:block}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.sym-x-wrap{position:relative;width:72px;height:72px}
.sym-x-arm{position:absolute;top:50%;left:50%;width:64px;height:14px;border-radius:7px;background:linear-gradient(135deg,#f0f4ff,#c8d8f0,#dde6f0);box-shadow:0 4px 14px rgba(180,210,255,0.7);transform-origin:center}
.sym-x-arm:nth-child(1){transform:translate(-50%,-50%) rotate(45deg)}
.sym-x-arm:nth-child(2){transform:translate(-50%,-50%) rotate(-45deg)}
.sym-o-ring{width:66px;height:66px;border-radius:50%;border:13px solid #c0392b;box-shadow:0 0 0 3px #e74c3c,inset 0 3px 8px rgba(255,120,100,0.5),0 6px 20px rgba(192,57,43,0.7)}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px;white-space:pre-line}
#confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55}
#hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;pointer-events:none;z-index:5}
#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
.sw{color:#e2e8f0}.sr{color:#f87171}.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px}
</style>
</head>
<body>
<div id="top">
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#dde6f0"/></svg>
      <div class="profile-avatar" id="avatar-human"><div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div></div>
    </div>
    <div class="profile-name" id="name-human">Joueur 1</div>
  </div>
  <div class="top-center">
    <div class="score-row"><span class="snum sw" id="score-w">0</span><span class="ssep">–</span><span class="snum sr" id="score-r">0</span></div>
    <span class="manche-lbl" id="manche-lbl">Manche 1 / 5</span>
  </div>
  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/></svg>
      <div class="profile-avatar" id="avatar-ai"><div class="av-o"></div></div>
    </div>
    <div class="profile-name" id="name-ai">Joueur 2</div>
  </div>
</div>
<div id="wrap">
  <div id="loading"><div class="spin"></div><p id="loading-text">CONNEXION EN COURS…</p></div>
  <canvas id="confetti-canvas"></canvas>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
  <div id="manche-bar"></div>
  <div id="hint">👌 Pince = zoom · Glisse = tourner · Tap = jouer</div>
  <div id="toast"><div id="toast-emoji"></div><div id="toast-title"></div><div id="toast-sub"></div></div>
</div>
<div id="bot">
  <div style="display:flex;gap:7px;flex-shrink:0">
    <button class="btn btn-topview" id="btn-topview" title="Changer vue">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
    </button>
  </div>
  <div style="display:flex;gap:7px">
    <button class="btn" id="btn-cam">⟳ Auto</button>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script>
window.onerror=function(msg,url,line){var ld=document.getElementById('loading');if(ld)ld.querySelector('p').textContent='ERREUR: '+msg+' (L'+line+')';return false;};
(function(){
'use strict';
/* URL PARAMS */
var P=new URLSearchParams(window.location.search);
var ROOM_ID=P.get('room')||'';
var MY_SLOT=parseInt(P.get('player')||'1',10);
var P1_ID=P.get('p1Id')||'';
var P2_ID=P.get('p2Id')||'';
var P1_NAME=P.get('p1Name')||'Joueur 1';
var P2_NAME=P.get('p2Name')||'Joueur 2';
var BET_AMOUNT=parseFloat(P.get('bet')||'0');
var CURRENCY=P.get('currency')||'HTG';
var MY_SUPABASE_ID=MY_SLOT===1?P1_ID:P2_ID;
var OP_SUPABASE_ID=MY_SLOT===1?P2_ID:P1_ID;
var MY_NAME=MY_SLOT===1?P1_NAME:P2_NAME;
var OP_NAME=MY_SLOT===1?P2_NAME:P1_NAME;

/* SOCKET */
var socket=null,resultSent=false,forfeitTimer=null,forfeitCountdown=0;
function hideLoading(){var ld=document.getElementById('loading');if(ld){ld.style.opacity='0';ld.style.display='none';}}
function initSocket(){
  var lt=document.getElementById('loading-text');
  if(lt)lt.textContent='ROOM: '+(ROOM_ID||'?')+' | SLOT: '+MY_SLOT;
  socket=io({transports:['websocket','polling'],reconnection:true,reconnectionAttempts:Infinity,reconnectionDelay:1000,reconnectionDelayMax:5000,timeout:20000});
  socket.on('connect',function(){document.getElementById('reconn-bar').classList.remove('show');socket.emit('ttt:join',{gameId:ROOM_ID,playerId:MY_SUPABASE_ID,betAmount:BET_AMOUNT});});
  socket.on('disconnect',function(){if(!gameOver)document.getElementById('reconn-bar').classList.add('show');});
  socket.on('connect_error',function(){var lt=document.getElementById('loading-text');if(lt&&!gameReady)lt.textContent='CONNEXION IMPOSSIBLE — Vérifiez votre réseau';});
  socket.on('ttt:ready',function(data){
    humanSymbol=MY_SLOT===1?'X':'O';
    opponentSymbol=humanSymbol==='X'?'O':'X';
    hideLoading();startMultiGame();
  });
  socket.on('ttt:state',function(data){
    board=data.board;currentPlayer=data.curTurn;scores=data.scores;
    syncBoardVisual();gameReady=true;updUI();
  });
  socket.on('ttt:move',function(data){
    if(data.symbol===humanSymbol)return;
    applyRemoteMove(opponentSymbol,Math.floor(data.cell/3),data.cell%3);
  });
  socket.on('player:disconnected',function(){
    if(gameOver)return;
    document.getElementById('profile-ai').style.opacity='0.45';
    startForfeitCountdown(60);
  });
  socket.on('player:reconnected',function(data){
    stopForfeitCountdown();
    document.getElementById('profile-ai').style.opacity='1';
    showToast('✅','Adversaire reconnecté',data.message||'La partie reprend !',2500,null);
  });
  socket.on('game:over',function(d){
    if(gameOver)return;
    hideLoading();stopForfeitCountdown();
    if(d.result==='cancel'){
      gameOver=true;stopTimer();
      showToast('⚠️','Partie annulée','Les deux joueurs se sont déconnectés.',4000,function(){sendResult('cancel','both_disconnected');});
      return;
    }
    var iWon=d.winnerSupabaseId===MY_SUPABASE_ID||(d.winner==='player1'&&MY_SLOT===1)||(d.winner==='player2'&&MY_SLOT===2);
    handleMatchEnd(iWon,'forfeit');
  });
  socket.on('game:result',function(d){
    if(d.postMessage&&!gameOver){hideLoading();var iWon=d.postMessage.result==='win';handleMatchEnd(iWon,'forfeit');}
  });
}
function startForfeitCountdown(secs){
  stopForfeitCountdown();forfeitCountdown=secs;
  var bar=document.getElementById('forfeit-bar');bar.classList.add('show');
  function tick(){bar.textContent='⏳ Adversaire absent — victoire dans '+forfeitCountdown+'s';if(forfeitCountdown<=0){stopForfeitCountdown();return;}forfeitCountdown--;forfeitTimer=setTimeout(tick,1000);}
  tick();
}
function stopForfeitCountdown(){if(forfeitTimer){clearTimeout(forfeitTimer);forfeitTimer=null;}var bar=document.getElementById('forfeit-bar');if(bar)bar.classList.remove('show');forfeitCountdown=0;}
function sendResult(outcome,reason){
  if(resultSent)return;resultSent=true;
  var winnerId=outcome==='win'?MY_SUPABASE_ID:OP_SUPABASE_ID;
  var loserId=outcome==='win'?OP_SUPABASE_ID:MY_SUPABASE_ID;
  var msg={type:'game_result',game:'ttt',room:ROOM_ID,winner:winnerId,loser:loserId,bet:BET_AMOUNT,currency:CURRENCY,reason:reason||'normal',p1Id:P1_ID,p2Id:P2_ID};
  try{window.parent.postMessage(msg,'*');}catch(e){}
  if(socket&&socket.connected)socket.emit('ttt:match_over',{gameId:ROOM_ID,winner:outcome==='win'?humanSymbol:opponentSymbol,scores:scores});
}

/* GAME STATE */
var TOTAL_MANCHES=5;
var humanSymbol='X',opponentSymbol='O';
var board=[],meshes=[],currentPlayer='X';
var scores={X:0,O:0},mancheResults=[],isTiebreaker=false;
var mancheOver=false,gameOver=false,gameReady=false,isProcessing=false;
var mancheStarterSymbol='X';
var TIMER_DURATION=15000,CIRC=2*Math.PI*26;
var timerStart=null,timerRAF=null,timerActive=false;

/* THREE.JS */
var wrap=document.getElementById('wrap');
var scene=new THREE.Scene();scene.fog=new THREE.Fog(0x1e1b4b,18,55);
var camD=14,camPhi=0.72,camTheta=0,autoRotate=false;
var camera=new THREE.PerspectiveCamera(45,1,0.1,1000);
function setCam(){camera.position.set(camD*Math.sin(camPhi)*Math.sin(camTheta),camD*Math.cos(camPhi),camD*Math.sin(camPhi)*Math.cos(camTheta));camera.lookAt(0,0,0);}
setCam();
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
wrap.appendChild(renderer.domElement);
function resize(){var w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();var cc=document.getElementById('confetti-canvas');if(cc){cc.width=w;cc.height=h;}}
resize();window.addEventListener('resize',resize);
scene.add(new THREE.AmbientLight(0xffffff,0.45));
var dL=new THREE.DirectionalLight(0xffffff,0.85);dL.position.set(8,18,10);dL.castShadow=true;dL.shadow.mapSize.width=1024;dL.shadow.mapSize.height=1024;dL.shadow.camera.near=0.5;dL.shadow.camera.far=40;dL.shadow.camera.left=-8;dL.shadow.camera.right=8;dL.shadow.camera.top=8;dL.shadow.camera.bottom=-8;scene.add(dL);
var sL=new THREE.SpotLight(0xfbbf24,0.5);sL.position.set(-8,14,-5);sL.angle=Math.PI/6;sL.penumbra=0.5;scene.add(sL);
scene.add(new THREE.DirectionalLight(0x818cf8,0.3)).position.set(0,5,-10);
var boardGroup=new THREE.Group(),piecesGroup=new THREE.Group(),hlGroup=new THREE.Group(),particlesGroup=new THREE.Group(),winHlGroup=new THREE.Group();
[boardGroup,piecesGroup,hlGroup,particlesGroup,winHlGroup].forEach(function(g){scene.add(g);});
var base=new THREE.Mesh(new THREE.BoxGeometry(6.6,0.22,6.6),new THREE.MeshStandardMaterial({color:0x2d1f16,roughness:0.9}));base.position.y=-0.11;base.receiveShadow=true;boardGroup.add(base);
var surf=new THREE.Mesh(new THREE.BoxGeometry(6.0,0.12,6.0),new THREE.MeshStandardMaterial({color:0x1a1230,roughness:0.6,metalness:0.1}));surf.position.y=0.04;surf.receiveShadow=true;boardGroup.add(surf);
var lM=new THREE.MeshStandardMaterial({color:0xfbbf24,roughness:0.2,metalness:0.8,emissive:0xfbbf24,emissiveIntensity:0.08});
[-1,1].forEach(function(x){var v=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.18,6.0),lM);v.position.set(x,0.09,0);boardGroup.add(v);});
[-1,1].forEach(function(z){var h=new THREE.Mesh(new THREE.BoxGeometry(6.0,0.18,0.06),lM);h.position.set(0,0.09,z);boardGroup.add(h);});
for(var ci=0;ci<3;ci++)for(var cj=0;cj<3;cj++){var cell=new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.8),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));cell.rotation.x=-Math.PI/2;cell.position.set((cj-1)*2,0.2,(ci-1)*2);cell.userData.row=ci;cell.userData.col=cj;boardGroup.add(cell);}

/* CAMERA — 7 vues identiques Dames */
var topViewAnimating=false,camViewIdx=0;
var camViews=[{phi:0.72,toff:0,d:14},{phi:0.58,toff:Math.PI*0.30,d:14},{phi:0.55,toff:Math.PI*0.50,d:13},{phi:0.72,toff:Math.PI,d:14},{phi:0.55,toff:-Math.PI*0.50,d:13},{phi:0.58,toff:-Math.PI*0.30,d:14},{phi:0.06,toff:0,d:16}];
function animCamTo(tD,tPhi,tTheta,dur,onDone){var sD=camD,sPhi=camPhi,sTheta=camTheta,t0=Date.now();var dT=tTheta-sTheta;while(dT>Math.PI)dT-=Math.PI*2;while(dT<-Math.PI)dT+=Math.PI*2;topViewAnimating=true;function step(){var p=Math.min((Date.now()-t0)/dur,1);var e=p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;camD=sD+(tD-sD)*e;camPhi=sPhi+(tPhi-sPhi)*e;camTheta=sTheta+dT*e;setCam();if(p<1)requestAnimationFrame(step);else{camD=tD;camPhi=tPhi;camTheta=tTheta;setCam();topViewAnimating=false;if(onDone)onDone();}}requestAnimationFrame(step);}
var shake={active:false,t0:0,dur:2000,aX:0.20,aZ:0.15,fX:12,fZ:9,aP:0.12,fP:16};
function triggerShake(){shake.active=true;shake.t0=Date.now();}
function applyShake(){var gs=[boardGroup,piecesGroup,hlGroup,winHlGroup,particlesGroup];if(!shake.active){for(var i=0;i<gs.length;i++){gs[i].rotation.x=0;gs[i].rotation.z=0;gs[i].position.x=0;}return;}var el=(Date.now()-shake.t0)/1000,t=el/(shake.dur/1000);if(t>=1){shake.active=false;return;}var d=Math.pow(1-t,2.2);var rx=Math.sin(el*shake.fX)*shake.aX*d,rz=Math.sin(el*shake.fZ+1.1)*shake.aZ*d,px=Math.sin(el*shake.fP+0.5)*shake.aP*d;for(var i=0;i<gs.length;i++){gs[i].rotation.x=rx;gs[i].rotation.z=rz;gs[i].position.x=px;}}
document.getElementById('btn-topview').addEventListener('click',function(){if(topViewAnimating)return;camViewIdx=(camViewIdx+1)%camViews.length;var v=camViews[camViewIdx];animCamTo(v.d,v.phi,v.toff,720,null);triggerShake();autoRotate=false;document.getElementById('btn-cam').classList.remove('active-cam');document.getElementById('btn-topview').classList.toggle('active-top',camViewIdx!==0);});
document.getElementById('btn-cam').addEventListener('click',function(){autoRotate=!autoRotate;document.getElementById('btn-cam').classList[autoRotate?'add':'remove']('active-cam');});

/* PARTICLES */
var particles=[];
function createExplosion(x,y,z,color,count){count=count||25;var geo=new THREE.SphereGeometry(0.08,6,6),mat=new THREE.MeshBasicMaterial({color:color});for(var i=0;i<count;i++){var m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);m.userData={vel:new THREE.Vector3((Math.random()-.5)*.3,Math.random()*.4+.1,(Math.random()-.5)*.3),life:1.0,decay:0.015+Math.random()*.01};particlesGroup.add(m);particles.push(m);}}
function updateParticles(){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.userData.life-=p.userData.decay;p.position.add(p.userData.vel);p.userData.vel.y-=0.015;var s=Math.max(0,p.userData.life);p.scale.set(s,s,s);if(p.userData.life<=0){particlesGroup.remove(p);particles.splice(i,1);}}}

/* PIECES */
function makeX(row,col){var g=new THREE.Group(),mat=new THREE.MeshStandardMaterial({color:0xdde6f0,roughness:0.25,metalness:0.55});var a1=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.22,0.28),mat);a1.rotation.y=Math.PI/4;a1.castShadow=true;g.add(a1);var a2=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.22,0.28),mat);a2.rotation.y=-Math.PI/4;a2.castShadow=true;g.add(a2);g.position.set((col-1)*2,0.35,(row-1)*2);g.scale.set(0,0,0);g.userData={type:'X',row:row,col:col};piecesGroup.add(g);return g;}
function makeO(row,col){var g=new THREE.Group(),mat=new THREE.MeshStandardMaterial({color:0xc0392b,roughness:0.2,metalness:0.5});var ring=new THREE.Mesh(new THREE.TorusGeometry(0.55,0.18,16,48),mat);ring.rotation.x=Math.PI/2;ring.castShadow=true;g.add(ring);g.position.set((col-1)*2,0.35,(row-1)*2);g.scale.set(0,0,0);g.userData={type:'O',row:row,col:col};piecesGroup.add(g);return g;}
function animPop(mesh){var t0=Date.now(),DUR=750;function eoe(t){if(t===0||t===1)return t;var p=0.38,s=p/(2*Math.PI)*Math.asin(1);return Math.pow(2,-10*t)*Math.sin((t-s)*(2*Math.PI)/p)+1;}function eoc(t){return 1-Math.pow(1-t,3);}function loop(){var p=Math.min((Date.now()-t0)/DUR,1);var sv=Math.max(0,eoe(p));mesh.scale.set(sv,sv,sv);mesh.position.y=0.35+(1-eoc(Math.min(p*1.4,1)))*2.2;if(p<1)requestAnimationFrame(loop);else{mesh.scale.set(1,1,1);mesh.position.y=0.35;}}loop();}
function balloonPop(mesh,onComplete){var t0=Date.now(),ss=mesh.scale.x;createExplosion(mesh.position.x,mesh.position.y,mesh.position.z,mesh.userData.type==='X'?0xe2e8f0:0xe74c3c,22);function animate(){var p=(Date.now()-t0)/400;if(p<0.3){mesh.scale.setScalar(ss*(1+Math.sin(p*Math.PI*3.33)*0.3));}else if(p<0.5){mesh.scale.setScalar(ss*Math.max(0,1-(p-0.3)*5));mesh.rotation.y+=0.3;mesh.rotation.z+=0.2;}else{mesh.visible=false;if(onComplete)onComplete();return;}requestAnimationFrame(animate);}animate();}
function clearBoardSilent(onComplete){var all=[];for(var i=0;i<piecesGroup.children.length;i++)all.push(piecesGroup.children[i]);if(!all.length){if(onComplete)onComplete();return;}var done=0;all.forEach(function(piece,i){setTimeout(function(){var t0=Date.now();function shrink(){var p=(Date.now()-t0)/320;if(p<1){piece.scale.setScalar(1-p);requestAnimationFrame(shrink);}else{piecesGroup.remove(piece);done++;if(done===all.length&&onComplete)onComplete();}}shrink();},i*50);});}
function syncBoardVisual(){while(piecesGroup.children.length)piecesGroup.remove(piecesGroup.children[0]);meshes=[null,null,null,null,null,null,null,null,null];for(var i=0;i<9;i++){if(board[i]){var row=Math.floor(i/3),col=i%3;var m=board[i]==='X'?makeX(row,col):makeO(row,col);meshes[i]=m;m.scale.set(1,1,1);}}}
function clearHL(){while(hlGroup.children.length)hlGroup.remove(hlGroup.children[0]);}
function showHL(row,col){clearHL();var m=new THREE.Mesh(new THREE.CircleGeometry(0.75,32),new THREE.MeshBasicMaterial({color:0xfbbf24,transparent:true,opacity:0.18,side:THREE.DoubleSide}));m.position.set((col-1)*2,0.15,(row-1)*2);m.rotation.x=-Math.PI/2;hlGroup.add(m);}

/* GAME LOGIC */
var LINES=[
  [{row:0,col:0},{row:0,col:1},{row:0,col:2}],[{row:1,col:0},{row:1,col:1},{row:1,col:2}],[{row:2,col:0},{row:2,col:1},{row:2,col:2}],
  [{row:0,col:0},{row:1,col:0},{row:2,col:0}],[{row:0,col:1},{row:1,col:1},{row:2,col:1}],[{row:0,col:2},{row:1,col:2},{row:2,col:2}],
  [{row:0,col:0},{row:1,col:1},{row:2,col:2}],[{row:0,col:2},{row:1,col:1},{row:2,col:0}]
];
function idx(r,c){return r*3+c;}
function checkWin(b,player){for(var i=0;i<LINES.length;i++){var ln=LINES[i];if(b[idx(ln[0].row,ln[0].col)]===player&&b[idx(ln[1].row,ln[1].col)]===player&&b[idx(ln[2].row,ln[2].col)]===player)return ln;}return null;}
function isDraw(b){for(var i=0;i<9;i++)if(!b[i])return false;return true;}

function placeSymbol(sym,row,col){board[idx(row,col)]=sym;var m=sym==='X'?makeX(row,col):makeO(row,col);meshes[idx(row,col)]=m;animPop(m);}

function playCell(row,col){
  if(!gameReady||mancheOver||gameOver||isProcessing||board[idx(row,col)])return;
  if(currentPlayer!==humanSymbol)return;
  stopTimer();isProcessing=true;gameReady=false;
  placeSymbol(humanSymbol,row,col);
  if(socket&&socket.connected)socket.emit('ttt:move',{gameId:ROOM_ID,cell:idx(row,col),symbol:humanSymbol});
  clearHL();
  var win=checkWin(board,humanSymbol);
  if(win){handleWin(humanSymbol,win);return;}
  if(isDraw(board)){handleDraw();return;}
  currentPlayer=opponentSymbol;isProcessing=false;gameReady=true;updUI();
}

function applyRemoteMove(sym,row,col){
  if(gameOver||mancheOver)return;
  placeSymbol(sym,row,col);clearHL();
  var win=checkWin(board,sym);
  if(win){handleWin(sym,win);return;}
  if(isDraw(board)){handleDraw();return;}
  currentPlayer=humanSymbol;isProcessing=false;gameReady=true;updUI();
}

/* Win highlight */
var winPulseActive=false,winPulseObjs=[];
function showWinLineHL(winLine,winner){while(winHlGroup.children.length)winHlGroup.remove(winHlGroup.children[0]);var color=winner==='X'?0xe2e8f0:0xe74c3c;for(var i=0;i<3;i++){var cell=winLine[i];var disc=new THREE.Mesh(new THREE.CircleGeometry(0.85,40),new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.35,side:THREE.DoubleSide}));disc.rotation.x=-Math.PI/2;disc.position.set((cell.col-1)*2,0.18,(cell.row-1)*2);disc.userData.baseOpacity=0.35;winHlGroup.add(disc);var ring=new THREE.Mesh(new THREE.RingGeometry(0.7,0.88,40),new THREE.MeshBasicMaterial({color:winner==='X'?0xffffff:0xff4444,transparent:true,opacity:0.7,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.set((cell.col-1)*2,0.19,(cell.row-1)*2);ring.userData.baseOpacity=0.7;winHlGroup.add(ring);}winPulseObjs=winHlGroup.children.slice();}
function startWinPulse(pieces){winPulseActive=true;var t0=Date.now();function pulse(){if(!winPulseActive)return;var t=(Date.now()-t0)/1000;var s=1+Math.sin(t*5)*0.12;for(var i=0;i<pieces.length;i++)if(pieces[i].visible)pieces[i].scale.set(s,s,s);for(var j=0;j<winPulseObjs.length;j++){var o=winPulseObjs[j];o.material.opacity=o.userData.baseOpacity*(0.7+Math.sin(t*5)*0.3);}requestAnimationFrame(pulse);}pulse();}
function stopWinPulse(){winPulseActive=false;while(winHlGroup.children.length)winHlGroup.remove(winHlGroup.children[0]);winPulseObjs=[];}

function handleWin(winner,winLine){
  stopTimer();mancheOver=true;
  var humanWon=(winner===humanSymbol);
  if(humanWon){scores[humanSymbol]++;mancheResults.push('w');}else{scores[opponentSymbol]++;mancheResults.push('r');}
  mancheStarterSymbol=mancheStarterSymbol==='X'?'O':'X';updateDots();
  if(socket&&socket.connected)socket.emit('ttt:round_end',{gameId:ROOM_ID,scores:scores,round:mancheResults.length+1,nextStarter:mancheStarterSymbol,tieBreak:isTiebreaker});
  setTimeout(function(){
    var winPieces=[];for(var i=0;i<3;i++){var p=meshes[idx(winLine[i].row,winLine[i].col)];if(p)winPieces.push(p);}
    showWinLineHL(winLine,winner);startWinPulse(winPieces);
    setTimeout(function(){
      stopWinPulse();for(var i=0;i<winPieces.length;i++)winPieces[i].scale.set(1,1,1);
      var popped=0;winPieces.forEach(function(piece,i){setTimeout(function(){balloonPop(piece,function(){popped++;if(popped===winPieces.length)setTimeout(function(){clearBoardSilent(function(){finalizeManche(winner);});},200);});},i*250);});
    },2000);
  },620);
}

function handleDraw(){
  stopTimer();mancheOver=true;mancheResults.push('d');mancheStarterSymbol=mancheStarterSymbol==='X'?'O':'X';
  if(socket&&socket.connected)socket.emit('ttt:round_end',{gameId:ROOM_ID,scores:scores,round:mancheResults.length+1,nextStarter:mancheStarterSymbol,tieBreak:isTiebreaker});
  setTimeout(function(){clearBoardSilent(function(){finalizeManche(null);});},500);updateDots();
}

function finalizeManche(winner){
  var maxM=isTiebreaker?6:TOTAL_MANCHES;
  var left=maxM-mancheResults.length;
  var hS=scores[humanSymbol]||0,oS=scores[opponentSymbol]||0;
  var humanWon=winner&&(winner===humanSymbol);
  var decided=(oS+left<hS)||(hS+left<oS)||mancheResults.length>=maxM;
  updUI();
  if(decided){
    var matchWon=hS>oS,matchDraw=hS===oS;
    if(matchDraw&&!isTiebreaker){isTiebreaker=true;showToast('⚡','Égalité !','Manche décisive !',2500,function(){resetManche();});}
    else{handleMatchEnd(matchWon&&!matchDraw,'match');}
  }else{
    var rem=maxM-mancheResults.length;
    var starterName=mancheStarterSymbol===humanSymbol?MY_NAME:OP_NAME;
    var title=winner?(humanWon?'Manche gagnée !':OP_NAME+' gagne.'):'Nul !';
    var sub=rem+' manche'+(rem>1?'s':'')+' restante'+(rem>1?'s':'')+' • '+starterName+' commence';
    showToast(winner?(humanWon?'🏆':'😔'):'🤝',title,sub,2400,function(){resetManche();});
  }
}

function handleMatchEnd(humanWon,reason){
  gameOver=true;stopTimer();stopForfeitCountdown();
  var title=humanWon?'Vous avez gagné !':'Vous avez perdu.';
  var sub=humanWon?'Félicitations !':OP_NAME+' remporte la partie.';
  if(reason==='forfeit')sub=humanWon?"L'adversaire a abandonné.":'Vous avez abandonné.';
  if(humanWon)createConfetti();
  showToast(humanWon?'🏆':'😔',title,sub,4000,function(){sendResult(humanWon?'win':'loss',reason||'normal');});
}

function resetManche(){
  stopTimer();gameReady=false;mancheOver=false;isProcessing=false;
  board=[null,null,null,null,null,null,null,null,null];
  while(piecesGroup.children.length)piecesGroup.remove(piecesGroup.children[0]);
  meshes=[null,null,null,null,null,null,null,null,null];
  clearHL();currentPlayer=mancheStarterSymbol;
  gameReady=true;updUI();
}

function startMultiGame(){
  scores={X:0,O:0};mancheResults=[];isTiebreaker=false;gameOver=false;resultSent=false;
  mancheStarterSymbol='X';currentPlayer='X';
  var whoStarts=mancheStarterSymbol===humanSymbol?'Vous commencez':OP_NAME+' commence';
  updateDots();updUI();
  showToast('🎲','Partie commencée',whoStarts,2400,function(){resetManche();});
}

/* TIMER */
function stopTimer(){timerActive=false;if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}document.getElementById('timer-arc-human').style.strokeDashoffset=CIRC;document.getElementById('timer-arc-ai').style.strokeDashoffset=CIRC;document.getElementById('profile-human').classList.remove('active','human-active','timer-urgent');document.getElementById('profile-ai').classList.remove('active','ai-active','timer-urgent');}
function startTimer(isHuman){stopTimer();if(mancheOver||gameOver)return;timerActive=true;timerStart=Date.now();var arcId=isHuman?'timer-arc-human':'timer-arc-ai',profId=isHuman?'profile-human':'profile-ai';var arc=document.getElementById(arcId),prof=document.getElementById(profId);prof.classList.add('active',isHuman?'human-active':'ai-active');function tick(){if(!timerActive)return;var progress=Math.min((Date.now()-timerStart)/TIMER_DURATION,1);arc.style.strokeDashoffset=CIRC*progress;if(progress>=0.67)prof.classList.add('timer-urgent');if(progress<1)timerRAF=requestAnimationFrame(tick);else timerActive=false;}timerRAF=requestAnimationFrame(tick);}

/* UI */
function updateDots(){var bar=document.getElementById('manche-bar');bar.innerHTML='';var total=isTiebreaker?6:TOTAL_MANCHES;for(var i=0;i<total;i++){if(i===5){var sep=document.createElement('div');sep.className='manche-sep';bar.appendChild(sep);}var dot=document.createElement('div');dot.className='mdot';if(i===5)dot.classList.add('tie');if(i<mancheResults.length){if(mancheResults[i]==='w')dot.classList.add('win-w');else if(mancheResults[i]==='r')dot.classList.add('win-r');else dot.classList.add('draw-d');}else if(i===mancheResults.length&&!gameOver)dot.classList.add('current');bar.appendChild(dot);}}
function updUI(){var ahEl=document.getElementById('avatar-human'),aaEl=document.getElementById('avatar-ai');if(humanSymbol==='X'){ahEl.innerHTML='<div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>';aaEl.innerHTML='<div class="av-o"></div>';document.getElementById('timer-arc-human').setAttribute('stroke','#dde6f0');document.getElementById('timer-arc-ai').setAttribute('stroke','#e74c3c');}else{ahEl.innerHTML='<div class="av-o"></div>';aaEl.innerHTML='<div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>';document.getElementById('timer-arc-human').setAttribute('stroke','#e74c3c');document.getElementById('timer-arc-ai').setAttribute('stroke','#dde6f0');}document.getElementById('name-human').textContent=MY_NAME;document.getElementById('name-ai').textContent=OP_NAME;document.getElementById('score-w').textContent=scores[humanSymbol]||0;document.getElementById('score-r').textContent=scores[opponentSymbol]||0;var maxM=isTiebreaker?6:TOTAL_MANCHES;document.getElementById('manche-lbl').textContent='Manche '+Math.min(mancheResults.length+1,maxM)+' / '+maxM;if(mancheOver||gameOver)stopTimer();else startTimer(currentPlayer===humanSymbol);}

/* CONFETTI */
var confettiCanvas=document.getElementById('confetti-canvas'),confettiCtx=confettiCanvas.getContext('2d'),confettiParts=[],confettiActive=false;
function createConfetti(){var colors=['#fbbf24','#f59e0b','#e2e8f0','#ffffff','#818cf8','#c084fc'],shapes=['circle','square','triangle'];for(var i=0;i<150;i++)confettiParts.push({x:confettiCanvas.width/2,y:confettiCanvas.height/2,vx:(Math.random()-.5)*20,vy:(Math.random()-.5)*20-5,color:colors[Math.floor(Math.random()*colors.length)],shape:shapes[Math.floor(Math.random()*shapes.length)],size:Math.random()*10+5,rotation:Math.random()*360,rotSpeed:(Math.random()-.5)*10,gravity:0.3,drag:0.98,life:1.0});confettiActive=true;}
function updateConfetti(){if(!confettiActive)return;confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);var any=false;for(var i=confettiParts.length-1;i>=0;i--){var p=confettiParts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=p.drag;p.vy*=p.drag;p.rotation+=p.rotSpeed;p.life-=0.005;if(p.life>0&&p.y<confettiCanvas.height+50){any=true;confettiCtx.save();confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rotation*Math.PI/180);confettiCtx.globalAlpha=p.life;confettiCtx.fillStyle=p.color;if(p.shape==='circle'){confettiCtx.beginPath();confettiCtx.arc(0,0,p.size/2,0,Math.PI*2);confettiCtx.fill();}else if(p.shape==='square'){confettiCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);}else{confettiCtx.beginPath();confettiCtx.moveTo(0,-p.size/2);confettiCtx.lineTo(p.size/2,p.size/2);confettiCtx.lineTo(-p.size/2,p.size/2);confettiCtx.closePath();confettiCtx.fill();}confettiCtx.restore();}}if(!any){confettiActive=false;confettiParts=[];confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}}

/* TOAST */
function symHtml(sym){if(sym==='X')return '<div class="sym-x-wrap"><div class="sym-x-arm"></div><div class="sym-x-arm"></div></div>';if(sym==='O')return '<div class="sym-o-ring"></div>';return sym;}
function showToast(emoji,title,sub,delay,cb){var el=document.getElementById('toast');document.getElementById('toast-emoji').innerHTML=symHtml(emoji);document.getElementById('toast-title').textContent=title;document.getElementById('toast-sub').textContent=sub;el.style.cssText='display:block;opacity:0;transform:translate(-50%,-50%) scale(0.8);transition:none;';setTimeout(function(){el.style.transition='all 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1)';},20);setTimeout(function(){el.style.opacity='0';el.style.transform='translate(-50%,-50%) scale(0.85)';setTimeout(function(){el.style.display='none';if(cb)cb();},300);},delay);}

/* INPUT */
var raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
function getCell(cx,cy){var rect=renderer.domElement.getBoundingClientRect();mouse.x=((cx-rect.left)/rect.width)*2-1;mouse.y=-((cy-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);var hits=raycaster.intersectObjects(boardGroup.children);for(var i=0;i<hits.length;i++){var ud=hits[i].object.userData;if(ud.row!==undefined&&!board[idx(ud.row,ud.col)])return ud;}return null;}
function hoverTest(cx,cy){if(mancheOver||isProcessing||currentPlayer!==humanSymbol)return;var cell=getCell(cx,cy);if(cell)showHL(cell.row,cell.col);else clearHL();}
var isDragging=false,dragMoved=false,lastMX=0,lastMY=0,lastTouchDist=0;
renderer.domElement.addEventListener('mousedown',function(e){isDragging=true;dragMoved=false;lastMX=e.clientX;lastMY=e.clientY;});
renderer.domElement.addEventListener('mousemove',function(e){if(isDragging){var dx=e.clientX-lastMX,dy=e.clientY-lastMY;if(Math.abs(dx)+Math.abs(dy)>4)dragMoved=true;if(!topViewAnimating){camTheta-=dx*0.009;camPhi=Math.max(0.18,Math.min(1.45,camPhi-dy*0.007));setCam();}lastMX=e.clientX;lastMY=e.clientY;}else hoverTest(e.clientX,e.clientY);});
renderer.domElement.addEventListener('mouseup',function(e){if(!dragMoved){var cell=getCell(e.clientX,e.clientY);if(cell)playCell(cell.row,cell.col);}isDragging=false;});
renderer.domElement.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1){isDragging=true;dragMoved=false;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}else if(e.touches.length===2){isDragging=false;var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy);}},{passive:false});
renderer.domElement.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1&&isDragging){var dx=e.touches[0].clientX-lastMX,dy=e.touches[0].clientY-lastMY;if(Math.abs(dx)+Math.abs(dy)>5)dragMoved=true;if(!topViewAnimating){camTheta-=dx*0.010;camPhi=Math.max(0.18,Math.min(1.45,camPhi-dy*0.008));setCam();}lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}else if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);if(lastTouchDist>0){camD=Math.max(7,Math.min(24,camD+(lastTouchDist-dist)*0.035));setCam();}lastTouchDist=dist;}},{passive:false});
renderer.domElement.addEventListener('touchend',function(e){e.preventDefault();if(!dragMoved&&e.changedTouches.length){var t=e.changedTouches[0];var cell=getCell(t.clientX,t.clientY);if(cell)playCell(cell.row,cell.col);}isDragging=false;lastTouchDist=0;},{passive:false});

/* RENDER LOOP */
var at=0;
function renderLoop(){requestAnimationFrame(renderLoop);at+=0.016;if(autoRotate&&!topViewAnimating){camTheta+=0.004;setCam();}for(var i=0;i<hlGroup.children.length;i++)hlGroup.children[i].material.opacity=0.12+Math.sin(at*2)*0.08;for(var i=0;i<piecesGroup.children.length;i++){var p=piecesGroup.children[i];if(!p.userData.animating)p.rotation.y+=0.006;}applyShake();updateParticles();updateConfetti();renderer.render(scene,camera);}
renderLoop();

/* INIT */
initSocket();
})();
</script>
