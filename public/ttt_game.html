<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe 3D Pro - Multijoueur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#top {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.15);
  z-index: 20;
  gap: 8px;
}

.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 72px;
}

.profile-timer-wrap {
  position: relative;
  width: 58px;
  height: 58px;
}

.profile-timer-wrap svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.timer-track {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 4;
}

.timer-arc {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 163.4;
  stroke-dashoffset: 163.4;
  transition: stroke 0.3s;
}

.profile-avatar {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.12);
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
}

.profile.active .profile-avatar {
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.10);
}

.profile.active.human-active .profile-avatar {
  box-shadow: 0 0 18px rgba(220,235,255,0.5);
}

.profile.active.ai-active .profile-avatar {
  box-shadow: 0 0 18px rgba(231,76,60,0.5);
}

/* X symbol */
.av-x { position: relative; width: 28px; height: 28px; }
.av-x-arm {
  position: absolute; top: 50%; left: 50%;
  width: 28px; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, #c8d8f0, #e2e8f0, #c8d8f0);
  box-shadow: 0 2px 6px rgba(200,220,255,0.5);
  transform-origin: center;
}
.av-x-arm:nth-child(1) { transform: translate(-50%,-50%) rotate(45deg); }
.av-x-arm:nth-child(2) { transform: translate(-50%,-50%) rotate(-45deg); }

/* O symbol */
.av-o {
  width: 24px; height: 24px; border-radius: 50%;
  border: 5px solid #c0392b;
  box-shadow: 0 0 10px rgba(192,57,43,0.6), inset 0 2px 4px rgba(255,120,100,0.3);
}

.profile-name {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  transition: color 0.3s;
}

.profile.active .profile-name { color: rgba(255,255,255,0.9); }

.top-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.timer-urgent .timer-arc { animation: urgentPulse 0.5s infinite alternate; }
@keyframes urgentPulse { from { opacity: 1; } to { opacity: 0.4; } }

.btns { display: flex; gap: 7px; }

.btn {
  background: rgba(255,255,255,0.10);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 99px;
  padding: 6px 13px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
.btn.active-cam { background: rgba(251,191,36,0.25); border-color: rgba(251,191,36,0.7); color: #fbbf24; }

.btn-topview {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  padding: 0;
  border-radius: 50%;
  flex-shrink: 0;
  color: rgba(255,255,255,0.7);
  transition: all .2s;
}

.btn-topview.active-top {
  background: rgba(251,191,36,0.2);
  border-color: rgba(251,191,36,0.7);
  color: #fbbf24;
  box-shadow: 0 0 12px rgba(251,191,36,0.3);
}

#wrap {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

/* Manche dots */
#manche-bar {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 7px;
  align-items: center;
  z-index: 15;
  pointer-events: none;
}

.mdot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.07);
  transition: all .35s ease;
}

.mdot.win-x { background: #e2e8f0; border-color: #e2e8f0; box-shadow: 0 0 12px rgba(200,220,255,.9); }
.mdot.win-o { background: #e74c3c; border-color: #e74c3c; box-shadow: 0 0 12px rgba(231,76,60,.9); }
.mdot.draw-d { background: #fbbf24; border-color: #fbbf24; box-shadow: 0 0 12px rgba(251,191,36,.7); }
.mdot.current { border-color: rgba(255,255,255,.8); animation: pulse-dot 1s infinite; }
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,.4); }
  50% { box-shadow: 0 0 0 5px rgba(255,255,255,.0); }
}
.mdot.tie { border-color: #fbbf24; border-style: dashed; }
.manche-sep { width: 2px; height: 2px; border-radius: 50%; background: rgba(255,255,255,.3); }

/* Loading */
#loading {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity .6s;
}

.spin {
  width: 52px; height: 52px;
  border: 4px solid rgba(255,255,255,.08);
  border-top-color: #fbbf24;
  border-radius: 50%;
  animation: sp 1s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

#loading p {
  color: rgba(255,255,255,.55);
  margin-top: 16px;
  font-size: 11px;
  letter-spacing: 4px;
  font-family: 'Cinzel', serif;
  text-align: center;
  padding: 0 16px;
}

/* Toast */
#toast {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, rgba(30,27,75,.97), rgba(49,46,129,.97));
  border: 1.5px solid rgba(251,191,36,.6);
  border-radius: 20px;
  padding: 28px 32px;
  text-align: center;
  pointer-events: none;
  z-index: 40;
  display: none;
  box-shadow: 0 15px 50px rgba(0,0,0,.6);
  min-width: 220px;
}

#toast-emoji {
  font-size: 48px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Toast symbol renders */
.sym-x-wrap { position: relative; width: 72px; height: 72px; }
.sym-x-arm {
  position: absolute; top: 50%; left: 50%;
  width: 64px; height: 14px; border-radius: 7px;
  background: linear-gradient(135deg, #f0f4ff, #c8d8f0, #dde6f0);
  box-shadow: 0 4px 14px rgba(180,210,255,0.7), 0 0 0 2px rgba(255,255,255,0.3);
  transform-origin: center center;
}
.sym-x-arm:nth-child(1) { transform: translate(-50%,-50%) rotate(45deg); }
.sym-x-arm:nth-child(2) { transform: translate(-50%,-50%) rotate(-45deg); }

.sym-o-ring {
  width: 66px; height: 66px; border-radius: 50%;
  background: transparent;
  border: 13px solid #c0392b;
  box-shadow: 0 0 0 3px #e74c3c, inset 0 3px 8px rgba(255,120,100,0.5), 0 6px 20px rgba(192,57,43,0.7), 0 0 30px rgba(231,76,60,0.4);
  position: relative;
}
.sym-o-ring::after {
  content: ''; position: absolute; top: 6px; left: 10px;
  width: 18px; height: 8px; border-radius: 50%;
  background: rgba(255,180,160,0.45);
  transform: rotate(-20deg);
}

#toast-title { font-family: 'Cinzel', serif; color: #fbbf24; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
#toast-sub { font-size: 12px; color: rgba(255,255,255,.6); letter-spacing: 1px; white-space: pre-line; }

/* Confetti */
#confetti-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 55;
}

/* Score */
.score-row { display: flex; gap: 8px; align-items: center; }
.snum { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; display: inline-block; }
.sw { color: #e2e8f0; }
.sr { color: #f87171; }
.ssep { color: rgba(255,255,255,.3); font-size: 13px; }
.manche-lbl { font-size: 9px; color: rgba(255,255,255,.35); letter-spacing: 1px; }

/* Score animations */
@keyframes scoreX {
  0%   { transform: translateY(-32px) scale(0.4) rotate(-8deg); opacity: 0; }
  40%  { transform: translateY(6px)   scale(1.35) rotate(3deg);  opacity: 1; }
  60%  { transform: translateY(-4px)  scale(0.92) rotate(-2deg); }
  75%  { transform: translateY(3px)   scale(1.08) rotate(1deg); }
  88%  { transform: translateY(-2px)  scale(0.97) rotate(0deg); }
  100% { transform: translateY(0)     scale(1)    rotate(0deg);  opacity: 1; }
}
@keyframes scoreO {
  0%   { transform: translateY(28px) scale(0.3) rotate(12deg); opacity: 0; }
  35%  { transform: translateY(-5px) scale(1.4)  rotate(-4deg); opacity: 1; }
  55%  { transform: translateY(3px)  scale(0.88) rotate(2deg); }
  72%  { transform: translateY(-2px) scale(1.06) rotate(-1deg); }
  86%  { transform: translateY(1px)  scale(0.98) rotate(0deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg);  opacity: 1; }
}
.score-anim-x { animation: scoreX 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.score-anim-o { animation: scoreO 0.68s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

@keyframes scoreGlowX {
  0%   { text-shadow: 0 0 0px #e2e8f0; }
  30%  { text-shadow: 0 0 22px #ffffff, 0 0 40px #b0ccff; }
  100% { text-shadow: none; }
}
@keyframes scoreGlowO {
  0%   { text-shadow: 0 0 0px #f87171; }
  30%  { text-shadow: 0 0 22px #ff8888, 0 0 40px #ff4444; }
  100% { text-shadow: none; }
}
.score-glow-x { animation: scoreGlowX 0.9s ease-out forwards; }
.score-glow-o { animation: scoreGlowO 0.9s ease-out forwards; }

/* Reconnect bar */
#reconn-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 150;
  background: rgba(120,20,20,0.92);
  color: #fff;
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 1.5px;
  text-align: center;
  padding: 8px;
  display: none;
}
#reconn-bar.show { display: block; }

/* Forfeit bar */
#forfeit-bar {
  position: absolute;
  bottom: 60px; left: 50%;
  transform: translateX(-50%);
  background: rgba(30,27,75,0.95);
  border: 1px solid rgba(251,191,36,0.5);
  border-radius: 99px;
  padding: 8px 20px;
  font-family: 'Cinzel', serif;
  font-size: 12px; color: #fbbf24;
  display: none; z-index: 25;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
#forfeit-bar.show { display: block; }

#hint {
  position: absolute;
  bottom: 4px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: rgba(255,255,255,.22);
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
}

#bot {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.15);
  z-index: 20;
}
</style>
</head>
<body>

<div id="top">
  <!-- Joueur local (moi) -->
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#dde6f0"/>
      </svg>
      <div class="profile-avatar" id="avatar-human">
        <div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>
      </div>
    </div>
    <div class="profile-name" id="name-human">Vous</div>
  </div>

  <!-- Centre -->
  <div class="top-center">
    <div class="score-row">
      <span class="snum sw" id="score-x">0</span>
      <span class="ssep">–</span>
      <span class="snum sr" id="score-o">0</span>
    </div>
    <span class="manche-lbl" id="manche-lbl">Manche 1 / 5</span>
  </div>

  <!-- Adversaire -->
  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/>
      </svg>
      <div class="profile-avatar" id="avatar-ai">
        <div class="av-o"></div>
      </div>
    </div>
    <div class="profile-name" id="name-ai">Adversaire</div>
  </div>
</div>

<div id="wrap">
  <div id="loading">
    <div class="spin"></div>
    <p id="loading-text">CONNEXION EN COURS…</p>
  </div>
  <canvas id="confetti-canvas"></canvas>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
  <div id="manche-bar"></div>
  <div id="hint">👌 Pince = zoom · Glisse = tourner · Tap = jouer</div>
  <div id="toast">
    <div id="toast-emoji"></div>
    <div id="toast-title"></div>
    <div id="toast-sub"></div>
  </div>
</div>

<div id="bot">
  <div style="display:flex;gap:7px;flex-shrink:0;">
    <button class="btn btn-topview" id="btn-topview" title="Changer vue">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/>
        <line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/>
        <line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/>
        <line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/>
        <line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/>
        <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
      </svg>
    </button>
  </div>
  <div class="btns">
    <button class="btn" id="btn-cam">⟳ Auto</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script>
window.onerror = function(msg, url, line, col, err) {
  var ld = document.getElementById('loading');
  if (ld) ld.querySelector('p').textContent = 'ERREUR JS: ' + msg + ' (L' + line + ')';
  return false;
};

(function() {
'use strict';

/* ══════════════════════════════════════════
   URL PARAMS — même pattern que dames_multi
══════════════════════════════════════════ */
var P          = new URLSearchParams(window.location.search);
var ROOM_ID    = P.get('room')     || '';
var MY_SLOT    = parseInt(P.get('player') || '1', 10);
var P1_ID      = P.get('p1Id')     || '';
var P2_ID      = P.get('p2Id')     || '';
var P1_NAME    = P.get('p1Name')   || 'Joueur 1';
var P2_NAME    = P.get('p2Name')   || 'Joueur 2';
var BET_AMOUNT = parseFloat(P.get('bet') || '0');
var CURRENCY   = P.get('currency') || 'HTG';

if (!ROOM_ID && P1_ID && P2_ID) {
  var _ids = [P1_ID, P2_ID].sort();
  ROOM_ID = 'ttt-' + _ids[0].slice(-8) + '-' + _ids[1].slice(-8);
}
if (!ROOM_ID) { ROOM_ID = P.get('gameId') || P.get('matchId') || ''; }

/* Slot 1 = X, Slot 2 = O */
var MY_SYMBOL      = MY_SLOT === 1 ? 'X' : 'O';
var OP_SYMBOL      = MY_SLOT === 1 ? 'O' : 'X';
var MY_SUPABASE_ID = MY_SLOT === 1 ? P1_ID : P2_ID;
var OP_SUPABASE_ID = MY_SLOT === 1 ? P2_ID : P1_ID;
var MY_NAME        = MY_SLOT === 1 ? P1_NAME : P2_NAME;
var OP_NAME        = MY_SLOT === 1 ? P2_NAME : P1_NAME;

/* ══════════════════════════════════════════
   ÉTAT
══════════════════════════════════════════ */
var TOTAL_MANCHES = 5;
var socket        = null;
var resultSent    = false;
var forfeitTimer  = null;
var forfeitCd     = 0;

var gameOver      = false;
var isProcessing  = false;
var gameReady     = false;

var TIMER_DURATION = 30000;
var CIRC           = 2 * Math.PI * 26; // ≈163.4
var timerStart     = null;
var timerRAF       = null;
var timerActive    = false;
var graceRAF       = null;
var graceActive    = false;

/* Logique de partie */
var board         = [null,null,null,null,null,null,null,null,null];
var currentSymbol = 'X'; // X commence toujours
var manchesDone   = 0;
var mancheResults = []; // 'x','o','d'
var scores        = { X: 0, O: 0 };
var isTiebreaker  = false;
var nextStarter   = 'X';
var mancheOver    = false;
var meshes        = [null,null,null,null,null,null,null,null,null];

/* ══════════════════════════════════════════
   SOCKET.IO
══════════════════════════════════════════ */
function hideLoading() {
  var el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; el.style.display = 'none'; }
}

function emitJoin() {
  socket.emit('ttt:join', {
    gameId:    ROOM_ID,
    playerId:  MY_SUPABASE_ID,
    betAmount: BET_AMOUNT
  });
}

function initSocket() {
  var lt = document.getElementById('loading-text');
  if (lt) lt.textContent = 'ROOM: ' + (ROOM_ID || 'MANQUANT') + ' | SLOT: ' + MY_SLOT;

  socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });

  socket.on('connect', function() {
    document.getElementById('reconn-bar').classList.remove('show');
    emitJoin();
  });

  socket.on('disconnect', function() {
    if (!gameOver) document.getElementById('reconn-bar').classList.add('show');
  });

  socket.on('connect_error', function() {
    var lt = document.getElementById('loading-text');
    if (lt && !gameReady) lt.textContent = 'CONNEXION IMPOSSIBLE — Vérifiez votre réseau';
  });

  /* ── Les deux joueurs sont connectés — démarrer ── */
  socket.on('ttt:ready', function(data) {
    hideLoading();
    /* data.symbol = 'X' ou 'O' (confirmé par le serveur) */
    MY_SYMBOL = data.symbol;
    OP_SYMBOL = MY_SYMBOL === 'X' ? 'O' : 'X';
    startFreshMatch();
  });

  /* ── Reconnexion avec état complet ── */
  socket.on('ttt:state', function(data) {
    hideLoading();
    MY_SYMBOL = data.symbol;
    OP_SYMBOL = MY_SYMBOL === 'X' ? 'O' : 'X';
    board         = data.board;
    currentSymbol = data.curTurn;
    scores        = data.scores || { X: 0, O: 0 };
    manchesDone   = data.round ? data.round - 1 : 0;
    isTiebreaker  = data.tieBreak || false;
    nextStarter   = data.nextStarter || 'X';
    mancheResults = [];

    /* Reconstituer mancheResults depuis les scores */
    var xW = scores.X, oW = scores.O;
    for (var i = 0; i < xW; i++) mancheResults.push('x');
    for (var i = 0; i < oW; i++) mancheResults.push('o');

    syncPiecesFromBoard();
    updateDots();

    showToast('📶', 'Connexion rétablie', 'La partie reprend !', 2000, function() {
      gameReady = true;
      mancheOver = false;
      updUI();
    });
  });

  /* ── Coup de l'adversaire ── */
  socket.on('ttt:move', function(data) {
    if (data.symbol === MY_SYMBOL) return; /* ignore echo */
    if (mancheOver || gameOver) return;
    applyRemoteMove(data.cell, data.symbol);
  });

  /* ── Timer serveur : début de tour ── */
  socket.on('ttt:turn_start', function(data) {
    if (gameOver || !gameReady) return;
    stopGraceTimer();
    var isMyTurn = (data.symbol === MY_SYMBOL);
    startTimer(isMyTurn, data.startTime);
  });

  /* ── Timer serveur : période de grâce (30s épuisées) ── */
  socket.on('ttt:turn_warning', function(data) {
    if (gameOver) return;
    var isMyTurn = (data.symbol === MY_SYMBOL);
    startGraceTimer(isMyTurn, data.startTime, data.duration);
  });

  /* ── Resynchronisation du timer après reconnexion ── */
  socket.on('ttt:turn_sync', function(data) {
    if (gameOver || !gameReady) return;
    var isMyTurn = (data.turnSymbol === MY_SYMBOL);
    var now = Date.now();
    if (data.graceStartTime) {
      startGraceTimer(isMyTurn, data.graceStartTime + (now - data.serverTime), 60000);
    } else if (data.turnStartTime) {
      startTimer(isMyTurn, data.turnStartTime + (now - data.serverTime));
    }
  });

  /* ── Fin de partie (serveur) ── */
  socket.on('ttt:over', function(d) {
    if (gameOver) return;
    hideLoading();
    stopForfeitCountdown();
    var iWon = d.winnerSupabaseId === MY_SUPABASE_ID ||
               (d.winner === 'player1' && MY_SLOT === 1) ||
               (d.winner === 'player2' && MY_SLOT === 2);
    handleMatchEnd(iWon ? MY_SYMBOL : OP_SYMBOL, d.reason || 'normal');
  });

  socket.on('game:over', function(d) {
    if (gameOver) return;
    hideLoading();
    stopForfeitCountdown();
    if (d.result === 'cancel') {
      gameOver = true; stopTimer();
      showToast('⚠️', 'Partie annulée', 'Les deux joueurs se sont déconnectés.', 4000, function() {
        sendResult('cancel', 'both_disconnected');
      });
      return;
    }
    var iWon = d.winnerSupabaseId === MY_SUPABASE_ID ||
               (d.winner === 'player1' && MY_SLOT === 1) ||
               (d.winner === 'player2' && MY_SLOT === 2);
    handleMatchEnd(iWon ? MY_SYMBOL : OP_SYMBOL, d.reason || 'forfeit');
  });

  socket.on('game:result', function(d) {
    if (d.postMessage && !gameOver) {
      hideLoading();
      var iWon = d.postMessage.result === 'win';
      handleMatchEnd(iWon ? MY_SYMBOL : OP_SYMBOL, 'forfeit');
    }
  });

  /* ── Adversaire déconnecté ── */
  socket.on('player:disconnected', function(data) {
    if (gameOver) return;
    startForfeitCountdown(60);
  });

  socket.on('player:reconnected', function(data) {
    stopForfeitCountdown();
    showToast('✅', 'Adversaire reconnecté', data.message || 'La partie reprend !', 2000, function() {
      if (gameReady && !gameOver) updUI();
    });
  });
}

/* ══════════════════════════════════════════
   FORFEIT COUNTDOWN
══════════════════════════════════════════ */
function startForfeitCountdown(seconds) {
  stopForfeitCountdown();
  forfeitCd = seconds;
  var bar = document.getElementById('forfeit-bar');
  bar.classList.add('show');
  function tick() {
    bar.textContent = '⏳ Adversaire absent — victoire dans ' + forfeitCd + 's';
    if (forfeitCd <= 0) { stopForfeitCountdown(); return; }
    forfeitCd--;
    forfeitTimer = setTimeout(tick, 1000);
  }
  tick();
}

function stopForfeitCountdown() {
  if (forfeitTimer) { clearTimeout(forfeitTimer); forfeitTimer = null; }
  var bar = document.getElementById('forfeit-bar');
  if (bar) bar.classList.remove('show');
  forfeitCd = 0;
}

/* ══════════════════════════════════════════
   SEND RESULT
══════════════════════════════════════════ */
function sendResult(outcome, reason) {
  if (resultSent) return;
  resultSent = true;
  var winnerId = outcome === 'win' ? MY_SUPABASE_ID : OP_SUPABASE_ID;
  var loserId  = outcome === 'win' ? OP_SUPABASE_ID : MY_SUPABASE_ID;
  var msg = {
    type: 'game_result', game: 'ttt', room: ROOM_ID,
    winner: winnerId, loser: loserId,
    bet: BET_AMOUNT, currency: CURRENCY,
    reason: reason || 'normal', p1Id: P1_ID, p2Id: P2_ID
  };
  try { window.parent.postMessage(msg, '*'); } catch(e) {}
  if (socket && socket.connected) socket.emit('ttt:match_over', {
    gameId: ROOM_ID,
    winner: MY_SLOT === 1 ? (outcome === 'win' ? 'X' : 'O') : (outcome === 'win' ? 'O' : 'X'),
    scores: scores
  });
}

/* ══════════════════════════════════════════
   PARTICULES
══════════════════════════════════════════ */
var particles = [];

function createExplosion(x, y, z, color, count) {
  count = count || 30;
  var geo = new THREE.SphereGeometry(0.08, 8, 8);
  var mat = new THREE.MeshBasicMaterial({ color: color });
  for (var i = 0; i < count; i++) {
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData = {
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.3,
        Math.random() * 0.4 + 0.1,
        (Math.random() - 0.5) * 0.3
      ),
      life: 1.0,
      decay: 0.015 + Math.random() * 0.01
    };
    particlesGroup.add(mesh);
    particles.push(mesh);
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.userData.life -= p.userData.decay;
    p.position.add(p.userData.velocity);
    p.userData.velocity.y -= 0.015;
    var s = Math.max(0, p.userData.life);
    p.scale.set(s, s, s);
    if (p.userData.life <= 0) { particlesGroup.remove(p); particles.splice(i, 1); }
  }
}

/* ══════════════════════════════════════════
   PIÈCES 3D
══════════════════════════════════════════ */
function makeX(row, col) {
  var g = new THREE.Group();
  var mat = new THREE.MeshStandardMaterial({ color: 0xdde6f0, roughness: 0.25, metalness: 0.55 });
  var arm1 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.22, 0.28), mat);
  arm1.rotation.y = Math.PI / 4; arm1.castShadow = true;
  var arm2 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.22, 0.28), mat);
  arm2.rotation.y = -Math.PI / 4; arm2.castShadow = true;
  g.add(arm1); g.add(arm2);
  g.position.set((col - 1) * 2, 0.35, (row - 1) * 2);
  g.scale.set(0, 0, 0);
  g.userData = { type: 'X', row: row, col: col };
  piecesGroup.add(g);
  return g;
}

function makeO(row, col) {
  var g = new THREE.Group();
  var mat = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.2, metalness: 0.5 });
  var ring = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.18, 16, 48), mat);
  ring.rotation.x = Math.PI / 2; ring.castShadow = true;
  var shineMat = new THREE.MeshStandardMaterial({
    color: 0xff6b6b, roughness: 0.1, metalness: 0.8,
    emissive: 0xff2222, emissiveIntensity: 0.12
  });
  var inner = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.06, 8, 48), shineMat);
  inner.rotation.x = Math.PI / 2;
  g.add(ring); g.add(inner);
  g.position.set((col - 1) * 2, 0.35, (row - 1) * 2);
  g.scale.set(0, 0, 0);
  g.userData = { type: 'O', row: row, col: col };
  piecesGroup.add(g);
  return g;
}

function animPop(mesh) {
  var t0 = Date.now(), DUR = 750;
  function eoe(t) {
    if (t === 0 || t === 1) return t;
    var p = 0.38, s = p / (2 * Math.PI) * Math.asin(1);
    return Math.pow(2, -10 * t) * Math.sin((t - s) * (2 * Math.PI) / p) + 1;
  }
  function eoc(t) { return 1 - Math.pow(1 - t, 3); }
  function loop() {
    var pr = Math.min((Date.now() - t0) / DUR, 1);
    mesh.scale.set(Math.max(0, eoe(pr)), Math.max(0, eoe(pr)), Math.max(0, eoe(pr)));
    mesh.position.y = 0.35 + (1 - eoc(Math.min(pr * 1.4, 1))) * 2.2;
    if (pr < 1) requestAnimationFrame(loop);
    else { mesh.scale.set(1, 1, 1); mesh.position.y = 0.35; }
  }
  loop();
}

function balloonPop(mesh, onComplete) {
  var t0 = Date.now(), ss = mesh.scale.x;
  var colors = mesh.userData.type === 'X' ? [0xe2e8f0, 0xffffff, 0xfbbf24] : [0xe74c3c, 0xff6b6b, 0xfbbf24];
  for (var i = 0; i < 3; i++) {
    (function(idx) {
      setTimeout(function() {
        createExplosion(mesh.position.x + (Math.random()-.5)*.5, mesh.position.y, mesh.position.z + (Math.random()-.5)*.5, colors[idx % 3], 20);
      }, idx * 100);
    })(i);
  }
  function animate() {
    var p = (Date.now() - t0) / 400;
    if (p < 0.3) { mesh.scale.setScalar(ss * (1 + Math.sin(p * Math.PI * 3.33) * 0.3)); }
    else if (p < 0.5) { mesh.scale.setScalar(ss * Math.max(0, 1 - (p - 0.3) * 5)); mesh.rotation.y += 0.3; mesh.rotation.z += 0.2; }
    else { mesh.visible = false; if (onComplete) onComplete(); return; }
    requestAnimationFrame(animate);
  }
  animate();
}

function clearBoardSilent(onComplete) {
  var all = piecesGroup.children.slice();
  if (!all.length) { if (onComplete) onComplete(); return; }
  var done = 0;
  all.forEach(function(piece, i) {
    setTimeout(function() {
      var t0 = Date.now();
      function shrink() {
        var p = (Date.now() - t0) / 320;
        if (p < 1) { var sc = 1 - p; piece.scale.set(sc, sc, sc); requestAnimationFrame(shrink); }
        else { piece.scale.set(0,0,0); piecesGroup.remove(piece); done++; if (done === all.length && onComplete) onComplete(); }
      }
      shrink();
    }, i * 50);
  });
}

function syncPiecesFromBoard() {
  while (piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
  meshes = [null,null,null,null,null,null,null,null,null];
  for (var i = 0; i < 9; i++) {
    if (board[i]) {
      var row = Math.floor(i / 3), col = i % 3;
      var m = board[i] === 'X' ? makeX(row, col) : makeO(row, col);
      meshes[i] = m;
      m.scale.set(1, 1, 1);
    }
  }
}

/* ══════════════════════════════════════════
   LOGIQUE TTT
══════════════════════════════════════════ */
var LINES = [
  [{r:0,c:0},{r:0,c:1},{r:0,c:2}],
  [{r:1,c:0},{r:1,c:1},{r:1,c:2}],
  [{r:2,c:0},{r:2,c:1},{r:2,c:2}],
  [{r:0,c:0},{r:1,c:0},{r:2,c:0}],
  [{r:0,c:1},{r:1,c:1},{r:2,c:1}],
  [{r:0,c:2},{r:1,c:2},{r:2,c:2}],
  [{r:0,c:0},{r:1,c:1},{r:2,c:2}],
  [{r:0,c:2},{r:1,c:1},{r:2,c:0}]
];

function idx(r, c) { return r * 3 + c; }

function checkWin(b, sym) {
  for (var li = 0; li < LINES.length; li++) {
    var ln = LINES[li];
    if (b[idx(ln[0].r, ln[0].c)] === sym &&
        b[idx(ln[1].r, ln[1].c)] === sym &&
        b[idx(ln[2].r, ln[2].c)] === sym) return ln;
  }
  return null;
}

function isDraw(b) {
  for (var i = 0; i < 9; i++) if (!b[i]) return false;
  return true;
}

/* ══════════════════════════════════════════
   HIGHLIGHT PLATEAU
══════════════════════════════════════════ */
function clearHL() {

}

function showHL(row, col) {

}

/* Win glow */
var winPulseActive = false;
var winPulseObjects = [];

function showWinLineHL(winLine, sym) {
  while (winHlGroup.children.length) winHlGroup.remove(winHlGroup.children[0]);
  var color   = sym === 'X' ? 0xe2e8f0 : 0xe74c3c;

    );

    disc.position.set((cell.c - 1) * 2, 0.18, (cell.r - 1) * 2);
    disc.userData.baseOpacity = 0.35;
    winHlGroup.add(disc);
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(0.7, 0.88, 40),
      new THREE.MeshBasicMaterial({ color: emColor, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set((cell.c - 1) * 2, 0.19, (cell.r - 1) * 2);
    ring.userData.baseOpacity = 0.7;
    winHlGroup.add(ring);
  }
  winPulseObjects = winHlGroup.children.slice();
}

function startWinPulse(pieces) {
  winPulseActive = true;
  var t0 = Date.now();
  function pulse() {
    if (!winPulseActive) return;
    var t = (Date.now() - t0) / 1000;
    var s = 1 + Math.sin(t * 5) * 0.12;
    for (var i = 0; i < pieces.length; i++) if (pieces[i].visible) pieces[i].scale.set(s, s, s);
    for (var j = 0; j < winPulseObjects.length; j++) {
      var o = winPulseObjects[j];
      o.material.opacity = o.userData.baseOpacity * (0.7 + Math.sin(t * 5) * 0.3);
    }
    requestAnimationFrame(pulse);
  }
  pulse();
}

function stopWinPulse() {
  winPulseActive = false;
  while (winHlGroup.children.length) winHlGroup.remove(winHlGroup.children[0]);
  winPulseObjects = [];
}

/* ══════════════════════════════════════════
   ACTIONS DE JEU
══════════════════════════════════════════ */
function placeSymbol(sym, row, col) {
  board[idx(row, col)] = sym;
  var m = sym === 'X' ? makeX(row, col) : makeO(row, col);
  meshes[idx(row, col)] = m;
  animPop(m);
}

/* Joueur local joue */
function onCellClick(row, col) {
  if (!gameReady || mancheOver || gameOver || isProcessing) return;
  if (currentSymbol !== MY_SYMBOL) return; /* pas mon tour */
  if (board[idx(row, col)]) return;

  stopTimer();
  isProcessing = true;

  placeSymbol(MY_SYMBOL, row, col);
  clearHL();

  /* Envoyer au serveur */
  if (socket && socket.connected) {
    socket.emit('ttt:move', {
      gameId: ROOM_ID,
      cell:   idx(row, col),
      symbol: MY_SYMBOL
    });
  }

  var win = checkWin(board, MY_SYMBOL);
  if (win) { setTimeout(function() { handleMancheWin(MY_SYMBOL, win); }, 200); return; }
  if (isDraw(board)) { setTimeout(function() { handleMancheDraw(); }, 200); return; }

  currentSymbol = OP_SYMBOL;
  isProcessing = false;
  updUI();
}

/* Coup reçu de l'adversaire */
function applyRemoteMove(cellIdx, sym) {
  if (mancheOver || gameOver) return;
  isProcessing = true;
  stopTimer();

  var row = Math.floor(cellIdx / 3), col = cellIdx % 3;
  placeSymbol(sym, row, col);
  clearHL();

  var win = checkWin(board, sym);
  if (win) { setTimeout(function() { handleMancheWin(sym, win); }, 200); return; }
  if (isDraw(board)) { setTimeout(function() { handleMancheDraw(); }, 200); return; }

  currentSymbol = MY_SYMBOL;
  isProcessing = false;
  updUI();
}

/* ══════════════════════════════════════════
   FIN DE MANCHE
══════════════════════════════════════════ */
function handleMancheWin(winner, winLine) {
  stopTimer();
  mancheOver = true;
  manchesDone++;

  /* Score */
  if (winner === 'X') scores.X++;
  else scores.O++;

  mancheResults.push(winner === 'X' ? 'x' : 'o');

  /* Alterner qui commence */
  nextStarter = (nextStarter === 'X') ? 'O' : 'X';
  updateDots();
  updateScoreDisplay(winner);

  /* Animation : attendre animPop (~600ms) */
  setTimeout(function() {
    var winPieces = [];
    for (var i = 0; i < 3; i++) {
      var cell = winLine[i];
      var m = meshes[idx(cell.r, cell.c)];
      if (m) winPieces.push(m);
    }
    showWinLineHL(winLine, winner);
    startWinPulse(winPieces);

    setTimeout(function() {
      stopWinPulse();
      for (var i = 0; i < winPieces.length; i++) winPieces[i].scale.set(1, 1, 1);

      var popped = 0;
      winPieces.forEach(function(piece, i) {
        setTimeout(function() {
          balloonPop(piece, function() {
            popped++;
            if (popped === winPieces.length) {
              setTimeout(function() {
                clearBoardSilent(function() { finalizeManche(winner); });
              }, 200);
            }
          });
        }, i * 250);
      });
    }, 2000);
  }, 620);
}

function handleMancheDraw() {
  stopTimer();
  mancheOver = true;
  manchesDone++;
  mancheResults.push('d');
  nextStarter = (nextStarter === 'X') ? 'O' : 'X';
  updateDots();
  setTimeout(function() {
    clearBoardSilent(function() { finalizeManche(null); });
  }, 500);
}

function finalizeManche(winner) {
  var maxM = isTiebreaker ? 6 : TOTAL_MANCHES;
  var left = maxM - manchesDone;
  var matchDecided = (scores.O + left < scores.X) ||
                     (scores.X + left < scores.O) ||
                     manchesDone === maxM;

  var iWon = winner && (winner === MY_SYMBOL);

  /* Notifier le serveur de la fin de manche */
  if (socket && socket.connected) {
    socket.emit('ttt:round_end', {
      gameId: ROOM_ID,
      scores: scores,
      round:  manchesDone + 1,
      nextStarter: nextStarter,
      tieBreak: isTiebreaker
    });
  }

  if (matchDecided) {
    var winSym = scores.X > scores.O ? 'X' : (scores.O > scores.X ? 'O' : null);
    if (winSym) handleMatchEnd(winSym, 'normal');
    else handleMatchEnd(null, 'draw');
    return;
  }

  /* Afficher toast entre-manche */
  var emoji2, title2, sub2;
  var mancheRem = maxM - manchesDone;
  if (winner && iWon) { emoji2 = MY_SYMBOL; title2 = 'Vous gagnez !'; }
  else if (winner && !iWon) { emoji2 = OP_SYMBOL; title2 = OP_NAME + ' gagne !'; }
  else { emoji2 = '🤝'; title2 = 'Nul !'; }

  sub2 = mancheRem + ' manche' + (mancheRem > 1 ? 's' : '') + ' restante' + (mancheRem > 1 ? 's' : '');
  var nextStr = nextStarter === MY_SYMBOL ? 'Vous commencez' : OP_NAME + ' commence';
  sub2 += '\n' + nextStr;

  showToast(emoji2, title2, sub2, 2400, function() {
    resetManche();
  });
}

/* ══════════════════════════════════════════
   FIN DE MATCH
══════════════════════════════════════════ */
function handleMatchEnd(winnerSym, reason) {
  if (gameOver) return;
  stopTimer(); stopGraceTimer(); stopForfeitCountdown();
  gameOver = true;

  var iWon = winnerSym === MY_SYMBOL;

  var emoji, title, sub;
  if (reason === 'forfeit') {
    emoji = iWon ? '🏆' : '😔';
    title = iWon ? 'Victoire par forfait !' : 'Défaite par forfait.';
    sub   = iWon ? "L'adversaire s'est déconnecté." : 'Vous avez été déconnecté.';
  } else if (reason === 'draw') {
    emoji = '🤝'; title = 'Match nul !';
    sub   = 'Égalité totale après ' + TOTAL_MANCHES + ' manches.';
  } else {
    emoji = iWon ? '🏆' : '😔';
    title = iWon ? 'Vous remportez la partie !' : OP_NAME + ' remporte la partie.';
    sub   = scores.X + ' – ' + scores.O;
  }

  if (iWon) createConfetti();

  showToast(emoji, title, sub, 4000, function() {
    sendResult(iWon ? 'win' : 'loss', reason || 'normal');
  });

  /* Notifier le serveur */
  if (socket && socket.connected && reason !== 'forfeit') {
    socket.emit('ttt:match_over', {
      gameId: ROOM_ID,
      winner: winnerSym,
      scores: scores
    });
  }
}

/* ══════════════════════════════════════════
   RESET MANCHE
══════════════════════════════════════════ */
function resetManche() {
  stopTimer();
  mancheOver  = false;
  isProcessing = false;
  board = [null,null,null,null,null,null,null,null,null];
  meshes = [null,null,null,null,null,null,null,null,null];
  while (piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
  clearHL();
  currentSymbol = nextStarter;
  updUI();
}

/* ══════════════════════════════════════════
   DÉMARRAGE D'UNE PARTIE FRAÎCHE
══════════════════════════════════════════ */
function startFreshMatch() {
  gameOver    = false;
  isProcessing = false;
  resultSent  = false;
  manchesDone = 0;
  mancheResults = [];
  scores      = { X: 0, O: 0 };
  isTiebreaker = false;
  nextStarter = 'X';
  currentSymbol = 'X';
  board = [null,null,null,null,null,null,null,null,null];
  meshes = [null,null,null,null,null,null,null,null,null];
  while (piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
  clearHL();
  updateDots();

  /* Avatars */
  var ahEl = document.getElementById('avatar-human');
  var aaEl = document.getElementById('avatar-ai');
  if (MY_SYMBOL === 'X') {
    ahEl.innerHTML = '<div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>';
    aaEl.innerHTML = '<div class="av-o"></div>';
    document.getElementById('timer-arc-human').setAttribute('stroke', '#dde6f0');
    document.getElementById('timer-arc-ai').setAttribute('stroke', '#e74c3c');
  } else {
    ahEl.innerHTML = '<div class="av-o"></div>';

    document.getElementById('timer-arc-human').setAttribute('stroke', '#e74c3c');
    document.getElementById('timer-arc-ai').setAttribute('stroke', '#dde6f0');
  }

  var starterStr = nextStarter === MY_SYMBOL ? 'Vous commencez' : OP_NAME + ' commence';
  var symStr = 'Vous jouez ' + (MY_SYMBOL === 'X' ? '✕' : '○');

  showToast('🎲', symStr, starterStr, 2500, function() {
    gameReady = true;
    mancheOver = false;
    updUI();
  });
}

/* ══════════════════════════════════════════
   TIMERS
══════════════════════════════════════════ */
function stopTimer() {
  timerActive = false;
  if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
  document.getElementById('timer-arc-human').style.strokeDashoffset = CIRC;
  document.getElementById('timer-arc-ai').style.strokeDashoffset = CIRC;
  document.getElementById('profile-human').className = 'profile';
  document.getElementById('profile-ai').className = 'profile';
}

function stopGraceTimer() {
  graceActive = false;
  if (graceRAF) { cancelAnimationFrame(graceRAF); graceRAF = null; }
  document.getElementById('forfeit-bar').classList.remove('show');
}

function startTimer(isMyTurn, serverStartTime) {
  stopGraceTimer();
  stopTimer();
  if (gameOver || mancheOver) return;
  timerActive = true;
  timerStart  = serverStartTime || Date.now();

  var arcId  = isMyTurn ? 'timer-arc-human' : 'timer-arc-ai';
  var profId = isMyTurn ? 'profile-human'   : 'profile-ai';
  var arc    = document.getElementById(arcId);
  var prof   = document.getElementById(profId);
  prof.classList.add('active', isMyTurn ? 'human-active' : 'ai-active');

  function tick() {
    if (!timerActive) return;
    var progress = Math.min((Date.now() - timerStart) / TIMER_DURATION, 1);
    arc.style.strokeDashoffset = CIRC * progress;
    if (progress >= 0.67 && isMyTurn) prof.classList.add('timer-urgent');
    if (progress < 1) timerRAF = requestAnimationFrame(tick);
    else timerActive = false;
  }
  timerRAF = requestAnimationFrame(tick);
}

function startGraceTimer(isMyTurn, serverStartTime, duration) {
  stopTimer();
  stopGraceTimer();
  if (gameOver || mancheOver) return;
  graceActive = true;
  var graceStart = serverStartTime || Date.now();
  var graceDuration = duration || 60000;
  var bar = document.getElementById('forfeit-bar');

  var arcId  = isMyTurn ? 'timer-arc-human' : 'timer-arc-ai';
  var profId = isMyTurn ? 'profile-human'   : 'profile-ai';
  var arc    = document.getElementById(arcId);
  var prof   = document.getElementById(profId);
  prof.classList.add('active', isMyTurn ? 'human-active' : 'ai-active', 'timer-urgent');

  function tick() {
    if (!graceActive) return;
    var elapsed  = Date.now() - graceStart;
    var remaining = Math.max(0, graceDuration - elapsed);
    arc.style.strokeDashoffset = CIRC * ((graceDuration - remaining) / graceDuration);
    var secs = Math.ceil(remaining / 1000);
    if (isMyTurn) {
      bar.classList.add('show');
      bar.textContent = '⚠️ Jouez maintenant — ' + secs + 's avant défaite !';
    } else {
      bar.classList.add('show');
      bar.textContent = '⏳ ' + OP_NAME + ' doit jouer — ' + secs + 's';
    }
    if (remaining > 0) graceRAF = requestAnimationFrame(tick);
    else { graceActive = false; bar.classList.remove('show'); }
  }
  graceRAF = requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════
   UI
══════════════════════════════════════════ */
function updateScoreDisplay(winner) {
  var elX = document.getElementById('score-x');
  var elO = document.getElementById('score-o');
  var prevX = parseInt(elX.textContent) || 0;
  var prevO = parseInt(elO.textContent) || 0;

  if (scores.X !== prevX) {
    elX.textContent = scores.X;
    elX.classList.remove('score-anim-x', 'score-glow-x');
    void elX.offsetWidth;
    elX.classList.add('score-anim-x', 'score-glow-x');
  }
  if (scores.O !== prevO) {
    elO.textContent = scores.O;
    elO.classList.remove('score-anim-o', 'score-glow-o');
    void elO.offsetWidth;
    elO.classList.add('score-anim-o', 'score-glow-o');
  }
}

function updateDots() {
  var bar = document.getElementById('manche-bar');
  bar.innerHTML = '';
  var total = isTiebreaker ? 6 : TOTAL_MANCHES;
  for (var i = 0; i < total; i++) {
    if (i === 5) {
      var sep = document.createElement('div');
      sep.className = 'manche-sep';
      bar.appendChild(sep);
    }
    var dot = document.createElement('div');
    dot.className = 'mdot';
    if (i === 5) dot.classList.add('tie');
    if (i < mancheResults.length) {
      var r = mancheResults[i];
      if (r === 'x') dot.classList.add('win-x');
      else if (r === 'o') dot.classList.add('win-o');
      else dot.classList.add('draw-d');
    } else if (i === manchesDone && !gameOver) {
      dot.classList.add('current');
    }
    bar.appendChild(dot);
  }
  var maxM = isTiebreaker ? 6 : TOTAL_MANCHES;
  var cur  = Math.min(manchesDone + 1, maxM);
  document.getElementById('manche-lbl').textContent = 'Manche ' + cur + ' / ' + maxM;
}

function updUI() {
  document.getElementById('name-human').textContent = MY_NAME;
  document.getElementById('name-ai').textContent    = OP_NAME;
  updateDots();

  /* Timer — piloté par les events serveur ttt:turn_start/ttt:turn_warning */
  /* On démarre juste le bon arc si c'est mon tour */
  if (!mancheOver && !gameOver && gameReady) {
    var isMyTurn = (currentSymbol === MY_SYMBOL);
    /* Ne pas rappeler startTimer ici (piloté par serveur)
       — juste activer le profil visuel correct */
    var ph = document.getElementById('profile-human');
    var pa = document.getElementById('profile-ai');
    ph.className = 'profile' + (isMyTurn ? ' active human-active' : '');
    pa.className = 'profile' + (!isMyTurn ? ' active ai-active' : '');
  }
}

/* ══════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════ */
var confettiCanvas = document.getElementById('confetti-canvas');
var confettiCtx    = confettiCanvas.getContext('2d');
confettiCanvas.width  = wrap.clientWidth;
confettiCanvas.height = wrap.clientHeight;
var confettiParts  = [];
var confettiActive = false;

function createConfetti() {
  var colors = ['#fbbf24','#f59e0b','#e2e8f0','#ffffff','#818cf8','#c084fc'];
  var shapes = ['circle','square','triangle'];
  for (var i = 0; i < 150; i++) {
    confettiParts.push({
      x: confettiCanvas.width/2, y: confettiCanvas.height/2,
      vx: (Math.random()-.5)*20, vy: (Math.random()-.5)*20-5,
      color: colors[Math.floor(Math.random()*colors.length)],
      shape: shapes[Math.floor(Math.random()*shapes.length)],
      size: Math.random()*10+5,
      rotation: Math.random()*360, rotSpeed: (Math.random()-.5)*10,
      gravity: 0.3, drag: 0.98, life: 1.0
    });
  }
  confettiActive = true;
}

function updateConfetti() {
  if (!confettiActive) return;
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  var any = false;
  for (var i = confettiParts.length-1; i >= 0; i--) {
    var p = confettiParts[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity; p.vx *= p.drag; p.vy *= p.drag;
    p.rotation += p.rotSpeed; p.life -= 0.005;
    if (p.life > 0 && p.y < confettiCanvas.height + 50) {
      any = true;
      confettiCtx.save();
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.rotation * Math.PI / 180);
      confettiCtx.globalAlpha = p.life;
      confettiCtx.fillStyle = p.color;
      if (p.shape === 'circle') {
        confettiCtx.beginPath(); confettiCtx.arc(0, 0, p.size/2, 0, Math.PI*2); confettiCtx.fill();
      } else if (p.shape === 'square') {
        confettiCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      } else {
        confettiCtx.beginPath(); confettiCtx.moveTo(0, -p.size/2);
        confettiCtx.lineTo(p.size/2, p.size/2); confettiCtx.lineTo(-p.size/2, p.size/2);
        confettiCtx.closePath(); confettiCtx.fill();
      }
      confettiCtx.restore();
    }
  }
  if (!any) { confettiActive = false; confettiParts = []; confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function symHtml(sym) {
  if (sym === 'X') return '<div class="sym-x-wrap"><div class="sym-x-arm"></div><div class="sym-x-arm"></div></div>';
  if (sym === 'O') return '<div class="sym-o-ring"></div>';
  return sym;
}

function showToast(emoji, title, sub, delay, cb) {
  var el = document.getElementById('toast');
  document.getElementById('toast-emoji').innerHTML = symHtml(emoji);
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent   = sub;
  el.style.cssText = 'display:block;opacity:0;transform:translate(-50%,-50%) scale(0.8);transition:none;';
  setTimeout(function() {
    el.style.transition = 'all 0.3s cubic-bezier(0.175,0.885,0.32,1.275)';
    el.style.opacity    = '1';
    el.style.transform  = 'translate(-50%,-50%) scale(1)';
  }, 20);
  setTimeout(function() {
    el.style.opacity   = '0';
    el.style.transform = 'translate(-50%,-50%) scale(0.8)';
    setTimeout(function() { el.style.display = 'none'; if (cb) cb(); }, 300);
  }, delay);
}

/* ══════════════════════════════════════════
   RAYCASTING & INTERACTIONS
══════════════════════════════════════════ */
var ray    = new THREE.Raycaster();
var mouse2 = new THREE.Vector2();

function hitTest(cx, cy) {
  if (mancheOver || gameOver || isProcessing || currentSymbol !== MY_SYMBOL) return;
  var rect = renderer.domElement.getBoundingClientRect();
  mouse2.x =  ((cx - rect.left) / rect.width)  * 2 - 1;
  mouse2.y = -((cy - rect.top)  / rect.height)  * 2 + 1;
  ray.setFromCamera(mouse2, camera);
  var hits = ray.intersectObjects(boardGroup.children);
  for (var i = 0; i < hits.length; i++) {
    var ud = hits[i].object.userData;
    if (ud.row !== undefined && !board[idx(ud.row, ud.col)]) {
      onCellClick(ud.row, ud.col); return;
    }
  }
}

function hoverTest(cx, cy) {
  if (mancheOver || gameOver || isProcessing || currentSymbol !== MY_SYMBOL) { clearHL(); return; }
  var rect = renderer.domElement.getBoundingClientRect();
  mouse2.x =  ((cx - rect.left) / rect.width)  * 2 - 1;
  mouse2.y = -((cy - rect.top)  / rect.height)  * 2 + 1;
  ray.setFromCamera(mouse2, camera);
  var hits = ray.intersectObjects(boardGroup.children);
  for (var i = 0; i < hits.length; i++) {
    var ud = hits[i].object.userData;
    if (ud.row !== undefined && !board[idx(ud.row, ud.col)]) {
      showHL(ud.row, ud.col); return;
    }
  }
  clearHL();
}

/* Mouse */
var mDown = false, mLast = null, mMoved = false;
renderer.domElement.addEventListener('mousedown', function(e) { mDown = true; mLast = { x: e.clientX, y: e.clientY }; mMoved = false; });
renderer.domElement.addEventListener('mousemove', function(e) {
  if (mDown && mLast) {
    var dx = e.clientX - mLast.x, dy = e.clientY - mLast.y;
    if (Math.sqrt(dx*dx + dy*dy) > 4) {
      camTheta -= dx * 0.004;
      camPhi    = Math.max(0.2, Math.min(1.45, camPhi - dy * 0.004));
      setCam(); mLast = { x: e.clientX, y: e.clientY }; mMoved = true;
    }
  }
  if (!mDown) hoverTest(e.clientX, e.clientY);
});
renderer.domElement.addEventListener('mouseup', function(e) {
  if (!mMoved) hitTest(e.clientX, e.clientY);
  mDown = false; mLast = null;
});
renderer.domElement.addEventListener('wheel', function(e) {
  camD = Math.max(7, Math.min(32, camD + e.deltaY * 0.02)); setCam();
}, { passive: true });

/* Touch */
var pinD0 = null, pinCam0 = null, dragS = null, th0 = 0, ph0 = 0;
var tapS = null, tapT = 0, tapMoved = false;

function pinLen(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

renderer.domElement.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    pinD0 = pinLen(e); pinCam0 = camD; dragS = null; tapS = null; tapMoved = true;
  } else {
    tapT = Date.now(); tapMoved = false;
    tapS = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragS = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    th0 = camTheta; ph0 = camPhi;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 2 && pinD0 !== null) {
    camD = Math.max(7, Math.min(32, pinCam0 * (pinD0 / pinLen(e)))); setCam(); tapMoved = true;
  } else if (e.touches.length === 1 && dragS) {
    var dx = e.touches[0].clientX - dragS.x, dy = e.touches[0].clientY - dragS.y;
    if (Math.sqrt(dx*dx + dy*dy) > 6) {
      camTheta = th0 - dx * 0.005;
      camPhi   = Math.max(0.2, Math.min(1.45, ph0 - dy * 0.005));
      setCam(); tapMoved = true;
    }
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', function(e) {
  e.preventDefault();
  pinD0 = null;
  if (!tapMoved && tapS && e.changedTouches.length) {
    var t = e.changedTouches[0];
    var dx = t.clientX - tapS.x, dy = t.clientY - tapS.y;
    if (Math.sqrt(dx*dx + dy*dy) < 12 && Date.now() - tapT < 400) hitTest(t.clientX, t.clientY);
  }
  dragS = null; tapS = null;
}, { passive: false });

/* ══════════════════════════════════════════
   CAMERA VIEWS
══════════════════════════════════════════ */
var topViewAnimating = false;
var camViewIndex = 0;
var camViews = [
  { phi: 0.78, thetaOff: 0,           duration: 650  },
  { phi: 0.01, thetaOff: 0,           duration: 700  },
  { phi: 1.25, thetaOff: 0,           duration: 750  },
  { phi: 0.65, thetaOff: Math.PI/2,   duration: 680  },
  { phi: 0.50, thetaOff: -Math.PI*0.7, duration: 720 }
];

function animateCamTo(tD, tPhi, tTheta, dur, onDone) {
  var sD = camD, sPhi = camPhi, sTheta = camTheta, t0 = Date.now();
  var dTheta = tTheta - sTheta;
  while (dTheta >  Math.PI) dTheta -= Math.PI * 2;
  while (dTheta < -Math.PI) dTheta += Math.PI * 2;
  topViewAnimating = true;
  function step() {
    var p = Math.min((Date.now() - t0) / dur, 1);
    var e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
    camD = sD + (tD - sD)*e; camPhi = sPhi + (tPhi - sPhi)*e; camTheta = sTheta + dTheta*e;
    setCam();
    if (p < 1) requestAnimationFrame(step);
    else { camD = tD; camPhi = tPhi; camTheta = tTheta; setCam(); topViewAnimating = false; if (onDone) onDone(); }
  }
  requestAnimationFrame(step);
}

document.getElementById('btn-topview').addEventListener('click', function() {
  if (topViewAnimating) return;
  camViewIndex = (camViewIndex + 1) % camViews.length;
  var v = camViews[camViewIndex];
  var targetD = camViewIndex === 1 ? fitTopD() : (camViewIndex === 2 ? 13 : (camViewIndex === 0 ? 14 : 12));
  animateCamTo(targetD, v.phi, v.thetaOff, v.duration, null);
  var btn = document.getElementById('btn-topview');
  btn.classList.toggle('active-top', camViewIndex !== 0);
});

function fitTopD() {
  var w = renderer.domElement.clientWidth, h = renderer.domElement.clientHeight;
  var aspect = w / h, fovRad = 45 * Math.PI / 180;
  var bh = 3.8;
  return Math.max(7, Math.min(22, Math.max(bh / Math.tan(fovRad/2), bh / (Math.tan(fovRad/2)*aspect)) * 1.08));
}

document.getElementById('btn-cam').addEventListener('click', function() {
  autoRotate = !autoRotate;
  var btn = document.getElementById('btn-cam');
  if (autoRotate) btn.classList.add('active-cam');
  else btn.classList.remove('active-cam');
  if (autoRotate && camViewIndex !== 0) {
    camViewIndex = 0;
    document.getElementById('btn-topview').classList.remove('active-top');
  }
});

/* ══════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════ */
var at = 0;

function loop() {
  requestAnimationFrame(loop);
  at += 0.016;

  /* Pulse highlight */
  for (var i = 0; i < hlGroup.children.length; i++) {
    hlGroup.children[i].material.opacity = 0.12 + Math.sin(at * 2) * 0.08;
  }

  /* Rotation auto pièces */
  for (var pi = 0; pi < piecesGroup.children.length; pi++) {
    piecesGroup.children[pi].rotation.y += 0.006;
  }

  if (autoRotate) { camAngle += 0.007; camTheta = camAngle; setCam(); }

  updateParticles();
  updateConfetti();
  renderer.render(scene, camera);
}
loop();

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
initSocket();

})();
