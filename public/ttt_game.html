<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tic Tac Toe — Mindspille</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --gold:#C9A84C; --gold-lt:#E8C96A; --gold-dim:#7A5C10;
  --onyx:#060508; --onyx2:#0D0B11; --onyx3:#141018; --onyx4:#1C1824;
  --cream:#EDE0C4; --cream-dim:#A89878;
  --x-col:#E8C96A; --o-col:#C0C8E0;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body {
  background:var(--onyx);
  font-family:'Cinzel',serif;
  color:var(--cream);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(100,80,160,0.04) 0%, transparent 60%),
    repeating-linear-gradient(105deg, transparent 0px, transparent 80px, rgba(255,255,255,0.008) 80px, rgba(255,255,255,0.008) 81px, transparent 81px, transparent 160px);
  pointer-events:none; z-index:0;
}
.particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.particle { position:absolute; width:2px; height:2px; background:var(--gold); border-radius:50%; opacity:0; animation:particle-float linear infinite; }
@keyframes particle-float {
  0%   { transform:translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:0.4; }
  90%  { opacity:0.1; }
  100% { transform:translateY(-20px) scale(1); opacity:0; }
}

/* WRAPPER */
.wrapper { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:20px; padding:20px 16px; width:100%; max-width:420px; }

/* LOGO */
.logo { font-family:'Cinzel Decorative',serif; font-size:clamp(22px,6vw,30px); font-weight:700; letter-spacing:4px; color:var(--gold); animation:logo-glow 3s ease-in-out infinite; }
@keyframes logo-glow {
  0%,100% { text-shadow:0 0 40px rgba(201,168,76,0.3),0 0 80px rgba(201,168,76,0.1); }
  50%     { text-shadow:0 0 60px rgba(201,168,76,0.55),0 0 120px rgba(201,168,76,0.2); }
}
.subtitle { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--cream-dim); letter-spacing:3px; font-weight:300; }

/* SCOREBOARD */
.scoreboard { width:100%; display:grid; grid-template-columns:1fr auto 1fr; background:var(--onyx3); border:1px solid rgba(201,168,76,0.15); border-radius:16px; overflow:hidden; }
.score-slot { display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 8px; position:relative; }
.score-slot.active::before { content:''; position:absolute; bottom:0; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:2px; }
.score-slot.active .slot-label { color:var(--gold-lt); }
.slot-symbol { font-size:22px; font-weight:700; line-height:1; }
.slot-symbol.x { color:var(--x-col); text-shadow:0 0 16px rgba(232,201,106,0.5); }
.slot-symbol.o { color:var(--o-col); text-shadow:0 0 16px rgba(192,200,224,0.5); }
.slot-label { font-size:9px; letter-spacing:1.5px; color:var(--cream-dim); text-transform:uppercase; transition:color 0.3s; }
.slot-score { font-family:'Cinzel Decorative',serif; font-size:24px; font-weight:700; color:var(--gold); line-height:1; }
.score-mid { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px 16px; border-left:1px solid rgba(201,168,76,0.12); border-right:1px solid rgba(201,168,76,0.12); gap:4px; }
.score-mid-vs { font-family:'Cinzel Decorative',serif; font-size:11px; color:var(--gold-dim); letter-spacing:2px; }
.score-mid-draw { font-size:8px; color:rgba(168,152,120,0.5); letter-spacing:1px; }
.draw-count { font-family:'Cinzel Decorative',serif; font-size:16px; color:rgba(201,168,76,0.4); }

/* STATUS BAR */
.status-bar { width:100%; text-align:center; padding:7px 0; font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:2px; border-radius:10px; border:1px solid transparent; transition:all 0.35s ease; min-height:38px; display:flex; align-items:center; justify-content:center; }
.status-bar.turn-x  { background:rgba(201,168,76,0.09); border-color:rgba(201,168,76,0.3); color:var(--x-col); animation:glow-pulse 2.2s ease-in-out infinite; }
.status-bar.turn-o  { background:rgba(192,200,224,0.07); border-color:rgba(192,200,224,0.15); color:var(--o-col); }
.status-bar.win     { background:rgba(201,168,76,0.12); border-color:rgba(201,168,76,0.5); color:var(--gold-lt); animation:win-flash 0.5s ease 3; }
.status-bar.draw    { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.06); color:var(--cream-dim); }
.status-bar.waiting { background:rgba(201,168,76,0.05); border-color:rgba(201,168,76,0.15); color:var(--cream-dim); }
.status-bar.disco   { background:rgba(180,40,40,0.1); border-color:rgba(220,60,60,0.35); color:#E88080; }
@keyframes glow-pulse { 0%,100%{box-shadow:0 0 0 rgba(201,168,76,0);} 50%{box-shadow:0 0 18px rgba(201,168,76,0.15);} }
@keyframes win-flash  { 0%,100%{box-shadow:0 0 20px rgba(201,168,76,0.2);} 50%{box-shadow:0 0 40px rgba(201,168,76,0.5);} }

/* BOARD */
.board-wrap { position:relative; width:min(88vw,360px); aspect-ratio:1; }
.board-wrap::before,.board-wrap::after,.corner-bl,.corner-br {
  content:''; position:absolute; width:18px; height:18px;
  border-color:var(--gold); border-style:solid; z-index:3; opacity:0.6;
}
.board-wrap::before { top:-2px; left:-2px;   border-width:2px 0 0 2px; }
.board-wrap::after  { top:-2px; right:-2px;  border-width:2px 2px 0 0; }
.corner-bl { bottom:-2px; left:-2px;  border-width:0 0 2px 2px; }
.corner-br { bottom:-2px; right:-2px; border-width:0 2px 2px 0; }
.board {
  width:100%; height:100%;
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  gap:3px; background:linear-gradient(135deg,rgba(201,168,76,0.25),rgba(201,168,76,0.08));
  border-radius:4px; padding:3px;
  box-shadow:0 0 60px rgba(0,0,0,0.85), inset 0 0 20px rgba(0,0,0,0.3);
}
.cell {
  background:var(--onyx2);
  background-image:linear-gradient(145deg,rgba(255,255,255,0.025) 0%,transparent 60%);
  border-radius:3px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; overflow:hidden; transition:background 0.2s;
}
.cell::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at center,rgba(201,168,76,0.08) 0%,transparent 70%); opacity:0; transition:opacity 0.3s; }
.cell:hover:not(.taken):not(.blocked)::before { opacity:1; }
.cell.taken  { cursor:default; }
.cell.blocked{ cursor:default; opacity:0.85; }
.cell.win-cell { background:rgba(201,168,76,0.1)!important; box-shadow:inset 0 0 0 1px rgba(201,168,76,0.3); animation:win-cell-pulse 1s ease-in-out infinite; }
@keyframes win-cell-pulse { 0%,100%{background:rgba(201,168,76,0.08)!important;} 50%{background:rgba(201,168,76,0.18)!important;} }

/* SYMBOLS */
.sym { width:55%; height:55%; position:relative; z-index:1; }
.sym-x { animation:sym-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.sym-x line { stroke:var(--x-col); stroke-width:8; stroke-linecap:round; fill:none; filter:drop-shadow(0 0 6px rgba(232,201,106,0.6)); stroke-dasharray:100; stroke-dashoffset:100; }
.sym-x line:nth-child(1) { animation:draw-line 0.2s ease forwards; }
.sym-x line:nth-child(2) { animation:draw-line 0.2s ease 0.1s forwards; }
.sym-o { animation:sym-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.sym-o circle { stroke:var(--o-col); stroke-width:8; stroke-linecap:round; fill:none; filter:drop-shadow(0 0 6px rgba(192,200,224,0.5)); stroke-dasharray:282; stroke-dashoffset:282; animation:draw-circle 0.35s ease forwards; }
@keyframes draw-line   { to { stroke-dashoffset:0; } }
@keyframes draw-circle { to { stroke-dashoffset:0; } }
@keyframes sym-appear  { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }

/* WIN LINE */
.win-line-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:10; }
.win-line-svg line { stroke:var(--gold); stroke-width:4; stroke-linecap:round; opacity:0.8; fill:none; filter:drop-shadow(0 0 8px rgba(201,168,76,0.8)); stroke-dasharray:600; stroke-dashoffset:600; animation:draw-win-line 0.5s ease forwards; }
@keyframes draw-win-line { to { stroke-dashoffset:0; } }

/* PIECE EXIT */
@keyframes piece-exit {
  0%   { transform:scale(1);   opacity:1; }
  40%  { transform:scale(1.15) translateY(-6px); opacity:0.7; }
  100% { transform:scale(0) translateY(20px); opacity:0; }
}
.cell.exiting svg { animation:piece-exit 0.35s cubic-bezier(0.4,0,1,1) forwards !important; }

/* DISCONNECT BANNER */
.disco-banner {
  display:none; width:100%; padding:10px 14px;
  background:rgba(180,40,40,0.15); border:1px solid rgba(220,60,60,0.35);
  border-radius:10px; text-align:center;
  font-size:10px; letter-spacing:1.5px; color:#E88080;
}
.disco-banner.show { display:block; }

/* ── TRANSITION BANNER — FIX iOS Safari ── */
.tbanner {
  position:fixed;
  top:0; left:0;        /* ← remplace inset:0 non supporté sur certains Safari */
  width:100%;
  height:100%;
  min-height: 100vh;    /* fallback pour anciens iOS */
  z-index:200;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(6,5,8,0.95);
  -webkit-backdrop-filter:blur(6px);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.35s ease;
  overflow:hidden;      /* évite tout débordement */
}
.tbanner.show { opacity:1; pointer-events:all; }
.tb-title {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(26px,8vw,44px);
  color:var(--gold);
  letter-spacing:3px;
  text-shadow:0 0 50px rgba(201,168,76,0.6);
  transform:scale(0.7);
  opacity:0;
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.05s, opacity 0.35s ease 0.05s;
}
.tbanner.show .tb-title { transform:scale(1); opacity:1; }
.tb-sub {
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:15px;
  color:var(--cream-dim);
  margin-top:10px;
  letter-spacing:2px;
  opacity:0;
  transition:opacity 0.35s ease 0.3s;
}
.tbanner.show .tb-sub { opacity:1; }
.tb-line {
  width:60px; height:2px;
  margin-top:18px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;
  transition:opacity 0.35s ease 0.35s;
}
.tbanner.show .tb-line { opacity:1; }

/* OVERLAY */
.overlay {
  display:none;
  position:fixed;
  top:0; left:0;        /* ← même fix iOS */
  width:100%;
  height:100%;
  min-height:100vh;
  z-index:300;
  background:rgba(6,5,8,0.88);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  align-items:center;
  justify-content:center;
}
.overlay.show { display:flex; }
.ov-card { background:linear-gradient(145deg,var(--onyx3),var(--onyx4)); border:1px solid rgba(201,168,76,0.25); border-radius:24px; padding:40px 36px 32px; text-align:center; max-width:300px; width:88%; box-shadow:0 30px 80px rgba(0,0,0,0.9); animation:card-drop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes card-drop { from{transform:scale(0.7) translateY(-30px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
.ov-symbol { font-size:60px; margin-bottom:12px; line-height:1; }
.ov-title  { font-family:'Cinzel Decorative',serif; font-size:22px; color:var(--gold); text-shadow:0 0 30px rgba(201,168,76,0.4); margin-bottom:6px; }
.ov-sub    { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:var(--cream-dim); margin-bottom:10px; font-weight:300; letter-spacing:1px; }
.ov-gain   { font-family:'Cinzel Decorative',serif; font-size:26px; color:var(--gold-lt); margin-bottom:22px; }
.ov-btn    { padding:13px 32px; background:linear-gradient(135deg,var(--gold-dim),var(--gold)); border:none; border-radius:10px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--onyx); font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(201,168,76,0.3); }
.ov-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(201,168,76,0.45); }

/* CONNECTING SCREEN */
.connecting { display:flex; flex-direction:column; align-items:center; gap:16px; padding:40px 20px; }
.connecting-dot { width:12px; height:12px; background:var(--gold); border-radius:50%; animation:cdot 1.2s ease-in-out infinite; }
@keyframes cdot { 0%,100%{opacity:0.2;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<!-- CONNECTING SCREEN -->
<div id="screenConnect" class="wrapper">
  <div style="text-align:center">
    <div class="logo">MINDSPILLE</div>
    <div class="subtitle">Morpion de Prestige</div>
  </div>
  <div class="connecting">
    <div class="connecting-dot"></div>
    <div style="font-size:11px;letter-spacing:2px;color:var(--cream-dim)" id="connectMsg">CONNEXION...</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screenGame" class="wrapper" style="display:none">
  <div style="text-align:center">
    <div class="logo">MINDSPILLE</div>
    <div class="subtitle">Morpion de Prestige</div>
  </div>

  <div class="scoreboard">
    <div class="score-slot active" id="slotX">
      <div class="slot-symbol x">✕</div>
      <div class="slot-label" id="labelX">Joueur 1</div>
      <div class="slot-score" id="scoreX">0</div>
    </div>
    <div class="score-mid">
      <div class="score-mid-vs">VS</div>
      <div class="score-mid-draw" id="roundLabel">MANCHE 1/5</div>
      <div class="draw-count" id="roundNum">1</div>
    </div>
    <div class="score-slot" id="slotO">
      <div class="slot-symbol o">○</div>
      <div class="slot-label" id="labelO">Joueur 2</div>
      <div class="slot-score" id="scoreO">0</div>
    </div>
  </div>

  <div class="status-bar turn-x" id="statusBar">EN ATTENTE...</div>

  <div class="disco-banner" id="discoBanner">⚠️ Adversaire déconnecté — <span id="discoCount">60</span>s</div>

  <div class="board-wrap">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="board" id="board"></div>
  </div>
</div>

<!-- TRANSITION BANNER -->
<div class="tbanner" id="tbanner">
  <div class="tb-title" id="tbTitle">MANCHE 2</div>
  <div class="tb-sub"   id="tbSub">Bonne chance !</div>
  <div class="tb-line"></div>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="ov-symbol" id="ovSymbol">🏆</div>
    <div class="ov-title"  id="ovTitle">VICTOIRE !</div>
    <div class="ov-sub"    id="ovSub">La gloire vous appartient.</div>
    <div class="ov-gain"   id="ovGain"></div>
    <button class="ov-btn" onclick="closeResult()">Retour au menu</button>
  </div>
</div>

<script>
/* ============================================================
   MINDSPILLE TIC TAC TOE — MULTIJOUEUR EN LIGNE
   ============================================================ */

var WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

/* ── Paramètres URL ── */
var params  = {};
var parts   = window.location.search.slice(1).split('&');
for(var i=0;i<parts.length;i++){
  var kv=parts[i].split('=');
  if(kv[0]) params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');
}
var GAME_ID   = params['gameId']  || '';
var PLAYER_ID = params['player']  || '';
var TOKEN     = params['token']   || '';

/* ── State ── */
var mySymbol    = null;
var board       = [null,null,null,null,null,null,null,null,null];
var curTurn     = 'X';
var over        = false;
var busy        = false;
var scores      = {X:0, O:0};
var round       = 1;
var tieBreak    = false;
var matchOver   = false;
var nextStarter = 'X';
var discoTimer  = null;
var discoInterval = null;
var opponentName = 'Adversaire';
var myName       = 'Moi';

/* ── Socket ── */
var socket = io();

window.onload = function(){
  buildParticles();
  setMsg('CONNEXION...');

  if(TOKEN){
    socket.emit('auth', {token: TOKEN});
  } else if(PLAYER_ID){
    socket.emit('auth:supabase', {supabaseId: PLAYER_ID, username: 'Joueur'});
  } else {
    setMsg('PARAMÈTRES MANQUANTS');
    return;
  }

  socket.on('auth:ok', function(){
    setMsg('REJOINDRE LA PARTIE...');
    socket.emit('game:join_room', {gameId: GAME_ID});
    socket.emit('ttt:join', {gameId: GAME_ID, playerId: PLAYER_ID});
  });

  socket.on('auth:error', function(){
    setMsg('ERREUR D\'AUTHENTIFICATION');
  });

  socket.on('ttt:ready', function(data){
    mySymbol     = data.symbol;
    opponentName = data.opponentName || 'Adversaire';
    myName       = data.myName       || 'Moi';
    nextStarter  = 'X';
    showGame();
    initMatch();
    updNames();
  });

  socket.on('ttt:move', function(data){
    if(over||matchOver||busy) return;
    applyMove(data.cell, data.symbol, false);
  });

  socket.on('player:disconnected', function(data){
    var count = data.countdown || 60;
    showDiscoBanner(count);
  });

  socket.on('player:reconnected', function(){
    hideDiscoBanner();
  });

  socket.on('ttt:over', function(data){
    hideDiscoBanner();
    matchOver = true; over = true;
    showMatchResult(data);
  });

  socket.on('ttt:state', function(data){
    board       = data.board;
    curTurn     = data.curTurn;
    scores      = data.scores;
    round       = data.round;
    tieBreak    = data.tieBreak;
    nextStarter = data.nextStarter;
    mySymbol    = data.symbol;
    opponentName= data.opponentName || 'Adversaire';
    showGame();
    rebuildBoard();
    updStatus();
    updSlots();
    updRound();
    updNames();
  });
};

/* ── Affichage ── */
function setMsg(txt){
  document.getElementById('connectMsg').textContent = txt;
}

function showGame(){
  document.getElementById('screenConnect').style.display = 'none';
  document.getElementById('screenGame').style.display    = 'flex';
}

function updNames(){
  var xName = mySymbol==='X' ? myName : opponentName;
  var oName = mySymbol==='O' ? myName : opponentName;
  document.getElementById('labelX').textContent = xName;
  document.getElementById('labelO').textContent = oName;
}

/* ── Match init ── */
function initMatch(){
  scores={X:0,O:0}; round=1; tieBreak=false; matchOver=false; busy=false; nextStarter='X';
  document.getElementById('scoreX').textContent='0';
  document.getElementById('scoreO').textContent='0';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('tbanner').classList.remove('show');
  startRound();
}

function startRound(){
  var cells=document.getElementById('board').children;
  var hasPieces=false;
  for(var i=0;i<cells.length;i++){
    if(cells[i].querySelector('svg')){ hasPieces=true; break; }
  }
  if(!hasPieces){ doStartRound(); return; }
  for(var i=0;i<cells.length;i++){
    (function(cell,idx){
      if(cell.querySelector('svg')){
        setTimeout(function(){ cell.classList.add('exiting'); }, idx*38);
      }
    })(cells[i],i);
  }
  setTimeout(function(){ doStartRound(); }, 9*38+380);
}

function doStartRound(){
  board=[null,null,null,null,null,null,null,null,null];
  curTurn=nextStarter; over=false;
  buildBoard(); updStatus(); updSlots(); updRound();
}

function buildBoard(){
  var b=document.getElementById('board'); b.innerHTML='';
  /* Retirer la win-line SVG si présente */
  var wl=document.querySelector('.win-line-svg');
  if(wl) wl.parentNode.removeChild(wl);
  for(var i=0;i<9;i++){
    (function(idx){
      var c=document.createElement('div');
      c.className='cell';
      c.addEventListener('click',function(){ onCell(idx); });
      b.appendChild(c);
    })(i);
  }
}

function rebuildBoard(){
  buildBoard();
  var cells=document.getElementById('board').children;
  for(var i=0;i<9;i++){
    if(board[i]){
      cells[i].classList.add('taken');
      drawSym(cells[i], board[i]);
    }
  }
}

/* ── Cell click ── */
function onCell(i){
  if(over||matchOver||busy) return;
  if(mySymbol !== curTurn) return;
  if(board[i]) return;
  socket.emit('ttt:move', {gameId: GAME_ID, cell: i, symbol: mySymbol});
  applyMove(i, mySymbol, true);
}

function applyMove(i, sym, isMe){
  board[i] = sym;
  var cells = document.getElementById('board').children;
  cells[i].classList.add('taken');
  drawSym(cells[i], sym);

  var res = checkWin();
  if(res){ endRound(res); }
  else if(board.indexOf(null)===-1){ endRound('D'); }
  else {
    curTurn = curTurn==='X'?'O':'X';
    updStatus(); updSlots();
  }
}

function drawSym(cell, p){
  cell.innerHTML='';
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('fill','none');
  svg.setAttribute('class','sym '+(p==='X'?'sym-x':'sym-o'));
  if(p==='X'){
    var l1=document.createElementNS(ns,'line');
    l1.setAttribute('x1','20');l1.setAttribute('y1','20');l1.setAttribute('x2','80');l1.setAttribute('y2','80');l1.setAttribute('fill','none');
    var l2=document.createElementNS(ns,'line');
    l2.setAttribute('x1','80');l2.setAttribute('y1','20');l2.setAttribute('x2','20');l2.setAttribute('y2','80');l2.setAttribute('fill','none');
    svg.appendChild(l1); svg.appendChild(l2);
  } else {
    var c=document.createElementNS(ns,'circle');
    c.setAttribute('cx','50');c.setAttribute('cy','50');c.setAttribute('r','34');c.setAttribute('fill','none');
    svg.appendChild(c);
  }
  cell.appendChild(svg);
}

function checkWin(){
  for(var i=0;i<WINS.length;i++){
    var w=WINS[i];
    if(board[w[0]]&&board[w[0]]===board[w[1]]&&board[w[1]]===board[w[2]])
      return {winner:board[w[0]],line:w};
  }
  return null;
}

function drawWinLine(line){
  var existing=document.querySelector('.win-line-svg');
  if(existing) existing.parentNode.removeChild(existing);
  var wrap=document.querySelector('.board-wrap');
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','win-line-svg');
  svg.setAttribute('viewBox','0 0 3 3');
  var ln=document.createElementNS(ns,'line');
  var coords={
    0:{x1:0.5,y1:0.5}, 1:{x1:1.5,y1:0.5}, 2:{x1:2.5,y1:0.5},
    3:{x1:0.5,y1:1.5}, 4:{x1:1.5,y1:1.5}, 5:{x1:2.5,y1:1.5},
    6:{x1:0.5,y1:2.5}, 7:{x1:1.5,y1:2.5}, 8:{x1:2.5,y1:2.5}
  };
  var a=coords[line[0]], b=coords[line[2]];
  ln.setAttribute('x1',String(a.x1));ln.setAttribute('y1',String(a.y1));
  ln.setAttribute('x2',String(b.x1));ln.setAttribute('y2',String(b.y1));
  svg.appendChild(ln);
  wrap.appendChild(svg);
}

/* ── End round ── */
function endRound(res){
  over=true;
  var isDraw=(res==='D');
  var winner=isDraw?null:res.winner;

  nextStarter=(nextStarter==='X'?'O':'X');

  if(!isDraw){
    scores[winner]++;
    document.getElementById('score'+winner).textContent=String(scores[winner]);
    var cells=document.getElementById('board').children;
    for(var i=0;i<res.line.length;i++) cells[res.line[i]].classList.add('win-cell');
    drawWinLine(res.line);
    var s=document.getElementById('statusBar');
    s.className='status-bar win';
    s.textContent=(winner==='X'?'✕':'○')+' — MANCHE GAGNEE !';
  } else {
    var s=document.getElementById('statusBar');
    s.className='status-bar draw';
    s.textContent='MANCHE NULLE';
  }

  if(mySymbol==='X'){
    socket.emit('ttt:round_end', {
      gameId: GAME_ID,
      scores: scores,
      round: round,
      nextStarter: nextStarter,
      tieBreak: tieBreak
    });
  }

  setTimeout(function(){
    var decided=checkMatch();
    if(decided&&decided.winner){
      if(mySymbol==='X'){
        socket.emit('ttt:match_over', {
          gameId: GAME_ID,
          winner: decided.winner,
          scores: scores
        });
      }
      showLocalResult(decided.winner, 'match');
    } else if(decided&&decided.needsBelle){
      tieBreak=true;
      showBanner('BELLE MANCHE !','Egalite — manche decisive',function(){ startRound(); });
    } else if(decided&&decided.finalDraw){
      if(mySymbol==='X'){
        socket.emit('ttt:match_over', {gameId:GAME_ID, winner:null, scores:scores});
      }
      showLocalResult(null, 'draw');
    } else {
      var nextN=round+1;
      var lbl=tieBreak?'BELLE MANCHE':('MANCHE '+nextN);
      var sub=isDraw?'Manche nulle — on repart !':('Score : ✕ '+scores.X+' — ○ '+scores.O);
      showBanner(lbl,sub,function(){
        if(!tieBreak) round++;
        startRound();
      });
    }
  }, isDraw?700:1200);
}

function checkMatch(){
  var rem=tieBreak?0:(5-round);
  if(scores.X-scores.O>rem) return {winner:'X'};
  if(scores.O-scores.X>rem) return {winner:'O'};
  if(round>=5&&!tieBreak){
    if(scores.X!==scores.O) return {winner:scores.X>scores.O?'X':'O'};
    return {needsBelle:true};
  }
  if(tieBreak){
    if(scores.X!==scores.O) return {winner:scores.X>scores.O?'X':'O'};
    return {finalDraw:true};
  }
  return null;
}

/* ── Résultat local ── */
function showLocalResult(winner, reason){
  matchOver=true;
  var isWinner = (winner && winner===mySymbol);
  var isDraw   = (!winner);
  document.getElementById('ovSymbol').textContent = isDraw?'🤝':(isWinner?'🏆':'💀');
  document.getElementById('ovTitle').textContent  = isDraw?'MATCH NUL':(isWinner?'VICTOIRE !':'DEFAITE');
  var sub = isDraw?'Egalite parfaite — belle partie !':(isWinner?'La gloire vous appartient.':'Votre adversaire a triomphé.');
  if(reason==='forfeit') sub='Victoire par forfait !';
  document.getElementById('ovSub').textContent = sub;
  document.getElementById('ovGain').textContent = '';
  document.getElementById('overlay').classList.add('show');
}

/* ── Résultat depuis serveur ── */
function showMatchResult(data){
  matchOver=true; over=true;
  var mySupId  = PLAYER_ID;
  var isWinner = (data.winnerSupabaseId && data.winnerSupabaseId===mySupId);
  var isDraw   = (!data.winnerSupabaseId);
  document.getElementById('ovSymbol').textContent = isDraw?'🤝':(isWinner?'🏆':'💀');
  document.getElementById('ovTitle').textContent  = isDraw?'MATCH NUL':(isWinner?'VICTOIRE !':'DEFAITE');
  var sub = isDraw?'Egalite parfaite.':(isWinner?'La gloire vous appartient.':'Votre adversaire a triomphé.');
  if(data.reason==='forfeit') sub='Victoire par forfait !';
  document.getElementById('ovSub').textContent = sub;
  document.getElementById('ovGain').textContent = isWinner&&data.payout?'+'+data.payout+' HTG':'';
  document.getElementById('overlay').classList.add('show');
}

function closeResult(){
  window.parent.postMessage({type:'game_over',gameId:GAME_ID}, '*');
}

/* ── Disconnect banner ── */
function showDiscoBanner(count){
  var banner=document.getElementById('discoBanner');
  var span=document.getElementById('discoCount');
  banner.classList.add('show');
  span.textContent=String(count);
  if(discoInterval) clearInterval(discoInterval);
  var remaining=count;
  discoInterval=setInterval(function(){
    remaining--;
    span.textContent=String(remaining);
    if(remaining<=0){ clearInterval(discoInterval); discoInterval=null; }
  },1000);
}

function hideDiscoBanner(){
  document.getElementById('discoBanner').classList.remove('show');
  if(discoInterval){ clearInterval(discoInterval); discoInterval=null; }
}

/* ── Banner animé ── */
function showBanner(title, sub, cb){
  busy=true;
  /* Cacher le banner de déco pendant la transition */
  hideDiscoBanner();
  var bn=document.getElementById('tbanner');
  document.getElementById('tbTitle').textContent=title;
  document.getElementById('tbSub').textContent=sub;
  bn.classList.add('show');
  setTimeout(function(){
    bn.classList.remove('show');
    setTimeout(function(){ busy=false; if(cb) cb(); }, 380);
  },1700);
}

/* ── UI updates ── */
function updStatus(){
  var s=document.getElementById('statusBar');
  var isMyTurn=(curTurn===mySymbol);
  if(over) return;
  s.className='status-bar '+(curTurn==='X'?'turn-x':'turn-o');
  s.textContent=isMyTurn?'VOTRE TOUR':'TOUR ADVERSAIRE';
}

function updSlots(){
  document.getElementById('slotX').className='score-slot'+(curTurn==='X'?' active':'');
  document.getElementById('slotO').className='score-slot'+(curTurn==='O'?' active':'');
}

function updRound(){
  var lbl=tieBreak?'BELLE':'MANCHE '+round+'/5';
  var num=tieBreak?'★':String(round);
  document.getElementById('roundLabel').textContent=lbl;
  document.getElementById('roundNum').textContent=num;
}

/* ── Particles ── */
function buildParticles(){
  var c=document.getElementById('particles');
  for(var i=0;i<18;i++){
    var p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    p.style.animationDuration=(6+Math.random()*12)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    c.appendChild(p);
  }
}
</script>
