<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe 3D — Mindspille</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#top {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.15);
  z-index: 20;
  gap: 8px;
}

/* ── Profile cards ── */
.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 72px;
}

.profile-timer-wrap {
  position: relative;
  width: 58px;
  height: 58px;
}

.profile-timer-wrap svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.timer-track {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 4;
}

.timer-arc {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 163.4;
  stroke-dashoffset: 163.4;
  transition: stroke 0.3s;
}

.profile-avatar {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.12);
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
}

.profile.active .profile-avatar {
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.10);
}

.profile.active.human-active .profile-avatar {
  box-shadow: 0 0 18px rgba(220,235,255,0.5);
}

.profile.active.ai-active .profile-avatar {
  box-shadow: 0 0 18px rgba(231,76,60,0.5);
}

/* inline X symbol */
.av-x { position: relative; width: 28px; height: 28px; }
.av-x-arm {
  position: absolute; top: 50%; left: 50%;
  width: 28px; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, #c8d8f0, #e2e8f0, #c8d8f0);
  box-shadow: 0 2px 6px rgba(200,220,255,0.5);
  transform-origin: center;
}
.av-x-arm:nth-child(1) { transform: translate(-50%,-50%) rotate(45deg); }
.av-x-arm:nth-child(2) { transform: translate(-50%,-50%) rotate(-45deg); }

/* inline O symbol */
.av-o {
  width: 24px; height: 24px; border-radius: 50%;
  border: 5px solid #c0392b;
  box-shadow: 0 0 10px rgba(192,57,43,0.6), inset 0 2px 4px rgba(255,120,100,0.3);
}

.profile-name {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  transition: color 0.3s;
}

.profile.active .profile-name { color: rgba(255,255,255,0.9); }



/* ── Center info ── */
.top-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.timer-urgent .timer-arc { animation: urgentPulse 0.5s infinite alternate; }
@keyframes urgentPulse {
  from { opacity: 1; }
  to   { opacity: 0.4; }
}

.btns { display: flex; gap: 7px; }

.btn {
  background: rgba(255,255,255,0.10);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 99px;
  padding: 6px 13px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
.btn.ia { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.5); color: #fbbf24; }
.btn.active-cam { background: rgba(251,191,36,0.25); border-color: rgba(251,191,36,0.7); color: #fbbf24; }

.btn-topview {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 50%;
  flex-shrink: 0;
  color: rgba(255,255,255,0.7);
  transition: all .2s;
}
.btn-topview.active-top {
  background: rgba(251,191,36,0.2);
  border-color: rgba(251,191,36,0.7);
  color: #fbbf24;
  box-shadow: 0 0 12px rgba(251,191,36,0.3);
}


#wrap {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

#manche-bar {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 7px;
  align-items: center;
  z-index: 15;
  pointer-events: none;
}

.mdot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.07);
  transition: all .35s ease;
}

.mdot.win-w { background: #e2e8f0; border-color: #e2e8f0; box-shadow: 0 0 12px rgba(200,220,255,.9); }
.mdot.win-r { background: #e74c3c; border-color: #e74c3c; box-shadow: 0 0 12px rgba(231,76,60,.9); }
.mdot.draw-d { background: #fbbf24; border-color: #fbbf24; box-shadow: 0 0 12px rgba(251,191,36,.7); }
.mdot.current { border-color: rgba(255,255,255,.8); animation: pulse-dot 1s infinite; }

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.4); }
  50% { box-shadow: 0 0 0 5px rgba(255,255,255,.0); }
}

.mdot.tie { border-color: #fbbf24; border-style: dashed; }
.manche-sep { width: 2px; height: 2px; border-radius: 50%; background: rgba(255,255,255,.3); }

#bot {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.15);
  z-index: 20;
}

.ibox { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.4); }
.val { font-size: 14px; font-weight: 700; font-family: 'Cinzel', serif; color: #fbbf24; }
.val.red { color: #f87171; }

.score-wrap { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.score-row { display: flex; gap: 8px; align-items: center; }
.snum { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; display: inline-block; }
.sw { color: #e2e8f0; }
.sr { color: #f87171; }

/* Human score — bounces in from top, elastic overshoot */
@keyframes scoreHuman {
  0%   { transform: translateY(-32px) scale(0.4) rotate(-8deg); opacity: 0; }
  40%  { transform: translateY(6px)   scale(1.35) rotate(3deg);  opacity: 1; }
  60%  { transform: translateY(-4px)  scale(0.92) rotate(-2deg); }
  75%  { transform: translateY(3px)   scale(1.08) rotate(1deg);  }
  88%  { transform: translateY(-2px)  scale(0.97) rotate(0deg);  }
  100% { transform: translateY(0)     scale(1)    rotate(0deg);  opacity: 1; }
}

/* AI score — slams in from below, spins slightly, thumps */
@keyframes scoreAI {
  0%   { transform: translateY(28px) scale(0.3) rotate(12deg);  opacity: 0; }
  35%  { transform: translateY(-5px) scale(1.4) rotate(-4deg);  opacity: 1; }
  55%  { transform: translateY(3px)  scale(0.88) rotate(2deg); }
  72%  { transform: translateY(-2px) scale(1.06) rotate(-1deg); }
  86%  { transform: translateY(1px)  scale(0.98) rotate(0deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg);  opacity: 1; }
}

.score-anim-human {
  animation: scoreHuman 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.score-anim-ai {
  animation: scoreAI 0.68s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Glow flash behind the winning score */
@keyframes scoreGlowW {
  0%   { text-shadow: 0 0 0px #e2e8f0; }
  30%  { text-shadow: 0 0 22px #ffffff, 0 0 40px #b0ccff; }
  100% { text-shadow: none; }
}
@keyframes scoreGlowR {
  0%   { text-shadow: 0 0 0px #f87171; }
  30%  { text-shadow: 0 0 22px #ff8888, 0 0 40px #ff4444; }
  100% { text-shadow: none; }
}
.score-glow-w { animation: scoreGlowW 0.9s ease-out forwards; }
.score-glow-r { animation: scoreGlowR 0.9s ease-out forwards; }
.ssep { color: rgba(255,255,255,.3); font-size: 13px; }
.manche-lbl { font-size: 9px; color: rgba(255,255,255,.35); letter-spacing: 1px; }


#hint {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: rgba(255,255,255,.25);
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
}

#loading {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity .6s;
}

.spin {
  width: 52px;
  height: 52px;
  border: 4px solid rgba(255,255,255,.08);
  border-top-color: #fbbf24;
  border-radius: 50%;
  animation: sp 1s linear infinite;
}

@keyframes sp { to { transform: rotate(360deg); } }

#loading p {
  color: rgba(255,255,255,.55);
  margin-top: 16px;
  font-size: 11px;
  letter-spacing: 4px;
  font-family: 'Cinzel', serif;
}

#loading.error p {
  color: #f87171;
}

#modal {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 60;
  backdrop-filter: blur(8px);
}

#modal.on { display: flex; }

.mbox {
  background: linear-gradient(135deg, rgba(30,27,75,0.95), rgba(49,46,129,0.95));
  border: 2px solid #fbbf24;
  border-radius: 24px;
  padding: 32px 28px;
  text-align: center;
  animation: pop .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  min-width: 280px;
  box-shadow: 0 25px 80px rgba(0,0,0,.6), 0 0 40px rgba(251,191,36,0.2);
  position: relative;
  overflow: hidden;
}

@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.mbox .emoji { font-size: 56px; margin-bottom: 8px; animation: bounce 1s infinite; }

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.mbox h2 {
  font-family: 'Cinzel', serif;
  color: #fbbf24;
  font-size: 28px;
  margin-bottom: 8px;
  text-shadow: 0 2px 10px rgba(251,191,36,0.3);
}

.mbox p {
  color: rgba(255,255,255,.85);
  margin-bottom: 24px;
  font-size: 14px;
  line-height: 1.5;
}

.mbox-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.btn-g {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #1e1b4b;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  border: none;
  border-radius: 99px;
  padding: 12px 28px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(251,191,36,0.3);
}

.btn-g:active {
  transform: scale(0.95);
}

#toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, rgba(30,27,75,.97), rgba(49,46,129,.97));
  border: 1.5px solid rgba(251,191,36,.6);
  border-radius: 20px;
  padding: 28px 32px;
  text-align: center;
  pointer-events: none;
  z-index: 40;
  display: none;
  box-shadow: 0 15px 50px rgba(0,0,0,.6);
  min-width: 220px;
}

#toast-emoji { font-size: 48px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
.sym-x-wrap { position:relative; width:72px; height:72px; }
.sym-x-arm {
  position:absolute; top:50%; left:50%;
  width:64px; height:14px; border-radius:7px;
  background: linear-gradient(135deg,#f0f4ff,#c8d8f0,#dde6f0);
  box-shadow: 0 4px 14px rgba(180,210,255,0.7), 0 0 0 2px rgba(255,255,255,0.3);
  transform-origin: center center;
}
.sym-x-arm:nth-child(1) { transform: translate(-50%,-50%) rotate(45deg); }
.sym-x-arm:nth-child(2) { transform: translate(-50%,-50%) rotate(-45deg); }
.sym-o-ring {
  width:66px; height:66px; border-radius:50%;
  background: transparent;
  border: 13px solid #c0392b;
  box-shadow:
    0 0 0 3px #e74c3c,
    inset 0 3px 8px rgba(255,120,100,0.5),
    0 6px 20px rgba(192,57,43,0.7),
    0 0 30px rgba(231,76,60,0.4);
  position: relative;
}
.sym-o-ring::after {
  content:''; position:absolute; top:6px; left:10px;
  width:18px; height:8px; border-radius:50%;
  background: rgba(255,180,160,0.45);
  transform: rotate(-20deg);
}
#toast-title { font-family: 'Cinzel', serif; color: #fbbf24; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
#toast-sub { font-size: 12px; color: rgba(255,255,255,.6); letter-spacing: 1px; }

#confetti-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 55;
}

</style>
</head>
<body>

<div id="top">
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#dde6f0"/>
      </svg>
      <div class="profile-avatar" id="avatar-human">
        <div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>
      </div>
    </div>
    <div class="profile-name" id="name-human">VOUS</div>
  </div>
  <div class="top-center">
    <div class="score-row">
      <span class="snum sw" id="score-w">0</span>
      <span class="ssep">–</span>
      <span class="snum sr" id="score-r">0</span>
    </div>
    <span class="manche-lbl" id="manche-lbl">Manche 1 / 5</span>
  </div>
  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58">
        <circle class="timer-track" cx="29" cy="29" r="26"/>
        <circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/>
      </svg>
      <div class="profile-avatar" id="avatar-ai">
        <div class="av-o"></div>
      </div>
    </div>
    <div class="profile-name" id="name-ai">ADV</div>
  </div>
</div>

<div id="wrap">
  <div id="mp-waiting" style="display:flex;position:absolute;inset:0;background:rgba(15,12,50,0.96);z-index:90;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(10px);">
    <div style="width:60px;height:60px;border:4px solid rgba(255,255,255,.1);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite;"></div>
    <div style="font-family:'Cinzel',serif;color:#fbbf24;font-size:14px;letter-spacing:3px;">EN ATTENTE</div>
    <div id="mp-wait-msg" style="color:rgba(255,255,255,.5);font-size:12px;letter-spacing:1px;text-align:center;max-width:240px;padding:0 20px;">Connexion...</div>
  </div>
  <div id="mp-dc-banner" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(180,30,30,0.95);border:2px solid #e74c3c;border-radius:18px;padding:22px 32px;text-align:center;z-index:85;min-width:220px;">
    <div style="font-family:'Cinzel',serif;color:#fff;font-size:13px;font-weight:700;margin-bottom:8px;">Adversaire déconnecté</div>
    <div id="mp-dc-countdown" style="font-family:'Cinzel',serif;color:#fbbf24;font-size:32px;font-weight:700;">60</div>

  </div>
</div>

<div id="bot">
  <button class="btn btn-topview" id="btn-topview">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/>
      <line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/>
      <line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/>
      <line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/>

  </button>

</div>

<div id="modal">
  <div class="mbox">
    <div class="emoji" id="m-emoji">🏆</div>

    <div class="mbox-btns">
      <button class="btn-g" id="btn-modal-close">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
window.onerror = function(msg,u,l){ console.error('[TTT]',msg,'L'+l); return false; };
(function(){
'use strict';

function waitThree(){ if(typeof THREE==='undefined'){setTimeout(waitThree,100);return;} startGame(); }
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',waitThree);
else waitThree();

function startGame(){

var P=new URLSearchParams(window.location.search);
var MP_GAME_ID=P.get('gameId')||null;
var MP_PLAYER=P.get('playerId')||null;
var MP_BET=parseFloat(P.get('betAmount'))||0;

var MY_SYMBOL=null,OPP_SYMBOL=null,MY_TURN=false,socket=null,dcInterval=null;
var board=Array(9).fill(null),meshes=Array(9).fill(null);
var matchW=0,matchR=0,manchesDone=0,mancheResults=[];
var isTiebreaker=false,matchOver=false,mancheOver=false,isProcessing=false,gameReady=false;
var humanSymbol=null,aiSymbol=null;
var TOTAL_MANCHES=5,TIMER_DURATION=30000;
var CIRC=2*Math.PI*26,timerStart=null,timerRAF=null,timerActive=false;

      var wrap = document.getElementById('wrap');
      var scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x1e1b4b, 18, 55);
      
      var camD = 14, camPhi = 0.78, camTheta = 0;
      var autoRotate = false, camAngle = 0;
      var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
      
      function setCam() {
        camera.position.set(
          camD * Math.sin(camPhi) * Math.sin(camTheta),
          camD * Math.cos(camPhi),
          camD * Math.sin(camPhi) * Math.cos(camTheta)
        );
        camera.lookAt(0, 0, 0);
      }
      setCam();
      
      var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      wrap.appendChild(renderer.domElement);
      
      function resize() {
        var w = wrap.clientWidth, h = wrap.clientHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        var cc = document.getElementById('confetti-canvas');
        if (cc) { cc.width = w; cc.height = h; }
      }
      resize();
      window.addEventListener('resize', resize);
      
      scene.add(new THREE.AmbientLight(0xffffff, 0.45));
      var dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
      dirLight.position.set(8, 18, 10);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 40;
      dirLight.shadow.camera.left = -8;
      dirLight.shadow.camera.right = 8;
      dirLight.shadow.camera.top = 8;
      dirLight.shadow.camera.bottom = -8;

      function animPop(mesh) {
        var t0 = Date.now();
        var DUR = 750; // ms — longer = smoother feel
        function easeOutElastic(t) {
          if (t === 0 || t === 1) return t;
          var p = 0.38, s = p / (2 * Math.PI) * Math.asin(1);
          return Math.pow(2, -10 * t) * Math.sin((t - s) * (2 * Math.PI) / p) + 1;
        }
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function loop() {
          var p = Math.min((Date.now() - t0) / DUR, 1);
          // Scale: elastic spring from 0 → 1
          var s = easeOutElastic(p);
          s = Math.max(0, s); // clamp negatives from elastic
          mesh.scale.set(s, s, s);
          // Drop: smooth cubic, from height 2.2 → 0.35
          var dropP = Math.min(p * 1.4, 1); // drop finishes at ~70% of anim
          mesh.position.y = 0.35 + (1 - easeOutCubic(dropP)) * 2.2;
          if (p < 1) requestAnimationFrame(loop);
          else { mesh.scale.set(1, 1, 1); mesh.position.y = 0.35; }
        }
        loop();
      }
      
      function balloonPop(mesh, onComplete) {
        var startTime = Date.now();
        var startScale = mesh.scale.x;
        createWinBurst(mesh.position, mesh.userData.type);
        function animate() {
          var elapsed = Date.now() - startTime;
          var progress = elapsed / 400;
          if (progress < 0.3) {
            var expand = 1 + Math.sin(progress * Math.PI * 3.33) * 0.3;
            mesh.scale.setScalar(startScale * expand);
          } else if (progress < 0.5) {
            var shrink = 1 - (progress - 0.3) * 5;
            mesh.scale.setScalar(startScale * Math.max(0, shrink));
            mesh.rotation.y += 0.3;
            mesh.rotation.z += 0.2;
          } else {
            mesh.visible = false;
            if (onComplete) onComplete();
            return;
          }
          requestAnimationFrame(animate);
        }
        animate();
      }

      function createConfetti() {
        var colors = ['#fbbf24', '#f59e0b', '#e2e8f0', '#ffffff', '#818cf8', '#c084fc'];
        var shapes = ['circle', 'square', 'triangle'];
        for (var i = 0; i < 150; i++) {
          confettiParticles.push({
            x: confettiCanvas.width / 2, y: confettiCanvas.height / 2,
            vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            shape: shapes[Math.floor(Math.random() * shapes.length)],
            size: Math.random() * 10 + 5,
            rotation: Math.random() * 360, rotationSpeed: (Math.random() - 0.5) * 10,
            gravity: 0.3, drag: 0.98, life: 1.0
          });
        }
        confettiActive = true;
      }
      
      function updateConfetti() {
        if (!confettiActive) return;
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        var active = false;
        for (var i = confettiParticles.length - 1; i >= 0; i--) {
          var p = confettiParticles[i];
          p.x += p.vx; p.y += p.vy;
          p.vy += p.gravity; p.vx *= p.drag; p.vy *= p.drag;
          p.rotation += p.rotationSpeed; p.life -= 0.005;
          if (p.life > 0 && p.y < confettiCanvas.height + 50) {
            active = true;
            confettiCtx.save();
            confettiCtx.translate(p.x, p.y);
            confettiCtx.rotate(p.rotation * Math.PI / 180);
            confettiCtx.globalAlpha = p.life;
            confettiCtx.fillStyle = p.color;
            if (p.shape === 'circle') {
              confettiCtx.beginPath(); confettiCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2); confettiCtx.fill();
            } else if (p.shape === 'square') {
              confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            } else {
              confettiCtx.beginPath(); confettiCtx.moveTo(0, -p.size / 2);
              confettiCtx.lineTo(p.size / 2, p.size / 2); confettiCtx.lineTo(-p.size / 2, p.size / 2);
              confettiCtx.closePath(); confettiCtx.fill();
            }
            confettiCtx.restore();
          }
        }
        if (!active) { confettiActive = false; confettiParticles = []; }
      }

        // Reset arcs to empty
        document.getElementById('timer-arc-human').style.strokeDashoffset = CIRC;

      function startTimer(isHumanTurn) {
        stopTimer();
        if (mancheOver || matchOver) return;
        timerActive = true;
        timerStart = Date.now();

        var arcId  = isHumanTurn ? 'timer-arc-human' : 'timer-arc-ai';
        var profId = isHumanTurn ? 'profile-human'   : 'profile-ai';
        var arc    = document.getElementById(arcId);
        var prof   = document.getElementById(profId);

        prof.classList.add('active', isHumanTurn ? 'human-active' : 'ai-active');

        function tick() {
          if (!timerActive) return;
          var elapsed  = Date.now() - timerStart;
          var progress = Math.min(elapsed / TIMER_DURATION, 1);
          var offset   = CIRC * progress;
          arc.style.strokeDashoffset = offset;

          // Urgent flash in last 5s
          if (progress >= 0.67 && isHumanTurn) {
            prof.classList.add('timer-urgent');
          }

          if (progress < 1) {
            timerRAF = requestAnimationFrame(tick);
          } else {
            // Time expired
            timerActive = false;
            timerRAF = null;
            if (isHumanTurn && gameReady && !mancheOver && !matchOver) {
              // Auto-play random empty cell for human
              var empties = [];
              for (var i = 0; i < 9; i++) if (!board[i]) empties.push(i);
              if (empties.length > 0) {
                var pick = empties[Math.floor(Math.random() * empties.length)];
                playCell(Math.floor(pick / 3), pick % 3);
              }
            }
          }
        }
        timerRAF = requestAnimationFrame(tick);
      }

});

document.getElementById('btn-cam').addEventListener('click',function(){
  autoRotate=!autoRotate;
  camAngle=camTheta;
  var btn=document.getElementById('btn-cam');
  if(autoRotate)btn.classList.add('active-cam');
  else btn.classList.remove('active-cam');
});

function closeGame(){
  if(window.parent&&window.parent!==window)window.parent.postMessage({type:'ttt:closed'},'*');
  else window.history.back();
}
document.getElementById('btn-close').addEventListener('click',closeGame);
document.getElementById('btn-modal-close').addEventListener('click',closeGame);

function initSocket(){
  socket=io({transports:['websocket']});
  var waitEl=document.getElementById('mp-waiting');
  var waitMsg=document.getElementById('mp-wait-msg');

  socket.on('connect',function(){
    if(waitMsg)waitMsg.textContent='Connecté. En attente de l'adversaire…';
    socket.emit('ttt:join',{gameId:MP_GAME_ID,playerId:MP_PLAYER,betAmount:MP_BET});
  });

  socket.on('ttt:ready',function(data){
    MY_SYMBOL=data.symbol;OPP_SYMBOL=MY_SYMBOL==='X'?'O':'X';humanSymbol=MY_SYMBOL;aiSymbol=OPP_SYMBOL;
    if(waitEl)waitEl.style.display='none';
    document.getElementById('name-human').textContent='VOUS';
    document.getElementById('name-ai').textContent=(data.opponentName||'Adversaire').substring(0,10).toUpperCase();
    updUI();
    showToast('🎲','Vous jouez '+MY_SYMBOL,MP_BET>0?'Mise : '+MP_BET+' HTG':'Bonne chance !',2200,null);
  });

  socket.on('ttt:state',function(data){
    MY_SYMBOL=data.symbol;OPP_SYMBOL=MY_SYMBOL==='X'?'O':'X';humanSymbol=MY_SYMBOL;aiSymbol=OPP_SYMBOL;
    matchW=data.scores?data.scores[MY_SYMBOL]||0:0;matchR=data.scores?data.scores[OPP_SYMBOL]||0:0;
    manchesDone=Math.max(0,(data.round||1)-1);isTiebreaker=!!data.tieBreak;
    board=data.board?data.board.slice():Array(9).fill(null);meshes=Array(9).fill(null);
    while(piecesGroup.children.length)piecesGroup.remove(piecesGroup.children[0]);
    for(var ci=0;ci<9;ci++){if(board[ci]){var m=board[ci]==='X'?makeX(Math.floor(ci/3),ci%3):makeO(Math.floor(ci/3),ci%3);meshes[ci]=m;m.scale.set(1,1,1);initPiecePhysics(m);}}
    MY_TURN=(data.curTurn===MY_SYMBOL);gameReady=MY_TURN;isProcessing=false;mancheOver=false;matchOver=false;
    if(waitEl)waitEl.style.display='none';
    document.getElementById('name-ai').textContent=(data.opponentName||'Adversaire').substring(0,10).toUpperCase();
    updateDots();updUI();showToast('🔄','Reconnecté !','La partie reprend',1800,null);
  });

  socket.on('ttt:move',function(data){
    var r=Math.floor(data.cell/3),c=data.cell%3;
    placeSymbol(data.symbol,r,c);clearHL();
    var win=checkWin(board,data.symbol);
    if(win){handleWin(data.symbol,win);return;}
    if(isDraw(board)){handleDraw();return;}
    var nextTurn=data.symbol==='X'?'O':'X';
    MY_TURN=(nextTurn===MY_SYMBOL);isProcessing=false;gameReady=MY_TURN;
    updUI();
  });

  socket.on('ttt:turn_start',function(data){
    stopTimer();MY_TURN=(data.symbol===MY_SYMBOL);gameReady=MY_TURN;isProcessing=false;
    startTimer(MY_TURN);
  });

  socket.on('ttt:turn_warning',function(data){if(!timerActive)startTimer(data.symbol===MY_SYMBOL);});

  socket.on('ttt:turn_sync',function(data){
    var isMe=(data.turnSymbol===MY_SYMBOL);MY_TURN=isMe;gameReady=isMe;isProcessing=false;
    var elapsed=Date.now()-(data.turnStartTime||data.graceStartTime||Date.now());
    stopTimer();timerStart=Date.now()-Math.min(elapsed,TIMER_DURATION-500);
    var prof=document.getElementById(isMe?'profile-human':'profile-ai');
    var arc=document.getElementById(isMe?'timer-arc-human':'timer-arc-ai');
    if(prof)prof.classList.add('active',isMe?'human-active':'ai-active');
    timerActive=true;
    (function tick(){if(!timerActive)return;var p=Math.min((Date.now()-timerStart)/TIMER_DURATION,1);if(arc)arc.style.strokeDashoffset=CIRC*p;if(p<1)timerRAF=requestAnimationFrame(tick);else timerActive=false;})();
  });

  function showResult(data){
    stopTimer();matchOver=true;gameReady=false;
    var isWin=(data.result==='win'),isDrw=(data.result==='draw');
    if(isWin||isDrw)createConfetti();
    document.getElementById('m-emoji').textContent=isWin?'🏆':isDrw?'🤝':'😔';
    document.getElementById('m-title').textContent=isWin?'Victoire !':isDrw?'Match nul !':'Défaite';
    var g=isWin&&data.netGain?'
+'+data.netGain+' HTG':!isWin&&!isDrw&&data.betAmount?'
-'+data.betAmount+' HTG':'';
    document.getElementById('m-msg').textContent=(isWin?'Vous remportez !':isDrw?'Égalité !':'Votre adversaire gagne.')+g;
    document.getElementById('btn-close').style.display='';
    document.getElementById('modal').classList.add('on');
    socket.emit('ttt:match_over',{gameId:MP_GAME_ID,winner:data.winnerSymbol,scores:data.scores||{X:matchW,O:matchR}});
  }

  socket.on('ttt:over',showResult);
  socket.on('game:over',function(data){if(!matchOver)showResult(data);});

  socket.on('player:disconnected',function(){
    var banner=document.getElementById('mp-dc-banner'),cntEl=document.getElementById('mp-dc-countdown');
    if(banner)banner.style.display='block';
    var secs=60;if(cntEl)cntEl.textContent=secs;
    if(dcInterval)clearInterval(dcInterval);
    dcInterval=setInterval(function(){secs--;if(cntEl)cntEl.textContent=Math.max(0,secs);if(secs<=0){clearInterval(dcInterval);dcInterval=null;}},1000);
  });

  socket.on('player:reconnected',function(){
    var banner=document.getElementById('mp-dc-banner');if(banner)banner.style.display='none';
    if(dcInterval){clearInterval(dcInterval);dcInterval=null;}
    showToast('✅','Adversaire reconnecté !','La partie reprend',1800,null);
  });

  socket.on('disconnect',function(){
    if(!matchOver&&waitEl){waitEl.style.display='flex';if(waitMsg)waitMsg.textContent='Connexion perdue...';}
  });
}

initSocket();
} // end startGame
})();
</script>
