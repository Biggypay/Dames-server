<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe 3D Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);z-index:20;gap:8px}

.profile{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px}
.profile-timer-wrap{position:relative;width:58px;height:58px}
.profile-timer-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-arc{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke 0.3s}
.profile-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);transition:border-color 0.3s,box-shadow 0.3s,background 0.3s}
.profile.active .profile-avatar{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.10)}
.profile.active.human-active .profile-avatar{box-shadow:0 0 18px rgba(220,235,255,0.5)}
.profile.active.ai-active .profile-avatar{box-shadow:0 0 18px rgba(231,76,60,0.5)}

.av-x{position:relative;width:28px;height:28px}
.av-x-arm{position:absolute;top:50%;left:50%;width:28px;height:6px;border-radius:3px;background:linear-gradient(90deg,#c8d8f0,#e2e8f0,#c8d8f0);box-shadow:0 2px 6px rgba(200,220,255,0.5);transform-origin:center}
.av-x-arm:nth-child(1){transform:translate(-50%,-50%) rotate(45deg)}
.av-x-arm:nth-child(2){transform:translate(-50%,-50%) rotate(-45deg)}
.av-o{width:24px;height:24px;border-radius:50%;border:5px solid #c0392b;box-shadow:0 0 10px rgba(192,57,43,0.6),inset 0 2px 4px rgba(255,120,100,0.3)}

.profile-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;transition:color 0.3s}
.profile.active .profile-name{color:rgba(255,255,255,0.9)}

.top-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.timer-urgent .timer-arc{animation:urgentPulse 0.5s infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:0.4}}

.btns{display:flex;gap:7px}
.btn{background:rgba(255,255,255,0.10);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:99px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(255,255,255,0.25);transform:scale(0.95)}
.btn.active-cam{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.7);color:#fbbf24}
.btn-topview{display:flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border-radius:50%;flex-shrink:0;color:rgba(255,255,255,0.7);transition:all .2s}
.btn-topview.active-top{background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.7);color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.3)}

#wrap{flex:1 1 auto;position:relative;overflow:hidden;touch-action:none}

#manche-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:7px;align-items:center;z-index:15;pointer-events:none}
.mdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.07);transition:all .35s ease}
.mdot.win-w{background:#e2e8f0;border-color:#e2e8f0;box-shadow:0 0 12px rgba(200,220,255,.9)}
.mdot.win-r{background:#e74c3c;border-color:#e74c3c;box-shadow:0 0 12px rgba(231,76,60,.9)}
.mdot.draw-d{background:#fbbf24;border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.7)}
.mdot.current{border-color:rgba(255,255,255,.8);animation:pulse-dot 1s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}50%{box-shadow:0 0 0 5px rgba(255,255,255,.0)}}
.mdot.tie{border-color:#fbbf24;border-style:dashed}
.manche-sep{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.3)}

/* ── Identique Dames ── */
#reconn-bar{position:absolute;top:0;left:0;right:0;z-index:150;background:rgba(120,20,20,0.92);color:#fff;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px;display:none}
#reconn-bar.show{display:block}
#forfeit-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(30,27,75,0.95);border:1px solid rgba(251,191,36,0.5);border-radius:99px;padding:8px 20px;font-family:'Cinzel',serif;font-size:12px;color:#fbbf24;display:none;z-index:25;backdrop-filter:blur(8px)}
#forfeit-bar.show{display:block}

#loading{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
.spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:#fbbf24;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,.55);margin-top:16px;font-size:11px;letter-spacing:4px;font-family:'Cinzel',serif;text-align:center;padding:0 16px}

#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(30,27,75,.97),rgba(49,46,129,.97));border:1.5px solid rgba(251,191,36,.6);border-radius:20px;padding:28px 32px;text-align:center;pointer-events:none;z-index:40;display:none;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:220px}
#toast-emoji{font-size:48px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.sym-x-wrap{position:relative;width:72px;height:72px}
.sym-x-arm{position:absolute;top:50%;left:50%;width:64px;height:14px;border-radius:7px;background:linear-gradient(135deg,#f0f4ff,#c8d8f0,#dde6f0);box-shadow:0 4px 14px rgba(180,210,255,0.7),0 0 0 2px rgba(255,255,255,0.3);transform-origin:center center}
.sym-x-arm:nth-child(1){transform:translate(-50%,-50%) rotate(45deg)}
.sym-x-arm:nth-child(2){transform:translate(-50%,-50%) rotate(-45deg)}
.sym-o-ring{width:66px;height:66px;border-radius:50%;background:transparent;border:13px solid #c0392b;box-shadow:0 0 0 3px #e74c3c,inset 0 3px 8px rgba(255,120,100,0.5),0 6px 20px rgba(192,57,43,0.7),0 0 30px rgba(231,76,60,0.4);position:relative}
.sym-o-ring::after{content:'';position:absolute;top:6px;left:10px;width:18px;height:8px;border-radius:50%;background:rgba(255,180,160,0.45);transform:rotate(-20deg)}
#toast-title{font-family:'Cinzel',serif;color:#fbbf24;font-size:22px;font-weight:700;margin-bottom:6px}
#toast-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:1px;white-space:pre-line}

#confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55}
#hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;pointer-events:none;z-index:5}

#bot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.15);z-index:20}
.score-row{display:flex;gap:8px;align-items:center}
.snum{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
.sw{color:#e2e8f0}.sr{color:#f87171}.ssep{color:rgba(255,255,255,.3);font-size:13px}
.manche-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px}

@keyframes scoreHuman{0%{transform:translateY(-32px) scale(0.4) rotate(-8deg);opacity:0}40%{transform:translateY(6px) scale(1.35) rotate(3deg);opacity:1}60%{transform:translateY(-4px) scale(0.92) rotate(-2deg)}75%{transform:translateY(3px) scale(1.08) rotate(1deg)}88%{transform:translateY(-2px) scale(0.97) rotate(0deg)}100%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}}
@keyframes scoreAI{0%{transform:translateY(28px) scale(0.3) rotate(12deg);opacity:0}35%{transform:translateY(-5px) scale(1.4) rotate(-4deg);opacity:1}55%{transform:translateY(3px) scale(0.88) rotate(2deg)}72%{transform:translateY(-2px) scale(1.06) rotate(-1deg)}86%{transform:translateY(1px) scale(0.98) rotate(0deg)}100%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}}
.score-anim-human{animation:scoreHuman 0.72s cubic-bezier(0.22,1,0.36,1) forwards}
.score-anim-ai{animation:scoreAI 0.68s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes scoreGlowW{0%{text-shadow:0 0 0px #e2e8f0}30%{text-shadow:0 0 22px #ffffff,0 0 40px #b0ccff}100%{text-shadow:none}}
@keyframes scoreGlowR{0%{text-shadow:0 0 0px #f87171}30%{text-shadow:0 0 22px #ff8888,0 0 40px #ff4444}100%{text-shadow:none}}
.score-glow-w{animation:scoreGlowW 0.9s ease-out forwards}
.score-glow-r{animation:scoreGlowR 0.9s ease-out forwards}
</style>
</head>
<body>

<div id="top">
  <div class="profile" id="profile-human">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-human" cx="29" cy="29" r="26" stroke="#dde6f0"/></svg>
      <div class="profile-avatar" id="avatar-human">
        <div class="av-x"><div class="av-x-arm"></div><div class="av-x-arm"></div></div>
      </div>
    </div>
    <div class="profile-name" id="name-human">VOUS</div>
  </div>

  <div class="top-center">
    <div class="score-row">
      <span class="snum sw" id="score-w">0</span>
      <span class="ssep">–</span>
      <span class="snum sr" id="score-r">0</span>
    </div>
    <span class="manche-lbl" id="manche-lbl">Manche 1 / 5</span>
  </div>

  <div class="profile" id="profile-ai">
    <div class="profile-timer-wrap">
      <svg viewBox="0 0 58 58"><circle class="timer-track" cx="29" cy="29" r="26"/><circle class="timer-arc" id="timer-arc-ai" cx="29" cy="29" r="26" stroke="#e74c3c"/></svg>
      <div class="profile-avatar" id="avatar-ai">
        <div class="av-o"></div>
      </div>
    </div>
    <div class="profile-name" id="name-ai">ADV</div>
  </div>
</div>

<div id="wrap">
  <div id="loading"><div class="spin"></div><p id="loading-text">CONNEXION EN COURS…</p></div>
  <canvas id="confetti-canvas"></canvas>
  <div id="reconn-bar">📡 RECONNEXION EN COURS…</div>
  <div id="forfeit-bar"></div>
  <div id="manche-bar"></div>
  <div id="hint">👌 Pince = zoom · Glisse = tourner · Tap = jouer</div>
  <div id="toast"><div id="toast-emoji"></div><div id="toast-title"></div><div id="toast-sub"></div></div>
</div>

<div id="bot">
  <div style="display:flex;gap:7px;flex-shrink:0">
    <button class="btn btn-topview" id="btn-topview" title="Changer vue">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="11" y1="2" x2="11" y2="16" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/><line x1="2" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.1"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="btns">
    <button class="btn" id="btn-cam">⟳ Auto</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script>
window.onerror=function(msg,url,line,col,err){
  var ld=document.getElementById('loading');
  if(ld){ld.querySelector('p').textContent='ERREUR JS: '+msg+' (L'+line+')';}
  return false;
};
(function(){
'use strict';

/* ══════════════════════════════════════════
   URL PARAMS
══════════════════════════════════════════ */
var P=new URLSearchParams(window.location.search);
var ROOM_ID   =P.get('room')    ||'';
var MY_SLOT   =parseInt(P.get('player')||'1',10);
var P1_ID     =P.get('p1Id')    ||'';
var P2_ID     =P.get('p2Id')    ||'';
var P1_NAME   =P.get('p1Name')  ||'Joueur 1';
var P2_NAME   =P.get('p2Name')  ||'Joueur 2';
var BET_AMOUNT=parseFloat(P.get('bet')||'0');
var CURRENCY  =P.get('currency')||'HTG';
var TOTAL_MANCHES=parseInt(P.get('manches')||'5',10);

if(!ROOM_ID&&P1_ID&&P2_ID){
  var _ids=[P1_ID,P2_ID].sort();
  ROOM_ID='ttt-'+_ids[0].slice(-8)+'-'+_ids[1].slice(-8);
}
if(!ROOM_ID){ROOM_ID=P.get('gameId')||P.get('matchId')||'';}

/* FIX : indices 0-based cohérents partout — identique Dames */
var MY_PLAYER      = MY_SLOT===1?0:1;   /* 0 = X (commence), 1 = O */
var MY_SUPABASE_ID = MY_SLOT===1?P1_ID:P2_ID;
var OP_SUPABASE_ID = MY_SLOT===1?P2_ID:P1_ID;
var MY_NAME        = MY_SLOT===1?P1_NAME:P2_NAME;
var OP_NAME        = MY_SLOT===1?P2_NAME:P1_NAME;
var MY_SYMBOL  = MY_SLOT===1?'X':'O';
var OP_SYMBOL  = MY_SLOT===1?'O':'X';

/* ══════════════════════════════════════════
   SOCKET & RÉSULTAT
══════════════════════════════════════════ */
var socket=null;
var resultSent=false;
var forfeitTimer=null,forfeitCountdown=0;

function hideLoading(){
  var ldEl=document.getElementById('loading');
  if(ldEl){ldEl.style.opacity='0';ldEl.style.display='none';}
}
function emitJoin(){
  socket.emit('ttt_join',{
    room:ROOM_ID,player:MY_SLOT,
    supabaseId:MY_SUPABASE_ID,name:MY_NAME,
    bet:BET_AMOUNT,currency:CURRENCY,
    manches:TOTAL_MANCHES
  });
}
function sendResult(outcome,reason){
  if(resultSent)return;resultSent=true;
  var winnerId=outcome==='win'?MY_SUPABASE_ID:OP_SUPABASE_ID;
  var loserId =outcome==='win'?OP_SUPABASE_ID:MY_SUPABASE_ID;
  var msg={type:'game_result',game:'dames',room:ROOM_ID,winner:winnerId,loser:loserId,bet:BET_AMOUNT,currency:CURRENCY,reason:reason||'normal',p1Id:P1_ID,p2Id:P2_ID};
  try{window.parent.postMessage(msg,'*');}catch(e){}
  if(socket&&socket.connected)socket.emit('ttt_result',msg);
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
var gameOver=false,gameReady=false,isProcessing=false;
var mancheOver=false,matchOver=false;
var matchW=0,matchR=0,manchesDone=0,mancheResults=[];
var isTiebreaker=false;
var currentPlayer=0;
var board=[null,null,null,null,null,null,null,null,null];
var meshes=[null,null,null,null,null,null,null,null,null];
var mancheStarterPlayer=0;

/* Timer — identique Dames */
var TIMER_DURATION=30000,CIRC=2*Math.PI*26;
var timerStart=null,timerRAF=null,timerActive=false;
var graceRAF=null,graceActive=false;

/* BUG 1 FIX : stockage du timer en attente quand gameReady est encore false — identique Dames */
var pendingTimerData=null;

function applyPendingTimer(){
  if(!pendingTimerData)return;
  var d=pendingTimerData;
  pendingTimerData=null;
  if(gameOver||mancheOver||matchOver)return;
  if(d.type==='turn_start'){
    stopGraceTimer();
    var isMyTurn=(d.player===MY_SLOT);
    startTimer(isMyTurn,d.startTime);
  }else if(d.type==='sync'){
    var offset=Date.now()-d.serverTime;
    var isMyTurn2=(d.turnPlayer===MY_SLOT);
    if(d.graceStartTime)startGraceTimer(isMyTurn2,d.graceStartTime+offset,60000);
    else if(d.turnStartTime)startTimer(isMyTurn2,d.turnStartTime+offset);
  }
}

/* ══════════════════════════════════════════
   THREE.JS
══════════════════════════════════════════ */
var wrap=document.getElementById('wrap');
var scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x1e1b4b,18,55);

var camD=14,camPhi=0.78,camTheta=MY_PLAYER===0?Math.PI:0;
var autoRotate=false;
var camera=new THREE.PerspectiveCamera(45,1,0.1,1000);
function setCam(){
  camera.position.set(camD*Math.sin(camPhi)*Math.sin(camTheta),camD*Math.cos(camPhi),camD*Math.sin(camPhi)*Math.cos(camTheta));
  camera.lookAt(0,0,0);
}
setCam();

var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
wrap.appendChild(renderer.domElement);

function resize(){
  var w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
  var cc=document.getElementById('confetti-canvas');
  if(cc){cc.width=w;cc.height=h;}
}
resize();
window.addEventListener('resize',resize);

scene.add(new THREE.AmbientLight(0xffffff,0.45));
var dirLight=new THREE.DirectionalLight(0xffffff,0.85);
dirLight.position.set(8,18,10);dirLight.castShadow=true;
dirLight.shadow.mapSize.width=1024;dirLight.shadow.mapSize.height=1024;
dirLight.shadow.camera.near=0.5;dirLight.shadow.camera.far=40;
dirLight.shadow.camera.left=-8;dirLight.shadow.camera.right=8;
dirLight.shadow.camera.top=8;dirLight.shadow.camera.bottom=-8;
scene.add(dirLight);
var spotLight=new THREE.SpotLight(0xfbbf24,0.5);spotLight.position.set(-8,14,-5);spotLight.angle=Math.PI/6;spotLight.penumbra=0.5;scene.add(spotLight);
var rimLight=new THREE.DirectionalLight(0x818cf8,0.3);rimLight.position.set(0,5,-10);scene.add(rimLight);

var boardGroup=new THREE.Group(),piecesGroup=new THREE.Group(),hlGroup=new THREE.Group();
var particlesGroup=new THREE.Group(),winHlGroup=new THREE.Group();
scene.add(boardGroup);scene.add(piecesGroup);scene.add(hlGroup);
scene.add(particlesGroup);scene.add(winHlGroup);

/* Plateau */
var baseMat=new THREE.MeshStandardMaterial({color:0x2d1f16,roughness:0.9});
var base=new THREE.Mesh(new THREE.BoxGeometry(6.6,0.22,6.6),baseMat);
base.position.y=-0.11;base.receiveShadow=true;boardGroup.add(base);
var surfMat=new THREE.MeshStandardMaterial({color:0x1a1230,roughness:0.6,metalness:0.1});
var surf=new THREE.Mesh(new THREE.BoxGeometry(6.0,0.12,6.0),surfMat);
surf.position.y=0.04;surf.receiveShadow=true;boardGroup.add(surf);
var lineMat=new THREE.MeshStandardMaterial({color:0xfbbf24,roughness:0.2,metalness:0.8,emissive:0xfbbf24,emissiveIntensity:0.08});
var vGeo=new THREE.BoxGeometry(0.06,0.18,6.0),hGeo2=new THREE.BoxGeometry(6.0,0.18,0.06);
for(var li=0;li<2;li++){
  var vl=new THREE.Mesh(vGeo,lineMat);vl.position.set([-1,1][li],0.09,0);boardGroup.add(vl);
  var hl2=new THREE.Mesh(hGeo2,lineMat);hl2.position.set(0,0.09,[-1,1][li]);boardGroup.add(hl2);
}
var cellMeshes=[];
var cellGeo=new THREE.PlaneGeometry(1.8,1.8);
var cellMatInvis=new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide});
for(var ci=0;ci<3;ci++){for(var cj=0;cj<3;cj++){
  var cell=new THREE.Mesh(cellGeo,cellMatInvis.clone());
  cell.rotation.x=-Math.PI/2;cell.position.set((cj-1)*2,0.2,(ci-1)*2);
  cell.userData.row=ci;cell.userData.col=cj;
  boardGroup.add(cell);cellMeshes.push(cell);
}}

/* ══════════════════════════════════════════
   PARTICULES
══════════════════════════════════════════ */
var particles=[];
function createExplosion(x,y,z,color,count){
  count=count||30;
  var geo=new THREE.SphereGeometry(0.08,8,8);
  var mat=new THREE.MeshBasicMaterial({color:color});
  for(var i=0;i<count;i++){
    var pm=new THREE.Mesh(geo,mat);
    pm.position.set(x,y,z);
    pm.userData={velocity:new THREE.Vector3((Math.random()-.5)*0.3,Math.random()*0.4+0.1,(Math.random()-.5)*0.3),life:1.0,decay:0.015+Math.random()*0.01};
    particlesGroup.add(pm);particles.push(pm);
  }
}
function createWinBurst(pos,type){
  var colors=type==='X'?[0xe2e8f0,0xffffff,0xfbbf24]:[0xe74c3c,0xff6b6b,0xfbbf24];
  for(var i=0;i<3;i++){(function(idx){setTimeout(function(){createExplosion(pos.x+(Math.random()-.5)*0.5,pos.y,pos.z+(Math.random()-.5)*0.5,colors[idx%colors.length],20);},idx*100);})(i);}
}
function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.userData.life-=p.userData.decay;
    p.position.add(p.userData.velocity);
    p.userData.velocity.y-=0.015;
    var s=Math.max(0,p.userData.life);
    p.scale.set(s,s,s);
    if(p.userData.life<=0){particlesGroup.remove(p);particles.splice(i,1);}
  }
}

function animPop(mesh){
  var t0=Date.now(),DUR=750;
  function eoe(t){if(t===0||t===1)return t;var p=0.38,s=p/(2*Math.PI)*Math.asin(1);return Math.pow(2,-10*t)*Math.sin((t-s)*(2*Math.PI)/p)+1;}
  function eoc(t){return 1-Math.pow(1-t,3);}
  function loop(){var p=Math.min((Date.now()-t0)/DUR,1);var sv=Math.max(0,eoe(p));mesh.scale.set(sv,sv,sv);var dp=Math.min(p*1.4,1);mesh.position.y=0.35+(1-eoc(dp))*2.2;if(p<1)requestAnimationFrame(loop);else{mesh.scale.set(1,1,1);mesh.position.y=0.35;}}
  loop();
}
function balloonPop(mesh,onComplete){
  var startTime=Date.now(),startScale=mesh.scale.x;
  createWinBurst(mesh.position,mesh.userData.type);
  function animate(){
    var p=(Date.now()-startTime)/400;
    if(p<0.3){var expand=1+Math.sin(p*Math.PI*3.33)*0.3;mesh.scale.setScalar(startScale*expand);}
    else if(p<0.5){var shrink=1-(p-0.3)*5;mesh.scale.setScalar(startScale*Math.max(0,shrink));mesh.rotation.y+=0.3;mesh.rotation.z+=0.2;}
    else{mesh.visible=false;if(onComplete)onComplete();return;}
    requestAnimationFrame(animate);
  }
  animate();
}
function clearBoardSilent(onComplete){
  var all=[];
  for(var i=0;i<piecesGroup.children.length;i++)all.push(piecesGroup.children[i]);
  if(all.length===0){if(onComplete)onComplete();return;}
  var cleared=0;
  all.forEach(function(piece,i){
    setTimeout(function(){
      var st=Date.now();
      function shrink(){var p=(Date.now()-st)/320;if(p<1){var sc=1-p;piece.scale.set(sc,sc,sc);requestAnimationFrame(shrink);}else{piece.scale.set(0,0,0);piecesGroup.remove(piece);cleared++;if(cleared===all.length&&onComplete)onComplete();}}
      shrink();
    },i*50);
  });
}

/* ══════════════════════════════════════════
   LOGIQUE JEU
══════════════════════════════════════════ */
var LINES=[
  [{row:0,col:0},{row:0,col:1},{row:0,col:2}],
  [{row:1,col:0},{row:1,col:1},{row:1,col:2}],
  [{row:2,col:0},{row:2,col:1},{row:2,col:2}],
  [{row:0,col:0},{row:1,col:0},{row:2,col:0}],
  [{row:0,col:1},{row:1,col:1},{row:2,col:1}],
  [{row:0,col:2},{row:1,col:2},{row:2,col:2}],
  [{row:0,col:0},{row:1,col:1},{row:2,col:2}],
  [{row:0,col:2},{row:1,col:1},{row:2,col:0}]
];
function bIdx(r,c){return r*3+c;}
function checkWin(b,sym){
  for(var li=0;li<LINES.length;li++){
    var ln=LINES[li];
    if(b[bIdx(ln[0].row,ln[0].col)]===sym&&b[bIdx(ln[1].row,ln[1].col)]===sym&&b[bIdx(ln[2].row,ln[2].col)]===sym)return ln;
  }
  return null;
}
function isDraw(b){for(var i=0;i<9;i++)if(!b[i])return false;return true;}

function placeSymbol(sym,row,col){
  board[bIdx(row,col)]=sym;
  var m=sym==='X'?makeX(row,col):makeO(row,col);
  meshes[bIdx(row,col)]=m;
  initPiecePhysics(m);
  animPop(m);
}

/* ══════════════════════════════════════════
   SOCKET.IO — identique Dames
══════════════════════════════════════════ */
function initSocket(){
  var lt=document.querySelector('#loading-text');
  if(lt)lt.textContent='ROOM: '+(ROOM_ID||'MANQUANT')+' | SLOT: '+MY_SLOT;

  socket=io({
    transports:['websocket','polling'],
    reconnection:true,
    reconnectionAttempts:Infinity,
    reconnectionDelay:1000,
    reconnectionDelayMax:5000,
    timeout:20000
  });

  socket.on('connect',function(){
    document.getElementById('reconn-bar').classList.remove('show');
    emitJoin();
  });

  socket.on('disconnect',function(){
    if(!gameOver)document.getElementById('reconn-bar').classList.add('show');
  });

  socket.on('connect_error',function(){
    var lt2=document.querySelector('#loading-text');
    if(lt2&&!gameReady)lt2.textContent='CONNEXION IMPOSSIBLE — Vérifiez votre réseau';
  });

  /* ─────────────────────────────────────────────────────
     ttt_start — identique dames_start (FIX 3)
     Reconnexion complète avec restauration d'état.
  ───────────────────────────────────────────────────── */
  socket.on('ttt_start',function(data){
    var ldEl=document.getElementById('loading');
    if(ldEl){ldEl.style.opacity='0';setTimeout(function(){ldEl.style.display='none';},400);}

    if(data.reconnected&&gameReady){
      /* Reconnexion rapide — partie déjà affichée */
      gameOver=false;isProcessing=false;
      stopForfeitCountdown();
      showToast('📶','Connexion rétablie','La partie reprend !',2000,function(){updUI();});

    }else if(data.reconnected&&!gameReady&&!data.gameState){
      /* Reconnexion sans état → redémarrer */
      startMatch();

    }else if(data.reconnected&&data.gameState){
      /* FIX 3 : restauration complète */
      gameOver=false;isProcessing=false;resultSent=false;
      mancheOver=false;matchOver=false;
      stopForfeitCountdown();
      try{
        var gs=data.gameState;
        board=gs.board||[null,null,null,null,null,null,null,null,null];
        currentPlayer=gs.currentPlayer!==undefined?gs.currentPlayer:0;
        matchW=gs.matchW||0;matchR=gs.matchR||0;
        manchesDone=gs.manchesDone||0;mancheResults=gs.mancheResults||[];
        isTiebreaker=gs.isTiebreaker||false;
        mancheStarterPlayer=gs.mancheStarterPlayer||0;
        while(piecesGroup.children.length)piecesGroup.remove(piecesGroup.children[0]);
        meshes=[null,null,null,null,null,null,null,null,null];
        piecePhysics={};
        for(var r=0;r<3;r++)for(var c=0;c<3;c++){
          var sym=board[bIdx(r,c)];
          if(sym){var m2=sym==='X'?makeX(r,c):makeO(r,c);m2.scale.set(1,1,1);meshes[bIdx(r,c)]=m2;initPiecePhysics(m2);}
        }
        clearHL();stopTimer();stopGraceTimer();
        updateDots();
        showToast('📶','Partie restaurée','Reprise là où vous étiez !',2400,function(){
          gameReady=true;updUI();
          /* BUG 1 FIX : appliquer le timer en attente après gameReady */
          applyPendingTimer();
        });
      }catch(e){startMatch();}

    }else{
      startMatch();
    }
  });

  /* ─────────────────────────────────────────────────────
     FIX 1 : ttt_turn_start — identique dames_turn_start.
     Toujours stocker. Démarrer si gameReady.
  ───────────────────────────────────────────────────── */
  socket.on('ttt_turn_start',function(data){
    if(gameOver||mancheOver||matchOver)return;
    /* Toujours stocker — évite la perte si arrivé avant gameReady */
    pendingTimerData={type:'turn_start',player:data.player,startTime:data.startTime};
    if(!gameReady)return;
    pendingTimerData=null;
    stopGraceTimer();
    var isMyTurn=(data.player===MY_SLOT);
    startTimer(isMyTurn,data.startTime);
  });

  socket.on('ttt_turn_warning',function(data){
    if(gameOver||mancheOver||matchOver)return;
    var isMyTurn=(data.player===MY_SLOT);
    startGraceTimer(isMyTurn,data.startTime,data.duration);
  });

  /* FIX 1 : ttt_turn_sync — identique dames_turn_sync */
  socket.on('ttt_turn_sync',function(data){
    if(gameOver||mancheOver||matchOver)return;
    pendingTimerData={type:'sync',serverTime:data.serverTime,turnPlayer:data.turnPlayer,graceStartTime:data.graceStartTime||null,turnStartTime:data.turnStartTime||null};
    if(!gameReady)return;
    pendingTimerData=null;
    var offset=Date.now()-data.serverTime;
    if(data.graceStartTime){var isMyTurn=(data.turnPlayer===MY_SLOT);startGraceTimer(isMyTurn,data.graceStartTime+offset,60000);}
    else if(data.turnStartTime){var isMyTurn2=(data.turnPlayer===MY_SLOT);startTimer(isMyTurn2,data.turnStartTime+offset);}
  });

  /* ─────────────────────────────────────────────────────
     ttt_move — NE PAS appeler stopTimer() ici.
     Le serveur émet ttt_turn_start AVANT de relayer ttt_move.
     stopTimer() ici tuerait le timer de mon tour.
     Identique au commentaire Dames executeRemoteSequence.
  ───────────────────────────────────────────────────── */
  socket.on('ttt_move',function(data){
    if(data.player===MY_SLOT)return;
    if(mancheOver||matchOver||isProcessing)return;
    isProcessing=true;
    var sym=data.player===1?'X':'O';
    placeSymbol(sym,data.row,data.col);
    clearHL();
    var win=checkWin(board,sym);
    if(win){handleWin(sym,win);return;}
    if(isDraw(board)){handleDraw();return;}
    currentPlayer=MY_PLAYER;
    isProcessing=false;
    gameReady=true;
    updUI();
    /* Appliquer timer en attente si ttt_turn_start est arrivé pendant isProcessing */
    if(!timerActive&&!graceActive)applyPendingTimer();
  });

  socket.on('ttt_manche_result',function(data){
    if(mancheOver||matchOver)return;
    if(data.winner==='draw'){handleDraw();}
    else{var winSym=data.winner===1?'X':'O';var winLine=data.winLine||null;if(winLine)handleWin(winSym,winLine);else handleDraw();}
  });

  /* ── Déconnexion adversaire — identique Dames ── */
  socket.on('ttt_opponent_disconnected',function(){
    if(gameOver)return;startForfeitCountdown(60);
  });

  socket.on('ttt_player_status',function(data){
    if(data.slot===MY_SLOT)return;
    document.getElementById('profile-ai').style.opacity=data.connected?'1':'0.45';
  });

  socket.on('ttt_game_resumed',function(data){
    stopForfeitCountdown();
    document.getElementById('profile-ai').style.opacity='1';
    showToast('▶️','Partie reprise',data.message||'Les deux joueurs sont de retour !',2000,function(){
      if(gameReady&&!gameOver)updUI();
    });
  });

  socket.on('player:reconnected',function(data){
    stopForfeitCountdown();
    showToast('✅','Adversaire reconnecté',data.message||'La partie reprend !',2500,function(){
      if(gameReady&&!gameOver)updUI();
    });
  });

  /* ── game:over — identique Dames (hideLoading avant toast) ── */
  socket.on('game:over',function(d){
    if(gameOver)return;
    hideLoading();
    stopForfeitCountdown();
    if(d.result==='cancel'){
      gameOver=true;matchOver=true;mancheOver=true;
      stopTimer();stopGraceTimer();pendingTimerData=null;
      var penalty=d.penalty||0;
      showToast('⚠️','Partie annulée',
        'Les deux joueurs se sont déconnectés.\nPénalité de '+penalty+' HTG appliquée.',
        4000,function(){sendResult('cancel','both_disconnected');});
      return;
    }
    var iWon=d.winnerSupabaseId===MY_SUPABASE_ID||
             (d.winnerSlot&&d.winnerSlot===MY_SLOT)||
             (d.winner==='player1'&&MY_SLOT===1)||
             (d.winner==='player2'&&MY_SLOT===2);
    handleMatchEnd(iWon?'win':'loss','forfeit');
  });

  socket.on('game:result',function(d){
    if(d.postMessage&&!gameOver){
      hideLoading();
      var iWon=d.postMessage.result==='win';
      handleMatchEnd(iWon?'win':'loss','forfeit');
    }
  });
}

function startForfeitCountdown(seconds){

/* ══════════════════════════════════════════
   TIMERS SERVEUR — identique Dames
══════════════════════════════════════════ */
function stopTimer(){
  timerActive=false;
  if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}
  document.getElementById('timer-arc-human').style.strokeDashoffset=CIRC;
  document.getElementById('timer-arc-ai').style.strokeDashoffset=CIRC;
  document.getElementById('profile-human').className='profile';
  document.getElementById('profile-ai').className='profile';
}
function stopGraceTimer(){
  graceActive=false;
  if(graceRAF){cancelAnimationFrame(graceRAF);graceRAF=null;}
  var bar=document.getElementById('forfeit-bar');if(bar)bar.classList.remove('show');
}

/* FIX 1 : startTimer synchronisé serveur — identique Dames */
function startTimer(isMyTurn,serverStartTime){
  stopGraceTimer();stopTimer();
  if(gameOver||mancheOver||matchOver)return;
  timerActive=true;timerStart=serverStartTime||Date.now();
  var arcId=isMyTurn?'timer-arc-human':'timer-arc-ai';
  var profId=isMyTurn?'profile-human':'profile-ai';
  var arc=document.getElementById(arcId),prof=document.getElementById(profId);
  prof.classList.add('active',isMyTurn?'human-active':'ai-active');
  function tick(){
    if(!timerActive)return;
    var progress=Math.min((Date.now()-timerStart)/TIMER_DURATION,1);
    arc.style.strokeDashoffset=CIRC*progress;
    if(progress>=0.67)prof.classList.add('timer-urgent');
    if(progress<1){timerRAF=requestAnimationFrame(tick);}
    else{timerActive=false;/* Le serveur enverra ttt_turn_warning */}
  }
  timerRAF=requestAnimationFrame(tick);
}

/* FIX 1 : startGraceTimer — identique Dames */
function startGraceTimer(isMyTurn,serverStartTime,duration){
  stopTimer();stopGraceTimer();
  if(gameOver||mancheOver||matchOver)return;
  graceActive=true;
  var graceStart=serverStartTime||Date.now(),graceDuration=duration||60000;
  var bar=document.getElementById('forfeit-bar');
  var arcId=isMyTurn?'timer-arc-human':'timer-arc-ai';
  var profId=isMyTurn?'profile-human':'profile-ai';
  var arc=document.getElementById(arcId),prof=document.getElementById(profId);
  prof.classList.add('active',isMyTurn?'human-active':'ai-active','timer-urgent');
  function tick(){
    if(!graceActive)return;
    var elapsed=Date.now()-graceStart,remaining=Math.max(0,graceDuration-elapsed);
    arc.style.strokeDashoffset=CIRC*(graceDuration-remaining)/graceDuration;
    var secs=Math.ceil(remaining/1000);
    if(isMyTurn){bar.classList.add('show');bar.textContent='⚠️ Jouez maintenant — '+secs+'s avant défaite !';}
    else{bar.classList.add('show');bar.textContent='⏳ Adversaire doit jouer — '+secs+'s';}
    if(remaining>0){graceRAF=requestAnimationFrame(tick);}
    else{graceActive=false;bar.classList.remove('show');}
  }
  graceRAF=requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════
   CLIC CELLULE
══════════════════════════════════════════ */
function playCell(row,col){
  if(!gameReady||mancheOver||matchOver||isProcessing)return;
  if(currentPlayer!==MY_PLAYER)return;
  if(board[bIdx(row,col)])return;

  gameReady=false;isProcessing=true;
  /* Ici stopTimer est correct : le joueur vient de jouer — identique Dames afterPlayerStep */
  stopTimer();stopGraceTimer();
  pendingTimerData=null;

  placeSymbol(MY_SYMBOL,row,col);
  clearHL();

  if(socket&&socket.connected){
    socket.emit('ttt_move',{
      room:ROOM_ID,player:MY_SLOT,
      row:row,col:col,
      symbol:MY_SYMBOL,
      boardState:JSON.stringify(board),
      nextPlayer:1-MY_PLAYER
    });
  }

  var win=checkWin(board,MY_SYMBOL);
  if(win){handleWin(MY_SYMBOL,win);return;}
  if(isDraw(board)){handleDraw();return;}

  currentPlayer=1-MY_PLAYER;
  isProcessing=false;
  gameReady=true;
  updUI();
  if(!timerActive&&!graceActive)applyPendingTimer();
}

/* ══════════════════════════════════════════
   FIN DE MANCHE
══════════════════════════════════════════ */
function handleWin(winner,winLine){
  stopTimer();stopGraceTimer();pendingTimerData=null;
  mancheOver=true;manchesDone++;
  var humanWon=(winner===MY_SYMBOL);
  if(humanWon){matchW++;mancheResults.push('w');}
  else{matchR++;mancheResults.push('r');}
  mancheStarterPlayer=1-mancheStarterPlayer;
  updateDots();

  setTimeout(function(){
    var winPieces=[];
    for(var i=0;i<3;i++){var wcell=winLine[i];var piece=meshes[bIdx(wcell.row,wcell.col)];if(piece)winPieces.push(piece);}
    showWinLineHL(winLine,winner);
    startWinPulse(winPieces);
    setTimeout(function(){
      stopWinPulse();
      for(var i=0;i<winPieces.length;i++)winPieces[i].scale.set(1,1,1);
      var popped=0;
      winPieces.forEach(function(piece,i){
        setTimeout(function(){
          balloonPop(piece,function(){popped++;if(popped===winPieces.length){setTimeout(function(){clearBoardSilent(function(){finalizeManche(winner,humanWon);});},200);}});
        },i*250);
      });
    },2000);
  },620);
}

function handleDraw(){
  stopTimer();stopGraceTimer();pendingTimerData=null;
  mancheOver=true;manchesDone++;
  mancheResults.push('d');
  mancheStarterPlayer=1-mancheStarterPlayer;
  updateDots();
  setTimeout(function(){clearBoardSilent(function(){finalizeManche(null,false);});},500);
}

function finalizeManche(winner,humanWon){
  updUI();
  var maxManches=isTiebreaker?6:TOTAL_MANCHES;
  var manchesLeft=maxManches-manchesDone;
  var matchDecided=(matchR+manchesLeft<matchW)||(matchW+manchesLeft<matchR)||manchesDone===maxManches;

  if(matchDecided){
    var e2=winner&&humanWon?MY_SYMBOL:(winner&&!humanWon?OP_SYMBOL:'🤝');
    var t2=winner&&humanWon?'Manche gagnée !':(winner&&!humanWon?'Manche perdue !':'Nul !');
    showToast(e2,t2,'',1500,function(){showMatchResult();});
  }else{
    var mancheRem=maxManches-manchesDone;
    var e3=winner&&humanWon?MY_SYMBOL:(winner&&!humanWon?OP_SYMBOL:'🤝');
    var t3=winner&&humanWon?'Vous gagnez !':(winner&&!humanWon?OP_NAME+' gagne !':'Nul !');
    var s3=mancheRem+' manche'+(mancheRem>1?'s':'')+' restante'+(mancheRem>1?'s':'');
    var nextIsMe=(mancheStarterPlayer===MY_PLAYER);
    s3+='\n'+(nextIsMe?'Vous commencez':OP_NAME+' commence');
    showToast(e3,t3,s3,2400,function(){resetManche();});
  }
}

function showMatchResult(){
  stopTimer();stopGraceTimer();pendingTimerData=null;
  matchOver=true;gameOver=true;
  var iWon=matchW>matchR,isDraw2=matchW===matchR;
  if(iWon){
    showToast(MY_SYMBOL,'Victoire !',MY_NAME+' remporte la partie !\n'+matchW+' – '+matchR,3500,function(){createConfetti();sendResult('win','normal');});
  }else if(!isDraw2){
    showToast(OP_SYMBOL,'Défaite',OP_NAME+' remporte la partie !\n'+matchW+' – '+matchR,3500,function(){sendResult('loss','normal');});
  }else{
    if(!isTiebreaker){
      isTiebreaker=true;
      showToast('⚡','Égalité !','Manche décisive !',2500,function(){resetManche();});
    }else{
      showToast('🤝','Match nul !','Égalité totale après '+manchesDone+' manches.',3500,function(){sendResult('draw','normal');});
    }
  }
}

/* ── Fin par forfait/déconnexion — identique Dames ── */

  gameOver=true;matchOver=true;mancheOver=true;

    humanWon?'L\'adversaire a abandonné.':'Vous avez abandonné la partie.',
    3500,function(){sendResult(outcome,reason||'forfeit');});
}

var confettiCanvas=document.getElementById('confetti-canvas');

confettiCanvas.width=wrap.clientWidth;confettiCanvas.height=wrap.clientHeight;
var confettiParticles=[],confettiActive=false;
function createConfetti(){
  var colors=['#fbbf24','#f59e0b','#e2e8f0','#ffffff','#818cf8','#c084fc'],shapes=['circle','square','triangle'];
  for(var i=0;i<180;i++)confettiParticles.push({x:confettiCanvas.width/2,y:confettiCanvas.height/2,vx:(Math.random()-.5)*22,vy:(Math.random()-.5)*22-6,color:colors[Math.floor(Math.random()*colors.length)],shape:shapes[Math.floor(Math.random()*shapes.length)],size:Math.random()*10+5,rotation:Math.random()*360,rotationSpeed:(Math.random()-.5)*12,gravity:0.32,drag:0.985,life:1.0});
  confettiActive=true;
}
function updateConfetti(){
  if(!confettiActive)return;confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);var anyAlive=false;
  for(var i=confettiParticles.length-1;i>=0;i--){
    var p=confettiParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=p.drag;p.vy*=p.drag;p.rotation+=p.rotationSpeed;p.life-=0.004;
    if(p.life>0&&p.y<confettiCanvas.height+60){
      anyAlive=true;confettiCtx.save();confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rotation*Math.PI/180);confettiCtx.globalAlpha=p.life;confettiCtx.fillStyle=p.color;
      if(p.shape==='circle'){confettiCtx.beginPath();confettiCtx.arc(0,0,p.size/2,0,Math.PI*2);confettiCtx.fill();}
      else if(p.shape==='square'){confettiCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);}
      else{confettiCtx.beginPath();confettiCtx.moveTo(0,-p.size/2);confettiCtx.lineTo(p.size/2,p.size/2);confettiCtx.lineTo(-p.size/2,p.size/2);confettiCtx.closePath();confettiCtx.fill();}
      confettiCtx.restore();
    }
  }
  if(!anyAlive){confettiActive=false;confettiParticles=[];confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}
}

  var dTheta=tTheta-sTheta;while(dTheta>Math.PI)dTheta-=Math.PI*2;while(dTheta<-Math.PI)dTheta+=Math.PI*2;

var ray=new THREE.Raycaster(),mouse2=new THREE.Vector2();
function hitTest(cx,cy){
  if(mancheOver||matchOver||isProcessing)return;
  var rect=renderer.domElement.getBoundingClientRect();
  mouse2.x=((cx-rect.left)/rect.width)*2-1;
  mouse2.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse2,camera);
  var hits=ray.intersectObjects(boardGroup.children);
  for(var i=0;i<hits.length;i++){
    var ud=hits[i].object.userData;
    if(ud.row!==undefined&&!board[bIdx(ud.row,ud.col)]){playCell(ud.row,ud.col);return;}
  }
}
function hoverTest(cx,cy){
  if(mancheOver||isProcessing||currentPlayer!==MY_PLAYER)return;
  var rect=renderer.domElement.getBoundingClientRect();
  mouse2.x=((cx-rect.left)/rect.width)*2-1;
  mouse2.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse2,camera);
  var hits=ray.intersectObjects(boardGroup.children);
  for(var i=0;i<hits.length;i++){
    var ud=hits[i].object.userData;
    if(ud.row!==undefined&&!board[bIdx(ud.row,ud.col)]){showHL(ud.row,ud.col);return;}
  }
  clearHL();
}

var pinD0=null,pinCam0=null,dragS=null,th0=0,ph0=0,tapS=null,tapT=0,tapMoved=false;
function pinLen(e){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
renderer.domElement.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===2){pinD0=pinLen(e);pinCam0=camD;dragS=null;tapS=null;tapMoved=true;}else{tapT=Date.now();tapMoved=false;tapS={x:e.touches[0].clientX,y:e.touches[0].clientY};dragS={x:e.touches[0].clientX,y:e.touches[0].clientY};th0=camTheta;ph0=camPhi;}},{passive:false});
renderer.domElement.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===2&&pinD0!==null){camD=Math.max(7,Math.min(32,pinCam0*(pinD0/pinLen(e))));setCam();tapMoved=true;}else if(e.touches.length===1&&dragS){var dx=e.touches[0].clientX-dragS.x,dy=e.touches[0].clientY-dragS.y;if(Math.sqrt(dx*dx+dy*dy)>6){if(!topViewAnimating){camTheta=th0-dx*0.010;camPhi=Math.max(0.20,Math.min(1.45,ph0-dy*0.008));setCam();}tapMoved=true;}}},{passive:false});
renderer.domElement.addEventListener('touchend',function(e){e.preventDefault();pinD0=null;if(!tapMoved&&tapS&&e.changedTouches.length){var t=e.changedTouches[0],dx=t.clientX-tapS.x,dy=t.clientY-tapS.y;if(Math.sqrt(dx*dx+dy*dy)<12&&Date.now()-tapT<400)hitTest(t.clientX,t.clientY);}dragS=null;tapS=null;},{passive:false});

var mDown=false,mLast=null,mMoved=false;
renderer.domElement.addEventListener('mousedown',function(e){mDown=true;mLast={x:e.clientX,y:e.clientY};mMoved=false;});

/* ══════════════════════════════════════════
   BOUCLE DE RENDU
══════════════════════════════════════════ */
var at=0;
function renderLoop(){
  requestAnimationFrame(renderLoop);
  at+=0.016;

  for(var i=0;i<hlGroup.children.length;i++)hlGroup.children[i].material.opacity=0.12+Math.sin(at*2)*0.08;
  if(autoRotate&&!topViewAnimating){camTheta+=0.007;setCam();}

  var rawTV=camTheta-prevTheta,rawPV=camPhi-prevPhi;
  var MAX_VEL=0.008;
  smoothThetaVel+=(Math.max(-MAX_VEL,Math.min(MAX_VEL,rawTV))-smoothThetaVel)*0.18;
  smoothPhiVel+=(Math.max(-MAX_VEL,Math.min(MAX_VEL,rawPV))-smoothPhiVel)*0.18;
  prevTheta=camTheta;prevPhi=camPhi;

  var phiTilt=camPhi-0.78;
  var gX=-Math.sin(camTheta)*phiTilt*1.0+Math.cos(camTheta)*smoothThetaVel*14;
  var gZ=-Math.cos(camTheta)*phiTilt*1.0-Math.sin(camTheta)*smoothThetaVel*14;
  var gMag=Math.sqrt(gX*gX+gZ*gZ),MAX_G=0.5;
  if(gMag>MAX_G){gX=gX/gMag*MAX_G;gZ=gZ/gMag*MAX_G;}

  for(var pi=0;pi<piecesGroup.children.length;pi++){
    var piece=piecesGroup.children[pi];
    if(piece.userData.row===undefined)continue;
    var ph=getPiecePhysics(piece);
    var gx2=gX*ph.gravScale/ph.mass,gz2=gZ*ph.gravScale/ph.mass;
    ph.vx+=gx2*0.042-ph.ox*ph.spring;ph.vz+=gz2*0.042-ph.oz*ph.spring;
    ph.vx*=ph.friction;ph.vz*=ph.friction;ph.ox+=ph.vx;ph.oz+=ph.vz;
    var dist=Math.sqrt(ph.ox*ph.ox+ph.oz*ph.oz);
    if(dist>ph.maxSlide){var ov=dist-ph.maxSlide;ph.ox-=(ph.ox/dist)*ov*0.6;ph.oz-=(ph.oz/dist)*ov*0.6;ph.vx*=0.25;ph.vz*=0.25;}
    var si=(smoothThetaVel)*ph.spinSensitivity*ph.spinDir*0.28+(smoothPhiVel)*ph.spinSensitivity*ph.spinDir*0.12;
    ph.spinVel+=si;if(Math.abs(ph.spinVel)>ph.maxSpinVel)ph.spinVel=ph.maxSpinVel*(ph.spinVel>0?1:-1);
    ph.spinVel*=ph.spinFriction;ph.ry+=ph.spinVel;
    var tRx=ph.vz*ph.leanMult,tRz=-ph.vx*ph.leanMult;ph.rx+=(tRx-ph.rx)*ph.leanSmooth;ph.rz+=(tRz-ph.rz)*ph.leanSmooth;
    var age=(Date.now()-ph.birthTime)/1000;
    var calm=age<4?1.0:age<9?Math.pow(1-(age-4)/5,1.8):0.04;
    var t=at;
    var idleX=(Math.sin(t*ph.wobbleFreq+ph.wobblePhase)*ph.wobbleAmp+Math.cos(t*ph.wobbleFreq2+ph.wobblePhase2)*ph.wobbleAmp2+Math.sin(t*ph.wobbleFreq3+ph.wobblePhase3)*ph.wobbleAmp3)*calm;
    var idleZ=(Math.cos(t*ph.wobbleFreq+ph.wobblePhase)*ph.wobbleAmp+Math.sin(t*ph.wobbleFreq2+ph.wobblePhase2)*ph.wobbleAmp2+Math.cos(t*ph.wobbleFreq3+ph.wobblePhase3)*ph.wobbleAmp3)*calm;
    var hoverY=(Math.abs(Math.sin(t*ph.hoverFreq+ph.hoverPhase))*ph.hoverAmp+Math.abs(Math.sin(t*ph.hoverFreq2+ph.hoverPhase2))*ph.hoverAmp2)*calm;
    var chTX=(Math.sin(t*ph.tiltFreq+ph.tiltPhase)*ph.tiltAmp+Math.cos(t*ph.tiltFreq2+ph.tiltPhase2)*ph.tiltAmp2)*calm;
    var chTZ=(Math.cos(t*ph.tiltFreq+ph.tiltPhase)*ph.tiltAmp*0.7+Math.sin(t*ph.tiltFreq2+ph.tiltPhase2)*ph.tiltAmp2*0.7)*calm;
    var lazyYaw=Math.sin(t*ph.lazyYawFreq+ph.lazyYawPhase)*ph.lazyYawAmp*calm;
    piece.position.x=(piece.userData.col-1)*2+ph.ox+idleX;
    piece.position.z=(piece.userData.row-1)*2+ph.oz+idleZ;
    piece.position.y=0.35+hoverY;
    piece.rotation.x=ph.rx+chTX;piece.rotation.z=ph.rz+chTZ;piece.rotation.y=ph.ry+lazyYaw;
  }

  if(boardShake.active){
    var elapsed=Date.now()-boardShake.startTime,bp=Math.min(elapsed/boardShake.duration,1);
    var env=Math.pow(1-bp,2.2);
    var sRx=Math.sin(elapsed*0.001*boardShake.freqX)*boardShake.ampX*env;
    var sRz=Math.sin(elapsed*0.001*boardShake.freqZ+1.1)*boardShake.ampZ*env;
    var sPx=Math.sin(elapsed*0.001*boardShake.freqPos)*boardShake.ampPos*env;
    var sPz=Math.cos(elapsed*0.001*boardShake.freqPos*0.8+0.7)*boardShake.ampPos*env;
    var sGroups=[boardGroup,piecesGroup,hlGroup,winHlGroup,particlesGroup];
    for(var sg=0;sg<sGroups.length;sg++){sGroups[sg].rotation.x=sRx;sGroups[sg].rotation.z=sRz;sGroups[sg].position.x=sPx;sGroups[sg].position.z=sPz;}
    if(bp>=1){boardShake.active=false;for(var sg=0;sg<sGroups.length;sg++){sGroups[sg].rotation.x=0;sGroups[sg].rotation.z=0;sGroups[sg].position.x=0;sGroups[sg].position.z=0;}}
  }

  updateParticles();updateConfetti();
  renderer.render(scene,camera);
}
renderLoop();

/* INIT */
initSocket();

})();
</script>
